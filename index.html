              const parent = rawPath.split('/').slice(0, -1).join('/');
              for (const v of variants) {
                for (const e of exts) {
                  pushIf(`${parent}/${v}${e}`);
                  pushIf(`${parent}/${v.replace(/\s+/g, '')}${e}`);
                  pushIf(`${parent}/${basename(v)}${e}`);
                }
              }
            }
          }
        }
      } catch (e) { /* ignore */ }

      // 3) try root level images
      for (const v of variants) {
        for (const e of exts) {
          pushIf(`./${v}${e}`);
          pushIf(`./${v.replace(/\s+/g, '')}${e}`);
        }
      }

      // 4) try ./Movies/<Folder>.<ext> and flat variants
      for (const v of variants) {
        for (const e of exts) {
          pushIf(`./Movies/${v}${e}`);
          pushIf(`./${v}${e}`);
        }
      }

      // 5) last fallbacks
      pushIf('./Images/default.jpg');
      pushIf('./Images/placeholder.jpg');

      return candidates;
    }

    // Render favorites (sorted)
    sortedFavs.forEach(folderName => {
      try {
        const tile = document.createElement('div');
        tile.className = 'folder';

        const candidates = buildImageCandidates(folderName);

        let imgIndex = 0;
        const imgEl = document.createElement('img');
        imgEl.alt = folderName;
        imgEl.style.width = '150px';
        imgEl.style.height = '210px';
        imgEl.style.objectFit = 'cover';
        imgEl.style.borderRadius = '10px';

        imgEl.onerror = function() {
          if (imgIndex < candidates.length - 1) {
            imgIndex++;
            this.src = candidates[imgIndex];
          } else {
            this.onerror = null;
          }
        };

        imgEl.src = candidates[0];

        // Title: use folder name for season/series folders. Use episode name only for single-file movie folders
        let titleText = folderName;
        if (typeof episodes !== 'undefined' && episodes && episodes[folderName] && Array.isArray(episodes[folderName]) && episodes[folderName].length === 1) {
          const first = episodes[folderName][0];
          if (first && first.name) {
            const normalizedFolder = folderName.trim().toLowerCase();
            const normalizedName = first.name.trim().toLowerCase();
            if (normalizedFolder === normalizedName) titleText = first.name;
          }
        }

        const titleP = document.createElement('p');
        titleP.style.fontSize = '16px';
        titleP.style.fontWeight = 'bold';
        titleP.style.color = '#fff';
        titleP.style.margin = '10px 0 0';
        titleP.innerText = titleText;

        tile.appendChild(imgEl);
        tile.appendChild(titleP);

        tile.onclick = () => {
          try {
            currentFolder = folderName;

            if (typeof window.openFolderByName === 'function') {
              window.openFolderByName(folderName);
              return;
            }

            if (window._specialFolderHandlers && typeof window._specialFolderHandlers[folderName] === 'function') {
              try { window._specialFolderHandlers[folderName](); return; } catch (e) { console.warn('special handler failed', e); }
            }

            if (typeof tryCallCandidates === 'function') {
              try {
                const handled = tryCallCandidates(folderName);
                if (handled) return;
              } catch (e) { console.warn('tryCallCandidates failed', e); }
            }

            if (typeof loadEpisodes === 'function') {
              try { loadEpisodes(folderName); return; } catch (e) { console.warn('loadEpisodes failed', e); }
            }

            alert('Could not open favorite: ' + folderName);
          } catch (e) {
            console.warn('favorite tile click failed for', folderName, e);
            try { loadEpisodes(folderName); } catch (_) { alert('Could not open favorite: ' + folderName); }
          }
        };

        folderContainer.appendChild(tile);
      } catch (e) {
        console.warn('render favorite failed', folderName, e);
      }
    });

    // BOTTOM Back button (same as top)
    const bottomBackButton = document.createElement('button');
    bottomBackButton.className = 'return-button';
    bottomBackButton.innerText = 'Back to Title Selection';
    bottomBackButton.onclick = () => {
      folderContainer.innerHTML = '';
      loadMainFolders();
    };
    bottomBackButton.style.marginTop = '12px';
    folderContainer.appendChild(bottomBackButton);

  } catch (e) {
    console.warn('loadFavorites error', e);
    folderContainer.innerHTML = '<p style="color:white">Failed to load favorites.</p>';
  }
}

/* === NEW: show/hide the top bar buttons without moving them === */
(function() {
  const video = document.getElementById('video'); // may be null for some pages
  const player = document.getElementById('videoPlayer');
  const returnBtn = document.getElementById('returnBtn');
  const sendBtn = document.getElementById('sendTVBtn');
  const favoriteBtn = document.getElementById('favoriteBtn');

  // If none of the relevant elements exist, bail early
  if (!player || (!returnBtn && !sendBtn && !favoriteBtn)) {
    return;
  }

  // Inject a small helper CSS class (idempotent)
  if (!document.getElementById('hidden-by-player-style')) {
    const s = document.createElement('style');
    s.id = 'hidden-by-player-style';
    // use display:none so elements are removed from layout when hidden
    s.textContent = `
      .hidden-by-player {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    `;
    document.head.appendChild(s);
  }

  // Robust check whether the player is actually visible in layout and not hidden by CSS
  function isPlayerActuallyVisible() {
    try {
      if (!player.isConnected) return false;
      if (player.style && player.style.display === 'none') return false;
      if (player.offsetParent === null) return false;
      const r = player.getBoundingClientRect();
      if (!r || r.width === 0 || r.height === 0) return false;
      const cs = window.getComputedStyle(player);
      if (!cs) return false;
      if (cs.visibility === 'hidden' || Number(cs.opacity) === 0) return false;
      return true;
    } catch (err) {
      return false;
    }
  }

  // Show only when player is present/visible AND the video is not playing
  function updateButtonsVisibility() {
    const playerVisible = isPlayerActuallyVisible();
    const videoNotPlaying = !video || video.paused || video.ended;
    const shouldShow = playerVisible && videoNotPlaying;

    // Buttons to manage: return, send, favorite (any may be null)
    [returnBtn, sendBtn, favoriteBtn].forEach(btn => {
      if (!btn) return;
      if (shouldShow) {
        btn.classList.remove('hidden-by-player');
        btn.setAttribute('aria-hidden', 'false');
        // ensure focusable / interactive
        btn.style.pointerEvents = '';
      } else {
        btn.classList.add('hidden-by-player');
        btn.setAttribute('aria-hidden', 'true');
        // ensure not interactive
        btn.style.pointerEvents = 'none';
      }
    });
  }

  // Attach to media events if video exists
  if (video) {
    ['play', 'pause', 'ended', 'loadedmetadata', 'emptied'].forEach(evt => {
      try { video.addEventListener(evt, updateButtonsVisibility, { passive: true }); } catch(e){}
    });
  }

  // Observe attribute changes on the player (style/class toggles)
  try {
    const mo = new MutationObserver(() => updateButtonsVisibility());
    mo.observe(player, { attributes: true, attributeFilter: ['style', 'class'] });
  } catch (e) {
    // MutationObserver not available — still fine
  }

  // Also watch for window resize / scroll in case layout changes cause player to become 0-sized
  window.addEventListener('resize', updateButtonsVisibility, { passive: true });
  window.addEventListener('scroll', updateButtonsVisibility, { passive: true });

  // Initial run
  setTimeout(updateButtonsVisibility, 40);
})();

<script>
(function () {
  // config
  const INACTIVITY_MS = 15000; // 15s before slideshow when idle
  const SLIDE_MS = 7500;       // time per slide
  const FADE_MS = 600;
  const AlbumsRoot = '/Albums/'; // matches albums.html
  const IMAGE_RE = /\.(jpe?g|png|gif|webp|avif|heic)$/i;
  const PROFILE_KEYS = ['activeProfile','chosenProfile','selectedProfile','profile','activeProfileName'];

  // state
  let inactivityTimer = null;
  let slideTimer = null;
  let playingSlideshow = false;
  let images = [];
  let idx = -1;
  let lastActivity = Date.now();

  // overlay / two image slots
  let overlay = document.getElementById('tvdAlbumScreensaver');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tvdAlbumScreensaver';
    Object.assign(overlay.style, {
      position: 'fixed', inset: '0', zIndex: 99990, display: 'none',
      alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.95)',
      backdropFilter: 'blur(4px)', cursor: 'default', overflow: 'hidden'
    });
    overlay.innerHTML = `
      <div id="tvdScrInner" style="width:100%;height:100%;display:block;position:relative;overflow:hidden;">
        <img id="tvdScrA" style="position:absolute; top:0; left:0; height:100%; width:100%; object-fit:contain; opacity:0; transition:opacity ${FADE_MS}ms ease;">
        <img id="tvdScrB" style="position:absolute; top:0; right:0; height:100%; width:100%; object-fit:contain; opacity:0; transition:opacity ${FADE_MS}ms ease;">
        <div id="tvdScrCaption" style="position:absolute; left:20px; bottom:24px; color:rgba(255,255,255,0.0); font-weight:600;"></div>
      </div>`;
    document.body.appendChild(overlay);
  }

  const imgA = document.getElementById('tvdScrA');
  const imgB = document.getElementById('tvdScrB');
  const caption = document.getElementById('tvdScrCaption');

  // helpers
  function getStoredProfile() {
    for (const k of PROFILE_KEYS) {
      try { const v = localStorage.getItem(k); if (v) return v; } catch (e) {}
    }
    return 'Guest';
  }
  function basenameFromPath(p) { if (!p) return ''; const parts = p.split('/').filter(Boolean); return parts[parts.length-1] || p; }

  async function listImagesForProfile(profile) {
    const dir = `${AlbumsRoot}${encodeURIComponent(profile)}/`;
    try {
      const r = await fetch(dir, { cache: 'no-store' });
      if (r && r.ok) {
        const html = await r.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const anchors = Array.from(doc.querySelectorAll('a[href]')).map(a => a.getAttribute('href') || '');
        const resolved = anchors.map(h => {
          try { return new URL(h, location.origin + dir).href; } catch(e) { return (dir + h); }
        }).filter(Boolean).map(s=>s.split('#')[0].split('?')[0]);
        const imgs = resolved.filter(u => IMAGE_RE.test(basenameFromPath(u)));
        if (imgs.length) return imgs;
      }
    } catch (e) { /* ignore and fallback */ }

    try {
      const candidateNames = [
        `${profile}-albums.json`,
        `${profile}-album-unsorted.json`,
        `${profile}-album-default.json`
      ];
      for (const name of candidateNames) {
        try {
          const r2 = await fetch(`./Profiles/${name}?t=${Date.now()}`, { cache: 'no-store' });
          if (r2 && r2.ok) {
            const arr = await r2.json();
            if (Array.isArray(arr) && arr.length) {
              return arr.map(n => `${AlbumsRoot}${profile}/${n}`);
            }
          }
        } catch(e){ /* ignore */ }
      }
    } catch (e) {}

    return [];
  }

  // prefetch and decode with returned Image element (natural sizes available)
  async function prefetchImageElement(url) {
    return new Promise((res, rej) => {
      const im = new Image();
      im.decoding = 'async';
      im.onload = () => res(im);
      im.onerror = () => rej(new Error('img load fail: ' + url));
      im.src = url;
    });
  }

  function fillsViewportFromNatural(nw, nh) {
    if (!nw || !nh) return false;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / nw, vh / nh);
    const dw = nw * scale;
    const dh = nh * scale;
    // treat as filling if it would cover most of viewport
    return (dw >= vw * 0.85 && dh >= vh * 0.85);
  }

  function resetSlotStyles() {
    // normalize both slots to default single-image layout
    [imgA, imgB].forEach(el => {
      el.style.transition = `opacity ${FADE_MS}ms ease`;
      el.style.top = '0';
      el.style.height = '100%';
      el.style.objectFit = 'contain';
      el.style.left = '0';
      el.style.right = 'auto';
      el.style.width = '100%';
      el.style.opacity = '0';
    });
  }

  function hideOverlay() {
    if (!playingSlideshow) return;
    playingSlideshow = false;
    overlay.style.display = 'none';
    clearTimeout(slideTimer);
    slideTimer = null;
    idx = -1;
    imgA.src = imgB.src = '';
    imgA.style.opacity = imgB.style.opacity = '0';
  }

  // Atomic advance: decide pairing, preload all needed, then set layout + fade
  async function advance() {
    if (!playingSlideshow || !images.length) { hideOverlay(); return; }

    // choose next primary index
    idx = (idx + 1) % images.length;
    const primarySrc = images[idx];
    let secondarySrc = null;

    // preload primary to read natural dimensions
    let primaryImgEl;
    try {
      primaryImgEl = await prefetchImageElement(primarySrc);
    } catch (e) {
      console.warn('screensaver: primary preload failed', primarySrc, e);
      // skip this and go to next
      slideTimer = setTimeout(advance, SLIDE_MS);
      return;
    }

    const primaryFills = fillsViewportFromNatural(primaryImgEl.naturalWidth, primaryImgEl.naturalHeight);

    if (!primaryFills && images.length > 1) {
      // choose a secondary candidate (prefer next in list)
      const candidateIdx = (idx + 1) % images.length;
      secondarySrc = images[candidateIdx];
    }

    // preload any secondary
    let secondaryImgEl = null;
    if (secondarySrc) {
      try {
        secondaryImgEl = await prefetchImageElement(secondarySrc);
      } catch (e) {
        // fallback: if secondary fails, show primary alone
        console.warn('screensaver: secondary preload failed', secondarySrc, e);
        secondarySrc = null;
      }
    }

    // Now that all needed images are preloaded, set layout and swap sources atomically.
    // We'll use imgA as "left slot" and imgB as "right slot" when pairing.
    // We'll fade both in together so no element changes while visible.

    // prepare slots
    resetSlotStyles();

    if (secondarySrc) {
      // Pair: left = primary, right = secondary
      imgA.style.left = '0';
      imgA.style.right = 'auto';
      imgA.style.width = '50%';

      imgB.style.right = '0';
      imgB.style.left = 'auto';
      imgB.style.width = '50%';

      // place new images while invisible
      imgA.style.opacity = '0';
      imgB.style.opacity = '0';
      imgA.src = primarySrc;
      imgB.src = secondarySrc;

      // set caption hidden (we removed text earlier); kept but invisible
      caption.textContent = '';

      // fade both in together
      // use RAF to ensure the browser notices the new src/styles before transition
      requestAnimationFrame(() => {
        // small delay to allow image decode & style application
        requestAnimationFrame(() => {
          imgA.style.opacity = '1';
          imgB.style.opacity = '1';
        });
      });

      // advance idx an extra step so we don't immediately repeat the secondary as primary
      // (this makes the pair atomic: primary+secondary are consumed together)
      idx = (idx + 1) % images.length;
    } else {
      // Single fullscreen image
      imgA.style.left = '0';
      imgA.style.right = '0';
      imgA.style.width = '100%';

      imgB.style.opacity = '0'; // ensure other slot hidden
      // set primary into left slot (A)
      imgA.style.opacity = '0';
      imgA.src = primarySrc;
      caption.textContent = '';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          imgA.style.opacity = '1';
        });
      });
    }

    // schedule next
    slideTimer = setTimeout(advance, SLIDE_MS);
  }

  async function startSlideshowIfAppropriate() {
    if (playingSlideshow) return;
    const vid = (window.vid || document.querySelector('video'));
    const noMediaPlaying = !vid || vid.paused || vid.ended || !vid.currentSrc || vid.readyState === 0;
    if (!noMediaPlaying) return;

    const profile = getStoredProfile();
    const fetched = await listImagesForProfile(profile);
    if (!fetched || !fetched.length) return;

    // randomize once per start
    images = fetched.slice();
    for (let i = images.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [images[i], images[j]] = [images[j], images[i]];
    }

    // start
    playingSlideshow = true;
    idx = -1;
    overlay.style.display = 'flex';
    // ensure both slots are reset
    resetSlotStyles();

    // preload first slide proactively: advance() will do the decode logic, so call it once
    slideTimer = setTimeout(advance, 60);
  }

  // user activity handlers (stop slideshow)
  function onUserActivity(e) {
    lastActivity = Date.now();
    if (playingSlideshow) {
      hideOverlay();
    }
    resetInactivityTimer();
  }
  function resetInactivityTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(async () => {
      const vid = (window.vid || document.querySelector('video'));
      const noMediaPlaying = !vid || vid.paused || vid.ended || !vid.currentSrc || vid.readyState === 0;
      if (noMediaPlaying) await startSlideshowIfAppropriate();
    }, INACTIVITY_MS);
  }

  function onPlaybackStart() {
    if (playingSlideshow) hideOverlay();
    resetInactivityTimer();
  }

  function setInputMode(mode) {
    try {
      const root = document.documentElement;
      if (!root) return;
      root.classList.toggle('using-pointer', mode === 'pointer');
      root.classList.toggle('using-keyboard', mode === 'keyboard');
    } catch (e) {}
  }

  ['mousemove','mousedown','pointerdown','pointermove','click','wheel','touchstart','touchmove'].forEach(ev => {
    window.addEventListener(ev, function(e) {
      setInputMode('pointer');
      onUserActivity(e);
    }, { passive: true });
  });

  window.addEventListener('keydown', function(e) {
    setInputMode('keyboard');
    onUserActivity(e);
  }, { passive: true });

  setInputMode('keyboard');

  function wireVideoEvents() {
    const vid = (window.vid || document.querySelector('video'));
    if (!vid) return;
    vid.addEventListener('play', onPlaybackStart, { passive: true });
    vid.addEventListener('playing', onPlaybackStart, { passive: true });
    vid.addEventListener('pause', () => { resetInactivityTimer(); }, { passive: true });
    vid.addEventListener('ended', () => { resetInactivityTimer(); }, { passive: true });
  }

  document.addEventListener('DOMContentLoaded', () => { wireVideoEvents(); resetInactivityTimer(); });
  try { wireVideoEvents(); resetInactivityTimer(); } catch(e){}

  const mo = new MutationObserver(() => { if (document.querySelector('video')) wireVideoEvents(); });
  mo.observe(document.body, { childList: true, subtree: true });

  // debug / control surface
  window._tvdScreensaver = {
    start: startSlideshowIfAppropriate,
    stop: hideOverlay,
    isRunning: () => playingSlideshow,
    resetTimer: resetInactivityTimer
  };
})();

</script>

<script>
(function () {
  const overlay = document.getElementById('setupOverlay');
  const iframe = document.getElementById('setupIframe');

  function setSetupOverlayVisible(show) {
    if (!overlay) return;
    overlay.classList.toggle('show', !!show);
    overlay.setAttribute('aria-hidden', show ? 'false' : 'true');
  }

  function hasSetupQuery() {
    try {
      return new URLSearchParams(window.location.search || '').has('setup');
    } catch (e) {
      return false;
    }
  }

  function stripSetupQuery() {
    try {
      const url = new URL(window.location.href);
      url.searchParams.delete('setup');
      const next = `${url.pathname}${url.searchParams.toString() ? '?' + url.searchParams.toString() : ''}${url.hash || ''}`;
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, '', next);
      }
    } catch (e) {}
  }

  function openSetupOverlay() {
    if (!overlay) return;
    if (iframe && iframe.src.indexOf('embedded=1') === -1) {
      const url = new URL(iframe.getAttribute('src'), window.location.href);
      url.searchParams.set('embedded', '1');
      iframe.src = url.toString();
    }
    setSetupOverlayVisible(true);
  }

  function closeSetupOverlay(shouldReload = false) {
    setSetupOverlayVisible(false);
    stripSetupQuery();
    if (shouldReload) {
      setTimeout(() => {
        try {
          window.location.reload();
        } catch (e) {}
      }, 50);
    }
  }

  window.addEventListener('message', function (event) {
    try {
      if (event.origin !== window.location.origin) return;
    } catch (e) {
      return;
    }
    const data = event.data || {};
    if (data.type === 'setup-close-request' || data.type === 'setup-finished') {
      closeSetupOverlay(true);
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    if (hasSetupQuery()) openSetupOverlay();
  });

  if (hasSetupQuery()) openSetupOverlay();
})();
</script>
