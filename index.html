<!-- KID MODE storage & helpers: paste this once near the top of the page (before code that checks URL params) -->
<script>
(function(){
  const KID_KEY = 'kidsMode'; // values: 'l' = kids, 'I' = adult

  function readQuery() {
    try {
      const p = new URLSearchParams(window.location.search || '');
      if (p.has('l')) return 'l';
      if (p.has('I')) return 'I';
    } catch(e){ /* ignore */ }
    return null;
  }

  function setStore(val) {
    try {
      if (val === 'l' || val === 'I') localStorage.setItem(KID_KEY, val);
      else localStorage.removeItem(KID_KEY);
    } catch(e){ console.warn('kidsMode setStore error', e); }
  }

  // Public helpers
window.setKidsModeFromQuery = function(){
  const q = readQuery();

  // If URL explicitly provides a mode, store it
  if (q) {
    setStore(q);
    return;
  }

  // No URL param:
  // if nothing has ever been stored, default to kids mode once
  try {
    const existing = localStorage.getItem(KID_KEY);

    if (existing !== 'l' && existing !== 'I') {
      localStorage.setItem(KID_KEY, 'l');
    }
  } catch(e) {
    console.warn('kidsMode default init error', e);
  }
};

  window.isKidsModeActive = function(){
    // Priority: explicit query (so a fresh ?l always takes effect even if storage missing),
    // otherwise use stored value.
    const q = readQuery();
    if (q) return q === 'l';
    try {
      return localStorage.getItem(KID_KEY) === 'l';
    } catch(e){ return false; }
  };

  window.updateQRButtonVisibility = function(){
    const kidsMode = window.isKidsModeActive && window.isKidsModeActive();
    const originalQRBtn = document.getElementById('originalQRBtn');
    const kidsQRBtn = document.getElementById('kidsQRBtn');

    if (originalQRBtn) {
      originalQRBtn.style.display = kidsMode ? 'none' : '';
    }
    if (kidsQRBtn) {
      kidsQRBtn.style.display = '';
    }
  };

  // Run once early on load so other inline scripts see the stored value.
  try { window.setKidsModeFromQuery(); } catch(e){}
})();
</script>

<script>

        
function showHomeButton() {
  document.getElementById("profilesButton").style.display = "none";
  document.getElementById("homeButton").style.display = "inline-block";
}

function showProfilesButton() {
  document.getElementById("homeButton").style.display = "none";

function returnToHome() {
  // First: remove any temporary "Continue"/action containers so they don't persist
  // across navigation. This removes #series-continue-container and #movie-action-container.
  try {
    if (typeof cleanupResumeActionContainers === 'function') {
      cleanupResumeActionContainers();
    } else {
      // defensive fallback: try removing known IDs/classes directly
      try { const sc = document.getElementById('series-continue-container'); if (sc && sc.parentNode) sc.parentNode.removeChild(sc); } catch(e){}
      try { const mc = document.getElementById('movie-action-container'); if (mc && mc.parentNode) mc.parentNode.removeChild(mc); } catch(e){}
      try { Array.from(document.querySelectorAll('.movie-action-container')).forEach(el => { if (el && el.parentNode) el.parentNode.removeChild(el); }); } catch(e){}
    }
  } catch (e) {
    console.warn('returnToHome cleanup failed', e);
  }

  // Hide player + pause video
  const vp = document.getElementById("videoPlayer");
  if (vp) vp.style.display = "none";
  const topNow = document.getElementById("topNowPlaying");
  if (topNow) topNow.style.display = "none";
  const video = document.getElementById("video");
  if (video) try { video.pause(); } catch(e){}

  // Reset folder UI state and load main folders
  try { folderContainer.innerHTML = ""; } catch(e){}
  lastFolderScroll = 0;
  lastViewedFolder = null;
  try { window.scrollTo({top:0, behavior:'auto'}); } catch(e){}

  loadMainFolders();
  showProfilesButton();
}

function fetchVersion() {

        function fetchColor() {
    return fetch(`color.txt?${new Date().getTime()}`)

        .then(color => color.trim());
}

        function getCurrentVersion() {
            return localStorage.getItem('currentVersion');
        }

        function setCurrentVersion(version) {
            localStorage.setItem('currentVersion', version);
        }

        function checkVersion() {
            fetchVersion().then(newVersion => {
                const currentVersion = getCurrentVersion();
                if (currentVersion !== newVersion) {
                    setCurrentVersion(newVersion);
                    location.reload(true); // Force a full reload
                }
            });
        }




window.onload = async () => {

function normalizeSeasonsArrayInPlace(arr) {
  if (!Array.isArray(arr)) return;

  const urlParams = new URLSearchParams(window.location.search || '');
  const kidsMode = urlParams.has('l');

  for (let i = arr.length - 1; i >= 0; i--) {
    const v = arr[i];
    if (typeof v !== 'string') continue;

    const isAdult = v.indexOf('*') !== -1;
    const cleaned = v.replace(/\*/g, '').trim();

    if (kidsMode && isAdult) {
      arr.splice(i, 1);
    } else {
      arr[i] = cleaned;
    }
  }
}
(function applyProfileTheme() {
  const fallbackThemes = [
    '#0B0F13',
    '#0D1B2A',
    '#102A43',
    '#143642',
    '#0E2D23',
    '#2D1F2F',
    '#3A0F0F',
    '#2C1B20',
    '#1F1323',
    '#231F20',
    '#1C2232',
    '#2A2F36',
    '#3B2F2B',
    '#23303B',
    '#1A2634',
    '#261728',
    '#2B1A4A',
    '#1B2B34',
    '#311E2E',
    '#0F1720'
  ];

  function normalizeHexColor(value) {
    let hex = String(value || '').trim();
    if (!hex) return '';
    hex = hex.replace(/^0x/i, '').replace(/\s+/g, '');
    if (!hex.startsWith('#')) hex = `#${hex}`;

    if (/^#([0-9a-fA-F]{3})$/.test(hex)) {
      return '#' + hex.slice(1).split('').map(ch => ch + ch).join('').toUpperCase();
    }
    if (/^#([0-9a-fA-F]{6})$/.test(hex)) {
      return '#' + hex.slice(1).toUpperCase();
    }
    return '';
  }

  function readableTextColor(bgHex) {
    const hex = normalizeHexColor(bgHex);
    if (!hex) return '#F2F2F2';

    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;

    return luminance > 0.58 ? '#111111' : '#F2F2F2';
  }

  function normalizeProfile(item) {
    if (!item) return null;
    if (typeof item === 'string') {
      return { name: item, bgColors: [] };
    }

    const name = String(item.name || item.id || item.label || 'Guest').trim() || 'Guest';
    const rawColors = Array.isArray(item.bgColors)
      ? item.bgColors
      : (typeof item.bgColors === 'string' ? item.bgColors.split(/[\n,;]+/) : []);

    const bgColors = rawColors
      .map(normalizeHexColor)
      .filter(Boolean)
      .filter((c, i, arr) => arr.indexOf(c) === i)
      .slice(0, 10);

    return { name, bgColors };
  }

  function getProfilesData() {
    const raw = Array.isArray(window.profiles)
      ? window.profiles
      : (typeof profiles !== 'undefined' && Array.isArray(profiles) ? profiles : []);

    return raw.map(normalizeProfile).filter(Boolean);
  }

  function pickTheme() {
    const activeName = String(localStorage.getItem('activeProfile') || 'Guest').trim().toLowerCase();
    const profilesData = getProfilesData();
    const activeProfile = profilesData.find(p => String(p.name || '').trim().toLowerCase() === activeName);

    if (activeProfile && activeProfile.bgColors && activeProfile.bgColors.length) {
      const bg = activeProfile.bgColors[Math.floor(Math.random() * activeProfile.bgColors.length)];
      return { bg, fg: readableTextColor(bg) };
    }

    const bg = fallbackThemes[Math.floor(Math.random() * fallbackThemes.length)];
    return { bg, fg: readableTextColor(bg) };
  }

  function applyTheme() {
    const theme = pickTheme();

    try {
      document.documentElement.style.setProperty('--bg-color', theme.bg);
      document.documentElement.style.setProperty('--fg-soft', theme.fg);
    } catch (e) {}

    try { if (document.body) document.body.style.backgroundColor = theme.bg; } catch (e) {}
    try { if (document.body) document.body.style.color = theme.fg; } catch (e) {}

    try {
      let meta = document.querySelector('meta[name="theme-color"]');
      if (!meta) {
        meta = document.createElement('meta');
        meta.name = 'theme-color';
        document.head.appendChild(meta);
      }
      meta.setAttribute('content', theme.bg);
    } catch (e) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyTheme, { once: true });
  } else {
    applyTheme();
  }
})();
</script>

<script>
(function(){
  // ... existing kids-mode QR logic ...
  try {
    const input = document.getElementById('searchInput');
    const overlay = document.getElementById('searchOverlayBtn');

    if (!input || !overlay) return;

    // Start with input removed from tab order and readonly to avoid virtual keyboard popups while navigating.
    input.tabIndex = -1;
    input.readOnly = true;

    // Activation routine: make input focusable, focus it synchronously,
    // and place the cursor at the end to encourage the keyboard to appear.
    function activateSearch() {
      // make input editable and focusable
      input.readOnly = false;
      input.tabIndex = 0;

      // focus synchronously – this keeps the user‑gesture chain intact for mobile keyboards
      try { input.focus(); } catch (e) {}

      // optional: move cursor to the end (helps with keyboard appearance)
      try { input.setSelectionRange(input.value.length, input.value.length); } catch (e) {}
    }

    // overlay responds to click / tap
    overlay.addEventListener('click', (e) => {
      e.preventDefault();
      activateSearch();
    });

    // also handle touchstart (mobile fires this before click, but both are fine)
    overlay.addEventListener('touchstart', (e) => {
      e.preventDefault();   // prevent any potential double‑tap zoom or context menu
      activateSearch();
    }, { passive: false });

    // keyboard + gamepad button support for overlay: Enter / Space
    overlay.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ' || e.keyCode === 13 || e.keyCode === 32) {
        e.preventDefault();
        activateSearch();
      }
    });

    // When the real input loses focus, revert it to non-focusable/read-only
    input.addEventListener('blur', function() {
      // small delay to avoid immediate flip-flop if something else focuses next
      setTimeout(() => {
        input.readOnly = true;
        input.tabIndex = -1;
      }, 50);
    });

    // Keep the oninput wiring (if filterTiles exists)
    if (typeof window.filterTiles === 'function') {
      input.removeEventListener && input.removeEventListener('input', window.filterTiles);
      input.addEventListener('input', window.filterTiles);
    }
  } catch (e) {
    console.warn('Search overlay wiring error', e);
  }
})();
</script>

   function adjustGearText() {

   async function sendToTV() {
  // Defensive: remove any transient resume UI up front (covers edge cases)
  try {
    if (typeof cleanupResumeActionContainers === 'function') {

      try { document.querySelectorAll('.sys-episode-continue, .sys-episode-startover').forEach(btn => { if (btn && btn.parentNode) btn.parentNode.removeChild(btn); }); } catch(e){}
    }
  } catch(err) {
    console.warn('sendToTV: pre-cleanup failed', err);
  }

  // Grab activeProfile if present; otherwise assume Guest
  let profile = localStorage.getItem("activeProfile");
  const assumedGuest = !profile;
  if (!profile) {
    profile = "Guest";
    alert("No profile is logged in — sending to the Guest profile.");
  }

  if (!currentFolder) {
    alert("No folder/season is currently selected.");
    return;
  }

  try {
    // 1) Fetch whatever resume file exists on the server for this folder
    await restoreShowFromProfile(profile, currentFolder);
  } catch (err) {
    // If restore fails (404 or no file), we’ll treat that as “no resume data”
    console.warn(`Could not restore ${currentFolder} for profile ${profile}:`, err);
  }


  // 2) Look at the now‐restored localStorage entry (if any)
  const resumeKeyForFolder = `progress-${profile}-${currentFolder}`;
  const raw = localStorage.getItem(resumeKeyForFolder);
  let progress = raw ? JSON.parse(raw) : null;

  // 3) Decide how to set up new progress
  if (progress && progress.episodeIndex !== undefined) {
    if (progress.episodeIndex !== 9999) {
      // Case A: there *is* resume data AND episodeIndex ≠ 9999
      // ─ simply point the global Resume pointer at this folder
      const resumePointerKey = `progress-${profile}-Resume`;
      const pointerValue = JSON.stringify({
        folderName: currentFolder,
        timestamp: Date.now()
      });
      localStorage.setItem(resumePointerKey, pointerValue);

      // Back up both the show’s progress file and the Resume pointer
      backupShowToProfile(profile, currentFolder);
      alert(`Sent to TV! Resuming from your existing progress in ${currentFolder} (Profile: ${profile}).`);
      return;
    } else {
      // Case B: resume exists but episodeIndex === 9999 → reset to episode 1
      progress = { episodeIndex: 0, currentTime: 0, timestamp: Date.now() };
      localStorage.setItem(resumeKeyForFolder, JSON.stringify(progress));

      // Also set the Resume pointer to point at this folder
      const resumePointerKey = `progress-${profile}-Resume`;
      const pointerValue = JSON.stringify({
        folderName: currentFolder,
        timestamp: Date.now()
      });
      localStorage.setItem(resumePointerKey, pointerValue);

      // Back up both the show’s (now‐reset) progress file AND the Resume pointer
      backupShowToProfile(profile, currentFolder);
      alert(`Sent to TV! Previous progress reset. Restarted ${currentFolder} at episode 1 (Profile: ${profile}).`);
      return;
    }
  } else {
    // Case C: No resume data at all for this folder
    // → create a new one, starting at episode 1 (i.e. episodeIndex 0)
    const freshProgress = { episodeIndex: 0, currentTime: 0, timestamp: Date.now() };
    localStorage.setItem(resumeKeyForFolder, JSON.stringify(freshProgress));

    backupShowToProfile(profile, currentFolder);
    alert(`Sent to TV! Starting ${currentFolder} from episode 1 (Profile: ${profile}).`);
    return;
  }
}

        }

        if (!titlesInBlock.length) continue;

        const seasonlikeCount = titlesInBlock.reduce((acc, t) => acc + (seasonPattern.test(t) ? 1 : 0), 0);
        const derive = (titlesInBlock.length === 1 && seasonlikeCount === 1) ||
                       (seasonlikeCount >= Math.max(1, Math.ceil(titlesInBlock.length / 2)));

        let derivedParent = null;
        if (derive) {
          const candidates = {};
          for (const t of titlesInBlock) {
            let cand = t.replace(/\s*-\s*Season.*$/i, '')
                        .replace(/\s+Season\s*\d+.*$/i, '')
                        .replace(/\s*\(Season.*$/i, '')
                        .replace(/[:,;]?\s*$/, '')
                        .replace(/\s+/g, ' ')
                        .trim();
            if (!cand) continue;
            candidates[cand] = (candidates[cand] || 0) + 1;
          }
          let top = null, topn = 0;
          for (const [c, n] of Object.entries(candidates)) {
            if (n > topn) { top = c; topn = n; }
          }
          if (top) derivedParent = top;
        }

        const finalParentRaw = derivedParent || parent || null;
        const finalParent = finalParentRaw ? (resolveMainFolderTitle(finalParentRaw, activeMainFolders) || finalParentRaw) : null;

        if (kidsMode && finalParent && isAdultParentName(finalParent)) {
  continue;
}

        // Keep parsed season blocks even when their parent was removed from mainfolders.js.
        // Root detection now comes from the loader function itself, so hidden parents can still
        // behave like root tiles when a matching loadXSeasons() function exists.

        for (const t of titlesInBlock) {
          if (derivedParent && t === derivedParent) continue;
          parsed.push({ title: t, parent: finalParent });
        }
      }

      const map = new Map();
      for (const p of parsed) {
        const key = `${(p.title || '').replace(/\s+/g, ' ').trim()}||${p.parent || ''}`;
        if (!map.has(key)) map.set(key, p.parent);
      }

      const seasons = Array.from(map.entries()).map(([key, parent]) => {
        const title = key.split('||')[0];
        return { title, parent };
      });

      // Build roots from both season parents and loader functions.
      // Loader-derived roots count even if the title was removed from mainfolders.js.
      const roots = new Set();
      for (const s of seasons) {
        const pKey = parentCompareKey(s.parent);
        const pLoose = parentLooseKey(s.parent);
        if (
          (s.parent && activeMainSet.has(pKey)) ||
          (s.parent && activeMainLooseSet.has(pLoose))
        ) {
          roots.add(pKey || pLoose);
        }
      }

      for (const f of funcs) {
        const exact = (typeof f.fullName === 'string') ? loaderTitleMap.get(f.fullName) : null;
        const decoded = exact || decodeLoaderNameToDisplayName(f.name);
        const key = parentCompareKey(decoded);
        const loose = parentLooseKey(decoded);
        if (key || loose) roots.add(key || loose);
      }

      CACHE.seasons = seasons;
      CACHE.roots = roots;
      return CACHE.seasons;
    } catch(e){
      safeLog('getParsedSeasons error', e);
      CACHE.seasons = [];
      CACHE.roots = new Set();
      return CACHE.seasons;
    }
  }

  async function getMergedIndex() {
    if (CACHE.mergedIndex) return CACHE.mergedIndex;
    const [parsed, mainFolders, libraryItems] = await Promise.all([getParsedSeasons(), getMainFolders(), getLibraryIndex()]);
    const out = [];
    const seen = new Set();

    for (const p of parsed) {
      const k = normKey(p.title) + '||' + normKey(p.parent || '');
      if (seen.has(k)) continue;
      seen.add(k);
      out.push({ title: p.title, parent: p.parent || null });
    }

    for (const f of (mainFolders || [])) {
      const nf = normKey(f);
      const existingIdx = out.findIndex(i => normKey(i.title) === nf);
      if (existingIdx === -1) {
        out.push({ title: f, parent: null });
      } else if (!out[existingIdx].parent) {
        out[existingIdx] = { title: f, parent: null };
      }
    }

    for (const item of (libraryItems || [])) {
      const k = normKey(item.title) + '||' + normKey(item.parent || '');
      if (seen.has(k)) continue;
      seen.add(k);
      out.push(item);
    }

    CACHE.mergedIndex = out;
    CACHE.mergedRoots = CACHE.roots || new Set();
    return CACHE.mergedIndex;
  }

  async function _ensureMusicLoaded() {
    if (CACHE.music) return CACHE.music;

    if (typeof window.musicLibrary !== 'undefined' && Array.isArray(window.musicLibrary)) {
      CACHE.music = window.musicLibrary;
      return CACHE.music;
    }

    try {
      const txt = await fetch('./musiclibrary.js', { cache: 'no-store' }).then(r => r.text());
      const fn = new Function(`${txt}\nreturn {
        musicLibrary: (typeof musicLibrary !== 'undefined') ? musicLibrary : null,
        musicLibraryGenreMap: (typeof musicLibraryGenreMap !== 'undefined') ? musicLibraryGenreMap : null,
        musicLibraryParseEntry: (typeof musicLibraryParseEntry !== 'undefined') ? musicLibraryParseEntry : null
      };`);
      const ml = fn() || {};
      if (ml.musicLibraryGenreMap && typeof ml.musicLibraryGenreMap === 'object') {
        window.musicLibraryGenreMap = ml.musicLibraryGenreMap;
      }
      if (ml.musicLibraryParseEntry && typeof ml.musicLibraryParseEntry === 'function') {
        window.musicLibraryParseEntry = ml.musicLibraryParseEntry;
      }
      CACHE.music = Array.isArray(ml.musicLibrary) ? ml.musicLibrary : [];
      return CACHE.music;
    } catch (e) {
      safeLog('music load error', e);
    }

    CACHE.music = [];
    return CACHE.music;
  }

  function splitMusicOnLastDollar(raw) {
    const clean = String(raw ?? '').trim();
    if (!clean) return { base: '', code: '' };
    const idx = clean.lastIndexOf('$');
    if (idx === -1) return { base: clean, code: '' };
    return {
      base: clean.slice(0, idx).trim(),
      code: clean.slice(idx + 1).trim()
    };
  }

  function normalizeMusicBase(raw) {
    let s = String(raw == null ? '' : raw).trim();
    try { s = decodeURIComponent(s); } catch (e) {}
    s = s.split(/[\\/]/).pop();
    s = s.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)(\?.*)?$/i, '');
    return s.trim();
  }

  function splitMusicTitleArtist(base) {
    const clean = normalizeMusicBase(base);
    if (!clean) return { song: '', artist: '' };

    const parts = clean.split(' - ').map(p => p.trim()).filter(Boolean);
    if (parts.length <= 1) return { song: clean, artist: '' };

    return {
      song: parts.slice(0, parts.length - 1).join(' - ').trim(),
      artist: parts[parts.length - 1].trim()
    };
  }

  function parseMusicEntry(entry) {
    const raw = String(entry == null ? '' : entry).trim();
    if (!raw) return null;

    const split = splitMusicOnLastDollar(raw);
    const base = normalizeMusicBase(split.base || raw);
    const code = String(split.code || '').trim();
    return buildMusicRecord(raw, base, code);
  }

  function buildMusicRecord(raw, base, code) {
    const { song, artist } = splitMusicTitleArtist(base);
    const genreCode = String(code || '').trim();
    const genreName = getMusicGenreName(genreCode);

    return {
      raw,
      base,
      song,
      artist,
      genreCode,
      genreName,
      searchText: [
        raw,
        base,
        song,
        artist,
        genreCode,
        genreName
      ].filter(Boolean).join(' ').toLowerCase()
    };
  }

  async function buildMusicFlat() {
    if (CACHE.musicFlat) return CACHE.musicFlat;

    const entries = await _ensureMusicLoaded();
    const out = [];
    if (!Array.isArray(entries)) {
      CACHE.musicFlat = out;
      return out;
    }

    for (const entry of entries) {
      const rec = parseMusicEntry(entry);
      if (rec) out.push(rec);
    }

    CACHE.musicFlat = out;
    return out;
  }

  async function getMusicGenres() {
    if (CACHE.musicGenres) return CACHE.musicGenres;

    const arr = await buildMusicFlat();
    const seen = new Map();

    for (const rec of arr) {
      const code = String(rec.genreCode || '').trim();
      const name = String(rec.genreName || '').trim();
      const key = code || name;
      if (!key) continue;
      if (!seen.has(key)) {
        seen.set(key, {
          code,
          name,
          label: name || code
        });
      }
    }

    const out = Array.from(seen.values()).sort((a, b) => a.label.localeCompare(b.label));
    CACHE.musicGenres = out;
    return out;
  }

  async function findMusicMatches(q) {
    if (!q || q.length < 2) return [];
    const lc = q.toLowerCase();
    const arr = await buildMusicFlat();
    return arr.filter(it => {
      return (
        (it.searchText && it.searchText.includes(lc)) ||
        (it.raw && it.raw.toLowerCase().includes(lc)) ||
        (it.base && it.base.toLowerCase().includes(lc)) ||
        (it.song && it.song.toLowerCase().includes(lc)) ||
        (it.artist && it.artist.toLowerCase().includes(lc)) ||
        (it.genreCode && it.genreCode.toLowerCase().includes(lc)) ||
        (it.genreName && it.genreName.toLowerCase().includes(lc))
      );
    });
  }

  async function findGenreMatches(q) {
    if (!q || q.length < 2) return [];
    const lc = q.toLowerCase();
    const genres = await getMusicGenres();
    return genres.filter(g => {

  }

    glyph.className = 'tile-fav-glyph';

    function refreshStarVisual() {
      const favs = (typeof getStoredFavorites === 'function') ? getStoredFavorites() : [];
      const isFav = Array.isArray(favs) && favs.includes(folderName);

      if (isFav) {
        starBtn.classList.add('favorited');
        glyph.textContent = '★';
      } else {
        starBtn.classList.remove('favorited');
        glyph.textContent = '☆';
      }

      e.stopPropagation(); // IMPORTANT: prevents tile open
      toggleFavoriteByName(folderName);
      refreshStarVisual();
    });

    starBtn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ' || e.keyCode === 13 || e.keyCode === 32) {
        e.preventDefault();
        e.stopPropagation();
        starBtn.click();
        return;
      }
      e.stopPropagation();
    });

    // Optional: keyboard shortcut when tile focused (press F)
    tile.addEventListener('keydown', function (e) {
      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();

      }
    });

  async function getParsedSeasonsAllowAll() {
    // Same parsing as getParsedSeasons but WITHOUT skipping blocks whose parent isn't present in mainfolders.js.
    // This still respects kids-mode (so adult-marked entries are omitted in ?l/kids mode).
    try {
      const txt = await fetch('./loadseasonfunctions.js', { cache: 'no-store' }).then(r => r.text());
      const funcRe = /function\s+load([A-Za-z0-9_]+)Seasons\s*\(/g;
      const funcs = []; let fm;
      while ((fm = funcRe.exec(txt)) !== null) funcs.push({ name: fm[1], fullName: `load${fm[1]}Seasons`, index: fm.index });

      const loaderTitleMap = await getSeasonLoaderTitleMap();

      const blocks = [];
      const blockRe = /const\s+seasons\s*=\s*\[([\s\S]*?)\]\s*;?/g;
      let bm;
      while ((bm = blockRe.exec(txt)) !== null) blocks.push({ content: bm[1], index: bm.index });

      const parsed = [];
      const normalizeTitle = s => (s || '').replace(/\s+/g, ' ').trim();
      const seasonPattern = /\bseason\b/i;
      const urlParams = new URLSearchParams(window.location.search || '');
      const kidsMode = urlParams.has('l');

      for (const b of blocks) {
        // nearest preceding loader function name as parent hint
        let parentFn = null; let best = Infinity;
        for (const f of funcs) {
          if (f.index <= b.index) {
            const d = b.index - f.index;
            if (d < best) { best = d; parentFn = f; }
          }
        }
        let parent = null;
        if (parentFn) {
          const exactLoaderTitle = loaderTitleMap.get(parentFn.fullName || `load${parentFn.name}Seasons`);
          if (exactLoaderTitle) {
            parent = exactLoaderTitle;
          } else {
            parent = parentFn.name.replace(/([a-z0-9])([A-Z])/g,'$1 $2');
          }
        }

        // strip inline comments inside the block
        const cleaned = b.content.split('\n').map(l => l.replace(/\/\/.*$/,'')).join('\n');
        const re = /(['"])(.*?)\1/g;
        let m;
        const titlesInBlock = [];
        while ((m = re.exec(cleaned)) !== null) {
          const raw = m[2];
          let title = normalizeTitle(raw);
          if (!title) continue;

          const isAdult = title.includes('*');
          title = title.replace(/\*/g, '').trim();

          if (kidsMode && isAdult) continue;
          titlesInBlock.push(title);
        }
        if (!titlesInBlock.length) continue;

        // derive parent if block looks like season listings
        const seasonlikeCount = titlesInBlock.reduce((acc,t) => acc + (seasonPattern.test(t) ? 1 : 0), 0);
        const derive = (titlesInBlock.length === 1 && seasonlikeCount === 1) ||
                       (seasonlikeCount >= Math.max(1, Math.ceil(titlesInBlock.length / 2)));

        let derivedParent = null;
        if (derive) {
          const candidates = {};
          for (const t of titlesInBlock) {
            let cand = t.replace(/\s*-\s*Season.*$/i,'')
                        .replace(/\s+Season\s*\d+.*$/i,'')
                        .replace(/\s*\(Season.*$/i,'')
                        .replace(/[:,;]?\s*$/,'')
                        .replace(/\s+/g,' ')
                        .trim();
            if (!cand) continue;
            candidates[cand] = (candidates[cand] || 0) + 1;
          }
          let top = null, topn = 0;
          for (const [c,n] of Object.entries(candidates)) {
            if (n > topn) { top = c; topn = n; }
          }
          if (top) derivedParent = top;
        }

        const finalParent = derivedParent || parent || null;

        const adultMainFolderKeys = CACHE.adultMainFolderKeys || new Set();
        if (kidsMode && finalParent) {
          const pk = parentCompareKey(finalParent);
          const lk = parentLooseKey(finalParent);
          if (adultMainFolderKeys.has(pk) || adultMainFolderKeys.has(lk)) {
            continue;
          }
        }

        // NOTE: Unlike getParsedSeasons(), do NOT skip blocks whose parent is not present in mainfolders.js.
        for (const t of titlesInBlock) {
          if (derivedParent && t === derivedParent) continue;
          parsed.push({ title: t, parent: finalParent });
        }
      }

      // dedupe like original
      const map = new Map();
      for (const p of parsed) {
        const key = `${(p.title||'').replace(/\s+/g,' ').trim()}||${p.parent||''}`;
        if (!map.has(key)) map.set(key, p.parent);
      }
      const seasons = Array.from(map.entries()).map(([key,parent]) => {
        const title = key.split('||')[0];
        return { title, parent };
      });
      return seasons;
    } catch (e) {
      console.warn('getParsedSeasonsAllowAll error', e);
      return [];
    }
  }

  function flattenLibraryItems(items, meta, parentTitle = null) {
    const out = [];
    const list = Array.isArray(items) ? items : [];
    for (const item of list) {
      if (!item || typeof item !== 'object') continue;

      if (item.group && Array.isArray(item.books)) {
        const groupTitle = String(item.title || '').trim();
        out.push(...flattenLibraryItems(item.books, meta, groupTitle || parentTitle));
        continue;
      }

      const title = String(item.title || '').trim();
      if (!title) continue;

      out.push({
        title,
        parent: meta.category,
        source: 'library',
        lib: meta.lib,
        file: item.file || '',
        cover: item.cover || '',
        group: parentTitle || null,
      });
    }
    return out;
  }

  async function getLibraryIndex() {
    if (CACHE.libraryIndex) return CACHE.libraryIndex;

    try {
      const out = [];
      for (const src of LIBRARY_SOURCES) {
        const txt = await fetch(src.path, { cache: 'no-store' }).then(r => r.text());
        const sandbox = { libraryData: null };
        try {
          const libData = new Function('window', `${txt}
return window.libraryData;`)(sandbox);
          const data = libData || sandbox.libraryData;
          const items = data && Array.isArray(data.items) ? data.items : [];
          out.push(...flattenLibraryItems(items, src));
        } catch (e) {
          console.warn('getLibraryIndex parse error for', src.path, e);
        }
      }
      CACHE.libraryIndex = out;
      return out;
    } catch (e) {
      console.warn('getLibraryIndex error', e);
      CACHE.libraryIndex = [];
      return CACHE.libraryIndex;
    }
  }

  async function getMergedIndexAllowAll() {
    // Combine parsed seasons (allow all), main folders, and library databases.
    const [parsed, mainFolders, libraryItems] = await Promise.all([
      getParsedSeasonsAllowAll(),
      getMainFolders(),
      getLibraryIndex(),
    ]);
    const out = [];
    const seen = new Set();

    for (const p of parsed) {
      const k = normKey(p.title) + '||' + normKey(p.parent || '');
      if (seen.has(k)) continue;
      seen.add(k);
      out.push({ title: p.title, parent: p.parent || null });
    }

    for (const f of (mainFolders || [])) {
      const nf = normKey(f);
      const existingIdx = out.findIndex(i => normKey(i.title) === nf);
      if (existingIdx === -1) {
        out.push({ title: f, parent: null });
      } else if (!out[existingIdx].parent) {
        out[existingIdx] = { title: f, parent: null };
      }
    }

    for (const item of (libraryItems || [])) {
      const k = normKey(item.title) + '||' + normKey(item.parent || '');
      if (seen.has(k)) continue;
      seen.add(k);
      out.push(item);
    }

    return out;
  }

  async function _filterTilesImpl(){
    try {
      const raw = (document.getElementById('searchInput')?.value || '').trim();
      const q = normKey(raw);
      const container = document.getElementById('folderContainer');
      if (!container) return;

      const deepAll = raw === DEEP_ALL_TOKEN;

      if (!q) {
        removeGamesSection();
        removeMusicSection();
        removeGenreSection();
        removeBookMangaSection();
        if (window._searchResultMode || playerVisible()) {
          return;
        }
        hideHome();
        if (typeof loadMainFolders === 'function') { loadMainFolders(); return; }
        Array.from(container.querySelectorAll('.folder')).forEach(f => f.style.display='block');
        return;
      }

      if (!deepAll) {
        const visibleFolders = Array.from(container.querySelectorAll('.folder'));
        visibleFolders.forEach(folder => {
          const title = (folder.querySelector('p') || { innerText: '' }).innerText;
          folder.style.display = normKey(title).includes(q) ? 'block' : 'none';
        });
      } else {
        Array.from(container.querySelectorAll('.folder')).forEach(f => f.style.display='block');
      }

      const [merged, libraryMatches, gameMatches, musicMatches, genreMatches] = await Promise.all([
        deepAll ? getMergedIndexAllowAll() : getMergedIndex(),
        findLibraryMatches(raw),
        Promise.resolve(findGameMatches(raw)),
        findMusicMatches(raw),
        findGenreMatches(raw)
      ]);

      const mainMatches = deepAll
        ? merged.filter(p => p && p.source !== 'library')
        : merged.filter(p => p && p.source !== 'library' && p.title && normKey(p.title).includes(q));

      const hasExtras = (libraryMatches.length + gameMatches.length + musicMatches.length + genreMatches.length) > 0;

      if (q.length < 2 && !deepAll) {
        const exact = mainMatches.find(p => normKey(p.title) === q);
        renderResults(exact ? [exact] : [], raw, { suppressEmptyState: hasExtras });
      } else {
        renderResults(mainMatches, raw, { suppressEmptyState: hasExtras });
      }

      renderBookMangaMatches(libraryMatches, raw);
      renderGameMatches(gameMatches, raw);
      renderMusicMatches(musicMatches, raw).catch(()=>{});
      renderGenreMatches(genreMatches, raw).catch(()=>{});
      try { console.info('send buttons created:', sendButtonsCount); } catch(e){}
    } catch(e){ safeLog('filterTiles impl error', e); }
  }

    const DOUBLE_TAP_MS = 300; // adjust tolerance if you want

    function isTapOnEmptySpace(eventTarget, x, y) {
      // If the actual element at the touch point is inside a .folder, treat it as NOT empty.
      // Use elementFromPoint for touch coordinates (more reliable on mobile)
      let el = null;
      try {
        if (typeof x === 'number' && typeof y === 'number') {
          el = document.elementFromPoint(x, y);
        }
      } catch (e) { el = null; }
      el = el || eventTarget;

      if (!el) return true;
      if (el.closest && el.closest('.folder')) return false;        // tapped a tile
      if (el === input()) return false;                            // tapped the search input
      if (el.closest && el.closest('.qr-buttons-container')) return false; // avoid QR buttons
      // anything else (container itself, blank space, headers, separators) is considered "empty"
      return true;
    }

    // Touch double-tap
    container().addEventListener('touchend', function(e) {
      if (!e.changedTouches || e.changedTouches.length === 0) return;
      const t = e.changedTouches[0];
      const now = Date.now();

      if (!isTapOnEmptySpace(e.target, t.clientX, t.clientY)) {
        lastTap = now;
        return;
      }

      if (now - lastTap <= DOUBLE_TAP_MS) {
        // double-tap detected on empty space -> close deep search
        const s = input();
        if (s && s.value.trim().length > 0) {
          s.value = '';
          try { window.filterTiles && window.filterTiles(); } catch(_) {}
          s.blur();
        }
        lastTap = 0;
        e.preventDefault && e.preventDefault();
      } else {
        lastTap = now;
      }
    }, { passive: true });

    // Desktop double-click fallback
    container().addEventListener('dblclick', function(e){
      if (!isTapOnEmptySpace(e.target)) return;
      const s = input();
      if (s && s.value.trim().length > 0) {
        s.value = '';
        try { window.filterTiles && window.filterTiles(); } catch(_) {}
        s.blur();
      }
    });

  })();

  function debounce(fn, wait){ let t; return function(){ clearTimeout(t); t=setTimeout(()=>fn.apply(this, arguments), wait); }; }
  window.filterTiles = debounce(_filterTilesImpl, 120);

  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('searchInput');
    if (input) {
      try { input.removeEventListener('input', window.filterTiles); } catch(e){}
      input.addEventListener('input', window.filterTiles);
    }
  });

  document.addEventListener('click', function(ev){
    const input = document.getElementById('searchInput');
    const results = document.getElementById('folderContainer');
    if (!input || !results) return;
    const clickedInsideInput = input.contains(ev.target) || ev.target === input;
    const clickedInsideResults = results.contains(ev.target);
    if (!clickedInsideInput && !clickedInsideResults) {
      if (input.value.trim().length > 0) {
        input.value = '';
        window.filterTiles();
      }
    }
  });

  (function ensureLoadMainFoldersPatched(){
    const tryPatch = () => {
      if (typeof window.loadMainFolders === 'function' && !window._loadMainFoldersPatched) {
        const orig = window.loadMainFolders;
        window.loadMainFolders = function(){
          try { orig.apply(this, arguments); } catch(e){ try{ orig(); }catch(e2){} }
          window._searchResultMode = false;
          try { showProfilesButton(); } catch(e){}
        };
        window._loadMainFoldersPatched = true;
        return true;
      }
      return false;
    };
    if (!tryPatch()) {
      const id = setInterval(()=>{ if (tryPatch()) clearInterval(id); }, 200);
      setTimeout(()=>clearInterval(id), 5000);
    }
  })();
})();

function toAssetName(str) {
  return String(str || "")
    .replace(/\*/g, "")
    .replace(/['’]/g, "")
    .trim();
}

function assetVariantsForName(name) {
  const base = String(name || '').trim();
  if (!base) return [];
  const noApos = base.replace(/[’']/g, '');
  const noSpace = base.replace(/\s+/g, '');
  const noAposNoSpace = noApos.replace(/\s+/g, '');
  return [...new Set([base, noApos, noSpace, noAposNoSpace].filter(Boolean))];
}

function buildSeasonImageCandidates(seriesName, seasonName) {
  const candidates = [];
  const pushIf = (u) => {
    if (u && !candidates.includes(u)) candidates.push(u);
  };

  const seriesVariants = assetVariantsForName(seriesName);
  const seasonVariants = assetVariantsForName(seasonName);

  for (const s of seriesVariants) {
    for (const e of seasonVariants) {
      const encS = encodeURIComponent(s);
      const encE = encodeURIComponent(e);
      pushIf(`./${encS}/${encE}/${encE}.jpg`);
      pushIf(`./${encS}/${encE}.jpg`);
    }
  }

  for (const e of seasonVariants) {
    const encE = encodeURIComponent(e);
    pushIf(`./${encE}/${encE}.jpg`);
    pushIf(`./${encE}.jpg`);
    pushIf(`./Movies/${encE}.jpg`);
  }

  pushIf('./Images/default.jpg');
  pushIf('./Images/placeholder.jpg');
  return candidates;
}

currentFolder = folderName;

  const safeSrc = safeFileUrl(episode.file);
  video.src = safeSrc;
  setSubtitleWithFetch(safeSrc);

  video.onloadedmetadata = function () {
    try {
      if (startTime && startTime < video.duration) {
        video.currentTime = startTime;
      }
    } catch (e) {}

    // Attempt play; once play resolves, clear suppression flag.
    video.play().then(() => {
      // Clear suppression now that playback started
      window._suppressExitOnPause = false;

      // Ensure any transient resume UI is removed as soon as playback begins
      try {
        if (typeof cleanupResumeActionContainers === 'function') {
          try { cleanupResumeActionContainers(); } catch (err) { console.warn('cleanupResumeActionContainers threw during play start', err); }
        } else {
          // defensive fallback just in case
          try { const sc = document.getElementById('series-continue-container'); if (sc && sc.parentNode) sc.parentNode.removeChild(sc); } catch(e){}
          try { const mc = document.getElementById('movie-action-container'); if (mc && mc.parentNode) mc.parentNode.removeChild(mc); } catch(e){}

      } catch (err) {

      }

      if (episodes[folderName].length === 1) {
        currentEpisodeTitle.textContent = `Now Playing: ${folderName}`;
      } else {
        currentEpisodeTitle.textContent = `Now Playing: ${folderName}: Episode ${episodeIndex + 1} - ${episode.name}`;
      }
      nextEpisodePopup.style.display = 'none';

      // Preserve original behavior: try to ensure container is fullscreen when play begins.
      let attempts = 0;
      const tryFullscreen = () => {
        try {
          if (videoPlayer && videoPlayer.requestFullscreen) {
            videoPlayer.requestFullscreen().catch(() => {});
          } else if (video && video.requestFullscreen) {
            video.requestFullscreen().catch(() => {});
          }
        } catch (err) {}
        attempts++;
        if (attempts < 3) setTimeout(tryFullscreen, 400);
      };
      tryFullscreen();
    }).catch(err => {
      console.error("Error playing video:", err);
      // If play() failed (autoplay blocked), clear the suppression flag after a short safety window
      setTimeout(() => { window._suppressExitOnPause = false; }, 700);
    });

    // Safety: if play() never resolves, clear suppression after 2s to avoid a stuck flag
    setTimeout(() => { if (window._suppressExitOnPause) window._suppressExitOnPause = false; }, 2000);
  };

  // update every 5 seconds instead of every second
  let lastSavedTimestamp = 0;

  video.ontimeupdate = () => {
    // only attempt to save if video is playing
    if (!video.paused && !video.ended) {
      const now = Date.now();

      // if at least 5000ms have elapsed since the last save, do it now
      if (now - lastSavedTimestamp >= 5000) {
        lastSavedTimestamp = now;
        saveProgress(folderName, episodeIndex, video.currentTime);
      }
    }
    if (skipEnabled && episode) {
      // Check for skip intro
      if (typeof episode.skipIntroStart === "number" && typeof episode.skipIntroEnd === "number") {
        if (video.currentTime >= episode.skipIntroStart && video.currentTime < episode.skipIntroEnd) {
          video.currentTime = episode.skipIntroEnd;
        }
      }
      // Check for skip outro
      if (typeof episode.skipOutroStart === "number" && typeof episode.skipOutroEnd === "number") {
        if (video.currentTime >= episode.skipOutroStart && video.currentTime < episode.skipOutroEnd) {
          video.currentTime = episode.skipOutroEnd;
        }
      }
    }
  };

  // In case metadata is already loaded, trigger the handler manually
  if (video.readyState >= 1) {
    video.onloadedmetadata();
  }

  document.getElementById("videoPlayer").style.display = "block";
}

  let resumeChoice = null; // will hold user choice from resumeConfirm if shown
  const progress = getSavedProgress(folderName);
  if (
    progress &&
    !(progress.episodeIndex === 0 && progress.currentTime < 1) &&
    episodeData[progress.episodeIndex]
  ) {
    const ep = episodeData[progress.episodeIndex];
    const m  = Math.floor(progress.currentTime / 60);
    const s  = String(Math.floor(progress.currentTime % 60)).padStart(2, "0");
    const msg = isSingle
      ? `Resume ${folderName} at ${m}:${s}?`
      : `Resume ${folderName} - Episode ${progress.episodeIndex + 1}: "${ep.name}" at ${m}:${s}?`;

    // uses the resume overlay (enter -> Continue, Esc -> Not yet)
    const choice = await window.SysNotify.resumeConfirm(msg, 'Resume playback');
    resumeChoice = choice; // remember it for later decision-making

    if (choice === 'continue') {
      // still render the episode buttons so you can switch later
      if (!isSingle) {
        episodeData.forEach((episode, i) => {
          const btn = document.createElement("button");
          btn.textContent = `Episode ${i + 1}: ${episode.name}`;
          btn.dataset.index = i;
          btn.onclick = () => {
            currentEpisodeIndex = i;
            playEpisode(folderName, i);
          };
          episodeList.appendChild(btn);
        });
        try { updateEpisodeListHighlight(); } catch (e) {}
      }
      return playEpisode(folderName, progress.episodeIndex, progress.currentTime);
    }
    // else 'notyet' -> fall through; resumeChoice === 'notyet' will be used below
  }

  // 4) If it's a single file, normally we'd auto-play — but if the user chose
  // 'notyet' at the resume prompt, show the player but DO NOT auto-start the file.
  // Instead render two action buttons in a centered container ABOVE the video player.
if (isSingle) {
    if (resumeChoice === 'notyet') {
      // 1) Ensure the player UI is visible but do not start streaming the file.
      try {
        const video = document.getElementById('video');
        if (video) {
          try { video.pause(); } catch (e) {}
          try { video.removeAttribute('src'); } catch (e) {}
          try { if (typeof video.load === 'function') video.load(); } catch (e) {}
        }
      } catch (e) {
        console.warn('suppress autoplay for single-file when user chose notyet', e);
      }

      // 2) Render the Continue / Start Over buttons inside the top bar center
      try {
        const centerDiv = document.getElementById('top-bar-center');
        if (!centerDiv) return;

        // Clear any previous buttons
        centerDiv.innerHTML = '';

        // helper: format seconds as "h:mm:ss" (h only shown when >= 1 hour) or "m:ss"
        function formatResumeTime(totalSeconds) {
          const secs = Math.max(0, Math.floor(Number(totalSeconds) || 0));
          const h = Math.floor(secs / 3600);
          const m = Math.floor((secs % 3600) / 60);
          const s = secs % 60;
          const pad2 = (n) => String(n).padStart(2, '0');
          if (h > 0) return `${h}:${pad2(m)}:${pad2(s)}`;
          return `${m}:${pad2(s)}`;
        }

        // create Continue button (resume at saved spot)
        const btnContinue = document.createElement('button');
        const resumeSeconds = (progress && progress.currentTime) ? progress.currentTime : 0;
        btnContinue.textContent = `Continue (${formatResumeTime(resumeSeconds)})`;
        btnContinue.title = `Resume at ${formatResumeTime(resumeSeconds)}`;
        btnContinue.className = 'sys-episode-btn sys-episode-continue';
        btnContinue.onclick = () => {
          // clean up top bar then resume
          centerDiv.innerHTML = '';
          try { currentEpisodeIndex = progress.episodeIndex || 0; } catch(e){}
          playEpisode(folderName, progress.episodeIndex || 0, progress.currentTime || 0);
        };

        // create Start Over button (play from beginning)
        const btnStartOver = document.createElement('button');
        btnStartOver.textContent = 'Start Over';
        btnStartOver.className = 'sys-episode-btn sys-episode-startover';
        btnStartOver.onclick = () => {
          // clean up top bar then start over
          centerDiv.innerHTML = '';
          try { currentEpisodeIndex = 0; } catch(e){}
          playEpisode(folderName, 0, 0);
        };

        // append buttons into the center container
        centerDiv.appendChild(btnContinue);
        centerDiv.appendChild(btnStartOver);

        // Focus Continue so remote users can press Select/Enter immediately
        setTimeout(() => {
          try { btnContinue.focus(); } catch (e) {}
        }, 30);

      } catch (e) {
        console.warn('failed to render movie continue/startover buttons in top bar', e);
      }

      // Do not auto-play
      return;
    }

    // No resume prompt or user didn't explicitly choose "notyet" → preserve old behavior
    return playEpisode(folderName, 0);
  }

  // 5) If the user chose "Not yet" for a multi-episode title, show a single
  // Continue button inside the top bar center with Episode number, Episode title and resume time.
  // Otherwise fall through to render the episode buttons as before.

  // Helper: format seconds as "h:mm:ss" (h only shown when >= 1 hour) or "m:ss"
  function formatResumeTime(totalSeconds) {
    const secs = Math.max(0, Math.floor(Number(totalSeconds) || 0));
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    const pad2 = (n) => String(n).padStart(2, '0');
    if (h > 0) return `${h}:${pad2(m)}:${pad2(s)}`;
    return `${m}:${pad2(s)}`;
  }

  if (!isSingle && resumeChoice === 'notyet' && progress && typeof progress.episodeIndex === 'number') {
    try {
      const centerDiv = document.getElementById('top-bar-center');
      if (centerDiv) {
        centerDiv.innerHTML = ''; // clear previous buttons

        // build label: "Continue — Episode N: Title (h:mm:ss or m:ss)"
        const epIndex = Math.max(0, Number(progress.episodeIndex) || 0);
        const ep = (episodeData && episodeData[epIndex]) ? episodeData[epIndex] : { name: 'Episode' };
        const resumeSeconds = Number(progress.currentTime) || 0;
        const label = `Continue — Episode ${epIndex + 1}: ${ep.name} (${formatResumeTime(resumeSeconds)})`;

        // Continue button
        const btnContinueSeries = document.createElement('button');
        btnContinueSeries.className = 'sys-episode-btn sys-episode-continue';
        btnContinueSeries.textContent = label;
        btnContinueSeries.title = `Resume ${ep.name} at ${formatResumeTime(resumeSeconds)}`;
        btnContinueSeries.onclick = () => {
          centerDiv.innerHTML = ''; // clean up top bar
          try { currentEpisodeIndex = epIndex; } catch(e){}
          playEpisode(folderName, epIndex, resumeSeconds);
        };

        // Append it to the center container
        centerDiv.appendChild(btnContinueSeries);

        setTimeout(() => { try { btnContinueSeries.focus(); } catch (e) {} }, 30);
      }
    } catch (e) {
      console.warn('failed to render series continue button in top bar', e);
    }
  }

  // 5b) Render the episode buttons (unchanged behavior)
  episodeData.forEach((episode, i) => {
    const button = document.createElement("button");
    button.textContent = `Episode ${i + 1}: ${episode.name}`;
    // store index so we can update highlight later
    button.dataset.index = i;
    button.onclick = () => {
      // Clear the top-bar buttons in case user clicks a specific episode manually instead of "Continue"
      try { 
        const centerDiv = document.getElementById('top-bar-center');
        if (centerDiv) centerDiv.innerHTML = ''; 
      } catch(e){}
      
      currentEpisodeIndex = i;
      playEpisode(folderName, i);
      // update the UI highlight immediately
      try { updateEpisodeListHighlight(); } catch(e) {}
    };
    episodeList.appendChild(button);
  });

  // initial highlight (in case resume pointed to an episode)
  try { updateEpisodeListHighlight(); } catch (e) {}
}

async function backupShowToProfile(profileName, showName) {
  // prefer getCachedPlatform if it exists, otherwise fall back to the value set at startup
  const platform = (typeof getCachedPlatform === 'function') ? await getCachedPlatform() : (window.detectedPlatform || 'windows');
  console.log('[backupShowToProfile] platform=', platform, 'profile=', profileName, 'show=', showName);

  // find parent series if any
  let parentSeries = null;
  for (const [series, seasons] of Object.entries(episodes || {})) {
    if (Array.isArray(seasons) && seasons.includes(showName)) {
      parentSeries = series;
      break;
    }
  }

  // collect keys/values to include in payload
  const dataToUpload = {};
  const keyShow  = `progress-${profileName}-${showName}`;
  const valShow  = localStorage.getItem(keyShow);
  if (valShow != null) dataToUpload[keyShow] = valShow;

  const keyResume = `progress-${profileName}-Resume`;
  const valResume = localStorage.getItem(keyResume);
  if (valResume != null) dataToUpload[keyResume] = valResume;

  if (parentSeries) {
    const keyParent = `progress-${profileName}-${parentSeries}`;
    const valParent = localStorage.getItem(keyParent);
    if (valParent != null) dataToUpload[keyParent] = valParent;
  }

  const payload = `[[[${JSON.stringify(dataToUpload)}]]]`;
  console.log('[backupShowToProfile] payload length=', payload.length);

  // helper: PUT a .txt copy (Windows / fallback)
  async function putTxtCopy(encodedNameWithoutExt) {
    try {
      const url = `/Profiles/${encodedNameWithoutExt}.txt`;
      const r = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: payload });
      console.log('[backupShowToProfile] PUT .txt ->', url, r.status);
      return r.ok;
    } catch (e) {
      console.warn('[backupShowToProfile] PUT .txt failed for', encodedNameWithoutExt, e);
      return false;
    }
  }

  // helper: basic pocketserver upload (upload by name into targetDir)
  async function pocketUpload(name, targetDir) {
    try {
      const blob = new Blob([payload], { type: 'application/json' });
      const form = new FormData();
      form.append('files[]', blob, name);
      form.append('targetDir', targetDir);
      const r = await fetch('/pocketserver-api/upload', { method: 'POST', body: form, credentials: 'include' });
      const txt = await r.text().catch(()=> '');
      console.log('[backupShowToProfile] pocketserver upload', name, '->', r.status, txt);
      return r.ok;
    } catch (e) {
      console.warn('[backupShowToProfile] pocketserver upload failed', name, e);
      return false;
    }
  }

  // pocketserver helpers: list + delete
  async function listProfiles(targetDir) {
    try {
      const q = encodeURIComponent(targetDir);
      const r = await fetch(`/pocketserver-api/list?q=${q}`, { credentials: 'include' });
      if (!r.ok) { console.warn('[backupShowToProfile] list failed', r.status); return null; }
      const text = await r.text();
      try { return JSON.parse(text); } catch { return text; }
    } catch (e) {
      console.error('[backupShowToProfile] listProfiles error', e);
      return null;
    }
  }
  async function deletePath(fullPath) {
    try {
      const body = { command: "delete", paths: [ fullPath ], name: "", targetDir: "" };
      const r = await fetch('/pocketserver-api/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        credentials: 'include'
      });
      const txt = await r.text().catch(()=> '');
      console.log('[backupShowToProfile] deletePath', fullPath, '->', r.status, txt);
      return r.ok;
    } catch (e) {
      console.error('[backupShowToProfile] deletePath error', fullPath, e);
      return false;
    }
  }

  // pocketReplace: temp -> verify -> delete old -> upload final -> cleanup temp
  async function pocketReplace(baseName, targetDir) {
    const tempName = baseName + '.__new__';
    console.log('[backupShowToProfile] pocketReplace start for', baseName);

    // upload temp
    const tempOk = await pocketUpload(tempName, targetDir);
    if (!tempOk) {
      console.warn('[backupShowToProfile] pocketReplace: temp upload failed for', tempName);
      return false;
    }

    // verify temp is visible
    const midList = await listProfiles(targetDir);
    const midText = midList ? (typeof midList === 'string' ? midList : JSON.stringify(midList)) : '';
    if (!midText.includes(tempName)) {
      console.warn('[backupShowToProfile] pocketReplace: temp not visible after upload for', tempName);
      return false;
    }

    // delete existing desired
    const desiredFullPath = targetDir + baseName;
    const delOk = await deletePath(desiredFullPath);
    if (!delOk) {
      console.warn('[backupShowToProfile] pocketReplace: could not delete existing', desiredFullPath);
      return false;
    }

    // upload final desired name
    const finalOk = await pocketUpload(baseName, targetDir);
    if (!finalOk) {
      console.warn('[backupShowToProfile] pocketReplace: final upload failed for', baseName);
      return false;
    }

    // cleanup temp
    const tempFullPath = targetDir + tempName;
    const cleanupOk = await deletePath(tempFullPath);
    console.log('[backupShowToProfile] pocketReplace cleanup temp ->', cleanupOk);
    return finalOk;
  }

  // Platform-specific flows
  if (platform.includes('android')) {
    // Android: FormData PUT two files (no extension preferred)
    try {
      const blob = new Blob([payload], { type: 'application/json' });
      const form1 = new FormData(); form1.append('files[]', blob, `${profileName}-${showName}`);
      const form2 = new FormData(); form2.append('files[]', blob, `${profileName}-Resume`);

      const results = await Promise.allSettled([
        fetch(`/api/file/upload?path=${encodeURIComponent('/Profiles/')}`, { method: 'PUT', body: form1, credentials: 'include' }),
        fetch(`/api/file/upload?path=${encodeURIComponent('/Profiles/')}`, { method: 'PUT', body: form2, credentials: 'include' })
      ]);
      console.log('[backupShowToProfile] android upload results:', results);
    } catch (e) {
      console.warn('[backupShowToProfile] android upload error', e);
    }

    // best-effort .txt copies for other clients
    try { await putTxtCopy(`${encodeURIComponent(profileName)}-${encodeURIComponent(showName)}`); } catch(e){/*ignore*/}
    try { await putTxtCopy(`${encodeURIComponent(profileName)}-Resume`); } catch(e){/*ignore*/}

    return;
  }

  if (platform.includes('iphone') || platform === 'iphones') {
    // iPhone safe replace for both show and Resume pointer
    const targetDir = 'file:///private/var/mobile/Library/LiveFiles/com.apple.filesystems.userfsd/2B3E705A-D115-3563-8EB1-F240305273C0/VideoServer/Profiles/';

    // replace show file
    try {
      const showBase = `${profileName}-${showName}`;
      const okShow = await pocketReplace(showBase, targetDir);
      if (!okShow) console.warn('[backupShowToProfile] show pocketReplace did not complete', showBase);
      else console.log('[backupShowToProfile] show pocketReplace success for', showBase);
    } catch (e) {
      console.warn('[backupShowToProfile] show pocketReplace error', e);
    }

    // replace resume pointer using same safe flow
    try {
      const resumeBase = `${profileName}-Resume`;
      const okResume = await pocketReplace(resumeBase, targetDir);
      if (!okResume) {
        console.warn('[backupShowToProfile] resume pocketReplace failed, attempting direct upload for', resumeBase);
        // last-resort: attempt a direct upload (keeps behavior resilient)
        await pocketUpload(resumeBase, targetDir).catch(()=>{});
      } else {
        console.log('[backupShowToProfile] resume pocketReplace success for', resumeBase);
      }
    } catch (e) {
      console.warn('[backupShowToProfile] resume pocketReplace exception', e);
      try { await pocketUpload(`${profileName}-Resume`, targetDir); } catch(_) { /* ignore */ }
    }

    // do NOT attempt .txt PUTs for iPhone branch
    return;
  }

  // Windows: existing behavior (PUT .txt after short delay)
  if (platform === 'windows') {
    // Windows: attempt immediate .txt PUTs with retries/backoff (surgically replace the old 5s delayed PUT)
    async function attemptPutTxtCopies(attempts = 4, baseDelay = 700) {
      const fileShow  = `${encodeURIComponent(profileName)}-${encodeURIComponent(showName)}.txt`;
      const fileResume = `${encodeURIComponent(profileName)}-Resume.txt`;
      for (let attempt = 0; attempt < attempts; ++attempt) {
        try {
          const [r1, r2] = await Promise.all([
            fetch(`/Profiles/${fileShow}`,  { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: payload, credentials: 'include' }),
            fetch(`/Profiles/${fileResume}`, { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: payload, credentials: 'include' })
          ]);
          console.log('[backupShowToProfile] windows put attempt', attempt+1, 'statuses', r1.status, r2.status);
          if (r1.ok && r2.ok) {
            console.log('[backupShowToProfile] windows put success on attempt', attempt+1);
            return true;
          }
        } catch (e) {
          console.warn('[backupShowToProfile] windows put attempt error', e);
        }
        const waitMs = baseDelay * Math.pow(2, attempt);
        await new Promise(res => setTimeout(res, waitMs));
      }
      console.error('[backupShowToProfile] windows put all attempts failed');
      return false;
    }

    // Await the attempts so callers (like sendToTV) see consistent behavior.
    await attemptPutTxtCopies(4, 700).catch(e => { console.error('[backupShowToProfile] windows put aborted', e); });
    return;
  }


  // Fallback: conservative .txt write
  setTimeout(() => {
    const fileShow  = `${encodeURIComponent(profileName)}-${encodeURIComponent(showName)}.txt`;
    const fileResume = `${encodeURIComponent(profileName)}-Resume.txt`;
    Promise.allSettled([
      fetch(`/Profiles/${fileShow}`,  { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: payload }),
      fetch(`/Profiles/${fileResume}`, { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: payload })
    ]).then(results => {
      console.log('[backupShowToProfile] fallback txt put results:', results);
    });
  }, 5000);
}

async function restoreShowFromProfile(profile, show) {
  if (show === 'Resume') {
    console.warn('Skipping restore from Profile-Resume');
    return;
  }

  const platform = (typeof getCachedPlatform === 'function') ? await getCachedPlatform() : (window.detectedPlatform || 'windows');

  // build candidate list for Resume pointer / show file
  const safeId = `${encodeURIComponent(profile)}-${encodeURIComponent(show)}`;
  const candidates = [];
  if (platform.includes('iphone') || platform === 'iphones') {
    candidates.push(safeId);           // no-extension first for iPhone
    candidates.push(safeId + '.txt'); // fallback .txt
  } else if (platform.includes('android')) {
    candidates.push(safeId);           // android prefers no-extension
    candidates.push(safeId + '.txt');
  } else {
    // windows/unknown: prefer .txt
    candidates.push(safeId + '.txt');
    candidates.push(safeId);
  }

  // attempt each candidate until one succeeds
  let txt = null;
  let lastError = null;
  for (const fileId of candidates) {
    const url = `/Profiles/${fileId}?_=${Date.now()}`;
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) {
        lastError = new Error(`HTTP ${res.status} for ${fileId}`);
        continue;
      }
      txt = await res.text();
      if (txt) break;
    } catch (e) {
      lastError = e;
      continue;
    }
  }

  if (!txt) {
    throw new Error('Could not find profile file (tried candidates). ' + (lastError ? `Last error: ${lastError.message}` : 'No response.'));
  }

  // parse JSON payload between markers
  const m = txt.match(/\[\[\[([\s\S]*?)\]\]\]/);
  if (!m) throw new Error('No backup JSON found between markers');
  let data;
  try { data = JSON.parse(m[1]); }
  catch (e) { throw new Error('Backup JSON malformed: ' + e.message); }

  // restore into localStorage
  Object.entries(data).forEach(([key, val]) => {
    if (val != null) localStorage.setItem(key, val);
    else localStorage.removeItem(key);
  });
}

function getNextSeason(currentSeason) {
  // Look for any key in `episodes` whose array includes the currentSeason
  for (const [parent, children] of Object.entries(episodes)) {
    if (Array.isArray(children) && children.includes(currentSeason)) {
      const idx = children.indexOf(currentSeason);
      if (idx < children.length - 1) {
        // return the very next entry in that array
        return children[idx + 1];
      }
    }
  }
  return null;  // no sequel/next-season found
}

  if (currentEpisodeIndex < episodeData.length - 1) {
    // Play next episode in current season

  } else if (autoNextSequelEnabled) {
    // Try to load the next season in the current series

    if (nextSeason && episodes[nextSeason]) {

    } else {
      alert("No more seasons available.");
    }
  } else {
    console.log("Last episode of the season and Auto-Next Sequel is off.");
  }
}

    // validate VTT
    if (!/^\s*WEBVTT/m.test(text)) {

      return;
    }

    const blob = new Blob([text], { type: "text/vtt" });
    const blobUrl = URL.createObjectURL(blob);
    t.src = blobUrl;

    setTimeout(() => {
      if (t.track) t.track.mode = "showing";
    }, 200);

  } catch (err) {
    console.warn("Subtitle fetch failed, fallback direct:", vttUrl);
    t.src = vttUrl;

    setTimeout(() => {
      if (t.track) t.track.mode = "showing";
    }, 200);
  }

/* helper: safe basename extractor */
function basename(path) {
  if (!path) return '';
  try {
    // chop off query strings
    const p = String(path).split('?')[0];
    const parts = p.split('/');
    return parts[parts.length - 1];
  } catch(e){ return String(path); }
}

function _favoritesKeyForProfile(profile) {
  profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
  return `favorites-${profile}`;
}

function folderFromPath(path) {
  if (!path) return null;
  try {
    let p = String(path).replace(/\\/g, '/').split(/[?#]/)[0];
    p = p.replace(/\/+$/, '');
    const parts = p.split('/').filter(Boolean);
    if (parts.length >= 2) return parts[parts.length - 2];
    if (parts.length === 1) return parts[0];
    return null;
  } catch { return null; }
}

function looksLikeFilename(s) {
  return typeof s === 'string' && /\.[a-z0-9]{2,6}$/i.test(s.trim());
}

/* Normalize saved favorites: convert legacy filenames -> folder names using episodes map */
function normalizeFavoriteList(arr) {
  if (!Array.isArray(arr)) return [];
  const out = [];
  for (let item of arr) {
    if (!item) continue;
    item = String(item).trim();
    if (!item) continue;

    if (!looksLikeFilename(item)) { out.push(item); continue; }

    // item looks like filename (e.g. "World War Z.mp4"); attempt to find parent folder via episodes map
    let matchedFolder = null;
    const targetBase = item;
    try {
      for (const folderName in episodes) {
        const list = episodes[folderName];
        if (!Array.isArray(list)) continue;
        for (const ep of list) {
          const f = ep && (ep.file || ep.name);
          if (!f) continue;
          const bn = String(f).split('/').pop().split('\\').pop();
          if (bn && bn.toLowerCase() === targetBase.toLowerCase()) {
            matchedFolder = folderName;
            break;
          }
        }
        if (matchedFolder) break;
      }
    } catch (e) { /* ignore */ }

    if (matchedFolder) out.push(matchedFolder);
    else out.push(item.replace(/\.[^.]+$/, ''));
  }
  return [...new Set(out)];
}

/* ------------------------
   Robust save/load to profile .txt (Favorites)
   ------------------------ */

async function saveFavoritesToServer(arr) {
  const profile = localStorage.getItem('activeProfile') || 'Guest';
  const slug = 'favorites';
  // 1) If the app already provides the playlist save helper (radio.html style), prefer it:
  if (typeof window.savePlaylistFileToServer === 'function') {
    try {
      await window.savePlaylistFileToServer(profile, slug, arr);
      console.log('[saveFavoritesToServer] saved via savePlaylistFileToServer');
      return true;
    } catch (e) {
      console.warn('[saveFavoritesToServer] savePlaylistFileToServer failed', e);
    }
  }

  // 2) Try pocketReplace (iPhone pocketserver flow) if available globally
  try {
    const fileName = `${profile}-${slug}.txt`;
    const payloadText = `[[[\n${JSON.stringify(arr, null, 2)}\n]]]`;
    if (typeof pocketReplace === 'function') {
      const ok = await pocketReplace(fileName, null, payloadText).catch(()=>false);
      if (ok) { console.log('[saveFavoritesToServer] saved via pocketReplace'); return true; }
    }
  } catch (e) {
    console.warn('[saveFavoritesToServer] pocketReplace attempt failed', e);
  }

  // 3) Try Android-style upload if helper exists (non-blocking fallback)
  try {
    if (typeof isAndroidUpload === 'function' && isAndroidUpload()) {
      const fileName = `${profile}-favorites.txt`;
      const blob = new Blob([JSON.stringify(arr)], { type: 'application/json' });
      const form = new FormData();
      form.append('files[]', blob, fileName);
      // try server endpoint used elsewhere in index/radio
      const r = await fetch(`/pocketserver-api/upload`, { method: 'POST', body: form });
      if (r && r.ok) { console.log('[saveFavoritesToServer] saved via android upload'); return true; }
    }
  } catch (e) {
    console.warn('[saveFavoritesToServer] android upload failed', e);
  }

  // 4) Final fallback: Windows/Generic PUT to /Profiles/<name>.txt with retries + credentials
  try {
    const nameNoExt = `${profile}-${slug}`;
    const url = `/Profiles/${encodeURIComponent(nameNoExt)}.txt`;
    const payloadText = `[[[\n${JSON.stringify(arr, null, 2)}\n]]]`;
    const maxAttempts = 3;
    const baseDelay = 250;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      try {
        const r = await fetch(url + `?_=${Date.now()}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'text/plain' },
          body: payloadText,
          credentials: 'include'
        });
        console.log('[saveFavoritesToServer] PUT attempt', attempt+1, '->', r.status);
        if (r.ok) return true;
      } catch (e) {
        console.warn('[saveFavoritesToServer] PUT attempt error', e);
      }
      await new Promise(res => setTimeout(res, baseDelay * Math.pow(2, attempt)));
    }
    console.error('[saveFavoritesToServer] all PUT attempts failed for', url);
  } catch (e) {
    console.warn('[saveFavoritesToServer] fallback failed', e);
  }
  return false;
}

async function loadFavoritesFromServer() {
  const profile = localStorage.getItem('activeProfile') || 'Guest';
  const slug = 'favorites';
  const fileName = `${profile}-${slug}.txt`;
  const perKey = _favoritesKeyForProfile(profile);

  // 1) Prefer radio/playlist helper if available
  if (typeof fetchAndParseJsonArray === 'function') {
    try {
      const arr = await fetchAndParseJsonArray(`/Profiles/${encodeURIComponent(fileName)}`);
      if (Array.isArray(arr)) {
        const normalized = normalizeFavoriteList(arr);
        try { localStorage.setItem(perKey, JSON.stringify(normalized)); } catch(e){}
        return normalized;
      }
    } catch (e) {
      console.warn('[loadFavoritesFromServer] fetchAndParseJsonArray failed', e);
    }
  }

  // 2) Direct fetch (with no-ext fallback)
  try {
    const r = await fetch(`/Profiles/${encodeURIComponent(fileName)}?_=${Date.now()}`, { cache: 'no-store', credentials: 'include' });
    let text = null;
    if (r && r.ok) {
      text = await r.text();
    } else {
      const alt = `/Profiles/${encodeURIComponent(fileName.replace(/\.txt$/, ''))}?_=${Date.now()}`;
      const r2 = await fetch(alt, { cache: 'no-store', credentials: 'include' });
      if (r2 && r2.ok) text = await r2.text();
      else {
        // server file not found -> clear per-profile localStorage to avoid leakage
        try { localStorage.removeItem(perKey); } catch(e){}
        return [];
      }
    }

    try {
      const m = text.match(/\[\[\[\s*([\s\S]*?)\s*\]\]\]/);
      let arr = null;
      if (m && m[1]) arr = JSON.parse(m[1]);
      else arr = JSON.parse(text);

      if (Array.isArray(arr)) {
        const normalized = normalizeFavoriteList(arr);
        try { localStorage.setItem(perKey, JSON.stringify(normalized)); } catch(e){}
        return normalized;
      } else {
        try { localStorage.removeItem(perKey); } catch(e){}
        return [];
      }
    } catch (e) {
      console.warn('[loadFavoritesFromServer] parse error', e);
      try { localStorage.removeItem(perKey); } catch(e){}
      return [];
    }

  } catch (e) {
    console.warn('[loadFavoritesFromServer] fetch failed', e);
    try { localStorage.removeItem(perKey); } catch(e){}
    return [];
  }
}

    function buildImageCandidates(folderName) {
      const exts = ['.jpg'];
      const candidates = [];
      const pushIf = (u) => {
        if (!u) return;
        if (!candidates.includes(u)) candidates.push(u);
      };

      // local, self-contained variant generator so favorites never depend on a missing global helper
      function variantsForName(name) {
        const base = String(name || '').trim();
        if (!base) return [];
        const noApos = base.replace(/[’']/g, '');
        const noSpace = base.replace(/\s+/g, '');
        const noAposNoSpace = noApos.replace(/\s+/g, '');
        return [...new Set([base, noApos, noSpace, noAposNoSpace].filter(Boolean))];
      }

      const variants = variantsForName(folderName);
      const baseFolder = String(folderName || '').trim();

      // 0) try folder-level poster variants used by the main grid
      for (const v of variants) {
        const noSpace = v.replace(/\s+/g, '');

          pushIf(`./${v}/${v}${e}`);
          pushIf(`./${v}/${noSpace}${e}`);
          pushIf(`./Movies/${v}${e}`);
          pushIf(`./${v}${e}`);

        if (Array.isArray(list)) {
          const hasObjects = list.some(it => it && typeof it === 'object' && (it.img || it.image || it.file || it.name));
          if (hasObjects) {
            for (const ep of list) {
              if (!ep) continue;
              if (ep.img) pushIf(ep.img);
              if (ep.image) pushIf(ep.image);
              if (ep.file) {
                try {
                  const rawPath = String(ep.file);

                  for (const v of variants) {

                      pushIf(`${parent}/${v.replace(/\s+/g, '')}${e}`);
                      pushIf(`${parent}/${basename(v)}${e}`);
                    }
                  }
                } catch (e) {}
              }
            }
          } else {
            for (const seasonName of list) {
              if (!seasonName) continue;
              const seasonEpisodes = episodes[seasonName];
              if (!Array.isArray(seasonEpisodes)) continue;

                    for (const v of variants) {
                      for (const e of exts) {
                        pushIf(`${parent}/${v}${e}`);
                        pushIf(`${parent}/${v.replace(/\s+/g, '')}${e}`);
                        pushIf(`${parent}/${basename(v)}${e}`);
                      }
                    }
                    break;
                  } catch (e) {}
                }
