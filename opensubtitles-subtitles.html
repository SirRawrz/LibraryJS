<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetching Subtitles...</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #253046;
      --accent: #6ee7b7;
      --accent2: #60a5fa;
      --warn: #f59e0b;
      --danger: #fb7185;
      --ok: #34d399;
    }
    body { 
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 40px; 
      text-align: center; 
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }
    h1 { margin-top: 0; font-size: 22px; }
    .status { font-size: 16px; margin-bottom: 20px; font-weight: 500; }
    .status.error { color: var(--danger); }
    .status.success { color: var(--ok); }
    .log { 
      color: var(--muted); 
      font-family: 'SF Mono', monospace; 
      font-size: 13px; 
      white-space: pre-wrap; 
      text-align: left; 
      background: rgba(0,0,0,0.3); 
      padding: 15px; 
      border-radius: 8px; 
      border: 1px solid var(--line);
      height: 200px;
      overflow-y: auto;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--accent2);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .hidden { display: none !important; }
    
    /* Setup UI Styles */
    .setup-box { text-align: left; padding: 10px 0; }
    .setup-box p { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .setup-box a { color: var(--accent2); text-decoration: none; }
    .setup-box a:hover { text-decoration: underline; }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      margin-bottom: 15px;
      font-family: monospace;
      box-sizing: border-box;
    }
    button {
      background: var(--accent2);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Open Subtitles Fetcher</h1>

    <!-- 1. Setup View (Hidden by default) -->
    <div id="setupView" class="setup-box hidden">
      <p><strong id="setupTitle">API Key Required</strong><br>
      <span id="setupInstructions">To search for subtitles, you need a free Open Subtitles REST API key.</span></p>
      <ol style="color: var(--muted); font-size: 14px; padding-left: 20px;">
        <li>Log in at <a href="https://opensubtitles.com/" target="_blank">OpenSubtitles.com</a></li>
        <li>Go to the <a href="https://www.opensubtitles.com/consumers" target="_blank">API Consumers</a> page</li>
        <li>Create a new application to generate your key</li>
      </ol>
      <input type="text" id="apiKeyInput" placeholder="Paste your API key here (e.g. abc123def456...)">
      <button id="saveKeyBtn">Save to Server & Continue</button>
      <div id="setupError" style="color: var(--danger); margin-top: 10px; font-size: 14px;"></div>
    </div>

    <!-- 2. Process View -->
    <div id="processView">
      <div id="spinner" class="spinner"></div>
      <div class="status" id="statusEl">Checking for API Key...</div>
      <div class="log" id="logEl"></div>
    </div>
  </div>

  <script>

    // --- URL Parameters ---
    const urlParams = new URLSearchParams(window.location.search);
    const mediaName = urlParams.get('name') || '';
    const uploadUrl = urlParams.get('upload') || '';
    const autoClose = urlParams.get('close') === '1';
    const jobId = urlParams.get('jobId') || '';
    const isEmbedded = window.parent && window.parent !== window;

    // Optional hints make subtitle matching much more accurate when the caller can pass them.
    const seriesHint = urlParams.get('series') || urlParams.get('show') || '';
    const librarySeriesHint = urlParams.get('librarySeries') || urlParams.get('collection') || '';
    const episodeTitleHint = urlParams.get('episodeTitle') || urlParams.get('title') || '';
    const libraryTitleHint = urlParams.get('libraryTitle') || urlParams.get('itemTitle') || '';
    const seasonHint = Number.parseInt(urlParams.get('season') || '', 10);
    const episodeHint = Number.parseInt(urlParams.get('episode') || '', 10);
    const yearHint = Number.parseInt(urlParams.get('year') || '', 10);
    const imdbHint = urlParams.get('imdb_id') || urlParams.get('imdb') || '';
    const tmdbHint = urlParams.get('tmdb_id') || urlParams.get('tmdb') || '';
    const textHint = urlParams.get('search') || '';

    function notifyHost(type, payload = {}) {
      const message = { type, ...payload };
      try {
        if (isEmbedded) {
          window.parent.postMessage(message, window.location.origin);
        } else if (window.opener) {
          window.opener.postMessage(message, window.location.origin);
        }
      } catch (err) {
        console.warn('Unable to notify host window:', err);
      }
    }

    // --- UI Elements ---

    const logEl = document.getElementById('logEl');
    const statusEl = document.getElementById('statusEl');
    const spinner = document.getElementById('spinner');
    const setupView = document.getElementById('setupView');
    const processView = document.getElementById('processView');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const setupError = document.getElementById('setupError');
    const setupTitle = document.getElementById('setupTitle');
    const setupInstructions = document.getElementById('setupInstructions');

    const MAX_KEY_SLOT = 20;
    let OS_API_KEY = '';
    let OS_API_KEY_SLOT = 1;
    let pendingKeyPrompt = null;

    function ordinal(n) {
      const v = n % 100;
      if (v >= 11 && v <= 13) return `${n}th`;
      switch (n % 10) {
        case 1: return `${n}st`;
        case 2: return `${n}nd`;
        case 3: return `${n}rd`;
        default: return `${n}th`;
      }
    }

    function keyFilePath(slot) {
      if (slot === 0) return '/opensubtitles-rest-api-favored.txt';
      return slot === 1 ? '/opensubtitles-rest-api.txt' : `/opensubtitles-rest-api${slot}.txt`;
    }

    function slotLabel(slot) {
      if (slot === 0) return 'favored';
      return slot === 1 ? 'primary' : `${ordinal(slot)} fallback`;
    }

    function updateSetupUI(slot, reason = '') {
      const label =
        slot === 0 ? 'Favored API Key Required' :
        slot === 1 ? 'API Key Required' : `API Key ${ordinal(slot)} Required`;
      setupTitle.innerText = label;
      setupInstructions.innerText = reason
        ? reason
        : 'To search for subtitles, you need a free Open Subtitles REST API key.';
      apiKeyInput.placeholder = slot === 1
        ? 'Paste your API key here (e.g. abc123def456...)'
        : `Paste the API key for ${keyFilePath(slot).replace(/^\//, '')}`;
      saveKeyBtn.innerText =
        slot === 0 ? 'Save Favored Key & Continue' :
        slot === 1 ? 'Save to Server & Continue' :
        `Save to ${keyFilePath(slot).replace(/^\//, '')} & Retry`;
    }

    function isQuotaLikeError(value) {
      const message = extractMessage(value).toLowerCase();
      return (
        message.includes('too many downloads from same api key') ||
        message.includes('allowed 20 subtitles') ||
        message.includes('you have downloaded your allowed 20 subtitles') ||
        message.includes('exceeding quota') ||
        message.includes('quota') ||
        message.includes('throttle limit reached') ||
        message.includes('rate limit')
      );
    }

    function isRetryableThrottle(value) {
      const message = extractMessage(value).toLowerCase();
      return message.includes('throttle limit reached') || message.includes('rate limit');
    }

    function extractMessage(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value.map(extractMessage).filter(Boolean).join(' ');
      if (typeof value === 'object') {
        return [
          value.message,
          value.error,
          value.errors,
          value.status,
          value.detail
        ].filter(Boolean).map(extractMessage).join(' ');
      }
      return String(value);
    }

    function looksLikeInvalidToken(value) {
      const message = extractMessage(value).toLowerCase();
      return message.includes('invalid token') || message.includes('expired token');
    }

    async function readKeyFile(slot) {
      const res = await fetch(keyFilePath(slot), { cache: 'no-store' });
      if (!res.ok) return '';
      const key = (await res.text()).trim();
      return key.length > 5 ? key : '';
    }

    async function saveKeyFile(slot, key) {
      const res = await fetch(keyFilePath(slot), {
        method: 'PUT',
        headers: { 'Content-Type': 'text/plain' },
        body: key
      });
      if (!res.ok) {
        throw new Error(`Failed to save ${keyFilePath(slot)}: ${res.statusText}`);
      }
    }

    function promptForKey(slot, reason = '') {
      processView.classList.add('hidden');
      setupView.classList.remove('hidden');
      setupError.innerText = '';
      updateSetupUI(slot, reason);
      apiKeyInput.value = '';
      apiKeyInput.focus();

      return new Promise((resolve) => {
        pendingKeyPrompt = { slot, resolve };
      });
    }

    async function getKeyForSlot(slot, reason = '') {
      if (slot === 0) {
        const favored = await readKeyFile(0);
        if (favored) {
          OS_API_KEY_SLOT = 0;
          OS_API_KEY = favored;
          log(`Loaded favored API key from ${keyFilePath(0).replace(/^\//, '')}.`);
          return favored;
        }
        return await getKeyForSlot(1, reason);
      }

      const existing = await readKeyFile(slot);
      if (existing) {
        OS_API_KEY_SLOT = slot;
        OS_API_KEY = existing;
        log(`Loaded ${slotLabel(slot)} API key from ${keyFilePath(slot).replace(/^\//, '')}.`);
        return existing;
      }
      return await promptForKey(slot, reason);
    }

    async function promoteFavoredKey(key, sourceSlot) {
      const currentFavored = await readKeyFile(0);
      if (currentFavored && currentFavored === key) {
        log('Favored key already matches the working key; skipping rewrite.');
        return false;
      }

      await saveKeyFile(0, key);
      log(`Promoted ${slotLabel(sourceSlot)} API key to ${keyFilePath(0).replace(/^\//, '')}.`);
      return true;
    }

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.innerText += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[${time}] ${msg}`);
    }

    function setStatus(msg, type = 'info') {
      statusEl.innerText = msg;
      statusEl.className = `status ${type}`;
      log(`STATUS: ${msg}`);
      if (type === 'error' || type === 'success') {
        spinner.classList.add('hidden');
      } else {
        spinner.classList.remove('hidden');
      }
    }

    function withTimeout(ms, promise, label = 'Operation') {
      let timer;
      const timeout = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(`${label} timed out after ${ms} ms`)), ms);
      });
      return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    // Uses the /proxy endpoint in your server.mjs to bypass CORS
    async function fetchViaProxy(url, method = 'GET', headers = {}, body = null, timeoutMs = 30000) {
      const payload = { url, method, headers, responseType: 'text' };
      if (body !== null && body !== undefined) {
        payload.bodyText = typeof body === 'string' ? body : JSON.stringify(body);
      }

      const request = fetch('/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(async (res) => {
        if (!res.ok) {
          throw new Error(`Proxy HTTP ${res.status}`);
        }
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Proxy fetch failed');

        try {
          return JSON.parse(data.body);
        } catch {
          return data.body;
        }
      });

      return withTimeout(timeoutMs, request, `Fetch ${method} ${url}`);
    }

    function decodeName(raw) {
      let name = raw || '';
      try {
        name = decodeURIComponent(name);
      } catch (_) {
        // Leave as-is if it is not valid URI encoding.
      }
      name = name.replace(/\.[^/.]+$/, '');
      name = name.replace(/_/g, ' ');
      name = name.replace(/\.+/g, ' ');
      name = name.replace(/\s+/g, ' ').trim();
      return name;
    }

    function normalizeForMatch(value) {
      return (value || '')
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[’']/g, '')
        .toLowerCase()
        .replace(/&/g, ' and ')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function words(value) {
      const normalized = normalizeForMatch(value);
      if (!normalized) return [];
      return normalized.split(' ').filter(Boolean);
    }

    function containsAny(haystack, needles) {
      const hay = normalizeForMatch(haystack);
      return needles.some((needle) => hay.includes(normalizeForMatch(needle)));
    }

    function matchCoverage(target, haystack) {
      const targetNorm = normalizeForMatch(target);
      const hayNorm = normalizeForMatch(haystack);
      if (!targetNorm || !hayNorm) {
        return { ratio: 0, exact: false, hits: 0, targetWords: 0 };
      }

      const targetWords = targetNorm.split(' ').filter(Boolean);
      const hayWords = new Set(hayNorm.split(' ').filter(Boolean));
      let hits = 0;
      for (const word of targetWords) {
        if (word.length > 1 && hayWords.has(word)) hits++;
      }

      return {
        ratio: targetWords.length ? hits / targetWords.length : 0,
        exact: hayNorm.includes(targetNorm),
        hits,
        targetWords: targetWords.length
      };
    }

    
    function splitTitleAndEpisode(raw) {
      const decoded = decodeName(raw);

      const patterns = [
        /^(?<series>.+?)\s*[sS](?<season>\d{1,2})\s*[eE](?<episode>\d{1,3})(?:\s*[-:–|]\s*(?<title>.+))?$/,
        /^(?<series>.+?)\s*[sS](?<season>\d{1,2})\s*(?<episode>\d{1,3})(?:\s*[-:–|]\s*(?<title>.+))?$/,
        /^(?<series>.+?)\s*(?:season|series)\s*(?<season>\d{1,2})\s*(?:episode|ep|e)\s*(?<episode>\d{1,3})(?:\s*[-:–|]\s*(?<title>.+))?$/i,
        /^(?<series>.+?)\s*(?<season>\d{1,2})x(?<episode>\d{1,3})(?:\s*[-:–|]\s*(?<title>.+))?$/i,
      ];

      for (const pattern of patterns) {
        const match = decoded.match(pattern);
        if (match && match.groups) {
          return {
            raw: decoded,
            series: (match.groups.series || '').trim(),
            season: Number.parseInt(match.groups.season || '', 10),
            episode: Number.parseInt(match.groups.episode || '', 10),
            title: (match.groups.title || '').trim(),
            isEpisode: true,
          };
        }
      }

      const yearMatch = decoded.match(/^(.*?)\s*\(?((?:19|20)\d{2})\)?$/);
      if (yearMatch) {
        return {
          raw: decoded,
          title: yearMatch[1].trim(),
          year: Number.parseInt(yearMatch[2], 10),
          isMovie: true,
        };
      }

      // Some of the library uses franchise/part naming like:
      // "Digimon Adventure tri. - Reunion"
      // Treat the left side as the series/franchise and the right side as the
      // part/title so both can be matched independently.
      const partMatch = decoded.match(/^(.*?)\s*[-:–|]\s*(.+)$/);
      if (partMatch) {
        const left = (partMatch[1] || '').trim();
        const right = (partMatch[2] || '').trim();
        if (left && right && right.length <= 120) {
          return {
            raw: decoded,
            series: left,
            title: right,
            isMovie: true,
            isFranchisePart: true,
          };
        }
      }

      return {
        raw: decoded,
        title: decoded,
        isMovie: false,
        isEpisode: false,
      };
    }

    function buildQueryString(params) {
      const filtered = [];
      for (const [key, value] of Object.entries(params)) {
        if (value === undefined || value === null || value === '') continue;
        filtered.push(`${encodeURIComponent(key)}=${encodeURIComponent(String(value))}`);
      }
      return filtered.join('&');
    }

    function buildApiUrl(baseParams) {
      const params = { languages: 'en', ...baseParams };
      if (params.query) params.query = normalizeForMatch(params.query);
      return `https://api.opensubtitles.com/api/v1/subtitles?${buildQueryString(params)}`;
    }

    
    function createSearchPlans() {
      const parsed = splitTitleAndEpisode(mediaName);
      const seriesCandidates = [
        seriesHint,
        librarySeriesHint,
        parsed.series,
        parsed.title,
        parsed.raw,
      ].map((s) => (s || '').trim()).filter(Boolean);

      const episodeCandidates = [
        episodeTitleHint,
        libraryTitleHint,
        textHint,
        parsed.title && parsed.isEpisode ? parsed.title : '',
      ].map((s) => (s || '').trim()).filter(Boolean);

      const unique = [];
      const seen = new Set();

      function addPlan(label, params) {
        const key = JSON.stringify(params);
        if (seen.has(key)) return;
        seen.add(key);
        unique.push({ label, url: buildApiUrl(params), params });
      }

      const season = Number.isFinite(seasonHint) ? seasonHint : parsed.season;
      const episode = Number.isFinite(episodeHint) ? episodeHint : parsed.episode;
      const year = Number.isFinite(yearHint) ? yearHint : parsed.year;

      const isEpisode = Number.isFinite(season) && Number.isFinite(episode);
      const seasonTag = Number.isFinite(season) ? `S${String(season).padStart(2, '0')}` : '';
      const episodeTag = Number.isFinite(season) && Number.isFinite(episode)
        ? `S${String(season).padStart(2, '0')}E${String(episode).padStart(2, '0')}`
        : '';

      if (isEpisode) {
        const seriesOnly = seriesCandidates[0] || '';
        const episodeOnly = episodeCandidates[0] || '';
        const rawOnly = parsed.raw;

        if (imdbHint) addPlan('IMDB episode lookup', { imdb_id: imdbHint, type: 'episode', season_number: season, episode_number: episode });
        if (tmdbHint) addPlan('TMDB episode lookup', { tmdb_id: tmdbHint, type: 'episode', season_number: season, episode_number: episode });

        addPlan('Series + episode title', {
          query: [seriesOnly, episodeTag, episodeOnly].filter(Boolean).join(' '),
          type: 'episode',
          season_number: season,
          episode_number: episode
        });
        addPlan('Series + S/E', {
          query: [seriesOnly, episodeTag || seasonTag].filter(Boolean).join(' '),
          type: 'episode',
          season_number: season,
          episode_number: episode
        });
        if (episodeOnly) {
          addPlan('Episode title fallback', {
            query: [episodeOnly, episodeTag].filter(Boolean).join(' '),
            type: 'episode',
            season_number: season,
            episode_number: episode
          });
        }
        addPlan('Raw episode fallback', {
          query: [rawOnly, episodeTag].filter(Boolean).join(' '),
          type: 'episode',
          season_number: season,
          episode_number: episode
        });
      } else {
        const seriesOnly = seriesCandidates[0] || '';
        const partTitle = episodeCandidates[0] || parsed.title || '';
        const rawOnly = parsed.raw;

        if (imdbHint) addPlan('IMDB movie lookup', { imdb_id: imdbHint, type: 'movie' });
        if (tmdbHint) addPlan('TMDB movie lookup', { tmdb_id: tmdbHint, type: 'movie' });

        // Prioritize the franchise + part title for OVA / multi-movie series.
        if (seriesOnly && partTitle && seriesOnly.toLowerCase() !== partTitle.toLowerCase()) {
          addPlan('Franchise + part title', {
            query: [seriesOnly, partTitle].filter(Boolean).join(' '),
            type: 'movie',
            year: year || undefined
          });
          addPlan('Franchise + raw title', {
            query: [seriesOnly, rawOnly].filter(Boolean).join(' '),
            type: 'movie',
            year: year || undefined
          });
        }

        if (year) addPlan('Movie title + year', { query: [rawOnly, year].filter(Boolean).join(' '), type: 'movie', year });
        addPlan('Movie/show title', { query: rawOnly, type: 'movie', year: year || undefined });
        if (partTitle && partTitle !== rawOnly) {
          addPlan('Part title fallback', { query: partTitle, type: 'movie' });
        }
        if (seriesOnly && seriesOnly !== rawOnly) {
          addPlan('Series title fallback', { query: seriesOnly, type: 'movie' });
        }
        if (textHint) addPlan('Text hint', { query: textHint, type: 'movie' });
      }

      return { parsed, plans: unique };
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function tokenOverlapScore(a, b) {
      const aw = words(a);
      const bw = words(b);
      if (!aw.length || !bw.length) return 0;
      const setB = new Set(bw);
      let hits = 0;
      for (const token of aw) {
        if (setB.has(token) && token.length > 1) hits++;
      }
      return hits / Math.max(aw.length, bw.length);
    }

    function parseReleaseEpisodeNumbers(text) {
      const s1 = text.match(/\bS(\d{1,2})\s*E?(\d{1,3})\b/i);
      if (s1) return { season: Number.parseInt(s1[1], 10), episode: Number.parseInt(s1[2], 10) };
      const x = text.match(/\b(\d{1,2})x(\d{1,3})\b/i);
      if (x) return { season: Number.parseInt(x[1], 10), episode: Number.parseInt(x[2], 10) };
      return {};
    }

    
    function scoreSubtitle(item, parsed) {
      const attrs = item?.attributes || {};
      const file = attrs.files?.[0] || {};
      const release = attrs.release || file.file_name || '';
      const featureTitle = attrs.feature_details?.title || '';
      const featureType = (attrs.feature_details?.feature_type || '').toLowerCase();
      const title = attrs.title || '';
      const combined = [release, featureTitle, title].filter(Boolean).join(' | ');
      const normalizedCombined = normalizeForMatch(combined);

      let score = 0;

      const seasonTarget = parsed.season || seasonHint;
      const episodeTarget = parsed.episode || episodeHint;
      const yearTarget = parsed.year || yearHint;
      const seriesTarget = (seriesHint || parsed.series || parsed.title || parsed.raw || '').trim();
      const titleTarget = (episodeTitleHint || textHint || parsed.title || '').trim();

      const apiSeason = Number.parseInt(attrs.season_number ?? attrs.season ?? '', 10);
      const apiEpisode = Number.parseInt(attrs.episode_number ?? attrs.episode ?? '', 10);

      if (Number.isFinite(seasonTarget) && Number.isFinite(episodeTarget)) {
        if (Number.isFinite(apiSeason) && Number.isFinite(apiEpisode)) {
          if (apiSeason === seasonTarget && apiEpisode === episodeTarget) {
            score += 160;
          } else if (apiSeason === seasonTarget || apiEpisode === episodeTarget) {
            score += 25;
          } else {
            score -= 110;
          }
        }

        const parsedRelease = parseReleaseEpisodeNumbers(combined);
        if (parsedRelease.season === seasonTarget && parsedRelease.episode === episodeTarget) {
          score += 70;
        } else if (
          Number.isFinite(parsedRelease.season) &&
          Number.isFinite(parsedRelease.episode) &&
          (parsedRelease.season !== seasonTarget || parsedRelease.episode !== episodeTarget)
        ) {
          score -= 30;
        }
      } else if (yearTarget) {
        const yearMatch = combined.match(/\b(19|20)\d{2}\b/);
        if (yearMatch && Number.parseInt(yearMatch[0], 10) === yearTarget) {
          score += 40;
        } else if (yearMatch) {
          score -= 15;
        }
      }

      if (seriesTarget) {
        const seriesMatch = matchCoverage(seriesTarget, combined);
        score += Math.round(60 * seriesMatch.ratio);
        if (seriesMatch.exact) score += 24;
        if (seriesMatch.hits > 0 && seriesMatch.ratio < 0.45) score -= 10;
        if (seriesMatch.ratio < 0.25) score -= 22;
      }

      if (titleTarget) {
        const titleMatch = matchCoverage(titleTarget, combined);
        score += Math.round(85 * titleMatch.ratio);
        if (titleMatch.exact) score += 30;
        if (titleMatch.hits > 0 && titleMatch.ratio < 0.5) score -= 10;
        if (titleMatch.ratio === 0) score -= parsed.isEpisode || Number.isFinite(seasonTarget) ? 22 : 48;
      }

      if (seriesTarget && titleTarget) {
        const combinedTargetMatch = matchCoverage([seriesTarget, titleTarget].filter(Boolean).join(' '), combined);
        score += Math.round(28 * combinedTargetMatch.ratio);
        if (combinedTargetMatch.exact) score += 20;
        if (combinedTargetMatch.ratio === 0) score -= parsed.isEpisode || Number.isFinite(seasonTarget) ? 10 : 35;
      }

      if (parsed.isFranchisePart && seriesTarget && titleTarget) {
        const seriesOnlyMatch = matchCoverage(seriesTarget, combined);
        const titleOnlyMatch = matchCoverage(titleTarget, combined);
        if (seriesOnlyMatch.ratio > 0 && titleOnlyMatch.ratio > 0) score += 22;
        if (seriesOnlyMatch.ratio > 0 && titleOnlyMatch.ratio === 0) score -= 28;
        if (titleOnlyMatch.ratio > 0 && seriesOnlyMatch.ratio === 0) score -= 18;
      }

      if (parsed.isEpisode || Number.isFinite(seasonTarget)) {
        if (featureType.includes('episode')) score += 25;
        if (featureType.includes('movie')) score -= 60;
      } else {
        if (featureType.includes('movie')) score += 25;
        if (featureType.includes('episode')) score -= 12;
      }

      if (/\b(complete|batch|pack|collection|season pack|full season)\b/i.test(normalizedCombined)) score -= 32;
      if (/\b(hearing impaired|sdh)\b/i.test(normalizedCombined)) score -= 8;
      if (/\b(dual audio|multi audio|dub)\b/i.test(normalizedCombined)) score -= 4;

      const downloadCount = Number.parseInt(attrs.download_count ?? attrs.downloads ?? 0, 10);
      if (Number.isFinite(downloadCount) && downloadCount > 0 && score > 0) {
        // Keep popularity as a very small tie-breaker only.
        score += clamp(Math.log10(downloadCount + 1) * 0.12, 0, 0.45);
      }

      return score;
    }

    function minimumScoreForPlan(parsed, plan) {
      const params = plan?.params || {};
      if (Number.isFinite(parsed.season) && Number.isFinite(parsed.episode)) {
        if (params.imdb_id || params.tmdb_id) return 52;
        if (Number.isFinite(Number(params.season_number)) && Number.isFinite(Number(params.episode_number))) return 64;
        return 70;
      }
      if (Number.isFinite(parsed.year) || Number.isFinite(yearHint)) return 44;
      return 40;
    }

    function bestResultForPlan(data, parsed, plan) {
      const list = Array.isArray(data?.data) ? data.data : [];
      if (!list.length) return null;

      let best = null;
      let bestScore = -Infinity;

      for (const item of list) {
        const score = scoreSubtitle(item, parsed);
        if (score > bestScore) {
          bestScore = score;
          best = item;
        }
      }

      if (!best || bestScore < minimumScoreForPlan(parsed, plan)) return null;
      return { item: best, score: bestScore };
    }

    function srtToVtt(srtContent) {
      let vtt = 'WEBVTT\n\n';
      vtt += String(srtContent || '')
        .replace(/\r/g, '')
        .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2');
      return vtt;
    }

    async function trySearchPlan(plan, parsed) {
      setStatus(`Searching OpenSubtitles: ${plan.label}...`);
      log(`Search URL: ${plan.url}`);
      const searchData = await fetchViaProxy(
        plan.url,
        'GET',
        {
          'Api-Key': OS_API_KEY,
          'Content-Type': 'application/json',
          'User-Agent': 'LibraryJS Media Server v1'
        },
        null,
        25000
      );

      if (searchData.errors) {
        throw new Error(`API Error: ${extractMessage(searchData.errors) || 'Unauthorized. Is your key correct?'}`);
      }

      const best = bestResultForPlan(searchData, parsed, plan);
      if (!best) return null;

      const attrs = best.item.attributes || {};
      const fileId = attrs.files?.[0]?.file_id;
      if (!fileId) return null;

      return {
        fileId,
        score: best.score,
        releaseName: attrs.release || attrs.files?.[0]?.file_name || 'Unknown release',
        featureTitle: attrs.feature_details?.title || 'Unknown Title',
        typeStr: attrs.feature_details?.feature_type || 'Media',
        raw: best.item,
      };
    }

    async function requestDownloadLink(fileId) {
      let slot = Number.isInteger(OS_API_KEY_SLOT) ? OS_API_KEY_SLOT : 1;
      let retryCount = 0;

      while (slot <= MAX_KEY_SLOT) {
        const key = slot === 0
          ? OS_API_KEY
          : await getKeyForSlot(
              slot,
              slot === 1
                ? ''
                : `OpenSubtitles rate limit reached on ${slotLabel(slot - 1)} key. Please enter the key for ${keyFilePath(slot).replace(/^\//, '')}.`
            );

        OS_API_KEY = key;
        OS_API_KEY_SLOT = slot;

        setStatus(`Requesting download token with ${slotLabel(slot)} key...`);
        const downloadReq = await fetchViaProxy(
          'https://api.opensubtitles.com/api/v1/download',
          'POST',
          {
            'Api-Key': key,
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          { file_id: fileId },
          25000
        );

        if (downloadReq && downloadReq.link) {
          if (key && key.trim()) {
            await promoteFavoredKey(key.trim(), slot);
          }
          return downloadReq.link;
        }

        const message = extractMessage(downloadReq) || 'Failed to retrieve the download link from OpenSubtitles.';
        log(`Download response for ${slotLabel(slot)} key: ${message}`);

        if (looksLikeInvalidToken(downloadReq)) {
          throw new Error(`OpenSubtitles rejected the token for ${keyFilePath(slot).replace(/^\//, '')}: ${message}`);
        }

        if (isQuotaLikeError(downloadReq)) {
          slot = slot === 0 ? 1 : slot + 1;
          if (slot > MAX_KEY_SLOT) {
            throw new Error('All configured OpenSubtitles API keys appear to be quota-limited.');
          }
          retryCount += 1;
          setStatus(`Quota reached. Trying ${slotLabel(slot)} key...`);
          continue;
        }

        if (isRetryableThrottle(downloadReq) && retryCount < 2) {
          retryCount += 1;
          log('Temporary throttle detected. Retrying the same key after a short pause...');
          await new Promise((resolve) => setTimeout(resolve, 1200));
          continue;
        }

        throw new Error(message);
      }

      throw new Error('No usable OpenSubtitles API key was found.');
    }

    // --- Core Processing Logic ---
    async function processSubtitle() {
      try {
        if (!mediaName || !uploadUrl) {
          throw new Error('Missing required parameters (name, upload) from URL.');
        }

        const { parsed, plans } = createSearchPlans();

        if (!plans.length) {
          throw new Error('Could not build a subtitle search query from the provided title.');
        }

        log(`Parsed media: ${JSON.stringify({
          raw: parsed.raw,
          series: parsed.series,
          title: parsed.title,
          season: parsed.season,
          episode: parsed.episode,
          year: parsed.year,
          isEpisode: !!parsed.isEpisode
        })}`);

        let winner = null;
        let lastError = null;

        for (const [index, plan] of plans.entries()) {
          try {
            const result = await trySearchPlan(plan, parsed);
            if (result && (!winner || result.score > winner.score)) {
              winner = { ...result, plan };
            }

            if (result && result.score >= 120) {
              winner = { ...result, plan };
              break;
            }
          } catch (err) {
            lastError = err;
            log(`Search failed for "${plan.label}": ${err.message}`);
          }

          if (index < plans.length - 1) {
            log('Trying a more specific fallback search...');
          }
        }

        if (!winner) {
          throw new Error(lastError?.message || 'No English subtitles found for this media.');
        }

        log(`Best match score: ${winner.score.toFixed(1)}`);
        log(`Match found! [${winner.typeStr}] "${winner.featureTitle}"`);
        log(`Release: ${winner.releaseName} (File ID: ${winner.fileId})`);

        const downloadLink = await requestDownloadLink(winner.fileId);

        setStatus('Downloading raw subtitle file...');
        const rawSrt = await fetchViaProxy(downloadLink, 'GET', {}, null, 35000);
        log(`Downloaded ${String(rawSrt).length} characters of subtitle data.`);

        setStatus('Converting to VTT format...');
        const vttText = srtToVtt(rawSrt);

        setStatus(`Uploading ${mediaName} to library...`);
        const uploadRes = await fetch(uploadUrl, {
          method: 'PUT',
          headers: { 'Content-Type': 'text/vtt' },
          body: vttText
        });

        if (!uploadRes.ok) {
          throw new Error(`Server upload rejected: HTTP ${uploadRes.status}`);
        }

        setStatus('Success! Subtitle saved.', 'success');
        notifyHost('repair-complete', {
          jobId: jobId,
          message: 'Subtitle successfully fetched and converted'
        });

        if (autoClose && !isEmbedded) {
          log('Auto-closing tab in 2 seconds...');
          setTimeout(() => window.close(), 2000);
        }

      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
        notifyHost('repair-failed', {
          jobId: jobId,
          error: err.message
        });
      }
    }

    // --- Key Management Logic ---
    async function loadOrPromptKey() {
      try {
        const favored = await readKeyFile(0);
        if (favored) {
          OS_API_KEY = favored;
          OS_API_KEY_SLOT = 0;
          log('API Key loaded successfully from opensubtitles-rest-api-favored.txt.');
          processSubtitle();
          return;
        }
      } catch (e) {
        log('Could not load favored key file from server. Continuing with the normal primary key flow.');
      }

      try {
        const key = await readKeyFile(1);
        if (key) {
          OS_API_KEY = key;
          OS_API_KEY_SLOT = 1;
          log('API Key loaded successfully from opensubtitles-rest-api.txt.');
          processSubtitle();
          return;
        }
      } catch (e) {
        log('Could not load primary key file from server. Need manual input.');
      }

      const key = await promptForKey(1, 'To search for subtitles, you need a free Open Subtitles REST API key.');
      OS_API_KEY = key;
      OS_API_KEY_SLOT = 1;
      processSubtitle();
    }

    saveKeyBtn.addEventListener('click', async () => {
      const inputKey = apiKeyInput.value.trim();
      if (!inputKey) {
        setupError.innerText = 'Please enter an API key.';
        return;
      }

      const slot = pendingKeyPrompt?.slot ?? (Number.isInteger(OS_API_KEY_SLOT) ? OS_API_KEY_SLOT : 1);

      saveKeyBtn.disabled = true;
      saveKeyBtn.innerText = 'Saving...';
      setupError.innerText = '';

      try {
        await saveKeyFile(slot, inputKey);

        OS_API_KEY = inputKey;
        OS_API_KEY_SLOT = slot;

        setupView.classList.add('hidden');
        processView.classList.remove('hidden');
        setStatus(`Key saved to ${keyFilePath(slot).replace(/^\//, '')}. Continuing...`);

        const resolve = pendingKeyPrompt?.resolve;
        pendingKeyPrompt = null;
        if (resolve) resolve(inputKey);

        if (!resolve) {
          processSubtitle();
        }

      } catch (err) {
        setupError.innerText = 'Error saving to server: ' + err.message;
        saveKeyBtn.disabled = false;
        updateSetupUI(slot, setupInstructions.innerText || '');
      }
    });

    loadOrPromptKey();

</script>
