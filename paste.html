<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Paste — Profile-aware</title>
<style>
  :root{ --bg:#071019; --panel:#0b1720; --accent:#66d0e8; --white:#f7fafc; --muted:#9aa4b2; }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--white);background:linear-gradient(180deg,var(--bg),#03121a);-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:28px auto;padding:18px}
  h1{font-size:20px;margin:0 0 12px;display:flex;align-items:center;gap:12px}
  .profile{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .profile img{width:28px;height:28px;border-radius:6px;object-fit:cover}
  textarea{width:100%;min-height:360px;border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--white);resize:vertical}
  .controls{display:flex;gap:8px;align-items:center;margin-top:10px}
  .btn{background:var(--accent);border:none;padding:8px 12px;border-radius:10px;color:#052022;cursor:pointer;font-weight:600}
  .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}
  .status{margin-left:10px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .check{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.04);opacity:0;transform:translateY(-4px);transition:all .28s ease}
  .check.show{opacity:1;transform:translateY(0)}
  .check.success{background:#1e462b;border-color:rgba(0,0,0,0.2)}
  .check.copySuccess{background:#1e3c56;border-color:rgba(0,0,0,0.2)}
  .check svg{width:16px;height:16px;display:block}
  .error{background:#3b1919;border-color:rgba(0,0,0,0.2)}
  .muted{color:var(--muted)}
  .meta{margin-top:10px;color:var(--muted);font-size:13px}

  /* modal for manual paste fallback */
  .paste-modal-backdrop{
    position:fixed;inset:0;background:rgba(2,6,9,0.6);display:flex;align-items:center;justify-content:center;z-index:200000;
  }
  .paste-modal{
    width: min(880px, 92%); max-width:880px;
    background: linear-gradient(180deg, #07151b, #041018);
    border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.04);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    color:var(--white);
  }
  .paste-modal textarea{min-height:220px}
  .paste-modal .row{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:8px}
  .paste-modal .btn{padding:8px 12px;border-radius:8px}
  .paste-hint{font-size:13px;color:var(--muted);margin-bottom:8px}
  .paste-instructions{font-size:12px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Server Paste — <span class="muted">/Profiles/paste/&lt;profile&gt;-paste.txt</span>
      <span id="profileDisplay" class="profile" title="Active profile"></span>
    </h1>
    <textarea id="pasteBox" aria-label="Paste content"></textarea>

    <div class="controls">
      <button id="saveBtn" class="btn">Save</button>
      <button id="refreshBtn" class="btn secondary">Refresh</button>
      <button id="copyBtn" class="btn secondary">Copy</button>
      <button id="pasteBtn" class="btn secondary">Paste</button>

      <div class="status">
        <div id="confirm" class="check" aria-hidden="true" title="Saved">
          <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#bff0db" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div id="copyConfirm" class="check" aria-hidden="true" title="Copied">
          <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#c3e3ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div id="statusText">Not saved</div>
      </div>
    </div>

    <div class="meta"><span id="fetchedAt">--</span></div>
  </div>

<script>
(function(){
  // ---------------- CONFIG ----------------
  const PASTE_BASE_DIR = '/Profiles/paste/';
  const PASTE_EXT = '-paste.txt';

  // UI refs
  const ta = document.getElementById('pasteBox');
  const saveBtn = document.getElementById('saveBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const copyBtn = document.getElementById('copyBtn');
  const pasteBtn = document.getElementById('pasteBtn');
  const statusText = document.getElementById('statusText');
  const confirmEl = document.getElementById('confirm');
  const copyConfirm = document.getElementById('copyConfirm');
  const fetchedAt = document.getElementById('fetchedAt');
  const profileDisplay = document.getElementById('profileDisplay');

  // ---------------- Platform helpers ----------------
  async function readPlatformTxtNoCache(){
    try{
      const r = await fetch('./platform.txt',{cache:'no-store'});
      if(r && r.ok){ const t=(await r.text()).trim().toLowerCase(); window.detectedPlatform=t; window.__cachedPlatform=t; return t; }
    }catch(e){}
    return null;
  }

  async function getCachedPlatform(){
    if(window.__cachedPlatform) return window.__cachedPlatform;
    const p = await readPlatformTxtNoCache(); if(p) return p;
    window.__cachedPlatform = (localStorage.getItem('SERVER_UPLOAD_STYLE')||'windows').toLowerCase();
    return window.__cachedPlatform;
  }

  function platformNow(){ return (window.detectedPlatform || window.__cachedPlatform || localStorage.getItem('SERVER_UPLOAD_STYLE') || 'windows').toLowerCase(); }
  function isWindowsUpload(){ return platformNow().includes('windows'); }

  async function putTxtCopy(path, txt){
    try{
      const r = await fetch(path,{method:'PUT',headers:{'Content-Type':'text/plain'},body:txt,credentials:'include'});
      return r && r.ok;
    }catch(e){ return false; }
  }

  async function pocketUpload(name,targetDir,payload){
    try{
      const blob = new Blob([payload||''],{type:'application/json'});
      const form = new FormData();
      form.append('files[]',blob,name);
      form.append('targetDir',targetDir);
      const r=await fetch('/pocketserver-api/upload',{method:'POST',body:form,credentials:'include'});
      return r && r.ok;
    }catch(e){ return false; }
  }
  async function listProfiles(targetDir){
    try{
      const q=encodeURIComponent(targetDir);
      const r=await fetch(`/pocketserver-api/list?q=${q}`,{credentials:'include'});
      if(!r||!r.ok) return null;
      const t=await r.text();
      try{return JSON.parse(t);}catch{return t;}
    }catch(e){return null;}
  }
  async function deletePath(path){
    try{
      const body={command:"delete",paths:[path],name:"",targetDir:""};
      const r=await fetch('/pocketserver-api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),credentials:'include'});
      return r&&r.ok;
    }catch(e){return false;}
  }
  async function pocketReplace(baseName,targetDir,payload){
    try{
      const temp=baseName+'.__new__';
      if(!await pocketUpload(temp,targetDir,payload)) return false;
      const mid=await listProfiles(targetDir);
      const midText = mid ? (typeof mid==='string'?mid:JSON.stringify(mid)) : '';
      if(!midText.includes(temp)) return false;
      await deletePath(targetDir+baseName);
      const okFinal = await pocketUpload(baseName,targetDir,payload);
      await deletePath(targetDir+temp).catch(()=>{});
      return okFinal;
    }catch(e){return false;}
  }

  // ---------------- Helpers ----------------
  function currentProfile(){ return localStorage.getItem('activeProfile') || 'Guest'; }
  function pastePathForProfile(p){ return PASTE_BASE_DIR + encodeURIComponent(p) + PASTE_EXT; }

  function showConfirm(ok){
    confirmEl.classList.remove('error','success','show');
    if(ok){
      confirmEl.classList.add('show','success');
      statusText.textContent='Saved';
      setTimeout(()=>{ confirmEl.classList.remove('show','success'); },2000);
    } else {
      confirmEl.classList.add('show','error');
      statusText.textContent='Save failed';
      setTimeout(()=>{ confirmEl.classList.remove('show','error'); },2500);
    }
  }

  function showCopyConfirm(){
    copyConfirm.classList.remove('copySuccess','show');
    copyConfirm.classList.add('show','copySuccess');
    statusText.textContent='Copied';
    setTimeout(()=>{ copyConfirm.classList.remove('show','copySuccess'); },2000);
  }

  function showStatus(t){ statusText.textContent=t; }

  // ---------------- Refresh Profile UI ----------------
  function refreshProfileUI(){
    const p=currentProfile();
    profileDisplay.innerHTML='';
    const img=document.createElement('img');
    img.src=`/Profiles/${encodeURIComponent(p)}.jpg`;
    img.onerror=()=>{img.src='data:image/gif;base64,R0lGODlhAQABAAAAACw=';};
    const span=document.createElement('span');
    span.textContent=p;
    profileDisplay.appendChild(img);
    profileDisplay.appendChild(span);
    profileDisplay.onclick=()=>{window.location.href='./profile.html';};
  }

  // ---------------- Load from server ----------------
  async function loadPaste(){
    const profile=currentProfile();
    showStatus('Loading…');

    const paths=[pastePathForProfile(profile), PASTE_BASE_DIR+'paste.txt'];

    for(const base of paths){
      try{
        const url = base + ((base.includes('?')?'&':'?') + '_=' + Date.now());
        const r = await fetch(url,{cache:'no-store',credentials:'include'});
        if(!r || !r.ok) continue;
        ta.value = await r.text();
        fetchedAt.textContent = 'Last fetched: ' + (new Date()).toLocaleString();
        showStatus('Loaded');
        return true;
      }catch(e){}
    }
    ta.value='';
    showStatus('Not found');
    fetchedAt.textContent='--';
    return false;
  }

  // ---------------- Save to server ----------------
  async function savePaste(){
    const txt = ta.value||'';
    const profile=currentProfile();
    const target=pastePathForProfile(profile);

    showStatus('Saving…');
    await getCachedPlatform();

    // Windows direct PUT
    if(isWindowsUpload()){
      if(await putTxtCopy(target,txt)){
        showConfirm(true);
        showStatus('Saved (direct)');
        await loadPaste();
        return true;
      }
    }

    // pocketReplace
    const baseName = encodeURIComponent(profile)+PASTE_EXT;
    if(await pocketReplace(baseName,PASTE_BASE_DIR,txt)){
      showConfirm(true);
      showStatus('Saved (server API)');
      await loadPaste();
      return true;
    }

    // fallback upload
    try{
      const blob=new Blob([txt],{type:'text/plain'});
      const form=new FormData();
      form.append('files[]',blob,profile+PASTE_EXT);
      const r=await fetch(`/api/file/upload?path=${encodeURIComponent(PASTE_BASE_DIR)}`,{method:'PUT',body:form,credentials:'include'});
      if(r && r.ok){
        showConfirm(true);
        showStatus('Saved (fallback upload)');
        await loadPaste();
        return true;
      }
    }catch(e){}

    showConfirm(false);
    return false;
  }

  // ---------------- Copy (poll → copy) ----------------
  async function copyLatest(){
    showStatus('Copying…');
    const ok = await loadPaste();
    if(!ok){ statusText.textContent='Copy failed'; return false; }

    try{
      await navigator.clipboard.writeText(ta.value||'');
      showCopyConfirm();
      return true;
    }catch(e){
      // fallback
      try {
        ta.focus();
        ta.select();
        const res = document.execCommand('copy');
        if (res) { showCopyConfirm(); return true; }
      } catch(_) {}
      statusText.textContent='Copy failed';
      return false;
    }
  }

  // ---------------- Modal with pointer-move confirm ----------------
  function showPasteModal(initialText='') {
    return new Promise((resolve) => {
      const backdrop = document.createElement('div');
      backdrop.className = 'paste-modal-backdrop';

      const modal = document.createElement('div');
      modal.className = 'paste-modal';

      const title = document.createElement('div');
      title.style.marginBottom = '8px';
      title.style.fontWeight = '600';
      title.textContent = 'Paste — Manual fallback';

      const info = document.createElement('div');
      info.className = 'paste-hint';
      info.textContent = 'Your browser blocked programmatic clipboard access. Paste into the box below, then move your mouse / touch the box to confirm.';

      const taModal = document.createElement('textarea');
      taModal.value = initialText;
      taModal.style.width = '100%';
      taModal.style.minHeight = '220px';
      taModal.style.borderRadius = '8px';
      taModal.style.padding = '10px';
      taModal.style.background = 'transparent';
      taModal.style.color = 'var(--white)';
      taModal.autofocus = true;
      taModal.setAttribute('placeholder', 'Paste here — moving your mouse / touching the box will confirm and save');

      const instructions = document.createElement('div');
      instructions.className = 'paste-instructions';
      instructions.textContent = 'Tip: on mobile, long-press inside the box to paste; then touch the box to confirm.';

      const row = document.createElement('div');
      row.className = 'row';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn secondary';
      cancelBtn.textContent = 'Cancel';

      const doneBtn = document.createElement('button');
      doneBtn.className = 'btn';
      doneBtn.textContent = 'Done';

      row.appendChild(cancelBtn);
      row.appendChild(doneBtn);

      modal.appendChild(title);
      modal.appendChild(info);
      modal.appendChild(taModal);
      modal.appendChild(instructions);
      modal.appendChild(row);
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);

      // focus the modal textarea to show paste options on mobile
      setTimeout(()=>{ try{ taModal.focus(); }catch(_){} }, 50);

      // Helper to clean up
      let cleaned = false;
      function cleanup() {
        if (cleaned) return; cleaned = true;
        try { document.removeEventListener('keydown', onKey); } catch(_) {}
        try { taModal.removeEventListener('pointermove', onPointerMove); } catch(_) {}
        try { taModal.removeEventListener('mousemove', onPointerMove); } catch(_) {}
        try { taModal.removeEventListener('touchstart', onPointerMove); } catch(_) {}
        try { taModal.removeEventListener('input', onInput); } catch(_) {}
        try { doneBtn.onclick = cancelBtn.onclick = null; } catch(_) {}
        try { if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop); } catch(_) {}
      }

      // Accept if textarea has content and pointer moves inside it (mouse or touch)
      function onPointerMove(ev) {
        try {
          const val = (taModal.value || '').trim();
          if (val.length === 0) return; // only confirm if there's content
          cleanup();
          resolve({ canceled: false, text: taModal.value });
        } catch (e) { console.warn('pointer move handler error', e); }
      }

      // If user types/pastes and then clicks Done
      doneBtn.onclick = () => {
        const val = (taModal.value || '').trim();
        cleanup();
        resolve({ canceled: false, text: taModal.value });
      };

      cancelBtn.onclick = () => {
        cleanup();
        resolve({ canceled: true });
      };

      // also accept on keyboard Enter (Ctrl+Enter) when focused
      function onKey(e) {
        if (e.key === 'Escape') { cleanup(); resolve({ canceled: true }); }
        if ((e.key === 'Enter' && (e.ctrlKey || e.metaKey)) || (e.key === 'Enter' && e.shiftKey && !e.ctrlKey && !e.metaKey && taModal.value.trim().length>0)) {
          cleanup(); resolve({ canceled: false, text: taModal.value });
        }
      }
      document.addEventListener('keydown', onKey);

      // Hook pointer & touch & mouse movement on taModal
      taModal.addEventListener('pointermove', onPointerMove);
      taModal.addEventListener('mousemove', onPointerMove);
      taModal.addEventListener('touchstart', onPointerMove, { passive: true });

      // also consider input event (so if paste via keyboard, we can hint)
      function onInput() { /* no-op but keeps detection alive */ }
      taModal.addEventListener('input', onInput);

    });
  }

  // ---------------- Universal Paste (clipboard → textarea → save) ----------------
  async function pasteFromClipboard(){
    showStatus('Pasting…');

    // 1) attempt modern clipboard API
    try {
      if (navigator.clipboard && navigator.clipboard.readText) {
        const text = await navigator.clipboard.readText();
        if (text && text.length > 0) {
          ta.value = text;
          showStatus('Saving pasted text…');
          await savePaste();
          return true;
        }
      }
    } catch (e) {
      console.warn('Clipboard API readText blocked:', e);
    }

    // 2) execCommand('paste') fallback (rare but sometimes works, esp. Android)
    try {
      ta.focus();
      const before = ta.value || '';
      const ok = document.execCommand && document.execCommand('paste');
      await new Promise(r => setTimeout(r, 120));
      if (ta.value && ta.value !== before) {
        showStatus('Saving pasted text…');
        await savePaste();
        return true;
      }
    } catch (e) {
      console.warn('execCommand paste attempt failed:', e);
    }

    // 3) invisible contentEditable quick capture (some iOS may allow)
    try {
      const catcher = document.createElement('div');
      catcher.contentEditable = 'true';
      catcher.style.position = 'fixed';
      catcher.style.left = '-9999px';
      catcher.style.top = '10px';
      catcher.style.width = '1px';
      catcher.style.height = '1px';
      catcher.style.overflow = 'hidden';
      catcher.style.opacity = '0';
      document.body.appendChild(catcher);
      catcher.focus();

      await new Promise(r => setTimeout(r, 250));

      const txt = catcher.innerText || catcher.textContent || '';
      document.body.removeChild(catcher);
      if (txt && txt.trim().length > 0) {
        ta.value = txt;
        showStatus('Saving pasted text…');
        await savePaste();
        return true;
      }
    } catch (e) {
      console.warn('contentEditable catch attempt failed:', e);
    }

    // 4) interactive manual paste modal (pointer-move confirms)
    try {
      const result = await showPasteModal('');
      if (!result.canceled) {
        ta.value = result.text || '';
        showStatus('Saving pasted text…');
        await savePaste();
        return true;
      } else {
        showStatus('Paste canceled');
        return false;
      }
    } catch (e) {
      console.warn('manual paste modal failed', e);
      try {
        const p = prompt('Clipboard access is blocked. Please paste your text here:');
        if (p !== null) {
          ta.value = p;
          showStatus('Saving pasted text…');
          await savePaste();
          return true;
        } else {
          showStatus('Paste canceled');
          return false;
        }
      } catch (ee) {
        showStatus('Paste canceled');
        return false;
      }
    }
  }

  // ---------------- Wire events ----------------
  saveBtn.addEventListener('click',()=>savePaste());
  refreshBtn.addEventListener('click',()=>loadPaste());
  copyBtn.addEventListener('click',()=>copyLatest());
  pasteBtn.addEventListener('click',()=>pasteFromClipboard());

  window.addEventListener('focus',()=>loadPaste());

  document.addEventListener('DOMContentLoaded',async()=>{
    await readPlatformTxtNoCache();
    refreshProfileUI();
    loadPaste();
  });

})();
</script>
</body>
</html>
