// == virtual gamepad shim (Ultimate Merged + Always On) ==
(function installUltimateGamepadShim() {
  const origGet = (navigator.getGamepads && navigator.getGamepads.bind(navigator)) || null;

  // 3 logical players:
  // 0 = Aggregator (Host + Joiner merged) - This is what the emulator listens to usually
  // 1 = Host (Physical Gamepad 1 + Keyboard)
  // 2 = Joiner (Physical Gamepad 2 + Network)
  const VCOUNT = 3;
  const BUTTON_COUNT = 16;
  
  // Storage for virtual states (UI buttons / Network inputs)
  const virtualOverrides = Array.from({ length: VCOUNT }, () => ({
    buttons: Array.from({ length: BUTTON_COUNT }, () => ({ pressed: false, value: 0 })),
    axes: [0, 0, 0, 0],
    timestamp: Date.now()
  }));

  // --- 1. Helper: Create a Standard Gamepad Object ---
  function makeVirtualPad(index, idLabel) {
    return {
      id: idLabel,
      index: index,
      connected: true,
      mapping: 'standard',
      timestamp: Date.now(), // Always fresh
      buttons: Array.from({ length: BUTTON_COUNT }, () => ({ pressed: false, value: 0, touched: false })),
      axes: [0, 0, 0, 0]
    };
  }

  // --- 2. Helper: Merge Physical + Virtual ---
  function mergeState(physPad, virtState, targetPad) {
    // Buttons: Logical OR (Pressed if Physical OR Virtual is pressed)
    for (let i = 0; i < BUTTON_COUNT; i++) {
      const physBtn = physPad && physPad.buttons && physPad.buttons[i];
      const pPressed = !!(physBtn && physBtn.pressed);
      const pValue = physBtn ? (physBtn.value || (pPressed ? 1 : 0)) : 0;
      
      const vPressed = !!(virtState.buttons[i] && virtState.buttons[i].pressed);
      const vValue = virtState.buttons[i] ? virtState.buttons[i].value : 0;

      targetPad.buttons[i].pressed = pPressed || vPressed;
      targetPad.buttons[i].value = Math.max(pValue, vValue);
      targetPad.buttons[i].touched = targetPad.buttons[i].pressed;
    }

    // Axes: Prefer Physical if active, else Virtual
    // (You can improve this by summing them if needed, but preference usually works best for sticks)
    const axesLen = Math.min(targetPad.axes.length, 4);
    for (let a = 0; a < axesLen; a++) {
      let val = 0;
      // If physical axis is moved significantly (>0.1), use it
      if (physPad && physPad.axes && Math.abs(physPad.axes[a]) > 0.1) {
        val = physPad.axes[a];
      } else {
        val = virtState.axes[a] || 0;
      }
      targetPad.axes[a] = val;
    }
    
    targetPad.timestamp = Date.now();
  }

  // --- 3. The Core Override Function ---
  function mergedGetGamepads() {
    // Get real browser gamepads
    const realArr = (origGet ? origGet() : []) || [];
    
    // Pick the first two real "connected" pads
    const realPads = [];
    for(let i=0; i < realArr.length; i++) {
      if(realArr[i] && realArr[i].connected) realPads.push(realArr[i]);
    }

    const physHost = realPads[0] || null;
    const physJoiner = realPads[1] || null;

    // Create our 3 Static Virtual Pads
    const aggPad = makeVirtualPad(0, "Aggregated Controller (P0)");
    const hostPad = makeVirtualPad(1, "Host Controller (P1)");
    const joinerPad = makeVirtualPad(2, "Joiner Controller (P2)");

    // A. Fill Host (Index 1) = Real Pad 1 + Virtual 1
    mergeState(physHost, virtualOverrides[1], hostPad);

    // B. Fill Joiner (Index 2) = Real Pad 2 + Virtual 2
    mergeState(physJoiner, virtualOverrides[2], joinerPad);

    // C. Fill Aggregator (Index 0) = Host State + Joiner State + Virtual 0
    // We manually merge Host and Joiner states into Aggregator
    // BUTTONS: allow only inputs permitted by turnManager. detect R2 rising-edge to switch turns.
for (let i = 0; i < BUTTON_COUNT; i++) {
  const hostPressed = !!(hostPad && hostPad.buttons && hostPad.buttons[i] && hostPad.buttons[i].pressed);
  const joinPressed = !!(joinerPad && joinerPad.buttons && joinerPad.buttons[i] && joinerPad.buttons[i].pressed);
  const aggVirtPressed = !!(virtualOverrides && virtualOverrides[0] && virtualOverrides[0].buttons[i] && virtualOverrides[0].buttons[i].pressed);

  // R2 edge-detection (button 7)
  if (i === 7 && window.turnManager && window.turnManager.prevPressed) {
    if (hostPressed && !window.turnManager.prevPressed[1][i]) {
      try { window.turnManager._handleR2Edge(1); } catch(e){}
    }
    if (joinPressed && !window.turnManager.prevPressed[2][i]) {
      try { window.turnManager._handleR2Edge(2); } catch(e){}
    }
    window.turnManager.prevPressed[1][i] = !!hostPressed;
    window.turnManager.prevPressed[2][i] = !!joinPressed;
  }

  const hostAllowed = hostPressed && window.turnManager && window.turnManager.allows ? window.turnManager.allows(1, i) : hostPressed;
  const joinAllowed = joinPressed && window.turnManager && window.turnManager.allows ? window.turnManager.allows(2, i) : joinPressed;

  aggPad.buttons[i].pressed = hostAllowed || joinAllowed || aggVirtPressed;
  aggPad.buttons[i].value = hostAllowed ? (hostPad.buttons[i].value || 1) : (joinAllowed ? (joinerPad.buttons[i].value || 1) : (aggVirtPressed ? (virtualOverrides[0].buttons[i].value || 1) : 0));
  aggPad.buttons[i].touched = aggPad.buttons[i].pressed;
}

// AXES: prefer the active player's axes. Non-active player's axes are ignored.
for (let a = 0; a < aggPad.axes.length; a++) {
  const cur = (window.turnManager && window.turnManager.getCurrent && window.turnManager.getCurrent()) || 1;
  if (cur === 1) {
    aggPad.axes[a] = (hostPad && hostPad.axes && hostPad.axes[a] != null) ? hostPad.axes[a] : ((joinerPad && joinerPad.axes && joinerPad.axes[a] != null) ? joinerPad.axes[a] : (virtualOverrides[0] && virtualOverrides[0].axes[a]) || 0);
  } else {
    aggPad.axes[a] = (joinerPad && joinerPad.axes && joinerPad.axes[a] != null) ? joinerPad.axes[a] : ((hostPad && hostPad.axes && hostPad.axes[a] != null) ? hostPad.axes[a] : (virtualOverrides[0] && virtualOverrides[0].axes[a]) || 0);
  }
}


    // Construct return array
    const out = [aggPad, hostPad, joinerPad];
    
    // Append any extra real gamepads (Index 3+) just in case
    for (let i = 2; i < realPads.length; i++) {
      out.push(realPads[i]);
    }
    
    // Ensure array is null-padded if expected (some browsers expect 4 slots)
    while(out.length < 4) out.push(null);

    return out;
  }

  // --- 4. Apply Override ---
  try {
    Object.defineProperty(navigator, 'getGamepads', {
      value: mergedGetGamepads,
      configurable: true
    });
  } catch (e) {
    navigator.getGamepads = mergedGetGamepads;
  }

  // --- 5. "Always On" Event Injection (The Fix) ---
  // This tricks the emulator into thinking a gamepad connected immediately.
  
  function triggerConnectionEvent() {
    // Create the pad we want to announce (The Aggregator)
    const gp = mergedGetGamepads()[0]; 
    if(!gp) return;

    const eventParams = { gamepad: gp };
    let ev;
    try {
      ev = new GamepadEvent('gamepadconnected', eventParams);
    } catch (e) {
      ev = new Event('gamepadconnected');
      ev.gamepad = gp;
    }
    window.dispatchEvent(ev);
  }

  // Patch addEventListener to fire immediately when the emulator starts listening
  const origAdd = window.addEventListener;
  window.addEventListener = function(type, listener, options) {
    if (type === 'gamepadconnected') {
      // Execute the real listener
      origAdd.call(window, type, listener, options);
      // Immediately fire a fake event to this specific listener
      setTimeout(triggerConnectionEvent, 50); 
      return;
    }
    return origAdd.call(window, type, listener, options);
  };

  // Also fire one right now for good measure
  setTimeout(triggerConnectionEvent, 100);
  setTimeout(triggerConnectionEvent, 1000); // Safety double-tap

  // --- 6. Expose Helpers for UI/Netplay ---
  window._setVirtualButtonForPlayer = function(pIdx, bIdx, state) {
    if(!virtualOverrides[pIdx]) return;
    virtualOverrides[pIdx].buttons[bIdx].pressed = !!state;
    virtualOverrides[pIdx].buttons[bIdx].value = state ? 1 : 0;
  };
  
  window._setVirtualAxisForPlayer = function(pIdx, aIdx, val) {
    if(!virtualOverrides[pIdx]) return;
    virtualOverrides[pIdx].axes[aIdx] = val;
  };

  // Keyboard Shim (unchanged logic, just re-integrated)
  const KEY_TO_PLAYER_BUTTON = {
    'KeyE': { player: 1, button: 7 }, // Host R2
    'Digit3': { player: 1, button: 7 },
    'Numpad3': { player: 1, button: 7 }
  };
  const heldKeys = new Set();
  
  window.addEventListener('keydown', (e) => {
    if (heldKeys.has(e.code)) return;
    const map = KEY_TO_PLAYER_BUTTON[e.code];
    if (map && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
      heldKeys.add(e.code);
      window._setVirtualButtonForPlayer(map.player, map.button, true);
    }
  });
  window.addEventListener('keyup', (e) => {
    const map = KEY_TO_PLAYER_BUTTON[e.code];
    if (map) {
      heldKeys.delete(e.code);
      window._setVirtualButtonForPlayer(map.player, map.button, false);
    }
  });

  console.log("✅ Ultimate Gamepad Shim Installed: Aggregator (P0) active.");
})();

	// == virtual gamepad shim ==
// Put this as early as possible (before emulator init)

/**
     * VIRTUAL GAMEPAD MERGER (Restored from working version)
     * This ensures the emulator always sees 2 gamepads.
     * It allows us to inject inputs (from UI or Network) into the emulator stream.
     */

    /**
     * Robust fullscreen helper:
     * - Locates the real canvas (by id 'canvas' or falls back to first <canvas>)
     * - Ensures the canvas is a direct child of document.body
     * - Hides everything else (preserving original display in data attr)
     * - Applies inline fullscreen CSS (overrides stylesheets)
     * - Exposes a restore function `restorePageFromFullscreen()`
     */
	 // --- Independent upload helpers (offer vs answer) ---
// Both try a direct PUT to /netplay/<room>/<filename>, then fallback to host API if necessary.
// They are intentionally separate functions so we can debug/override them independently.
// --- getBottomHalfStream helper: returns a MediaStream for the bottom half of the canvas ---
// Try direct canvas.captureStream first; if unavailable, create an offscreen canvas and copy the bottom half repeatedly.
// Always produce a stream containing only the bottom half of the emulator canvas.
// Replaces the earlier fallback that returned the entire canvas stream.
window.getBottomHalfStream = function(fps = 30) {
  try {
    const source = document.getElementById('canvas') || document.querySelector('canvas');
    if (!source) return null;

    // Determine source pixel dimensions (prefer the internal buffer size)
    const w = source.width || source.offsetWidth || 640;
    const h = source.height || source.offsetHeight || 480;
    const bottomH = Math.max(1, Math.floor(h / 2));

    // Create an offscreen canvas sized to the bottom half
    const off = document.createElement('canvas');
    off.width = w;
    off.height = bottomH;
    const ctx = off.getContext('2d');

    // RAF loop to keep the offscreen canvas updated from the source bottom half
    let rafId = null;
    let running = true;
    const draw = () => {
      try {
        // compute sy in source pixel space to copy the bottom half
        const sy = Math.max(0, (source.height || h) - bottomH);
        ctx.clearRect(0, 0, off.width, off.height);
        // drawImage(src, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
        ctx.drawImage(source, 0, sy, w, bottomH, 0, 0, off.width, off.height);
      } catch (e) {
        // ignore transient draw errors (canvas not ready, swapped, etc.)
      }
      if (running) rafId = requestAnimationFrame(draw);
    };
    draw();

    // create MediaStream from the offscreen canvas
    const stream = (typeof off.captureStream === 'function') ? off.captureStream(fps) : null;
    if (!stream) {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
      console.warn('getBottomHalfStream: offscreen captureStream not supported on this platform');
      return null;
    }

    // stop RAF loop when the stream tracks end
    stream.getTracks().forEach(track => {
      track.addEventListener('ended', () => {
        running = false;
        if (rafId) cancelAnimationFrame(rafId);
      });
    });

    return stream;
  } catch (err) {
    console.error('getBottomHalfStream error:', err);
    return null;
  }
};


async function publishOffer(hostParam, room, payload) {
  const filename = 'offer.json';
  return await _publishToNetplay(hostParam, room, filename, payload, 'publishOffer');
}

async function publishAnswer(hostParam, room, payload) {
  const filename = 'answer.json';
  return await _publishToNetplay(hostParam, room, filename, payload, 'publishAnswer');
}

// Core low-level uploader used by both; keeps common code in one place but still logs per-caller.
async function _publishToNetplay(hostParam, room, filename, payload, tag = 'uploader') {
  try {
    // Resolve host origin: allow hostParam like "localhost:8080" or full "https://host:port"
    let hostOrigin = hostParam;
    if (!/^https?:\/\//i.test(hostOrigin)) hostOrigin = `${window.location.protocol}//${hostOrigin}`;
    hostOrigin = hostOrigin.replace(/\/+$/,''); // strip trailing slash

    const putUrl = `${hostOrigin}/netplay/${encodeURIComponent(room)}/${encodeURIComponent(filename)}`;
    console.log(`[${tag}] PUT ->`, putUrl);
    const res = await fetch(putUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      credentials: 'include', // include cookies if server expects them
      mode: 'cors',           // be explicit
      cache: 'no-store'
    });
    console.log(`[${tag}] PUT status:`, res.status, res.statusText);
    if (res.ok) return true;

    // If direct PUT failed (non-2xx) log and fall through to API fallback
    console.warn(`[${tag}] direct PUT failed with status ${res.status}. Falling back to host API.`);
  } catch (err) {
    console.warn(`[${tag}] direct PUT threw:`, err);
    // fall through to fallback
  }

  // Fallback: POST/PUT form to /api/file/upload?path=/netplay/<room>/
  try {
    const fileBlob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    const form = new FormData();
    form.append('files[]', fileBlob, filename);
    // Try POST then PUT (some servers prefer one)
    const apiPath = `/api/file/upload?path=${encodeURIComponent(`/netplay/${room}/`)}`;
    console.log(`[${tag}] Trying API fallback ->`, apiPath);
    let r = await fetch(apiPath, { method: 'POST', body: form, credentials: 'include' });
    if (!r.ok) r = await fetch(apiPath, { method: 'PUT', body: form, credentials: 'include' });
    console.log(`[${tag}] API fallback status:`, r.status, r.statusText);
    return r.ok;
  } catch (err2) {
    console.error(`[${tag}] API fallback threw:`, err2);
    return false;
  }
}

	 // host: "hostname:port" (no protocol), roomNum: string/number, payload: plain object
async function publishNetplayFile(host, roomNum, filename, payload) {
    const jsonStr = JSON.stringify(payload);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    
    // Use current protocol (https: or https:) to avoid mixed-content errors
    const protocol = window.location.protocol;

    // Try direct PUT
    try {
        const putUrl = `${protocol}//${host}/netplay/${encodeURIComponent(roomNum)}/${filename}`;
        const res = await fetch(putUrl, { method: 'PUT', body: blob });
        if (!res.ok) throw new Error('https ' + res.status);
        console.log(`publishNetplayFile: uploaded ${filename} via PUT`);
        return true;
    } catch (err) {
        // Fallback: /api/file/upload endpoint
        try {
            const form = new FormData();
            form.append('files[]', blob, filename);
            const apiUrl = `/api/file/upload?path=${encodeURIComponent(`/netplay/${roomNum}/`)}`;
            const r2 = await fetch(apiUrl, { method: 'PUT', body: form });
            if (!r2.ok) throw new Error('API upload failed ' + r2.status);
            console.log(`publishNetplayFile: uploaded ${filename} via API fallback`);
            return true;
        } catch (err2) {
            console.warn(`publishNetplayFile failed for ${filename}:`, err, err2);
            return false;
        }
    }
}
// Ensure uploader is globally available to handleSaveWritten
window.uploadSaveToNetplay = async function(uint8array, romBase, profile, hostParam, room, forcedFilename) {
    // Normalize host origin
    const hostOrigin = (hostParam && (hostParam.startsWith('https://') || hostParam.startsWith('https://')))
        ? hostParam
        : `${window.location.protocol}//${hostParam}`;

    const fileName = forcedFilename || `${profile}-${romBase}.srm`;
    const putUrl = `${hostOrigin.replace(/\/+$/,'')}/emulator/netplay/${encodeURIComponent(fileName)}`;

    try {
        const res = await fetch(putUrl, {
            method: 'PUT',
            body: new Blob([uint8array]),
            mode: 'cors',
            cache: 'no-store'
        });
        if (!res.ok) throw new Error('https ' + res.status);
        log(`⬆️ Uploaded save to ${putUrl}`);
        return true;
    } catch (err) {
        console.warn('uploadSaveToNetplay failed direct PUT:', err);

        // fallback to host API upload if direct PUT fails
        try {
            const form = new FormData();
            form.append('files[]', new Blob([uint8array]), fileName);
            const apiUrl = `${hostOrigin.replace(/\/+$/,'')}/api/file/upload?path=${encodeURIComponent('/emulator/netplay/')}`;

            let r = await fetch(apiUrl, { method: 'POST', body: form, mode: 'cors', cache: 'no-store' });
            if (!r.ok) r = await fetch(apiUrl, { method: 'PUT', body: form, mode: 'cors', cache: 'no-store' });
            if (!r.ok) throw new Error('API upload failed ' + r.status);

            log(`⬆️ Uploaded save via host API to ${apiUrl} (filename ${fileName})`);
            return true;
        } catch (err2) {
            log(`Upload failed, falling back to download: ${err2 && err2.message}`);
            return false;
        }
    }
};
// Unified save handler used by the emulator callback
async function handleSaveWritten(path, data) {
    try {
        log(`✅ GAME SAVE DETECTED! Path: ${path}`);
        const cleanData = new Uint8Array(data.length);
        cleanData.set(data);

        // --- 1. Get identifiers from the save file path ---
        const fname = (path || '').split('/').pop() || 'save.srm';
        const romBaseFromPath = fname.replace(/\.srm$/i, ''); // This will be 'game1' or 'game2'

        // --- 2. Get server/room info ---
        const params = new URLSearchParams(window.location.search);
        const hostParam = params.get('host') || window.location.host;
        const room = params.get('room') || '0';

        // --- 3. Determine Player and get correct Profile/ROM names ---
        const isJoinerSave = /game2/i.test(romBaseFromPath);
        
        let finalProfile;
        let finalRomBase;

        if (isJoinerSave) {
            finalProfile = (window.latestJoinOffer && window.latestJoinOffer.profile) || 'Joiner';
            finalRomBase = window.joinerRomBase || romBaseFromPath;
        } else {
            finalProfile = localStorage.getItem('activeProfile') || 'Host';
            finalRomBase = window.activeRomBase || romBaseFromPath;
        }

        // --- 4. Create filename using desired format ---
        const uploadFilename = `${finalProfile}-${finalRomBase}.srm`;

        // Notify listeners that upload is starting for this save (optional)
        try { window.dispatchEvent(new CustomEvent('save:uploadstart', { detail: { filename: uploadFilename, path } })); } catch (e) {}

        // --- 5. Upload current file ---
        let ok = false;
        try {
            ok = await uploadSaveToNetplay(cleanData, romBaseFromPath, finalProfile, hostParam, room, uploadFilename);
            if (!ok) {
                // Fallback to local download if upload fails
                downloadBlob(cleanData, uploadFilename);
            }
        } catch (uploadErr) {
            console.warn('Upload attempt threw:', uploadErr);
            try { downloadBlob(cleanData, uploadFilename); } catch(e){}
            ok = false;
        }

        // Fire a "done" event so the UI (save button) can show success/failure
        try { window.dispatchEvent(new CustomEvent('save:done', { detail: { filename: uploadFilename, path, success: !!ok } })); } catch (e) {}

        // --- 6. Also attempt to upload the counterpart save (other player) from FS if present ---
        try {
            const baseDir = '/home/web_user/retroarch/userdata/saves/mGBA Dual';
            const counterpart = isJoinerSave ? 'game1.srm' : 'game2.srm';
            const counterpartPath = baseDir + '/' + counterpart;

            if (typeof emulatorModule !== 'undefined' && emulatorModule && emulatorModule.FS) {
                try {
                    const otherData = emulatorModule.FS.readFile(counterpartPath);
                    if (otherData && otherData.length) {
                        const otherRomBaseInternal = counterpart.replace(/\.srm$/i, '');
                        const otherIsJoiner = (counterpart === 'game2.srm');
                        let counterpartProfile;
                        let counterpartRomBase;

                        if (otherIsJoiner) {
                            counterpartProfile = (window.latestJoinOffer && window.latestJoinOffer.profile) || 'Joiner';
                            counterpartRomBase = window.joinerRomBase || otherRomBaseInternal;
                        } else {
                            counterpartProfile = localStorage.getItem('activeProfile') || 'Host';
                            counterpartRomBase = window.activeRomBase || otherRomBaseInternal;
                        }

                        const otherUploadName = `${counterpartProfile}-${counterpartRomBase}.srm`;
                        // Upload the counterpart but don't block the UI on it
                        uploadSaveToNetplay(otherData, otherRomBaseInternal, counterpartProfile, hostParam, room, otherUploadName)
                          .catch(e => console.debug('counterpart upload failed (async):', e && e.message));
                    } else {
                        log('No counterpart save present in FS at ' + counterpartPath);
                    }
                } catch(e) {
                    console.debug('Counterpart readFile failed (likely not present):', e && e.message);
                }
            }
        } catch(e) {
            console.warn('Counterpart upload attempt failed:', e && e.message);
        }

    } catch (err) {
        console.error('handleSaveWritten error:', err);
        try { window.dispatchEvent(new CustomEvent('save:done', { detail: { path, success: false } })); } catch (e) {}
    }
}

// Robust direct JSON uploader to the host origin (keeps host-specific API fallbacks on same host)
async function uploadJsonToRemoteHost(hostParam, roomNum, filename, payload) {
    // Ensure hostParam is an absolute origin (with protocol)
    const hostOrigin = (hostParam && (hostParam.startsWith('https://') || hostParam.startsWith('https://')))
        ? hostParam
        : `${window.location.protocol}//${hostParam}`;

    const jsonStr = JSON.stringify(payload);
    const blob = new Blob([jsonStr], { type: 'application/json' });

    const putUrl = `${hostOrigin.replace(/\/+$/,'')}/netplay/${encodeURIComponent(roomNum)}/${filename}`;

    try {
        const res = await fetch(putUrl, {
            method: 'PUT',
            body: blob,
            mode: 'cors',
            cache: 'no-store'
        });
        if (!res.ok) throw new Error('https ' + res.status);
        console.log(`uploadJsonToRemoteHost: PUT ${filename} -> ${putUrl}`);
        log(`⬆️ Uploaded ${filename} to ${putUrl}`);
        return true;

async function uploadSaveToNetplay(uint8array, romBase, profile, hostParam, room, forcedFilename) {
    const hostOrigin = (hostParam && (hostParam.startsWith('https://') || hostParam.startsWith('https://')))
        ? hostParam
        : `${window.location.protocol}//${hostParam}`;

    const fileName = forcedFilename || `${profile}-${romBase}.srm`;
    const putUrl = `${hostOrigin.replace(/\/+$/,'')}/emulator/netplay/${encodeURIComponent(fileName)}`;

    try {
        const res = await fetch(putUrl, { method: 'PUT', body: new Blob([uint8array]), mode: 'cors', cache: 'no-store' });
        if (!res.ok) throw new Error('https ' + res.status);
        log(`⬆️ Uploaded save to ${putUrl}`);
        return true;
    } catch (err) {
        console.warn('uploadSaveToNetplay failed direct PUT:', err);
        // fallback to host API
        try {
            const form = new FormData();
            form.append('files[]', new Blob([uint8array]), fileName);
            const apiUrl = `${hostOrigin.replace(/\/+$/,'')}/api/file/upload?path=${encodeURIComponent('/emulator/netplay/')}`;
            let r = await fetch(apiUrl, { method: 'POST', body: form, mode: 'cors', cache: 'no-store' });
            if (!r.ok) r = await fetch(apiUrl, { method: 'PUT', body: form, mode: 'cors', cache: 'no-store' });
            if (!r.ok) throw new Error('API upload failed ' + r.status);
            log(`⬆️ Uploaded save via host API to ${apiUrl} (filename ${fileName})`);
            return true;
        } catch (err2) {
            log(`Upload failed, falling back to download: ${err2.message}`);
            return false;
        }
    }
}

(function(){
  // Joiner: request host to save (helper)
  window.requestHostSave = function(dc) {
    dc = dc || (window.npw && window.npw.dc) || window.dataChannel;
    if (!dc || dc.readyState !== 'open') {
      console.warn('requestHostSave: no open datachannel');
      return false;
    }
    const payload = {
      type: 'gamepad',
      subtype: 'save-request',
      requester: localStorage.getItem('activeProfile') || 'joiner',
      ts: Date.now()
    };
    try { dc.send(JSON.stringify(payload)); return true; } catch (e) { console.warn('requestHostSave send failed', e); return false; }
  };

  // Attach a wrapper to the datachannel to handle incoming save-request and save-result messages
  function attachDCHandler(dc) {
    if (!dc || dc._saveRequestPatched) return;
    const orig = dc.onmessage;
    dc.onmessage = function(ev) {
      let msg = null;
      try { msg = (typeof ev.data === 'string') ? JSON.parse(ev.data) : ev.data; } catch(e){}
if (msg && typeof msg === 'object') {
  // Joiner -> Host: save request
  if (msg.type === 'gamepad' && msg.subtype === 'save-request') {
    try { window.dispatchEvent(new CustomEvent('save:start', { detail: { requestedBy: msg.requester } })); } catch(e){}
    if (typeof window.manualFlush === 'function') {
      try { window.manualFlush(); } catch(e){ console.warn('manualFlush failed from save-request', e); }
    } else if (window.emulatorModule && window.emulatorModule._cmd_savefiles) {
      try { window.emulatorModule._cmd_savefiles(); } catch(e){ console.warn('emulator save invoke failed', e); }
    }
    return;
  }

  // Host -> Joiner: save result
  if (msg.type === 'control' && msg.subtype === 'save-result') {
    try { window.dispatchEvent(new CustomEvent('save:done', { detail: { success: !!msg.success, filename: msg.filename, path: msg.path } })); } catch(e){}
    return;
  }

  // Control message: turn update (broadcast by the other peer via turnManager)
// Control message: turn update (peer requested a turn change)
if (msg.type === 'control' && msg.subtype === 'turn') {
  const newCur = Number(msg.current) || 1;
  console.log('DC: received turn update ->', newCur);
  if (window.turnManager && typeof window.turnManager.setCurrent === 'function') {
    window.turnManager.setCurrent(newCur);
  } else {
    try { window.updateTurnUI && window.updateTurnUI(newCur); } catch(e){}
  }
  return;
}

}

      // fallback to original handler
      if (typeof orig === 'function') {
        try { orig.call(this, ev); } catch(err) { console.warn('wrapped onmessage original failed', err); }
      }
    };
    dc._saveRequestPatched = true;
  }

  // Try immediate attach to known dc references; otherwise poll until available
  try { if (window.npw && window.npw.dc) attachDCHandler(window.npw.dc); } catch(e){}
  try { if (window.dataChannel) attachDCHandler(window.dataChannel); } catch(e){}
  let iv = setInterval(() => {
    try {
      if (window.npw && window.npw.dc) { attachDCHandler(window.npw.dc); clearInterval(iv); iv = null; return; }
      if (window.dataChannel) { attachDCHandler(window.dataChannel); clearInterval(iv); iv = null; return; }
    } catch(e){}
  }, 250);

  // When host completes a save (save:done), broadcast result to joiner(s)
  window.addEventListener('save:done', function(ev) {
    try {
      const amHost = !!window.isHost || !!(window.npw && window.npw.isHost);
      if (!amHost) return; // only hosts broadcast results
      const dc = (window.npw && window.npw.dc) || window.dataChannel;
      if (!dc || dc.readyState !== 'open') return;
      const d = (ev && ev.detail) || {};
      const payload = {
        type: 'control',
        subtype: 'save-result',
        success: !!d.success,
        filename: d.filename || null,
        path: d.path || null,
        ts: Date.now()
      };
      try { dc.send(JSON.stringify(payload)); } catch(e){ console.warn('broadcast save-result failed', e); }
    } catch(e){ console.warn('save:done broadcast handler error', e); }
  });

})();

<script>
(function installMgbaFullscreenAndLayoutFixes() {
  const STYLE_ID = 'mgba-fullscreen-layout-fixes';
  if (!document.getElementById(STYLE_ID)) {
    const style = document.createElement('style');
    style.id = STYLE_ID;
    style.textContent = `
      html.mgba-app-fullscreen,
      body.mgba-app-fullscreen {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }
      body.mgba-stream-active > h1,
      body.mgba-stream-active > .controls {
        display: none !important;
      }
      #mgbaHostViewport {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: #000;
        z-index: 0;
      }
      #mgbaHostViewport canvas {
        display: block;
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw !important;
        height: 200vh !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        z-index: 0 !important;
        background: #000 !important;
        image-rendering: pixelated;
      }
    `;
    document.head.appendChild(style);
  }

  function isTextOrControlTarget(node) {
    for (let el = node; el && el !== document.body; el = el.parentElement) {
      const tag = (el.tagName || '').toUpperCase();
      if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'OPTION' || tag === 'LABEL' || tag === 'A' || tag === 'VIDEO') {
        return true;
      }
      if (el.isContentEditable) return true;
      if (el.classList && (
        el.classList.contains('v-btn') ||
        el.classList.contains('v-dpad-btn') ||
        el.classList.contains('v-pill') ||
        el.classList.contains('mgba-save-btn') ||
        el.classList.contains('mgba-save-wrap') ||
        el.classList.contains('turn-dot')
      )) {
        return true;
      }
      if (el.id === 'mgbaFullscreenGlass') {
        return false;
      }
      if (el.id === 'mgbaNetplayOverlay') {
        if (tag === 'BUTTON' || (el.closest && el.closest('button, input, textarea, select, a, video'))) return true;
      }
    }
    return false;
  }

  function findCanvas() {
    return document.getElementById('canvas') || document.querySelector('canvas');
  }

  function ensureHostViewport() {
    const canvas = findCanvas();
    if (!canvas) return null;

    let viewport = document.getElementById('mgbaHostViewport');
    if (!viewport) {
      viewport = document.createElement('div');
      viewport.id = 'mgbaHostViewport';

      if (canvas.parentElement) {
        canvas._mgbaOriginalParent = canvas.parentElement;
        canvas._mgbaOriginalNextSibling = canvas.nextSibling;
        canvas.parentElement.insertBefore(viewport, canvas);
      } else {
        document.body.appendChild(viewport);
      }
      viewport.appendChild(canvas);
    } else if (canvas.parentElement !== viewport) {
      viewport.appendChild(canvas);
    }

    Object.assign(canvas.style, {
      display: 'block',
      position: 'absolute',
      left: '0',
      top: '0',
      width: '100vw',
      height: '200vh',
      margin: '0',
      padding: '0',
      border: 'none',
      background: '#000',
      zIndex: '0',
      imageRendering: 'pixelated'
    });

    return viewport;
  }

  function restoreCanvasLayout() {
    const canvas = findCanvas();
    const viewport = document.getElementById('mgbaHostViewport');

    if (canvas && canvas._mgbaOriginalParent) {
      try {
        if (canvas._mgbaOriginalNextSibling) {
          canvas._mgbaOriginalParent.insertBefore(canvas, canvas._mgbaOriginalNextSibling);
        } else {
          canvas._mgbaOriginalParent.appendChild(canvas);
        }
      } catch (e) {}
      delete canvas._mgbaOriginalParent;
      delete canvas._mgbaOriginalNextSibling;
    }

    if (viewport && viewport.parentElement) {
      try { viewport.remove(); } catch (e) {}
    }

    if (canvas) {
      canvas.style.display = '';
      canvas.style.position = '';
      canvas.style.left = '';
      canvas.style.top = '';
      canvas.style.width = '';
      canvas.style.height = '';
      canvas.style.margin = '';
      canvas.style.padding = '';
      canvas.style.border = '';
      canvas.style.background = '';
      canvas.style.zIndex = '';
      canvas.style.imageRendering = '';
    }

    document.body.classList.remove('mgba-stream-active');
  }

  function shouldApplyStreamLayout() {
    return !!(window.role === 'host' || window.role === 'join' || window.isHost === true || document.getElementById('mgbaNetplayOverlay'));
  }

  window.fullscreenCanvasOnly = function fullscreenCanvasOnly() {
    if (!shouldApplyStreamLayout()) return true;
    document.body.classList.add('mgba-stream-active');
    const viewport = ensureHostViewport();
    if (!viewport) return false;
    return true;
  };

  window.restorePageFromFullscreen = function restorePageFromFullscreen() {
    restoreCanvasLayout();
    const exitFull = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    try { if (exitFull) exitFull.call(document).catch(() => {}); } catch (e) {}
  };

  async function requestPageFullscreen() {
    const root = document.documentElement || document.body;
    const req = root.requestFullscreen || root.webkitRequestFullscreen || root.msRequestFullscreen;
    if (!req) return false;
    try {
      const result = req.call(root);
      if (result && typeof result.then === 'function') await result.catch(() => {});
      document.body.classList.add('mgba-app-fullscreen');
      return true;
    } catch (e) {
      return false;
    }
  }

  async function exitPageFullscreen() {
    const exitFull = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    try {
      if (exitFull) {
        const result = exitFull.call(document);
        if (result && typeof result.then === 'function') await result.catch(() => {});
      }
    } catch (e) {}
    document.body.classList.remove('mgba-app-fullscreen');
  }

  window.toggleMgbaPageFullscreen = async function toggleMgbaPageFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
      await exitPageFullscreen();
    } else {
      await requestPageFullscreen();
    }
  };

  function installGestureHandlers() {
    if (window.__mgbaFullscreenGesturesInstalled) return;
    window.__mgbaFullscreenGesturesInstalled = true;

    let lastTapTs = 0;
    let tapTimer = null;

    const onTapLike = (ev) => {
      const target = ev && ev.target;
      if (isTextOrControlTarget(target)) return;

      const now = Date.now();
      const delta = now - lastTapTs;
      lastTapTs = now;

      if (tapTimer) {
        clearTimeout(tapTimer);
        tapTimer = null;
      }

      if (delta > 20 && delta < 320) {
        ev.preventDefault();
        ev.stopPropagation();
        window.toggleMgbaPageFullscreen().catch(() => {});
        lastTapTs = 0;
        return;
      }

      tapTimer = setTimeout(() => {
        tapTimer = null;
        lastTapTs = 0;
      }, 340);
    };

    document.addEventListener('dblclick', onTapLike, true);
    document.addEventListener('touchend', onTapLike, { capture: true, passive: false });
    document.addEventListener('pointerup', onTapLike, true);
  }

  function wrapExistingHelpers() {
    if (typeof window.showNetplayOverlay === 'function' && !window.showNetplayOverlay.__mgbaWrapped) {
      const originalShow = window.showNetplayOverlay;
      const wrappedShow = function(role) {
        const out = originalShow.apply(this, arguments);
        try { document.body.classList.add('mgba-stream-active'); } catch (e) {}
        try { ensureHostViewport(); } catch (e) {}
        return out;
      };
      wrappedShow.__mgbaWrapped = true;
      window.showNetplayOverlay = wrappedShow;
    }

    if (typeof window.removeNetplayOverlay === 'function' && !window.removeNetplayOverlay.__mgbaWrapped) {
      const originalRemove = window.removeNetplayOverlay;
      const wrappedRemove = function() {
        try { restoreCanvasLayout(); } catch (e) {}
        return originalRemove.apply(this, arguments);
      };
      wrappedRemove.__mgbaWrapped = true;
      window.removeNetplayOverlay = wrappedRemove;
    }
  }

  installGestureHandlers();
  wrapExistingHelpers();

  // Keep applying the original crop whenever the stream mode is active.
  const layoutPoll = setInterval(() => {
    try {
      if (shouldApplyStreamLayout()) {
        window.fullscreenCanvasOnly();
      }
      wrapExistingHelpers();
    } catch (e) {}
  }, 1000);

  window.addEventListener('beforeunload', () => clearInterval(layoutPoll));
})();
</script>
