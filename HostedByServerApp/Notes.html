<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Notes — Profiles</title>
<style>
  :root{
    --bg:#071019;
    --panel:#0b1720;
    --card:#0f2230;
    --muted:#9aa4b2;
    --accent:#66d0e8;
    --white:#f7fafc;
    --glass: rgba(255,255,255,0.03);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--white);background:linear-gradient(180deg,var(--bg),#03121a);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:16px auto;padding:18px;position:relative}
  .topbar{position:relative;display:flex;align-items:center;justify-content:center;padding:18px 0 18px}
  .left-area{position:absolute;left:6px;top:6px;display:flex;align-items:center;gap:8px}
  #homeButton{padding:8px 12px;font-size:14px;min-width:71px;background-color:#333;color:white;border:none;border-radius:4px;cursor:pointer}
  #homeButton:focus{outline:2px solid rgba(102,208,232,0.28);outline-offset:4px}
  #activeProfileIcon{width:36px;height:36px;border-radius:8px;object-fit:cover;cursor:pointer;margin-left:8px}
  #activeProfileName{color:white;font-weight:700;font-size:14px;display:none;margin-left:8px}

  .title{font-size:20px;font-weight:800}
  .controls{display:flex;gap:8px;margin:14px 0;align-items:center}
  .btn{background:var(--accent);border:none;padding:8px 10px;border-radius:10px;color:#052022;cursor:pointer;font-weight:600}
  .btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}

  .layout{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
  .sidebar{background:var(--panel);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);min-height:320px}
  .sidebar h4{margin:6px 0 10px 0}
  .cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:8px;cursor:pointer}
  .cat-item:hover{background:rgba(255,255,255,0.02)}
  .cat-count{font-size:12px;color:var(--muted)}
  .profiles-small{margin-top:10px;max-height:240px;overflow:auto}

  .notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .note-card{background:var(--glass);padding:12px;border-radius:10px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between}
  .note-title{font-weight:700;margin-bottom:6px}
  .note-meta{color:var(--muted);font-size:12px}
  .search{flex:1}
  .profile-selector{border:1px solid rgba(255,255,255,0.04);background:transparent;padding:8px;border-radius:8px;color:var(--white)}
  .category-pill{display:inline-block;padding:4px 8px;border-radius:8px;background:rgba(255,255,255,0.03);font-size:12px;margin-left:6px}
  .owner-img{width:28px;height:28px;border-radius:6px;object-fit:cover;margin-right:8px}
  .note-header{display:flex;align-items:center;gap:8px}
  .muted{color:var(--muted)}

  .modal{position:fixed;inset:0;background:rgba(2,6,23,0.65);display:flex;align-items:center;justify-content:center;z-index:999}
  .card{background:linear-gradient(180deg,#07121a,#0a2430);padding:16px;border-radius:12px;width:620px;box-shadow:0 10px 34px rgba(2,6,23,0.6)}
  label{display:block;font-size:13px;margin-top:8px;color:var(--muted)}
  input[type="text"], textarea, select{width:100%;padding:9px;margin-top:6px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--white)}
  textarea{min-height:160px}

  footer{margin-top:18px;color:var(--muted);font-size:13px;text-align:center}
  @media (max-width:980px){ .layout{grid-template-columns:200px 1fr} .notes-grid{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:640px){ .layout{grid-template-columns:1fr} .sidebar{order:2} .notes-grid{grid-template-columns:1fr} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="left-area" aria-hidden="false">
        <button id="homeButton" onclick="window.location.href = './index.html'">Home</button>
        <img id="activeProfileIcon" src="" alt="Profile" onclick="window.location.href = './profile.html';" tabindex="0" />
        <span id="activeProfileName"></span>
      </div>
      <div class="title">Notes</div>
    </div>

    <div class="controls" role="toolbar" aria-label="notes controls">
      <input id="q" class="search" placeholder="Search notes..." />
      <button id="profilesBtn" class="btn secondary">Profiles</button>
      <button id="newNoteBtn" class="btn">+ New note</button>
      <button id="syncBtn" class="btn secondary">Sync</button>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <h4>Categories</h4>
        <div id="categoriesList">
          <div class="cat-item" data-cat=""><div>All</div><div class="cat-count" id="countAll">0</div></div>
          <div class="cat-item" data-cat="__uncat"><div>Uncategorized</div><div class="cat-count" id="countUncat">0</div></div>
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.04);margin:10px 0" />
        <small class="muted">Profiles</small>
        <div class="profiles-small" id="profilesSmall"></div>
      </aside>

      <main>
        <div id="notesGrid" class="notes-grid" aria-live="polite"></div>
      </main>
    </div>

    <footer>
      <div class="muted mini">Notes stored per-profile on server at <code>/Profiles/Notes/&lt;Profile&gt;.public.txt</code> and <code>/Profiles/Notes/&lt;Profile&gt;.private.txt</code>. Local edits saved to localStorage until synced.</div>
    </footer>
  </div>

  <!-- profiles selector modal -->
  <div id="profilesModal" class="modal" style="display:none">
    <div class="card" role="dialog" aria-modal="true" style="width:420px">
      <h3>Show public notes from profiles</h3>
      <div id="profilesList" style="margin-top:8px;max-height:220px;overflow:auto"></div>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <label style="align-items:center;display:flex;gap:8px;color:var(--muted)"><input type="checkbox" id="includeActivePrivate"/> Include my private notes when showing my profile</label>
        <button id="profilesApply" class="btn">Apply</button>
        <button id="profilesCancel" class="btn secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- note modal -->
  <div id="modal" class="modal" style="display:none">
    <div class="card" role="dialog" aria-modal="true">
      <h3 id="modalTitle">New note</h3>
      <label>Title <input id="noteTitle" type="text" /></label>
      <label>Category
        <div style="display:flex;gap:8px;align-items:center"><select id="noteCategory"></select><input id="newCategoryInput" placeholder="Add category" style="flex:1" /></div>
      </label>
      <label>Visibility
        <select id="noteVisibility"><option value="private">Private</option><option value="public">Public</option></select>
      </label>
      <label>Body <textarea id="noteBody"></textarea></label>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button id="saveNote" class="btn">Save</button>
        <button id="cancelNote" class="btn secondary">Cancel</button>
        <button id="deleteNote" class="btn secondary" style="display:none;background:#6b1f1f;color:var(--white)">Delete</button>
      </div>
    </div>
  </div>

<script src="./profiles.js"></script>
<script>
(function(){
  const $ = s => document.querySelector(s);
  const NOTES_DIR = '/Profiles/Notes/';
  const LOCAL_KEY_PREFIX = 'notes:profile:';
  const CATS_KEY_PREFIX = 'notes:categories:profile:';

  // --- platform/upload helpers (from Calendar) ---
  async function getCachedPlatform() {
    if (window.__cachedPlatform) return window.__cachedPlatform;
    try {
      const r = await fetch('./platform.txt', { cache: 'no-store' });
      if (r && r.ok) { window.__cachedPlatform = (await r.text()).trim().toLowerCase(); return window.__cachedPlatform; }
    } catch(e){}
    window.__cachedPlatform = (localStorage.getItem('SERVER_UPLOAD_STYLE') || 'windows').toLowerCase();
    return window.__cachedPlatform;
  }
  function platformNow(){ return (window.detectedPlatform || window.__cachedPlatform || localStorage.getItem('SERVER_UPLOAD_STYLE') || 'windows').toLowerCase(); }
  function isWindowsUpload(){ return platformNow().includes('windows'); }
  function isIphoneUpload(){ const p = platformNow(); return p.includes('iphone') || p === 'iphones'; }

  async function pocketUpload(name, targetDir, payloadText) {
    try { const blob = new Blob([payloadText || ''], { type: 'application/json' }); const form = new FormData(); form.append('files[]', blob, name); form.append('targetDir', targetDir); const r = await fetch('/pocketserver-api/upload', { method: 'POST', body: form, credentials: 'include' }); return r.ok; } catch(e) { console.warn('pocketUpload', e); return false; }
  }
  async function listProfiles(targetDir){ try{ const q = encodeURIComponent(targetDir); const r = await fetch(`/pocketserver-api/list?q=${q}`, { credentials:'include' }); if(!r.ok) return null; const text = await r.text(); try { return JSON.parse(text); } catch{ return text; } }catch(e){console.warn(e);return null} }
  async function deletePath(fullPath){ try{ const body = { command: "delete", paths:[fullPath], name:"", targetDir:"" }; const r = await fetch('/pocketserver-api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),credentials:'include'}); return r.ok;}catch(e){console.warn('deletePath',e);return false} }
  async function pocketReplace(baseName, targetDir, payloadText){ const tempName = baseName + '.__new__'; const tempOk = await pocketUpload(tempName, targetDir, payloadText); if(!tempOk) return false; const midList = await listProfiles(targetDir); const midText = midList ? (typeof midList === 'string' ? midList : JSON.stringify(midList)) : ''; if(!midText.includes(tempName)) return false; const desiredFullPath = targetDir + baseName; const delOk = await deletePath(desiredFullPath); if(!delOk) return false; const finalOk = await pocketUpload(baseName, targetDir, payloadText); if(!finalOk) return false; await deletePath(targetDir + tempName).catch(()=>{}); return finalOk; }
  async function putTxtCopy(encodedNameWithoutExt, txtPayload){ try{ const url = `${NOTES_DIR}${encodedNameWithoutExt}.txt`; const r = await fetch(url, { method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: txtPayload }); return r.ok; } catch(e){ console.warn('putTxtCopy', e); return false; } }

  // fetch-and-parse helper (handles triple-wrapped files and old single-file formats)
  async function fetchAndParseMaybeWrapped(url){ try{ const r = await fetch(url + ((url.indexOf('?')===-1)?'?':'&') + '_=' + Date.now(), { cache: 'no-store' }); if(!r.ok) return null; const text = await r.text(); // try to extract triple-wrapped [[[ ... ]]]
      const matchTriple = text.match(/\[\[\[([\s\S]*?)\]\]\]/);
      if(matchTriple) { try{ return JSON.parse(matchTriple[1]); } catch(e){ console.warn('parse triple', e); } }
      // try first JSON array in file
      const firstArray = extractFirstJsonArray(text);
      if(firstArray){ try{ return JSON.parse(firstArray); } catch(e){ console.warn('parse firstArray', e); } }
      // last attempt: try full text parse
      try{ return JSON.parse(text); }catch(e){}
    } catch(e){ console.warn('fetchAndParseMaybeWrapped', e); }
    return null;
  }
  function extractFirstJsonArray(text){ if(!text||typeof text!=='string') return null; for(let i=0;i<text.length;i++){ if(text[i]==='['){ let depth=0; for(let j=i;j<text.length;j++){ if(text[j]==='[') depth++; else if(text[j]===']'){ depth--; if(depth===0) return text.slice(i,j+1); } } break; } } return null; }

  // ---------- load/save per-profile public/private ----------
  async function loadProfileNotesFromServer(profile, visibility){ // visibility: 'public'|'private'|undefined -> returns array
    profile = profile || (localStorage.getItem('activeProfile') || 'Guest'); const suffix = visibility ? `.${visibility}` : ''; const fileTry = `${NOTES_DIR}${encodeURIComponent(profile)}${suffix}.txt`;
    const arr = await fetchAndParseMaybeWrapped(fileTry); if(Array.isArray(arr)) return arr; // fallback single-file name without suffix
    if(!visibility){ const alt = await fetchAndParseMaybeWrapped(`${NOTES_DIR}${encodeURIComponent(profile)}.txt`); if(Array.isArray(alt)) return alt; }
    return [];
  }

  async function saveNotesFileToServer(profile, arrPublic, arrPrivate){ profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
    const publicWrap = `[[[\n${JSON.stringify(arrPublic||[], null, 2)}\n]]]`;
    const privateWrap = `[[[\n${JSON.stringify(arrPrivate||[], null, 2)}\n]]]`;
    const publicName = `${profile}.public.txt`;
    const privateName = `${profile}.private.txt`;
    // try windows direct PUT first
    if (isWindowsUpload()){
      try{ await fetch(`${NOTES_DIR}${encodeURIComponent(publicName)}`, { method:'PUT', headers:{'Content-Type':'text/plain'}, body: publicWrap }); await fetch(`${NOTES_DIR}${encodeURIComponent(privateName)}`, { method:'PUT', headers:{'Content-Type':'text/plain'}, body: privateWrap }); return true; }catch(e){ console.warn('windows save failed', e); }
    }
    // fallback to server api / pocket style
    try{
      const blobPub = new Blob([publicWrap], {type: 'application/json'}); const blobPriv = new Blob([privateWrap], {type: 'application/json'});
      const form = new FormData(); form.append('files[]', blobPub, publicName); form.append('files[]', blobPriv, privateName);
      await fetch(`/api/file/upload?path=${encodeURIComponent(NOTES_DIR)}`, { method: 'PUT', body: form });
      return true;
    }catch(e){ console.warn('saveNotesFileToServer fallback failed', e); }
    return false;
  }

  // ---------- local storage helpers & categories ----------
  function localKeyForProfile(profile){ return LOCAL_KEY_PREFIX + (profile || 'Guest'); }
  function catsKeyForProfile(profile){ return CATS_KEY_PREFIX + (profile || 'Guest'); }
  function loadLocalNotes(profile){ try{ return JSON.parse(localStorage.getItem(localKeyForProfile(profile)) || '[]'); }catch(e){ return []; } }
  function saveLocalNotes(profile, arr){ localStorage.setItem(localKeyForProfile(profile), JSON.stringify(arr)); }
  function loadCategories(profile){ try{ return JSON.parse(localStorage.getItem(catsKeyForProfile(profile)) || '[]'); }catch(e){ return []; } }
  function saveCategories(profile, arr){ localStorage.setItem(catsKeyForProfile(profile), JSON.stringify(arr)); }

  function uniqNoteKey(n){ if(!n) return ''; if(n.id) return String(n.id); return (n.title || '').toLowerCase() + '|' + (n.createdAt || ''); }

  // ---------- parse profiles.js (fetch names if window.profiles not present) ----------
  async function getAllProfileNames(){
    // prefer window.profiles if already loaded
    if(Array.isArray(window.profiles) && window.profiles.length){
      try{ return window.profiles.map(p=>p.name).filter(Boolean); }catch(e){}
    }
    // fallback: fetch and scan profiles.js for name occurrences (robust, simple scan)
    try{
      const r = await fetch('./profiles.js', { cache: 'no-store' });
      if(!r.ok) return [ localStorage.getItem('activeProfile') || 'Guest' ];
      const text = await r.text();
      const names = [];
      let idx = 0;
      while(true){
        const i = text.indexOf('name', idx);
        if(i === -1) break;
        const colon = text.indexOf(':', i);
        if(colon === -1){ idx = i + 4; continue; }
        const windowText = text.slice(colon+1, colon+60);
        let quotePos = windowText.indexOf("'");
        let quoteChar = "'";
        if(quotePos === -1){ quotePos = windowText.indexOf('"'); quoteChar = '"'; }
        if(quotePos === -1){ idx = colon + 1; continue; }
        const start = colon + 1 + quotePos + 1;
        const end = text.indexOf(quoteChar, start);
        if(end === -1){ idx = start; continue; }
        const name = text.slice(start, end).trim();
        if(name) names.push(name);
        idx = end + 1;
      }
      if(names.length) return Array.from(new Set(names));
    }catch(e){ console.warn('getAllProfileNames parse failed', e); }
    // final fallback
    return [ localStorage.getItem('activeProfile') || 'Guest' ];
  }

  // ---------- merged loading: pulls both public and private (private only for active profile) ----------
  async function loadMergedNotesForProfiles(profilesToShow, options){ // profilesToShow: array of profile names. options.includeActivePrivate true/false
    const active = localStorage.getItem('activeProfile') || 'Guest'; const merged = [];
    for(const p of profilesToShow){ const isActive = (p === active);
      const publicList = await loadProfileNotesFromServer(p, 'public').catch(()=>[]) || [];
      const privateList = isActive && options && options.includeActivePrivate ? await loadProfileNotesFromServer(p, 'private').catch(()=>[]) || [] : [];
      // fallbacks: if no public/private files, try single combined file for backward compatibility
      if(!publicList.length && !privateList.length){ const combined = await loadProfileNotesFromServer(p).catch(()=>[]) || []; // combined notes may have visibility field
        const pub = combined.filter(n=>!n.visibility || n.visibility==='public'); const priv = combined.filter(n=>n.visibility==='private'); publicList.push(...pub); privateList.push(...priv);
      }
      // local cached notes for the active profile should be merged in: local notes are treated as authoritative until sync
      if(isActive){ const local = loadLocalNotes(p) || []; // local may contain both public and private notes depending on note.visibility
        // merge local into privateList/publicList
        for(const ln of local){ if(String(ln.visibility||'private') === 'public'){ // ensure not duplicate
            if(!publicList.find(x=>uniqNoteKey(x)===uniqNoteKey(ln))) publicList.push(ln);
          } else {
            if(!privateList.find(x=>uniqNoteKey(x)===uniqNoteKey(ln))) privateList.push(ln);
          } }
      }
      // annotate owner
      publicList.forEach(n=>{ n.owner = p; if(!n.visibility) n.visibility = 'public'; merged.push(n); });
      privateList.forEach(n=>{ n.owner = p; if(!n.visibility) n.visibility = 'private'; merged.push(n); });
    }
    // dedupe per-owner: if same uniqKey exists both public and private, keep public (public overrides private)
    const grouped = new Map();
    for(const n of merged){ const owner = n.owner || ''; const key = owner + '::' + uniqNoteKey(n); if(!grouped.has(key)) grouped.set(key, n); else {
        const existing = grouped.get(key); if(existing.visibility !== n.visibility){ if(n.visibility === 'public') grouped.set(key,n); } else { // same visibility -> keep latest
          if((n.updatedAt||n.createdAt||'') > (existing.updatedAt||existing.createdAt||'')) grouped.set(key,n);
        }
      } }
    const out = Array.from(grouped.values()).sort((a,b)=> (b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||''));
    return out;
  }

  // ---------- UI wiring ----------
  const notesGrid = $('#notesGrid'); const q = $('#q'); const newNoteBtn = $('#newNoteBtn'); const syncBtn = $('#syncBtn');
  const modal = $('#modal'); const noteTitle = $('#noteTitle'); const noteBody = $('#noteBody'); const saveNoteBtn = $('#saveNote'); const cancelNoteBtn = $('#cancelNote'); const deleteNoteBtn = $('#deleteNote');
  const activeProfileImg = $('#activeProfileIcon'); const activeProfileName = $('#activeProfileName');
  const profilesBtn = $('#profilesBtn'); const profilesModal = $('#profilesModal'); const profilesList = $('#profilesList'); const profilesApply = $('#profilesApply'); const profilesCancel = $('#profilesCancel'); const includeActivePrivate = $('#includeActivePrivate');
  const categoriesList = $('#categoriesList'); const profilesSmall = $('#profilesSmall'); const noteCategory = $('#noteCategory'); const newCategoryInput = $('#newCategoryInput');

  let editingId = null; let currentSelectedProfiles = []; let includeActivePrivateWhenShowing = true; let currentCategoryFilter = '';

  function refreshActiveProfileDisplay(){ const profName = localStorage.getItem('activeProfile') || ''; const prof = Array.isArray(window.profiles) ? window.profiles.find(p=>p.name === profName) : null; const name = profName || '';
    if(name){ activeProfileImg.src = prof && prof.image ? prof.image : `./Profiles/${name}.jpg`; activeProfileImg.alt = name; activeProfileImg.style.display = 'block'; activeProfileName.textContent = name; activeProfileName.style.display = 'block'; } else { activeProfileImg.style.display = 'none'; activeProfileName.style.display = 'none'; }
  }

  // rebuild profiles small list using parsed profiles (async)
  async function rebuildProfilesSmall(){
    profilesSmall.innerHTML = '';
    const names = await getAllProfileNames();
    const active = localStorage.getItem('activeProfile')||'Guest';
    // if currentSelectedProfiles empty, default to active
    if(!currentSelectedProfiles || !currentSelectedProfiles.length){
      currentSelectedProfiles = [active];
    }
    names.forEach(name => {
      const wrap = document.createElement('div'); wrap.style.display='flex'; wrap.style.alignItems='center'; wrap.style.gap='8px'; wrap.style.padding='6px 0';
      const chk = document.createElement('input'); chk.type='checkbox'; chk.value = name;
      chk.checked = currentSelectedProfiles.length? currentSelectedProfiles.includes(name) : (name===active);
      chk.addEventListener('change', ()=>{ if(chk.checked){ if(!currentSelectedProfiles.includes(name)) currentSelectedProfiles.push(name); } else { currentSelectedProfiles = currentSelectedProfiles.filter(x=>x!==name); } renderAll(); });
      const img = document.createElement('img'); img.src = `./Profiles/${name}.jpg`; img.width=28; img.height=28; img.style.borderRadius='6px';
      const lbl = document.createElement('label'); lbl.textContent = name;
      wrap.appendChild(chk); wrap.appendChild(img); wrap.appendChild(lbl); profilesSmall.appendChild(wrap);
    });
  }

  async function openProfilesModal(){ profilesList.innerHTML = '';
    const names = await getAllProfileNames();
    names.forEach(name=>{
      const id = `chk_${name}`;
      const wrap = document.createElement('div'); wrap.style.display='flex'; wrap.style.alignItems='center'; wrap.style.gap='8px';
      const chk = document.createElement('input'); chk.type='checkbox'; chk.id = id; chk.value = name; if(currentSelectedProfiles.includes(name)) chk.checked = true;
      const img = document.createElement('img'); img.src = `./Profiles/${name}.jpg`; img.width=28; img.height=28; img.style.borderRadius='6px';
      const lbl = document.createElement('label'); lbl.htmlFor = id; lbl.textContent = name;
      wrap.appendChild(chk); wrap.appendChild(img); wrap.appendChild(lbl); profilesList.appendChild(wrap);
    });
    includeActivePrivate.checked = includeActivePrivateWhenShowing; profilesModal.style.display='flex';
  }
  function closeProfilesModal(){ profilesModal.style.display='none'; }
  profilesBtn.addEventListener('click', openProfilesModal); profilesCancel.addEventListener('click', closeProfilesModal);
  profilesApply.addEventListener('click', async ()=>{ const checks = profilesList.querySelectorAll('input[type=checkbox]'); const sel = []; checks.forEach(c=>{ if(c.checked) sel.push(c.value); }); currentSelectedProfiles = sel; includeActivePrivateWhenShowing = includeActivePrivate.checked; closeProfilesModal(); await rebuildCategorySidebar(); renderAll(); });

  function buildCategoryElement(cat, count){ const div = document.createElement('div'); div.className='cat-item'; div.dataset.cat = cat; div.addEventListener('click', ()=>{ currentCategoryFilter = cat === '__uncat' ? '__uncat' : (cat||''); renderAll(); }); const name = document.createElement('div'); name.textContent = cat === '' ? 'All' : (cat==='__uncat' ? 'Uncategorized' : cat); const cnt = document.createElement('div'); cnt.className='cat-count'; cnt.textContent = count; div.appendChild(name); div.appendChild(cnt); return div; }

  async function rebuildCategorySidebar(){ const profilesToCheck = currentSelectedProfiles.length ? currentSelectedProfiles : [ localStorage.getItem('activeProfile')||'Guest' ]; const notes = await loadMergedNotesForProfiles(profilesToCheck, { includeActivePrivate: includeActivePrivateWhenShowing }); const counts = new Map(); let uncat = 0; notes.forEach(n=>{ const c = n.category || '__uncat'; if(!n.visibility) n.visibility = 'public'; if(counts.has(c)) counts.set(c, counts.get(c)+1); else counts.set(c,1); if(!n.category) uncat++; }); categoriesList.innerHTML = ''; categoriesList.appendChild(buildCategoryElement('', notes.length)); categoriesList.appendChild(buildCategoryElement('__uncat', uncat)); Array.from(counts.keys()).sort().forEach(k=>{ if(k==='__uncat') return; categoriesList.appendChild(buildCategoryElement(k, counts.get(k))); }); }

  async function renderNotes(filter){ const term = (filter||'').trim().toLowerCase(); const profilesToShow = currentSelectedProfiles.length ? currentSelectedProfiles : [ localStorage.getItem('activeProfile')||'Guest' ]; const notes = await loadMergedNotesForProfiles(profilesToShow, { includeActivePrivate: includeActivePrivateWhenShowing }); notesGrid.innerHTML = '';
    const filtered = notes.filter(n => {
      if(currentCategoryFilter && currentCategoryFilter !== '__uncat'){ if((n.category||'') !== currentCategoryFilter) return false; }
      if(currentCategoryFilter === '__uncat' && n.category) return false;
      if(term && !((n.title||'').toLowerCase().includes(term) || (n.body||'').toLowerCase().includes(term))) return false;
      // exclude private notes unless owner is active profile
      const active = localStorage.getItem('activeProfile') || 'Guest'; if(n.visibility==='private' && n.owner !== active) return false;
      return true;
    });
    if(!filtered.length){ notesGrid.innerHTML = `<div class="muted">No notes match.</div>`; return; }
    filtered.forEach(n => {
      const card = document.createElement('div'); card.className='note-card';
      const header = document.createElement('div'); header.className='note-header';
      const ownerImg = document.createElement('img'); ownerImg.className='owner-img'; ownerImg.src = `./Profiles/${n.owner}.jpg`; ownerImg.alt = n.owner; header.appendChild(ownerImg);
      const t = document.createElement('div'); t.innerHTML = `<div class="note-title">${escapeHtml(n.title||'Untitled')}<span class="category-pill">${escapeHtml(n.category||'')}</span></div><div class="note-meta">${escapeHtml((n.updatedAt||n.createdAt||'')).slice(0,19)} &nbsp; <span class="muted">${escapeHtml(n.owner||'')}</span> ${n.visibility==='public'?'<span class="category-pill">Public</span>':'<span class="category-pill">Private</span>'}</div>`;
      header.appendChild(t);
      const b = document.createElement('div'); b.style.marginTop='8px'; b.style.flex='1'; b.style.whiteSpace='pre-wrap'; b.style.overflow='hidden'; b.style.textOverflow='ellipsis'; b.textContent = (n.body||'').slice(0,240);
      const footer = document.createElement('div'); footer.style.display='flex'; footer.style.gap='8px'; footer.style.marginTop='10px'; footer.style.justifyContent='flex-end';
      const viewBtn = document.createElement('button'); viewBtn.className='btn secondary'; viewBtn.textContent='View'; viewBtn.addEventListener('click', ()=> openEditNote(n.id));
      footer.appendChild(viewBtn);
      const active = localStorage.getItem('activeProfile') || 'Guest'; if((n.owner || active) === active){ const del = document.createElement('button'); del.className='btn secondary'; del.textContent='Delete'; del.addEventListener('click', ()=> { if(!confirm('Delete note?')) return; deleteNote(n.id); }); footer.appendChild(del); }
      card.appendChild(header); card.appendChild(b); card.appendChild(footer); notesGrid.appendChild(card);
    });
  }

  function openNewNote(){ editingId = null; $('#modalTitle').textContent='New note'; noteTitle.value=''; noteBody.value=''; noteCategory.value=''; newCategoryInput.value=''; noteVisibility.value='private'; deleteNoteBtn.style.display='none'; modal.style.display='flex'; noteTitle.focus(); }
  function openEditNote(id){ const active = localStorage.getItem('activeProfile')||'Guest'; const local = loadLocalNotes(active); let note = local.find(n=>String(n.id)===String(id)); if(note){ fillModalFromNote(note); return; }
    // search selected profiles on server (public/private)
    (async ()=>{ const profilesToSearch = currentSelectedProfiles.length ? currentSelectedProfiles : [active]; for(const p of profilesToSearch){ const pub = await loadProfileNotesFromServer(p,'public').catch(()=>[]) || []; const priv = await loadProfileNotesFromServer(p,'private').catch(()=>[]) || []; const combined = pub.concat(priv); const found = combined.find(n=>String(n.id)===String(id)); if(found){ found.owner = p; fillModalFromNote(found); return; } } alert('Note not found'); })(); }
  function fillModalFromNote(n){ editingId = n.id; $('#modalTitle').textContent='Edit note'; noteTitle.value = n.title || ''; noteBody.value = n.body || ''; noteCategory.value = n.category || ''; noteVisibility.value = n.visibility || 'private'; deleteNoteBtn.style.display=''; modal.style.display='flex'; noteTitle.focus(); }
  function closeModal(){ modal.style.display='none'; editingId = null; }

  function deleteNote(id){ const profile = localStorage.getItem('activeProfile') || 'Guest'; let arr = loadLocalNotes(profile); arr = arr.filter(n=>String(n.id)!==String(id)); saveLocalNotes(profile, arr); // best-effort remove from server master
    removeNoteFromServerById(id, profile).catch(()=>{});
    renderAll();
    closeModal();
  }

  async function removeNoteFromServerById(id, profile){ const pub = await loadProfileNotesFromServer(profile,'public') || []; const priv = await loadProfileNotesFromServer(profile,'private') || []; const pFiltered = (pub||[]).filter(s=>String(s.id)!==String(id)); const prFiltered = (priv||[]).filter(s=>String(s.id)!==String(id)); await saveNotesFileToServer(profile, pFiltered, prFiltered); }

  async function saveOrUpdateNote(){ const title = noteTitle.value.trim(); const body = noteBody.value.trim(); const category = (noteCategory.value || newCategoryInput.value || '').trim(); const visibility = noteVisibility.value || 'private'; if(!title && !body){ alert('Add a title or some content'); return; }
    const profile = localStorage.getItem('activeProfile') || 'Guest'; const now = new Date().toISOString(); const local = loadLocalNotes(profile) || [];
    if(category){ const cats = loadCategories(profile); if(!cats.includes(category)){ cats.push(category); saveCategories(profile, cats); } }
    if(editingId){ let n = local.find(x=>String(x.id)===String(editingId)); if(n){ n.title = title; n.body = body; n.updatedAt = now; n.category = category; n.visibility = visibility; saveLocalNotes(profile, local); await upsertNoteToServer(n, profile); }
      else { // update on server
        const pub = await loadProfileNotesFromServer(profile,'public') || []; const priv = await loadProfileNotesFromServer(profile,'private') || []; let updated=false; for(const arr of [pub,priv]){ for(let i=0;i<arr.length;i++){ if(String(arr[i].id)===String(editingId)){ arr[i].title = title; arr[i].body = body; arr[i].updatedAt = now; arr[i].category = category; arr[i].visibility = visibility; updated=true; } } } if(updated) await saveNotesFileToServer(profile,pub,priv);
      }
    } else {
      const newNote = { id: Date.now() + Math.floor(Math.random()*999), title, body, category, visibility, createdAt: now, updatedAt: now, owner: profile };
      local.push(newNote); saveLocalNotes(profile, local); await upsertNoteToServer(newNote, profile);
    }
    closeModal(); rebuildCategorySidebar(); renderAll();
  }

  async function upsertNoteToServer(note, profile){ try{ profile = profile || (localStorage.getItem('activeProfile') || 'Guest'); const pub = await loadProfileNotesFromServer(profile,'public') || []; const priv = await loadProfileNotesFromServer(profile,'private') || [];
      // remove item by id from both
      const key = uniqNoteKey(note); const idxPub = pub.findIndex(x=>uniqNoteKey(x)===key); if(idxPub!==-1) pub.splice(idxPub,1); const idxPriv = priv.findIndex(x=>uniqNoteKey(x)===key); if(idxPriv!==-1) priv.splice(idxPriv,1);
      if(note.visibility === 'public') pub.push(note); else priv.push(note);
      await saveNotesFileToServer(profile, pub, priv);
    }catch(e){ console.warn('upsertNoteToServer', e); }
  }

  async function syncNow(){ const profile = localStorage.getItem('activeProfile') || 'Guest'; const local = loadLocalNotes(profile) || []; const pub = await loadProfileNotesFromServer(profile,'public').catch(()=>[]) || []; const priv = await loadProfileNotesFromServer(profile,'private').catch(()=>[]) || [];
    const idsPub = new Set(pub.map(s=>String(s.id))); const idsPriv = new Set(priv.map(s=>String(s.id)));
    for(const l of local){ if((l.visibility||'private')==='public'){ if(!idsPub.has(String(l.id))) pub.push(l); else { const idx = pub.findIndex(x=>String(x.id)===String(l.id)); if(idx>-1 && l.updatedAt > (pub[idx].updatedAt||pub[idx].createdAt||'')) pub[idx] = l; } } else { if(!idsPriv.has(String(l.id))) priv.push(l); else { const idx = priv.findIndex(x=>String(x.id)===String(l.id)); if(idx>-1 && l.updatedAt > (priv[idx].updatedAt||priv[idx].createdAt||'')) priv[idx] = l; } } }
    await saveNotesFileToServer(profile,pub,priv);
    saveLocalNotes(profile,[]);
    alert('Sync complete');
    rebuildCategorySidebar(); renderAll(); }

  // helpers to render everything
  async function renderAll(){ await rebuildProfilesSmall(); await rebuildCategorySidebar(); renderNotes(q.value); }

  // wire UI
  newNoteBtn.addEventListener('click', openNewNote); cancelNoteBtn.addEventListener('click', closeModal); saveNoteBtn.addEventListener('click', saveOrUpdateNote); deleteNoteBtn.addEventListener('click', ()=>{ if(!editingId) return; if(!confirm('Delete this note?')) return; deleteNote(editingId); }); syncBtn.addEventListener('click', syncNow);
  q.addEventListener('input', ()=> renderAll()); document.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ closeModal(); closeProfilesModal(); } });

  // helpers
  document.getElementById('newCategoryInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const val = newCategoryInput.value.trim(); if(val){ noteCategory.appendChild(new Option(val,val)); noteCategory.value = val; newCategoryInput.value=''; } } });

  function escapeHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function populateInitial(){ (async ()=>{ window.detectedPlatform = await getCachedPlatform().catch(()=> 'windows'); try{ localStorage.setItem('SERVER_UPLOAD_STYLE', window.detectedPlatform); }catch(e){}
      // populate currentSelectedProfiles from profiles.js (if available)
      try{
        const names = await getAllProfileNames();
        const active = localStorage.getItem('activeProfile') || names[0] || 'Guest';
        currentSelectedProfiles = [ active ];
      }catch(e){
        currentSelectedProfiles = [ localStorage.getItem('activeProfile') || 'Guest' ];
      }
      refreshActiveProfileDisplay(); await renderAll();
    })();
  }

  if($('#activeProfileIcon')) $('#activeProfileIcon').addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); window.location.href = './profile.html'; } });
  window.addEventListener('focus', ()=>{ refreshActiveProfileDisplay(); renderAll(); }); document.addEventListener('DOMContentLoaded', populateInitial);

  // expose for debug
  window.NotesApp = { loadProfileNotesFromServer, saveNotesFileToServer, NOTES_DIR, getAllProfileNames };
})();
</script>
</body>
</html>
