<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Library Manager</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #111827;
      --panel2: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #253046;
      --accent: #6ee7b7;
      --accent2: #60a5fa;
      --warn: #f59e0b;
      --danger: #fb7185;
      --ok: #34d399;
      --chip: #1f2937;
      --radius: 16px;
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: radial-gradient(1000px 500px at 20% 0%, rgba(96,165,250,.08), transparent 55%),
                  radial-gradient(1000px 500px at 80% 10%, rgba(110,231,183,.08), transparent 50%),
                  var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1600px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      flex-wrap: nowrap;
      min-width: 0;
    }
    .header-home,
    .header-brand {
      display: flex;
      align-items: center;
      min-width: 0;
    }
    .header-home {
      justify-content: flex-start;
      flex: 0 0 auto;
    }
    .header-brand {
      justify-content: flex-start;
      margin-left: auto;
      gap: 6px;
      flex: 1 1 360px;
      min-width: 0;
    }
    .brand-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
      text-align: left;
      line-height: 1.1;
    }
    h1 { font-size: 26px; font-weight: 650; letter-spacing: -0.03em; margin: 0; }
    .brand-title { display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
    .brand-subrow { display: flex; align-items: baseline; gap: 4px; min-width: 0; flex-wrap: nowrap; width: 100%; justify-content: flex-start; }
    .brand-sub { color: var(--muted); font-size: 14px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto; min-width: 0; }
    .title-switcher { transform: translateY(0); flex: 0 0 auto; margin-left: 0; }
    .title-switcher:hover { transform: translateY(-1px) scale(1.06); }
    .sub { color: var(--muted); font-size: 14px; }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 540px;
      align-items: stretch;
      justify-content: center;
      min-width: 0;
      overflow: hidden;
      max-width: none;
    }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: stretch;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
      width: 100%;
    }
    .controls-row.secondary {
      max-width: none;
    }
    .controls .btn {
      flex: 1 1 0;
      min-width: 0;
    }
    .home-btn {
      background: linear-gradient(145deg, rgba(96,165,250,0.14), rgba(15,23,42,0.95));
      border: 1px solid rgba(96,165,250,0.35);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 650;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s, border-color 0.15s, background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .home-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.15);
      border-color: rgba(96,165,250,0.55);
    }
    .home-btn-icon {
      width: 17px;
      height: 17px;
      display: inline-block;
      flex: 0 0 auto;
    }
    .home-btn-label {
      display: inline-block;
    }

.home-stack { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
.home-stack .home-btn { width: fit-content; }
.repair-batch-launch {
  align-self: flex-start;
  min-width: 0;
  width: fit-content;
  padding: 6px 10px;
  font-size: 11px;
  border-radius: 8px;
  line-height: 1.1;
}
.repair-batch-launch.hidden { display: none !important; }
.repair-batch-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-width: 42px;
  min-height: 32px;
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.02);
  color: var(--text);
  cursor: pointer;
}
.repair-batch-toggle input {
  width: 16px;
  height: 16px;
  accent-color: var(--ok);
  cursor: pointer;
}
.repair-batch-toggle.is-done {
  border-color: rgba(52,211,153,0.55);
  background: rgba(52,211,153,0.12);
  color: var(--ok);
  font-weight: 700;
}
.repair-batch-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 34px;
  min-height: 32px;
  padding: 0 8px;
  border-radius: 8px;
  border: 1px solid transparent;
  font-size: 16px;
}
.repair-batch-status.done {
  color: var(--ok);
  background: rgba(52,211,153,0.12);
  border-color: rgba(52,211,153,0.45);
}
.repair-batch-status.failed {
  color: var(--danger);
  background: rgba(251,113,133,0.12);
  border-color: rgba(251,113,133,0.45);
}
    @media (max-width: 1280px) {
      .header { gap: 10px; padding: 14px 14px; }
      .header-brand { flex: 0 1 auto; gap: 0; }
      .brand-copy { max-width: none; }
      .brand-sub { white-space: normal; }
      .controls { gap: 5px; }
    }
    @media (max-width: 980px) {
      .home-btn-label { display: none; }
      .home-btn { padding: 8px 10px; min-width: 40px; justify-content: center; }
      .controls { align-items: stretch; }
      .controls-row { justify-content: stretch; }
      .controls-row.secondary { max-width: 100%; }
      .brand-copy { max-width: none; }
      .header-brand { flex: 0 1 auto; }
    }
    @media (max-width: 780px) {
      .header { align-items: flex-start; }
      .header-brand { gap: 0; }
      h1 { font-size: 22px; }
      .brand-sub { font-size: 13px; }
      .home-btn { border-radius: 8px; }
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
      white-space: nowrap;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-icon {
      flex: 0 0 auto;
      font-size: 16px;
      line-height: 1;
    }
    .btn-label {
      flex: 0 1 auto;
      white-space: nowrap;
      overflow: hidden;
    }
    .btn.icon-only {
      padding-left: 10px;
      padding-right: 10px;
      min-width: 42px;
    }
    .btn.icon-only .btn-label {
      display: none;
    }
    .btn-primary { background: linear-gradient(145deg, rgba(110,231,183,0.12), rgba(110,231,183,0.04)); border-color: rgba(110,231,183,0.45); }
    .btn-warn { background: linear-gradient(145deg, rgba(245,158,11,0.1), rgba(245,158,11,0.02)); border-color: rgba(245,158,11,0.4); }
    .btn-small { padding: 4px 10px; font-size: 11px; }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.2); }
    .btn:disabled { opacity: 0.5; pointer-events: none; transform: none; }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 22px;
      flex: 1 1 180px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .stat-card.clickable:hover {
      background: rgba(255,255,255,0.03);
      border-color: var(--accent2);
    }
    .stat-label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-value { font-size: 36px; font-weight: 700; line-height: 1.2; }
    .progress-container {
      position: relative;
      margin: 20px 0 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 40px;
      height: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.2s;
    }
    .progress-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(229, 231, 235, 0.9);
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      mix-blend-mode: screen;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      margin: 16px 0 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 250px;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 15px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(96,165,250,0.2); }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      background: var(--chip);
      border: 1px solid var(--line);
    }
    .badge.ok { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.5); color: var(--ok); }
    .badge.warn { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.5); color: var(--warn); }
    .badge.danger { background: rgba(251,113,133,0.15); border-color: rgba(251,113,133,0.5); color: var(--danger); }
    .badge.muted { color: var(--muted); }
    .tree-container {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 0;
      max-height: calc(100vh - 380px);
      overflow-y: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .tree { padding: 0 8px; }
    .node { user-select: none; }
    .node-header {
      display: flex;
      align-items: center;
      padding: 8px 8px 8px 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .node-header:hover { background: rgba(255,255,255,0.04); }
    .toggle {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .node-icon { width: 24px; margin-right: 4px; opacity: 0.7; }
    .node-title { font-weight: 500; margin-right: 12px; }
    .node-actions { display: flex; gap: 4px; margin-left: 8px; }
    .node-stats { display: flex; gap: 8px; margin-left: auto; font-size: 12px; }
    .children { margin-left: 28px; border-left: 1px dashed var(--line); padding-left: 8px; }
    .episode-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 8px 8px 32px;
      border-radius: 8px;
      font-size: 14px;
    }
    .episode-row:hover { background: rgba(255,255,255,0.02); }
    .ep-name {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ep-file-name {
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      word-break: break-word;
    }
    .ep-episode-title {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      word-break: break-word;
    }
    .ep-status {
      display: flex;
      gap: 16px;
      margin-left: auto;
      white-space: nowrap;
    }
    .ep-actions {
      display: flex;
      gap: 4px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .path-preview {
      display: none;
    }
    .empty-message { padding: 40px; text-align: center; color: var(--muted); }
    .footnote { margin-top: 12px; font-size: 13px; color: var(--muted); }
    .flex { display: flex; gap: 8px; align-items: center; }


    .library-switcher {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      margin-left: 4px;
      margin-right: 0;
      order: 0;
    }
    .library-hub {
      position: relative;
      border: none;
      background: transparent;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
      padding: 0;
      margin: 0;
      cursor: pointer;
      z-index: 2;
      box-shadow: none;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }
    .library-hub:hover { filter: brightness(1.12); transform: scale(1.06); }
    .library-wheel {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .library-wheel.open { pointer-events: auto; }
    .library-wheel-btn {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      opacity: 0;
      transform: scale(0.6);
      transition: transform 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
      cursor: pointer;
    }
    .library-wheel.open .library-wheel-btn { opacity: 1; transform: scale(1); }
    .library-wheel-btn:hover { filter: brightness(1.15); }
    .library-wheel-btn[data-pos="nw"] { left: 50%; top: 50%; transform: translate(-50%, -50%) translate(-38px, -38px) scale(0.6); }
    .library-wheel-btn[data-pos="ne"] { left: 50%; top: 50%; transform: translate(-50%, -50%) translate(38px, -38px) scale(0.6); }
    .library-wheel-btn[data-pos="se"] { left: 50%; top: 50%; transform: translate(-50%, -50%) translate(38px, 38px) scale(0.6); }
    .library-wheel-btn[data-pos="sw"] { left: 50%; top: 50%; transform: translate(-50%, -50%) translate(-38px, 38px) scale(0.6); }
    .library-wheel.open .library-wheel-btn[data-pos="nw"] { transform: translate(-50%, -50%) translate(-38px, -38px) scale(1); }
    .library-wheel.open .library-wheel-btn[data-pos="ne"] { transform: translate(-50%, -50%) translate(38px, -38px) scale(1); }
    .library-wheel.open .library-wheel-btn[data-pos="se"] { transform: translate(-50%, -50%) translate(38px, 38px) scale(1); }
    .library-wheel.open .library-wheel-btn[data-pos="sw"] { transform: translate(-50%, -50%) translate(-38px, 38px) scale(1); }
    .library-wheel-btn.active {
      border-color: rgba(96,165,250,0.6);
      box-shadow: 0 0 0 3px rgba(96,165,250,0.16), 0 8px 18px rgba(0,0,0,0.28);
    }
    .stat-card.hidden,
    .btn.hidden,
    .footnote.hidden { display: none !important; }


    /* Modal styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .modal-header h3 { font-size: 18px; font-weight: 600; flex: 0 0 auto; }
    .modal-header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
      margin-left: auto;
      flex-wrap: wrap;
    }
    #addContentModalActions {
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    #addContentModalActions .embed-flow-meta {
      margin-right: auto;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(42vw, 420px);
    }
    #addContentModalActions .embed-flow-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(145deg, rgba(96,165,250,0.14), rgba(15,23,42,0.95));
      color: var(--text);
      padding: 8px 13px;
      border-radius: 8px;
      font-weight: 650;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s, border-color 0.15s, background 0.15s, opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    #addContentModalActions .embed-flow-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.12);
      border-color: rgba(96,165,250,0.55);
    }
    #addContentModalActions .embed-flow-btn.secondary {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      box-shadow: none;
    }
    #addContentModalActions .embed-flow-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
 .repair-modal-meta {
   display: inline-flex;
   align-items: center;
   gap: 10px;
   color: var(--muted);
   font-size: 12px;
   white-space: nowrap;
   flex: 1 1 320px;
   min-width: 0;
 }
     .modal-close {
       background: none;
       border: none;
       color: var(--muted);
       font-size: 24px;
       cursor: pointer;
       padding: 0 8px;
       margin-left: auto;
       flex: 0 0 auto;
     }
    .missing-group {
      margin-bottom: 20px;
    }
    .missing-group-title {
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 8px;
      font-size: 15px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 4px;
    }
    .missing-file-list {
      list-style: none;
      padding-left: 8px;
    }
    .missing-file-list li {
      padding: 6px 0;
      font-family: 'SF Mono', monospace;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      word-break: break-all;
    }

    .repair-modal {
      max-width: 1100px;
      width: 96%;
    }
    .repair-frame {
      width: 100%;
      height: min(78vh, 920px);
      border: 0;
      display: block;
      background: var(--panel);
    }
    .add-modal {
      max-width: 1180px;
      width: 96%;
    }
    .add-frame {
      width: 100%;
      height: min(78vh, 920px);
      border: 0;
      display: block;
      background: var(--panel);
    }
    .modal-body {
      padding: 18px 22px 22px;
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
    }
    .missing-modal-toolbar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 2;
      padding-bottom: 10px;
      background: var(--panel);
    }
    .missing-modal-toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .missing-modal-toolbar-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }
    .missing-modal-toolbar .btn {
      flex: 0 0 auto;
    }
    .missing-modal-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .missing-sub-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.015);
      margin-top: 8px;
      cursor: pointer;
    }
    .missing-sub-row:hover {
      background: rgba(255,255,255,0.03);
      border-color: rgba(96,165,250,0.35);
    }
    .missing-sub-row.selected {
      border-color: rgba(52,211,153,0.55);
      background: rgba(52,211,153,0.08);
    }
    .missing-sub-meta {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 2px;

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  }

  function safeDecode(value) {
    const raw = String(value ?? '');
    try { return decodeURIComponent(raw); } catch { return raw; }
  }

  function encodePathSegments(pathname) {
    return String(pathname ?? '')
      .split('/')
      .map(seg => {
        if (!seg) return '';
        try { seg = decodeURIComponent(seg); } catch {}
        return encodeURIComponent(seg);
      })
      .join('/');
  }

  function safeFileUrl(input, base = window.location.href) {
    const raw = String(input ?? '').trim();
    if (!raw) return '';
    try {
      const isAbsolute = /^[a-zA-Z][a-zA-Z\d+\-.]*:/.test(raw) || raw.startsWith('//');
      
      // If relative, we handle '?' as a separator but keep '#' as part of the path
      // because in library file contexts, '#' is usually a filename character.
      if (!isAbsolute) {
        const qIndex = raw.indexOf('?');
        const pathPart = qIndex === -1 ? raw : raw.slice(0, qIndex);
        const queryPart = qIndex === -1 ? '' : raw.slice(qIndex);
        return new URL(encodePathSegments(pathPart) + queryPart, base).href;
      }
      
      const u = new URL(raw, base);
      // For absolute URLs, if there is a hash, it might actually be part of the filename.
      // We re-encode the pathname specifically.
      u.pathname = encodePathSegments(u.pathname);
      return u.href;
    } catch {
      return raw;
    }
  }

  function ensureTrailingSlash(s) {

    if (!s) return '';
    return s.endsWith('/') ? s : s + '/';

    return String(str || '')
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\s-]/g, '')
      .trim()
      .replace(/[\s_-]+/g, '_')
      .replace(/^_+|_+$/g, '');

  function supportsSecondaryScan() {
    return flatItems.some(item => item.secondaryCandidates && item.secondaryCandidates.length > 0);
  }

  function updateActionVisibility() {
    const secondaryVisible = supportsSecondaryScan();
    const subtitleActive = subtitleBatchMode && subtitleBatchSelected.size > 0;
    const repairActive = repairBatchMode && repairBatchSelected.size > 0;
    els.scanSecondaryBtn.classList.toggle('hidden', !secondaryVisible);

  async function readServerBaseFromTxt() {
    try {
      const res = await fetch('./serverip.txt', { cache: 'no-store' });
      if (!res.ok) return '';
      const txt = (await res.text()).trim();
      if (!txt) return '';
      if (txt.startsWith('http://') || txt.startsWith('https://')) return ensureTrailingSlash(txt);
      if (/^[a-zA-Z0-9.-]+(:[0-9]+)?$/.test(txt)) return `http://${txt}/`;
      return '';
    } catch {
      return '';
    }
  }

  async function fetchLibraryResource(file) {
    const candidates = [file];
    const serverBase = await readServerBaseFromTxt();
    if (serverBase) {
      candidates.push(new URL(String(file).replace(/^\.\//, ''), serverBase).href);
    }
    let lastError = null;
    for (const url of candidates) {
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return { text: await res.text(), source: url, file };
      } catch (e) {
        lastError = e;
      }
    }
    throw lastError || new Error(`${file} not found`);
  }

  async function fetchLibraryText(config) {
    return fetchLibraryResource(config.file);
  }

  async function fetchLibraryBundle(config) {
    const files = Array.isArray(config.files) && config.files.length ? config.files : [config.file];
    const bundle = [];
    for (const file of files) {
      bundle.push(await fetchLibraryResource(file));
    }
    return bundle;
  }

  async function runLibrarySource(text, returnExpr) {
    const fn = new Function('window', 'document', `${text}\nreturn (${returnExpr});`);
    return fn(window, document);
  }

  function extractArrayLiteral(text, varName) {
    const re = new RegExp(String.raw`(?:const|let|var)\s+${varName}\s*=\s*(\[[\s\S]*?\]);`);
    const match = text.match(re);
    if (!match) throw new Error(`Could not find ${varName} array in source`);
    return match[1];
  }

  async function loadVideoData(text) {
    try {
      const data = await runLibrarySource(text, "typeof episodes !== 'undefined' ? episodes : window.episodes");
      return data || window.episodes || null;
    } catch {
      const transformed = text.replace(/^\s*(?:const|let|var)\s+episodes\s*=\s*/m, 'window.episodes = ');
      const data = await runLibrarySource(transformed, "window.episodes");
      return data || window.episodes || null;
    }
  }

  async function loadMusicData(text) {
    try {
      const data = await runLibrarySource(text, "typeof musicLibraryFlat !== 'undefined' && musicLibraryFlat.length ? musicLibraryFlat : (typeof musicLibrary !== 'undefined' ? musicLibrary : window.musicLibrary)");
      return data || window.musicLibraryFlat || window.musicLibrary || [];
    } catch {
      return window.musicLibraryFlat || window.musicLibrary || [];
    }
  }

  async function loadGamesData(text) {
    const arr = extractArrayLiteral(text, 'games');
    return new Function(`return (${arr});`)();
  }

  function inferSourceKeyFromPath(source) {
    const base = String(source || '').split(/[\\/]/).pop() || '';
    return base.replace(/\.[^.]+$/, '').trim().toLowerCase();
  }

  function deriveBookSourceLabel(source) {
    const key = inferSourceKeyFromPath(source);
    if (key.includes('manga')) return 'Manga';
    if (key.includes('guide')) return 'Guidebooks';
    if (key.includes('book')) return 'Books';
    return key ? key.charAt(0).toUpperCase() + key.slice(1) : 'Library';
  }

  function flattenBookSource(value) {
    if (Array.isArray(value)) {
      return value.flatMap(item => flattenBookSource(item));
    }
    if (!value || typeof value !== 'object') return [];
    const directKeys = ['title', 'name', 'book', 'manga', 'guidebook', 'series', 'label', 'file', 'url', 'link', 'path', 'img', 'image', 'cover', 'art', 'thumbnail', 'thumb'];
    const hasDirectFields = directKeys.some(k => Object.prototype.hasOwnProperty.call(value, k));
    if (hasDirectFields) return [value];
    return Object.entries(value).flatMap(([k, v]) => {
      if (Array.isArray(v)) return flattenBookSource(v).map(item => (item && typeof item === 'object') ? { ...item, category: item.category || k } : item);
      if (v && typeof v === 'object') return flattenBookSource(v).map(item => (item && typeof item === 'object') ? { ...item, category: item.category || k } : item);
      if (typeof v === 'string') return [{ title: k, file: v, category: k }];
      return [];
    });
  }

  function normalizeBookEntry(entry, idx, sourceLabel) {
    const raw = (entry && typeof entry === 'object') ? entry : { title: String(entry ?? '') };
    const title = String(raw.title || raw.name || raw.book || raw.manga || raw.guidebook || raw.series || raw.label || `Item ${idx + 1}`).trim();
    const groupKey = String(raw.category || raw.group || raw.series || raw.author || sourceLabel || 'General').trim() || 'General';

    const roots = [...new Set([
      ensureTrailingSlash(window.booksLibraryRoot || ''),
      ensureTrailingSlash(window.bookLibraryRoot || ''),
      ensureTrailingSlash(window.mangaLibraryRoot || ''),
      ensureTrailingSlash(window.guidebooksLibraryRoot || ''),
      './',
      './Books/',
      './Manga/',
      './Guidebooks/'
    ].filter(Boolean))];

    const primaryFields = ['file', 'url', 'link', 'path', 'src', 'source', 'download', 'href', 'book', 'pdf', 'epub', 'cbz', 'cbr', 'mobi', 'azw', 'azw3'];
    const secondaryFields = ['img', 'image', 'cover', 'art', 'thumbnail', 'thumb', 'poster', 'picture'];

    const primaryCandidates = [];
    const secondaryCandidates = [];

    for (const field of primaryFields) {
      const value = raw[field];
      if (typeof value === 'string' && value.trim()) {
        primaryCandidates.push(safeFileUrl(value.trim(), window.location.href));
      }
    }

    for (const field of secondaryFields) {
      const value = raw[field];
      if (typeof value === 'string' && value.trim()) {
        secondaryCandidates.push(safeFileUrl(value.trim(), window.location.href));
      }
    }

    const baseVariants = [];
    const addVariant = value => {
      const base = normalizeBaseName(value);
      if (base && !baseVariants.includes(base)) baseVariants.push(base);
    };
    addVariant(title);
    addVariant(raw.file || raw.url || raw.link || raw.path || '');
    if (raw.category) addVariant(raw.category);

    for (const variant of baseVariants) {
      for (const root of roots) {
        for (const ext of BOOK_FILE_EXTS) {
          primaryCandidates.push(safeFileUrl(root + variant + ext, window.location.href));
        }
        for (const ext of IMAGE_EXTS) {
          secondaryCandidates.push(safeFileUrl(root + variant + ext, window.location.href));
        }
      }
    }

    const uniquePrimary = [...new Set(primaryCandidates.filter(Boolean))];
    const uniqueSecondary = [...new Set(secondaryCandidates.filter(Boolean))];
    return {
      title,
      groupKey,
      primaryCandidates: uniquePrimary,
      secondaryCandidates: uniqueSecondary,
      primaryUrl: uniquePrimary[0] || '',
      secondaryUrl: uniqueSecondary[0] || '',
      primaryStatus: STATUS.UNCHECKED,
      secondaryStatus: uniqueSecondary.length ? STATUS.UNCHECKED : STATUS.NA,
      hasSecondary: uniqueSecondary.length > 0
    };
  }

  async function loadBooksData(bundle) {
    const items = Array.isArray(bundle) ? bundle : [];
    const sections = [];

    for (const item of items) {
      const sourceFile = String(item?.file || item?.source || '').trim();
      const sourceLabel = deriveBookSourceLabel(sourceFile);
      let data = null;

      try {
        data = await runLibrarySource(item.text, 'window.libraryData || null');
      } catch {
        data = null;
      }

      if (data && typeof data === 'object') {
        sections.push({
          key: inferSourceKeyFromPath(sourceFile) || sourceLabel.toLowerCase().replace(/\s+/g, ''),
          label: sourceLabel,
          data
        });
      } else {
        sections.push({
          key: inferSourceKeyFromPath(sourceFile) || sourceLabel.toLowerCase().replace(/\s+/g, ''),
          label: sourceLabel,
          data: { title: sourceLabel, items: [] }
        });
      }
    }

    return sections;
  }

  function getBookChildren(raw) {
    if (!raw || typeof raw !== 'object') return [];
    const arrays = ['books', 'items', 'children', 'series', 'volumes'];
    for (const key of arrays) {
      if (Array.isArray(raw[key])) return raw[key];
    }
    return [];
  }

  function getBookTitle(raw, fallback) {
    if (raw && typeof raw === 'object') {
      return String(raw.title || raw.name || raw.label || fallback || 'Untitled').trim();
    }
    return String(raw || fallback || 'Untitled').trim();
  }

  function isBookGroup(raw) {
    return !!(raw && typeof raw === 'object' && (raw.group || getBookChildren(raw).length));
  }

  function makeBookLeaf(raw, displayName, parentKey, sectionLabel, idxPath) {
    const title = getBookTitle(raw, displayName);
    const primaryCandidates = [];
    const secondaryCandidates = [];

    const primaryFields = ['file', 'url', 'link', 'path', 'src', 'source', 'href'];
    const secondaryFields = ['cover', 'image', 'img', 'art', 'thumbnail', 'thumb', 'poster', 'picture'];

    for (const field of primaryFields) {
      const value = raw && typeof raw === 'object' ? raw[field] : '';
      if (typeof value === 'string' && value.trim()) {
        primaryCandidates.push(safeFileUrl(value.trim(), window.location.href));
      }
    }

    for (const field of secondaryFields) {
      const value = raw && typeof raw === 'object' ? raw[field] : '';
      if (typeof value === 'string' && value.trim()) {
        secondaryCandidates.push(safeFileUrl(value.trim(), window.location.href));
      }
    }

    const item = {
      id: `books:item:${idxPath.join('.')}`,
      key: title,
      type: 'leaf',
      kind: 'book-item',
      displayName: title,
      primaryLabel: 'File',
      secondaryLabel: 'Cover',
      primaryUrl: primaryCandidates[0] || '',
      secondaryUrl: secondaryCandidates[0] || '',
      primaryCandidates,
      secondaryCandidates,
      primaryStatus: STATUS.UNCHECKED,
      secondaryStatus: secondaryCandidates.length ? STATUS.UNCHECKED : STATUS.NA,
      repairable: false,
      hasSecondary: secondaryCandidates.length > 0,
      parentKey,
      groupLabel: sectionLabel,
      category: sectionLabel
    };
    flatItems.push(item);
    nodeMap.set(item.id, item);
    return item;
  }

  function buildBookNode(raw, sectionLabel, parentKey, idxPath, fallbackTitle) {
    const title = getBookTitle(raw, fallbackTitle);
    if (!isBookGroup(raw)) {
      return makeBookLeaf(raw, title, parentKey, sectionLabel, idxPath);
    }

    const node = {
      id: `books:group:${idxPath.join('.')}`,
      key: title,
      type: 'group',
      kind: parentKey ? 'books-subgroup' : 'books-group',
      children: [],
      episodes: [],
      parentKey
    };
    nodeMap.set(node.id, node);

    const children = getBookChildren(raw);
    children.forEach((child, childIdx) => {
      const childNode = buildBookNode(child, sectionLabel, node.id, idxPath.concat(childIdx), getBookTitle(child, `Item ${childIdx + 1}`));
      if (childNode) node.children.push(childNode);
    });

    node.children.sort((a, b) => String(a.displayName || a.key || '').localeCompare(String(b.displayName || b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
    return node;
  }

  function buildBooksLibrary(sections) {
    flatItems = [];
    nodeMap = new Map();
    const roots = [];
    const list = Array.isArray(sections) ? sections : [];

    list.forEach((section, sectionIdx) => {
      const sectionLabel = String(section?.label || `Section ${sectionIdx + 1}`).trim();
      const sectionData = section?.data && typeof section.data === 'object' ? section.data : { title: sectionLabel, items: [] };
      const root = {
        id: `books:root:${sectionIdx}`,
        key: sectionLabel,
        type: 'group',
        kind: 'books-root',
        children: [],
        episodes: [],
        parentKey: null
      };
      nodeMap.set(root.id, root);

      const sourceItems = Array.isArray(sectionData.items) ? sectionData.items : (Array.isArray(sectionData) ? sectionData : []);
      sourceItems.forEach((entry, idx) => {
        const node = buildBookNode(entry, sectionLabel, root.id, [sectionIdx, idx], getBookTitle(entry, `Item ${idx + 1}`));
        if (node) root.children.push(node);
      });

      root.children.sort((a, b) => String(a.displayName || a.key || '').localeCompare(String(b.displayName || b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
      roots.push(root);
    });

    roots.sort((a, b) => String(a.key || '').localeCompare(String(b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
    return roots;
  }

  function splitMusicOnLastDollar(raw) {
    const clean = String(raw ?? '').trim();
    if (!clean) return { base: '', code: '' };
    const idx = clean.lastIndexOf('$');
    if (idx === -1) return { base: clean, code: '' };
    return {
      base: clean.slice(0, idx).trim(),
      code: clean.slice(idx + 1).trim()
    };
  }

  function normalizeBaseName(raw) {
    let s = String(raw ?? '').trim();
    try { s = decodeURIComponent(s); } catch {}
    s = s.split(/[\\/]/).pop();
    s = s.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac|mp4|m4v|mov|webm|mkv|jpg|jpeg|png|webp|gif|zip|iso|bin|chd|pbp|gba|gb|gbc|nds|z64|n64|smd|md|sfc|smc)(\?.*)?$/i, '');
    return s.trim();
  }


  function normalizeMusicScanBase(raw) {
    let s = String(raw ?? '').trim();
    if (!s) return '';
    try { s = decodeURIComponent(s); } catch {}
    s = s.split(/[\/]/).pop();
    // Modified: Only strip query parameters ('?'), preserved '#' as it's common in music titles
    s = s.replace(/\?.*$/, '');
    s = s.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)(\?.*)?$/i, '');
    const dollar = s.lastIndexOf('$');
    if (dollar !== -1) s = s.slice(0, dollar).trim();
    return s.trim();
  }

  function parseMusicEntry(entry) {
    const raw = String(entry ?? '').trim();
    const split = splitMusicOnLastDollar(raw);
    const base = normalizeBaseName(split.base || raw);
    const code = String(split.code || '').trim();
    let title = base;
    let artist = '';
    const splitTitle = base.split(/\s+-\s+/);
    if (splitTitle.length >= 2) {
      artist = splitTitle.pop().trim();
      title = splitTitle.join(' - ').trim();
    }
    return { title, artist, base, code };
  }

  function buildTrackCandidates(trackTitle, rawEntry) {
    const roots = [
      ensureTrailingSlash(window.musicLibraryRoot || './Music/'),
      'Music/',
      '/Music/'
    ];

    const variants = [];
    const addVariant = value => {
      const base = normalizeMusicScanBase(value);
      if (base && !variants.includes(base)) variants.push(base);
    };

    addVariant(trackTitle);

    const raw = String(rawEntry ?? '').trim();
    if (raw) {
      addVariant(raw);
      const lastDollar = raw.lastIndexOf('$');
      if (lastDollar !== -1) addVariant(raw.slice(0, lastDollar));
    }

    const moreVariants = [];
    for (const variant of variants) {
      moreVariants.push(variant);
      // Fallback specifically for titles with special characters like '#'
      if (variant.includes('#')) {
          moreVariants.push(variant.replace(/#/g, '%23'));
      }
      if (variant.includes(' - ')) {
        const parts = variant.split(/\s+-\s+/);
        const titlePart = parts.shift();
        const artistPart = parts.join(' - ');
        if (titlePart && artistPart) {
          const dotlessArtist = artistPart.replace(/\.(?=\w)/g, '');
          const recombined = `${titlePart} - ${dotlessArtist}`.trim();
          if (recombined && recombined !== variant) moreVariants.push(recombined);
        }
      }
    }

    const finalVariants = [...new Set(moreVariants)];
    const out = [];

    for (const variant of finalVariants) {
      for (const root of roots) {
        // Try raw variant first, safeFileUrl handles the actual encoding
        AUDIO_EXTS.forEach(ext => out.push(safeFileUrl(root + variant + ext, window.location.href)));
        out.push(safeFileUrl(root + variant, window.location.href));
      }
    }

    return [...new Set(out)];
  }

  function buildArtistArtCandidates(artist) {
    const root = ensureTrailingSlash(window.musicLibraryArtistImageRoot || './Images/Artists/');
    const clean = normalizeBaseName(artist || '');
    if (!clean) return [];
    const slug = slugify(clean);
    const variants = new Set([
      clean,
      slug,
      clean.replace(/\s+/g, '_'),
      clean.replace(/\s+/g, '')
    ].filter(Boolean));
    const out = [];
    for (const base of variants) {
      for (const ext of IMAGE_EXTS) {
        out.push(safeFileUrl(root + base + ext, window.location.href));
      }
    }
    return [...new Set(out)];
  }

  function getGamesImageRoot() {
    return ensureTrailingSlash(window.gamesImageRoot || './emulator/Images/');
  }

  function getGamesRomRoot() {
    return ensureTrailingSlash(window.gamesRomRoot || './emulator/roms/');
  }

  function basenameFromPath(value) {
    const raw = String(value ?? '').trim();
    if (!raw) return '';
    try {
      const withoutQuery = raw.split('?')[0];
      return withoutQuery.split('/').pop() || '';
    } catch {
      return raw.split('/').pop() || '';
    }
  }

  function buildGameImageCandidates(img) {
    const raw = String(img ?? '').trim();
    if (!raw) return [];
    const base = basenameFromPath(raw);
    const roots = [
      getGamesImageRoot(),
      './emulator/Images/',
      './Images/'
    ];
    const out = [];
    if (base) {
      for (const root of roots) {
        out.push(safeFileUrl(root + base, window.location.href));
      }
    }
    out.push(safeFileUrl(raw, window.location.href));
    return [...new Set(out.filter(Boolean))];
  }

  function buildGameRomCandidates(link) {
    const raw = String(link ?? '').trim();
    if (!raw) return [];
    const out = [];
    try {
      const page = new URL(raw, window.location.href);
      const rom = String(page.searchParams.get('rom') || '').trim();

      if (rom) {
        const romRoot = getGamesRomRoot();
        const isAbsolute = /^[a-zA-Z][a-zA-Z\d+\-.]*:/.test(rom) || rom.startsWith('//');

        if (!isAbsolute && !rom.startsWith('/')) {
          out.push(safeFileUrl(romRoot + rom, window.location.href));
        }

        out.push(safeFileUrl(rom, page.href));
        out.push(safeFileUrl(rom, window.location.href));
      }

      out.push(safeFileUrl(raw, window.location.href));
    } catch {
      out.push(safeFileUrl(raw, window.location.href));
    }
    return [...new Set(out.filter(Boolean))];
  }

  function parseRomUrlFromGameLink(link) {
    const candidates = buildGameRomCandidates(link);
    return candidates[0] || '';
  }

  function makeVideoLeaf(parentKey, idx, ep) {
    const file = ep.file || ep.url || ep.video || '';
    if (!file) return null;
    const videoUrl = safeFileUrl(file, window.location.href);
    const subtitleUrl = safeFileUrl(String(file || '').replace(/\.(mp4|m4v|mov|webm|mkv)$/i, '.vtt'), window.location.href);
    return {
      id: `${parentKey}:ep:${idx}`,
      key: ep.name || ep.title || `Episode ${idx + 1}`,
      type: 'leaf',
      kind: 'video-episode',
      displayName: ep.name || ep.title || `Episode ${idx + 1}`,
      primaryLabel: 'Video',
      secondaryLabel: 'Sub',
      primaryUrl: videoUrl,
      secondaryUrl: subtitleUrl,
      primaryCandidates: [videoUrl],
      secondaryCandidates: [subtitleUrl],
      primaryStatus: STATUS.UNCHECKED,
      secondaryStatus: STATUS.UNCHECKED,
      repairable: true,
      hasSecondary: true,
      parentKey,
      sourceOrder: idx
    };
  }

  function buildVideoLibrary(libObj) {
    flatItems = [];
    nodeMap = new Map();
    const roots = [];
    const nodes = new Map();
    const referenced = new Set();

    if (Array.isArray(libObj)) {
      const root = { id: 'video:root', key: 'Library', type: 'group', kind: 'video-root', children: [], episodes: [], parentKey: null };
      nodes.set(root.id, root);
      nodeMap.set(root.id, root);
      libObj.forEach((ep, idx) => {
        if (!ep || typeof ep !== 'object') return;
        const leaf = makeVideoLeaf(root.id, idx, ep);
        if (!leaf) return;
        root.episodes.push(leaf);
        flatItems.push(leaf);
        nodeMap.set(leaf.id, leaf);
      });
      root.episodes.sort(compareLeafs);
      roots.push(root);
      return roots;
    }

    for (const key of Object.keys(libObj || {})) {
      const node = {
        id: key,
        key,
        type: 'group',
        kind: 'video-folder',
        children: [],
        episodes: [],
        parentKey: null,
        rawValue: libObj[key]
      };
      nodes.set(key, node);
      nodeMap.set(key, node);
    }

    for (const [key, node] of nodes) {
      const value = node.rawValue;
      if (!Array.isArray(value)) continue;

      const hasEpisodes = value.some(item => item && typeof item === 'object' && (item.file || item.url || item.video));
      if (hasEpisodes) {
        node.kind = 'video-season';
        value.forEach((ep, idx) => {
          if (!ep || typeof ep !== 'object') return;
          const leaf = makeVideoLeaf(key, idx, ep);
          if (!leaf) return;
          node.episodes.push(leaf);
          flatItems.push(leaf);
          nodeMap.set(leaf.id, leaf);
        });
        node.episodes.sort(compareLeafs);
      } else {
        value.forEach(refKey => {
          if (typeof refKey === 'string' && nodes.has(refKey)) {
            referenced.add(refKey);
            const child = nodes.get(refKey);
            child.parentKey = key;
            node.children.push(child);
          }
        });
      }
    }

    for (const [key, node] of nodes) {
      if (!referenced.has(key)) roots.push(node);
      if (Array.isArray(node.children)) node.children.sort(compareNodes);
      if (Array.isArray(node.episodes)) node.episodes.sort(compareLeafs);
    }
    roots.sort((a, b) => String(a.key || '').localeCompare(String(b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
    return roots;
  }

  function buildMusicLibrary(raw) {
    flatItems = [];
    nodeMap = new Map();
    const roots = [];
    const groups = new Map();
    const list = Array.isArray(raw) ? raw : [];
    const genreMap = window.musicLibraryGenreMap || {};

    list.forEach((entry, idx) => {
      const parsed = parseMusicEntry(entry);
      const groupLabel = parsed.code ? `${parsed.code} • ${genreMap[parsed.code] || parsed.code}` : 'Unsorted';
      const artistCandidates = buildArtistArtCandidates(parsed.artist || parsed.title || parsed.base);
      const item = {
        id: `music:item:${idx}`,
        key: parsed.title || parsed.base || `Track ${idx + 1}`,
        type: 'leaf',
        kind: 'music-track',
        displayName: parsed.title || parsed.base || `Track ${idx + 1}`,
        artist: parsed.artist || '',
        genreCode: parsed.code || '',
        genreName: parsed.code ? (genreMap[parsed.code] || parsed.code) : 'Unsorted',
        primaryLabel: 'Track',
        secondaryLabel: 'Art',
        primaryUrl: '',
        secondaryUrl: '',
        primaryCandidates: buildTrackCandidates(parsed.base || parsed.title || entry, entry),
        secondaryCandidates: artistCandidates,
        primaryStatus: STATUS.UNCHECKED,
        secondaryStatus: artistCandidates.length ? STATUS.UNCHECKED : STATUS.NA,
        repairable: false,
        hasSecondary: artistCandidates.length > 0,
        parentKey: groupLabel
      };
      if (!groups.has(groupLabel)) {
        const group = {
          id: `music:group:${groupLabel}`,
          key: groupLabel,
          type: 'group',
          kind: 'music-group',
          children: [],
          episodes: [],
          parentKey: null
        };
        groups.set(groupLabel, group);
        nodeMap.set(group.id, group);
      }
      const group = groups.get(groupLabel);
      group.children.push(item);
      flatItems.push(item);
      nodeMap.set(item.id, item);
    });

    roots.push(...groups.values());
    roots.sort((a, b) => String(a.key || '').localeCompare(String(b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
    roots.forEach(group => group.children.sort(compareLeafs));
    return roots;
  }

  function normalizeGameTitle(name) {
    const raw = String(name ?? '').trim();
    if (!raw) return { title: 'Untitled Game', platform: 'Other' };
    const parts = raw.split(',');
    if (parts.length > 1) {
      const platform = parts.pop().trim() || 'Other';
      const title = parts.join(',').trim() || raw;
      return { title, platform };
    }
    return { title: raw, platform: 'Other' };
  }

  function getGamePlatform(game, fallback = 'Other') {
    if (!game || typeof game !== 'object') return fallback;
    const explicit = String(game.console || '').trim();
    if (explicit) return explicit;
    return normalizeGameTitle(game.name).platform || fallback;
  }

  function getGameBaseTitle(game, fallback = '') {
    if (!game || typeof game !== 'object') return fallback || 'Game';
    const explicit = String(game.baseName || game.title || '').trim();
    if (explicit) return explicit;
    return normalizeGameTitle(game.name).title || fallback || 'Game';
  }

  function getGameDiskNumber(disk, fallbackIndex = 1) {
    if (!disk || typeof disk !== 'object') return fallbackIndex;
    const raw = disk.disk ?? disk.disc ?? disk.number ?? disk.index ?? disk.part ?? fallbackIndex;
    const parsed = Number.parseInt(raw, 10);
    return Number.isFinite(parsed) && parsed > 0 ? parsed : fallbackIndex;
  }

  function getGameDiskLabel(disk, fallbackIndex = 1) {
    if (disk && typeof disk === 'object') {
      const explicit = String(disk.title || disk.name || disk.label || '').trim();
      if (explicit) return explicit;
    }
    return `Disk ${getGameDiskNumber(disk, fallbackIndex)}`;
  }

  function makeGameLeaf(nodeId, game, title, platform, romLink, imgLink, sourceOrder) {
    const romCandidates = buildGameRomCandidates(romLink || '');
    const imgCandidates = buildGameImageCandidates(imgLink || '');
    const primaryUrl = romCandidates[0] || String(romLink || '');
    const secondaryUrl = imgCandidates[0] || String(imgLink || '');
    return {
      id: `${nodeId}:leaf`,
      key: title,
      type: 'leaf',
      kind: 'game-item',
      displayName: title,
      platform: platform || 'Other',
      primaryLabel: 'ROM',
      secondaryLabel: 'Icon',
      primaryUrl,
      secondaryUrl,
      primaryCandidates: romCandidates.length ? romCandidates : [String(romLink || '')].filter(Boolean),
      secondaryCandidates: imgCandidates.length ? imgCandidates : [String(imgLink || '')].filter(Boolean),
      primaryStatus: STATUS.UNCHECKED,
      secondaryStatus: (imgCandidates.length || imgLink) ? STATUS.UNCHECKED : STATUS.NA,
      repairable: false,
      hasSecondary: imgCandidates.length > 0,
      parentKey: nodeId,
      sourceOrder: Number.isFinite(sourceOrder) ? sourceOrder : undefined
    };
  }

  function makeGameTitleGroup(game, idx) {
    const baseTitle = getGameBaseTitle(game, `Game ${idx + 1}`);
    const platform = getGamePlatform(game);
    return {
      id: `games:title:${idx}`,
      key: baseTitle,
      type: 'group',
      kind: 'games-group',
      children: [],
      episodes: [],
      parentKey: null,
      displayName: String(game.name || baseTitle).trim(),
      platform,
      baseTitle,
      sourceOrder: idx
    };
  }

  function buildGamesLibrary(raw) {
    flatItems = [];
    nodeMap = new Map();
    const roots = [];
    const groups = new Map();
    const list = Array.isArray(raw) ? raw : [];

    list.forEach((game, idx) => {
      if (!game || typeof game !== 'object') return;

      const platform = getGamePlatform(game);
      if (!groups.has(platform)) {
        const group = {
          id: `games:group:${platform}`,
          key: platform,
          type: 'group',
          kind: 'games-group',
          children: [],
          episodes: [],
          parentKey: null,
          displayName: platform
        };
        groups.set(platform, group);
        nodeMap.set(group.id, group);
      }

      const platformGroup = groups.get(platform);
      const disks = Array.isArray(game.disks) ? game.disks.filter(d => d && typeof d === 'object') : [];
      const wantsDiskChildren = String(game.specialSet || '').toLowerCase() === 'multidisk' || disks.length > 1;

      if (wantsDiskChildren) {
        const titleGroup = makeGameTitleGroup(game, idx);
        titleGroup.parentKey = platformGroup.id;
        nodeMap.set(titleGroup.id, titleGroup);

        disks.forEach((disk, diskIdx) => {
          const diskNumber = getGameDiskNumber(disk, diskIdx + 1);
          const diskLabel = getGameDiskLabel(disk, diskIdx + 1);
          const leaf = makeGameLeaf(
            titleGroup.id,
            game,
            diskLabel,
            platform,
            disk.link || game.link || '',
            disk.img || game.img || '',
            Number.isFinite(diskNumber) ? diskNumber : diskIdx + 1
          );
          if (!leaf) return;
          titleGroup.children.push(leaf);
          flatItems.push(leaf);
          nodeMap.set(leaf.id, leaf);
        });

        if (titleGroup.children.length) {
          titleGroup.children.sort(compareLeafs);
          platformGroup.children.push(titleGroup);
        } else {
          const leaf = makeGameLeaf(
            platformGroup.id,
            game,
            titleGroup.baseTitle || titleGroup.displayName,
            platform,
            game.link || '',
            game.img || '',
            idx
          );
          if (leaf) {
            platformGroup.children.push(leaf);
            flatItems.push(leaf);
            nodeMap.set(leaf.id, leaf);
          }
        }
      } else {
        const leaf = makeGameLeaf(
          platformGroup.id,
          game,
          getGameBaseTitle(game, game.name || `Game ${idx + 1}`),
          platform,
          game.link || '',
          game.img || '',
          idx
        );
        if (leaf) {
          platformGroup.children.push(leaf);
          flatItems.push(leaf);
          nodeMap.set(leaf.id, leaf);
        }
      }
    });

    roots.push(...groups.values());
    roots.sort((a, b) => String(a.key || '').localeCompare(String(b.key || ''), undefined, { numeric: true, sensitivity: 'base' }));
    roots.forEach(group => group.children.sort((a, b) => {
      if (a?.type === 'leaf' && b?.type === 'leaf') return compareLeafs(a, b);
      if (a?.type === 'leaf') return 1;
      if (b?.type === 'leaf') return -1;
      return compareNodes(a, b);
    }));
    return roots;
  }

  function compareLeafs(a, b) {
    const fileNameFromUrl = (value) => {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        const withoutQuery = raw.split('?')[0].split('#')[0];
        const lastPart = withoutQuery.split('/').filter(Boolean).pop() || withoutQuery;
        return decodeURIComponent(lastPart);
      } catch (e) {
        return raw.split('/').filter(Boolean).pop() || raw;
      }
    };

    const sortValue = (node) => {
      const fileName = fileNameFromUrl(node?.primaryUrl || node?.secondaryUrl || '');
      if (fileName) return fileName;
      return String(node?.displayName || node?.key || '');
    };

    const aValue = sortValue(a);
    const bValue = sortValue(b);

    const numA = (aValue.match(/\d+/g) || []).pop();
    const numB = (bValue.match(/\d+/g) || []).pop();
    if (numA != null || numB != null) {
      const aNum = numA == null ? Number.POSITIVE_INFINITY : Number.parseInt(numA, 10);
      const bNum = numB == null ? Number.POSITIVE_INFINITY : Number.parseInt(numB, 10);
      if (aNum !== bNum) return aNum - bNum;
    }

    const aSource = Number.isFinite(a?.sourceOrder) ? a.sourceOrder : Number.POSITIVE_INFINITY;
    const bSource = Number.isFinite(b?.sourceOrder) ? b.sourceOrder : Number.POSITIVE_INFINITY;
    if (aSource !== bSource) return aSource - bSource;

    return aValue.localeCompare(bValue, undefined, {
      numeric: true,
      sensitivity: 'base'
    });
  }

  function compareNodes(a, b) {
    return String(a.displayName || a.key || '').localeCompare(String(b.displayName || b.key || ''), undefined, {
      numeric: true,
      sensitivity: 'base'
    });
  }

  function getUploadTarget(node, which) {
    if (!node) return '';
    if (which === 'primary') {
      return (node.primaryCandidates && node.primaryCandidates[0]) || node.primaryUrl || '';
    }
    return (node.secondaryCandidates && node.secondaryCandidates[0]) || node.secondaryUrl || '';
  }

  function getUploadAccept(node, which) {
    if (activeKey === 'video') {
      return which === 'primary' ? VIDEO_EXTS.join(',') : SUB_EXTS.join(',');
    }
    if (activeKey === 'music') {
      return which === 'primary' ? AUDIO_EXTS.join(',') : IMAGE_EXTS.join(',');
    }
    if (activeKey === 'books') {
      return which === 'primary' ? BOOK_FILE_EXTS.join(',') : IMAGE_EXTS.join(',');
    }
    return which === 'primary' ? '.zip,.iso,.bin,.chd,.pbp,.z64,.n64,.gba,.gb,.gbc,.nds,.sfc,.smc,.smd,.md' : IMAGE_EXTS.join(',');
  }

  function statusChipHtml(node, which) {
    const status = which === 'primary' ? node.primaryStatus : node.secondaryStatus;
    const label = which === 'primary' ? activeConfig.primaryLabel : activeConfig.secondaryLabel;
    const symbol = which === 'primary' ? activeConfig.icon : (activeKey === 'video' ? '📝' : '🖼️');

    if (status === STATUS.EXISTS) {
      return `<span class="badge ok">${escapeHtml(label)} ✓</span>`;
    }
    if (status === STATUS.CHECKING) {
      return `<span class="badge" style="color:#60a5fa">${escapeHtml(label)} ⏳</span>`;
    }
    if (status === STATUS.ERROR || status === STATUS.MISSING) {
      const target = getUploadTarget(node, which);
      if (target) {
        return `<button type="button" class="badge danger status-button" data-action="upload-${which}" data-node-id="${escapeHtml(node.id)}" title="Click to upload ${escapeHtml(label.toLowerCase())}">${escapeHtml(label)} ✖</button>`;
      }
      return `<span class="badge danger">${escapeHtml(label)} ✖</span>`;
    }
    return `<span class="badge muted">${escapeHtml(label)} ○</span>`;
  }

  function leafStatsHtml(node) {
    let html = `<span class="ep-status">`;
    html += `<span>${statusChipHtml(node, 'primary')}</span>`;
    if (node.hasSecondary || node.secondaryStatus !== STATUS.NA) {
      html += `<span>${statusChipHtml(node, 'secondary')}</span>`;
    }
    if (node.genreName) {
      html += `<span class="badge muted">${escapeHtml(node.genreName)}</span>`;
    }
    if (node.platform) {
      html += `<span class="badge muted">${escapeHtml(node.platform)}</span>`;
    }
    if (node.artist && activeKey === 'music') {
      html += `<span class="badge muted">${escapeHtml(node.artist)}</span>`;
    }
    html += `</span>`;
    return html;
  }


function leafActionsHtml(node) {
  const secondaryIcon = activeKey === 'video' ? '📝' : '🖼️';
  let html = `<button class="btn btn-small" data-action="scan-leaf-primary" data-node-id="${escapeHtml(node.id)}" title="Check ${escapeHtml(activeConfig.primaryVerb)}">${activeConfig.icon}</button>`;
  if (node.secondaryCandidates && node.secondaryCandidates.length) {
    if (isSubtitleBatchLeaf(node) && subtitleBatchMode && subtitleBatchSelected.size) {
      const checked = subtitleBatchSelected.has(node.id);
      html += `<label class="repair-batch-toggle${checked ? ' is-done' : ''}" title="${checked ? 'Selected' : 'Select for subtitle generation'}"><input type="checkbox" data-action="subtitle-batch-toggle" data-node-id="${escapeHtml(node.id)}" ${checked ? 'checked' : ''}><span>${checked ? '✅' : '📝'}</span></label>`;
    } else if (node.subtitleBatchState === 'done') {
      html += `<span class="repair-batch-status done">✅</span>`;
    } else if (node.subtitleBatchState === 'failed') {
      html += `<span class="repair-batch-status failed">❌</span>`;
    } else {
      html += `<button class="btn btn-small btn-warn" data-action="scan-leaf-secondary" data-node-id="${escapeHtml(node.id)}" title="Check ${escapeHtml(activeConfig.secondaryVerb)}">${secondaryIcon}</button>`;
    }
  }
  if (node.repairable && activeConfig.showRepair) {
    if (repairBatchMode && repairBatchSelected.size) {
      const checked = repairBatchSelected.has(node.id);
      const done = node.repairBatchState === 'done';
      html += `<label class="repair-batch-toggle${done ? ' is-done' : ''}" title="${done ? 'Finished' : 'Select for batch repair'}"><input type="checkbox" data-action="repair-batch-toggle" data-node-id="${escapeHtml(node.id)}" ${checked ? 'checked' : ''} ${done ? 'disabled' : ''}><span>${done ? '✅' : 'ffmpeg'}</span></label>`;
    } else if (node.repairBatchState === 'done') {
      html += `<span class="repair-batch-status done">✅</span>`;
    } else if (node.repairBatchState === 'failed') {
      html += `<span class="repair-batch-status failed">❌</span>`;
    } else {
      html += `<button class="btn btn-small btn-primary" data-action="repair-leaf" data-node-id="${escapeHtml(node.id)}" title="Repair with ffmpeg">🛠️</button>`;
    }
  }
  return html;
}

function groupActionsHtml(node) {
  const counts = countNodeIssues(node);
  if (!counts.total) return '';
  let html = `<span class="node-actions">`;
  html += `<button class="btn btn-small" data-action="scan-group-primary" data-node-id="${escapeHtml(node.id)}" title="Scan ${escapeHtml(activeConfig.primaryLabel.toLowerCase())}">${activeConfig.icon}</button>`;
  if (supportsSecondaryScan()) {
    const secondaryIcon = activeKey === 'video' ? '📝' : '🖼️';
    html += `<button class="btn btn-small btn-warn" data-action="scan-group-secondary" data-node-id="${escapeHtml(node.id)}" title="Scan ${escapeHtml(activeConfig.secondaryLabel.toLowerCase())}">${secondaryIcon}</button>`;
  }
  if (activeConfig.showRepair && collectRepairableLeavesUnderNode(node).length) {
    html += `<button class="btn btn-small btn-primary" data-action="repair-group" data-node-id="${escapeHtml(node.id)}" title="Repair all in this group">🛠️</button>`;
  }
  html += `</span>`;
  return html;
}

function renderLeaf(node) {

    const title = escapeHtml(safeDecode(node.displayName || node.key || ''));
    const subtitle = escapeHtml(
      safeDecode(activeKey === 'music'
        ? (node.artist || node.genreName || '')
        : (node.platform || node.key || ''))
    );
    const fileName = activeKey === 'video'
      ? escapeHtml(safeDecode((node.primaryUrl || '').split('/').pop() || node.displayName || node.key || ''))
      : title;

    return `
      <div class="episode-row">
        <span class="ep-name" title="${title}">
          <span class="ep-file-name">${activeConfig.icon} ${fileName}</span>
          <span class="ep-episode-title">${subtitle}</span>
        </span>
        ${leafStatsHtml(node)}
        <div class="ep-actions">
          ${leafActionsHtml(node)}
        </div>
      </div>
    `;
  }

  function normalizeSearchText(value) {
    return String(value ?? '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
  }

  function buildSearchBlob(node) {
    const parts = [
      node.displayName,
      node.key,
      node.primaryUrl,
      node.secondaryUrl,
      node.genreName,
      node.genreCode,
      node.platform,
      node.artist,
      node.groupLabel,
      node.category,
      node.parentKey,
      node.fileName
    ].filter(Boolean);
    return parts.map(normalizeSearchText).join(' ');
  }

  function matchesSearch(node, term) {
    if (!term) return true;
    const normalizedTerm = normalizeSearchText(term);
    if (!normalizedTerm) return true;

    const tokens = normalizedTerm.split(/\s+/).filter(Boolean);
    if (!tokens.length) return true;

    const blob = buildSearchBlob(node);
    const compactBlob = blob.replace(/\s+/g, '');
    return tokens.every(token => blob.includes(token) || compactBlob.includes(token));
  }

  function countVisibleLeaves(node, term, ancestorMatched = false) {
    if (!node) return 0;
    const selfMatched = !term || ancestorMatched || matchesSearch(node, term);
    if (!selfMatched) return 0;
    if (node.type === 'leaf') return 1;
    const nextAncestorMatched = ancestorMatched || matchesSearch(node, term);
    return [...(node.children || []), ...(node.episodes || [])]
      .reduce((sum, child) => sum + countVisibleLeaves(child, term, nextAncestorMatched), 0);
  }

  function renderGroup(node, term, ancestorMatched = false) {
    const selfMatched = !term || ancestorMatched || matchesSearch(node, term);
    if (!selfMatched) return '';

    const isExpanded = expandedNodes.has(node.id);
    const hasKids = (node.children && node.children.length) || (node.episodes && node.episodes.length);
    const counts = countNodeIssues(node);
    const icon = node.kind === 'games-group'
      ? '🎮'
      : node.kind === 'music-group'
        ? '🎵'
        : node.kind === 'books-group' || node.kind === 'books-subgroup' || node.kind === 'books-root'
          ? '📚'
          : (activeKey === 'video' ? '📺' : '📁');

    const kids = [...(node.children || []), ...(node.episodes || [])].sort((a, b) => {
      if (a?.type === 'leaf' && b?.type === 'leaf') return compareLeafs(a, b);
      if (a?.type === 'leaf') return 1;
      if (b?.type === 'leaf') return -1;
      return compareNodes(a, b);
    });

    const nextAncestorMatched = ancestorMatched || matchesSearch(node, term);
    const childrenHtml = isExpanded ? kids.map(child => renderNode(child, term, nextAncestorMatched)).join('') : '';
    const statsHtml = counts.total > 0 ? `
      <span class="node-stats">
        <span title="${escapeHtml(activeConfig.primaryLabel)} missing" style="color:${counts.primaryMissing ? 'var(--danger)' : 'var(--muted)'}">${escapeHtml(activeConfig.primaryLabel)} ${counts.primaryMissing}</span>
        ${supportsSecondaryScan() ? `<span title="${escapeHtml(activeConfig.secondaryLabel)} missing" style="color:${counts.secondaryMissing ? 'var(--warn)' : 'var(--muted)'}">${escapeHtml(activeConfig.secondaryLabel)} ${counts.secondaryMissing}</span>` : ''}
        <span class="badge muted">${counts.total}</span>
      </span>
    ` : '';

    return `
      <div class="node" data-id="${escapeHtml(node.id)}">
        <div class="node-header" data-node-id="${escapeHtml(node.id)}">
          <span class="toggle">${hasKids ? (isExpanded ? '▼' : '▶') : '○'}</span>
          <span class="node-icon">${icon}</span>
          <span class="node-title">${escapeHtml(node.key)}</span>
          ${groupActionsHtml(node)}
          ${statsHtml}
        </div>
        ${childrenHtml ? `<div class="children">${childrenHtml}</div>` : ''}
      </div>
    `;
  }

  function renderNode(node, term, ancestorMatched = false) {
    const searchTerm = term ?? els.search.value.trim();
    const selfMatched = !searchTerm || ancestorMatched || matchesSearch(node, searchTerm);
    if (!selfMatched) return '';
    if (node.type === 'leaf') return renderLeaf(node);
    return renderGroup(node, searchTerm, ancestorMatched);
  }

  function renderTree() {
    const term = els.search.value.trim();
    const visibleRoots = hierarchyRoots.filter(root => matchesSearch(root, term) || !term || countVisibleLeaves(root, term) > 0);
    els.tree.innerHTML = visibleRoots.map(root => renderNode(root, term, false)).join('') || '<div class="empty-message">No matching items</div>';
    els.visibleCount.textContent = `${hierarchyRoots.reduce((sum, root) => sum + countVisibleLeaves(root, term), 0)} items shown`;
    updateActionVisibility();
  }

  function countNodeIssues(node) {
    if (!node) return { primaryMissing: 0, secondaryMissing: 0, total: 0 };
    if (node.type === 'leaf') {
      return {
        primaryMissing: (node.primaryStatus === STATUS.MISSING || node.primaryStatus === STATUS.ERROR) ? 1 : 0,
        secondaryMissing: ((node.secondaryStatus === STATUS.MISSING || node.secondaryStatus === STATUS.ERROR) && node.secondaryStatus !== STATUS.NA) ? 1 : 0,
        total: 1
      };
    }
    let primaryMissing = 0;
    let secondaryMissing = 0;
    let total = 0;
    for (const child of [...(node.children || []), ...(node.episodes || [])]) {
      const counts = countNodeIssues(child);
      primaryMissing += counts.primaryMissing;
      secondaryMissing += counts.secondaryMissing;
      total += counts.total;
    }
    return { primaryMissing, secondaryMissing, total };
  }

  async function checkUrlExists(url) {
    if (!url) return false;
    try {
      let res = await fetch(url, { method: 'HEAD', cache: 'no-store', mode: 'cors' });
      if (res.ok || res.status === 204 || res.status === 206) return true;
      if (res.status === 405 || res.status === 501) {
        res = await fetch(url, { headers: { Range: 'bytes=0-0' }, cache: 'no-store', mode: 'cors' });
        return res.ok || res.status === 206 || res.status === 416;
      }
      return false;
    } catch {
      try {
        const res = await fetch(url, { headers: { Range: 'bytes=0-0' }, cache: 'no-store', mode: 'cors' });
        return res.ok || res.status === 206 || res.status === 416;
      } catch {
        return false;
      }
    }
  }

  async function checkFirstExistingUrl(urls) {
    for (const url of urls || []) {
      if (await checkUrlExists(url)) return url;
    }
    return '';
  }

  async function scanLeaf(item, scanPrimary, scanSecondary) {
    if (scanPrimary && item.primaryStatus === STATUS.UNCHECKED) {
      item.primaryStatus = STATUS.CHECKING;
      renderTree();
      const found = item.primaryCandidates && item.primaryCandidates.length > 1
        ? await checkFirstExistingUrl(item.primaryCandidates)
        : (await checkUrlExists(item.primaryCandidates && item.primaryCandidates[0] ? item.primaryCandidates[0] : item.primaryUrl) ? (item.primaryCandidates && item.primaryCandidates[0] ? item.primaryCandidates[0] : item.primaryUrl) : '');
      item.primaryStatus = found ? STATUS.EXISTS : STATUS.MISSING;
      if (found) item.primaryUrl = found;
    }

    if (scanSecondary && item.secondaryCandidates && item.secondaryCandidates.length && item.secondaryStatus === STATUS.UNCHECKED) {
      item.secondaryStatus = STATUS.CHECKING;
      renderTree();
      const found = item.secondaryCandidates.length > 1
        ? await checkFirstExistingUrl(item.secondaryCandidates)
        : (await checkUrlExists(item.secondaryCandidates[0] || item.secondaryUrl) ? (item.secondaryCandidates[0] || item.secondaryUrl) : '');
      item.secondaryStatus = found ? STATUS.EXISTS : STATUS.MISSING;
      if (found) item.secondaryUrl = found;
    }

    renderTree();
    updateStats();
  }

  function collectLeavesUnderNode(node) {
    if (!node) return [];
    if (node.type === 'leaf') return [node];
    let out = [];
    if (Array.isArray(node.children)) {
      for (const child of node.children) out = out.concat(collectLeavesUnderNode(child));
    }
    if (Array.isArray(node.episodes)) {
      for (const ep of node.episodes) out = out.concat(collectLeavesUnderNode(ep));
    }
    return out;
  }

  function startScan(nodes, scanPrimary, scanSecondary, force = false) {
    const leaves = nodes.flatMap(collectLeavesUnderNode);
    if (!leaves.length) return;

    if (force) {
      leaves.forEach(item => {
        if (scanPrimary) item.primaryStatus = STATUS.UNCHECKED;
        if (scanSecondary && item.secondaryCandidates && item.secondaryCandidates.length) item.secondaryStatus = STATUS.UNCHECKED;
      });
    }

    const queue = leaves.filter(item => {
      const p = scanPrimary && item.primaryStatus === STATUS.UNCHECKED;
      const s = scanSecondary && item.secondaryCandidates && item.secondaryCandidates.length && item.secondaryStatus === STATUS.UNCHECKED;
      return p || s;
    });

    if (!queue.length) {
      setStatus('✨ No files to scan (everything already checked).');
      return;
    }

    scanQueue = queue.map(node => ({ node, scanPrimary, scanSecondary }));
    scanIndex = 0;
    scanning = true;
    paused = false;
    currentScanType = [scanPrimary ? activeConfig.primaryVerb : null, scanSecondary ? activeConfig.secondaryVerb : null].filter(Boolean).join(' + ');
    els.pauseBtn.disabled = false;
    els.stopBtn.disabled = false;
    els.pauseBtn.textContent = '⏸️ Pause';
    els.scanPrimaryBtn.disabled = true;
    els.scanSecondaryBtn.disabled = true;
    setStatus(`Scanning ${scanQueue.length} ${currentScanType}…`);
    updateProgress();

    activeWorkers = Array(Math.min(CONCURRENCY, Math.max(1, scanQueue.length))).fill(0).map(() => processScanQueue());
    Promise.all(activeWorkers).then(finishScan);
  }

  async function processScanQueue() {
    while (scanIndex < scanQueue.length) {
      if (paused) {
        await new Promise(resolve => {
          const tick = () => paused ? setTimeout(tick, 100) : resolve();
          tick();
        });
      }
      const item = scanQueue[scanIndex++];
      await scanLeaf(item.node, item.scanPrimary, item.scanSecondary);
      updateProgress();
    }
  }

  function finishScan() {
    scanning = false;
    paused = false;
    els.pauseBtn.disabled = true;
    els.stopBtn.disabled = true;
    els.scanPrimaryBtn.disabled = false;
    els.scanSecondaryBtn.disabled = false;
    setStatus('✅ Scan complete.');
    updateProgress();
    renderTree();
    updateStats();
  }

  function pauseScan() {
    paused = true;
    els.pauseBtn.textContent = '▶️ Resume';
    setStatus(`⏸️ Paused – ${scanIndex} / ${scanQueue.length} completed`);
  }

  function resumeScan() {
    paused = false;
    els.pauseBtn.textContent = '⏸️ Pause';
    setStatus(`Scanning ${scanQueue.length} ${currentScanType}…`);

  function stopScan() {

    scanning = false;
    paused = false;

    clearSubtitleBatchState();

    els.stopBtn.disabled = true;
    els.scanPrimaryBtn.disabled = false;

  }

  function updateStats() {

    const secondaryMissing = flatItems.filter(item => item.secondaryCandidates && item.secondaryCandidates.length && (item.secondaryStatus === STATUS.MISSING || item.secondaryStatus === STATUS.ERROR)).length;
    const checked = flatItems.filter(item => item.primaryStatus !== STATUS.UNCHECKED || item.secondaryStatus !== STATUS.UNCHECKED).length;

    els.total.textContent = total;
    els.missingPrimary.textContent = primaryMissing;
    els.missingSecondary.textContent = secondaryMissing;
    setProgressDisplay(checked, total);
  }

  function updateProgress() {

  function refreshMissingSubtitleModalIfOpen() {

  function getMissingDisplayName(item, isPrimary) {
  // For primary missing (videos/ROMs/tracks), use primaryUrl
  // For secondary missing (subtitles/art/icons), use secondaryUrl
  const url = isPrimary ? (item.primaryUrl || '') : (item.secondaryUrl || '');
  if (url) {
    try {
      let filename = url.split('/').pop() || '';
      filename = filename.split('?')[0].split('#')[0];
      if (filename) return decodeURIComponent(filename);
    } catch {}
  }
  return item.displayName || item.key || 'Untitled';
}

function renderMissingSubtitleModal(missing) {
  const selectedCount = subtitleBatchMode ? subtitleBatchSelected.size : 0;

  const grouped = {};
  missing.forEach(item => {

  });

  html += '  <div class="missing-modal-toolbar-row">';

    html += '  <div class="missing-modal-toolbar-row">';

  }
  html += '</div>';

  html += '</div>';

  Object.keys(grouped).sort().forEach(group => {
    const items = grouped[group].slice().sort((a, b) => {
      const aName = getMissingDisplayName(a, false);
      const bName = getMissingDisplayName(b, false);
      return aName.localeCompare(bName, undefined, { numeric: true, sensitivity: 'base' });
    });
    html += `<div class="missing-group"><div class="missing-group-title">${escapeHtml(group)} (${items.length})</div>`;
    items.forEach(item => {
      const display = getMissingDisplayName(item, false);

        <div class="missing-sub-row${selected ? ' selected' : ''}" data-action="missing-subtitle-open" data-node-id="${escapeHtml(item.id)}">

              <input type="checkbox" ${selected ? 'checked' : ''} aria-label="${escapeHtml(display)}">
              <span class="missing-sub-select-icon">${selected ? '✅' : '📝'}</span>
            </label>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  return html;
}

function showMissingModal(which) {
  const isPrimary = which === 'primary';

  const missing = flatItems.filter(item => isPrimary
    ? (item.primaryStatus === STATUS.MISSING || item.primaryStatus === STATUS.ERROR)

  window.addEventListener('message', async (event) => {
    if (event.origin !== window.location.origin) return;
    if (event.data?.type === 'lib-flow-complete') {
      try {
        await loadLibrary();
      } catch (err) {
        setStatus(`❌ Reload failed: ${err.message}`);
      } finally {
        hideAddContentModal();
      }
      return;
    }
    if (event.data?.type === 'repair-complete' || event.data?.type === 'repair-failed') {
      const subtitleFlow = !!subtitleBatchCurrent && !repairBatchCurrent;
      const currentNode = subtitleFlow ? subtitleBatchCurrent : repairBatchCurrent;
      const jobId = String(event.data?.jobId || currentNode?.id || '');

      const serverJobId = String(event.data?.serverJobId || '').trim();
      if (currentNode && jobId && currentNode.id !== jobId && currentNode.id !== serverJobId) return;

      if (currentNode) {

          finishSubtitleBatchJob(ok, detail, currentNode);

        }
      } else {

        if (subtitleFlow) {

    url.search = params.toString();
    return url.href;
  }

  function getEmbeddedFlowApi() {
    try {
      return els.addContentFrame?.contentWindow?.__lmFlowApi || window.__lmEmbedBridge || null;
    } catch (_) {
      return window.__lmEmbedBridge || null;
    }
  }

  function wireAddContentModalActions() {
    const slot = els.addContentModalActions;
    if (!slot || slot.dataset.flowWired === '1') return;
    slot.dataset.flowWired = '1';
    slot.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-embed-control]');
      if (!btn) return;
      const api = getEmbeddedFlowApi();
      if (!api) return;
      event.preventDefault();
      event.stopPropagation();
      const control = btn.dataset.embedControl;
      if (control === 'back') {
        api.back?.();
        return;
      }
      if (control === 'clear') {
        api.clear?.();
        return;
      }
      if (control === 'save') {
        api.save?.();
        return;
      }
      if (control === 'action') {
        const currentStep = api.currentStepKey?.() || '';
        if (currentStep === 'output') {
          api.applyAll?.();
        } else {
          api.next?.();
        }
        return;
      }
      if (control === 'addGenre') {
        api.addGenre?.();
        return;
      }
      if (control === 'refresh') {
        api.refresh?.();
        return;
      }
      if (control === 'download') {
        api.download?.();
        return;
      }
      if (control === 'publish') {
        api.save?.();
        return;
      }
    }, true);
  }

function getRepairFileName(node) {
  const raw = String(node?.primaryUrl || node?.secondaryUrl || node?.key || node?.displayName || 'Repair item').trim();
  if (!raw) return 'Repair item';
  try {
    const parsed = new URL(raw, window.location.href);
    const segment = parsed.pathname.split('/').pop() || '';
    return safeDecode(segment || parsed.pathname || raw);
  } catch {
    const segment = raw.split('/').pop() || raw;
    return safeDecode(segment);
  }
}


function isSubtitleBatchLeaf(node) {
