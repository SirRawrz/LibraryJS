function markSubtitleBatchResult(jobId, ok, detail = '') {
  if (!jobId) return;
  if (ok) {
    subtitleBatchCompleted.add(jobId);
    subtitleBatchFailed.delete(jobId);
  } else {
    subtitleBatchFailed.add(jobId);
  }
  const node = nodeMap.get(jobId);
  if (node) {
    node.subtitleBatchState = ok ? 'done' : 'failed';
    node.subtitleBatchDetail = detail || '';
    if (ok) {
      node.secondaryStatus = STATUS.EXISTS;
      node.secondaryUrl = node.secondaryCandidates?.[0] || node.secondaryUrl || '';
      subtitleBatchSelected.delete(jobId);
    }
  }
  updateStats();
  updateSubtitleBatchUi();
  renderTree();
  refreshMissingSubtitleModalIfOpen();
}

function finishSubtitleBatch() {
  const ran = subtitleBatchCompleted.size + subtitleBatchFailed.size;
  const failedNodes = [...subtitleBatchFailed].map(id => nodeMap.get(id)).filter(isSubtitleBatchLeaf);
  const failedNames = failedNodes.map(node => getRepairFileName(node)).filter(Boolean);
  const failureText = failedNames.length ? `; failed: ${failedNames.join(', ')}` : '; no failures';
  setStatus(`✅ Subtitle fetch complete: ${ran} ran${failureText}`);
  subtitleBatchCurrent = null;
  subtitleBatchQueue = [];
  subtitleBatchTotal = 0;
  updateStats();
  updateSubtitleBatchUi();
  renderTree();
  refreshMissingSubtitleModalIfOpen();

  if (failedNodes.length) {
    subtitleBatchMode = true;
    subtitleBatchSelected = new Set(failedNodes.map(node => node.id));
    updateSubtitleBatchUi();
    showMissingModal('secondary');
    return;
  }

  clearSubtitleBatchState();
  updateSubtitleBatchUi();
}

function runNextSubtitleBatchJob() {
  if (!subtitleBatchQueue.length) {

  const next = subtitleBatchQueue.shift();
  if (!next) {

    return;

}

function collectSelectedRepairQueue() {
  return [...repairBatchSelected].map(id => nodeMap.get(id)).filter(isRepairableLeaf);
}

function startRepairBatch(nodes) {
  const queue = (nodes || []).flatMap(collectRepairableLeavesUnderNode).filter(Boolean);
  if (!queue.length) {
    setStatus('✨ No repairable files found in that selection.');
    return;
  }
  repairBatchMode = true;
  repairBatchSelected = new Set(queue.map(node => node.id));
  repairBatchCompleted = new Set();
  repairBatchFailed = new Set();
  repairBatchQueue = queue.slice();
  repairBatchCurrent = null;
  repairBatchTotal = queue.length;
  updateRepairBatchUi();
  renderTree();
  runNextRepairBatchJob();
}

function startSelectedRepairBatch() {
  const queue = collectSelectedRepairQueue();
  if (!queue.length) {
    setStatus('✨ Select at least one repairable item first.');
    return;
  }
  repairBatchMode = true;
  repairBatchSelected = new Set(queue.map(node => node.id));
  repairBatchQueue = queue.slice();
  repairBatchCompleted = new Set();
  repairBatchFailed = new Set();
  repairBatchCurrent = null;
  repairBatchTotal = queue.length;
  updateRepairBatchUi();
  renderTree();
  runNextRepairBatchJob();
}

function markRepairBatchResult(jobId, ok, detail = '') {
  if (!jobId) return;
  if (ok) {
    repairBatchCompleted.add(jobId);
    repairBatchFailed.delete(jobId);
  } else {
    repairBatchFailed.add(jobId);
  }
  const node = nodeMap.get(jobId);
  if (node) {
    node.repairBatchState = ok ? 'done' : 'failed';
    node.repairBatchDetail = detail || '';
  }
  updateRepairBatchUi();
  renderTree();
}

function finishRepairBatch() {
  const ran = repairBatchCompleted.size + repairBatchFailed.size;
  const failedNames = [...repairBatchFailed].map(id => getRepairFileName(nodeMap.get(id))).filter(Boolean);
  const failureText = failedNames.length ? `; failed: ${failedNames.join(', ')}` : '; no failures';
  setStatus(`✅ Batch repair complete: ${ran} ran with ffmpeg${failureText}`);
  repairBatchCurrent = null;
  repairBatchQueue = [];
  repairBatchMode = false;
  repairBatchSelected = new Set();
  repairBatchTotal = 0;
  updateRepairBatchUi();
  renderTree();
}

function runNextRepairBatchJob() {
  if (!repairBatchQueue.length) {
    finishRepairBatch();
    return;
  }
  const next = repairBatchQueue.shift();
  if (!next) {
    finishRepairBatch();
    return;
  }
  repairBatchCurrent = next;
  updateRepairBatchUi();
  openRepairModal(next, { batch: true });
}

function closeRepairIfNeeded() {
  hideRepairModal();
}

function buildopensubtitlesPageUrl(ep) {
  const sourceUrl = String(ep?.primaryUrl || '').trim();
  const safeSource = sourceUrl ? safeFileUrl(sourceUrl, window.location.href) : '';
  const folderUrl = safeSource ? new URL('.', safeSource).href : '';
  const baseName = safeSource
    ? safeDecode(new URL(safeSource).pathname.split('/').pop() || '')
    : safeDecode(String(ep?.displayName || ep?.key || 'subtitle'));
  const outputName = `${baseName.replace(/\.[^.]+$/, '') || 'subtitle'}.vtt`;
  const uploadUrl = folderUrl ? new URL(encodeURIComponent(outputName), folderUrl).href : '';
  const seriesHint = (() => {
    try {
      if (typeof getGroupPath === 'function') {
        const path = String(getGroupPath(ep) || '').trim();
        if (path) return path;
      }
    } catch (e) {}
    const parts = [];
    let parent = ep && ep.parentKey && nodeMap && typeof nodeMap.get === 'function' ? nodeMap.get(ep.parentKey) : null;
    while (parent) {
      const label = String(parent.displayName || parent.key || '').trim();
      if (label) parts.unshift(label);
      parent = parent.parentKey && nodeMap && typeof nodeMap.get === 'function' ? nodeMap.get(parent.parentKey) : null;
    }
    return parts.join(' › ');
  })();
  const episodeTitle = safeDecode(String(ep?.displayName || ep?.key || 'subtitle'));
  const search = [seriesHint, episodeTitle, baseName].filter(Boolean).join(' ').trim();
  const parsedMatch = baseName.match(/\bS(\d{1,2})\s*E?(\d{1,3})\b/i) || baseName.match(/\b(\d{1,2})x(\d{1,3})\b/i);
  const season = parsedMatch ? Number.parseInt(parsedMatch[1], 10) : '';
  const episode = parsedMatch ? Number.parseInt(parsedMatch[2], 10) : '';
  const params = new URLSearchParams({
    source: safeSource || sourceUrl,
    name: outputName,
    folder: folderUrl,
    upload: uploadUrl,
    language: 'en',
    provider: '',
    mode: 'fetch',
    flow: '1',
    auto: '1',
    close: '1',
    proxy: '1',
    jobId: String(ep?.id || ''),
    series: seriesHint,
    show: seriesHint,
    librarySeries: seriesHint,
    title: episodeTitle,
    episodeTitle,
    libraryTitle: episodeTitle || baseName,
    search
  });
  if (Number.isFinite(season)) params.set('season', String(season));
  if (Number.isFinite(episode)) params.set('episode', String(episode));
  return `/opensubtitles-subtitles.html?${params.toString()}`;
}

function toggleWheel(force) {

    const open = typeof force === 'boolean' ? force : !els.libraryWheel.classList.contains('open');
    els.libraryWheel.classList.toggle('open', open);
    els.libraryWheel.setAttribute('aria-hidden', String(!open));
  }

  function getGroupPath(node) {
    const parts = [];
    let parent = nodeMap.get(node.parentKey);
    while (parent) {
      parts.unshift(parent.key);
      parent = nodeMap.get(parent.parentKey);
    }
    return parts.length ? parts.join(' › ') : (activeConfig.label || 'Library');
  }

  function expandAll() {
    const allIds = new Set();
    const walk = node => {
      allIds.add(node.id);
      if (node.children) node.children.forEach(walk);
      if (node.episodes) node.episodes.forEach(walk);
    };
    hierarchyRoots.forEach(walk);
    expandedNodes = allIds;
    renderTree();
  }

  function collapseAll() {
    expandedNodes = new Set();
    renderTree();
  }

  function ensureUploadInput() {
    if (uploadInput) return uploadInput;
    uploadInput = document.createElement('input');
    uploadInput.type = 'file';
    uploadInput.style.display = 'none';
    document.body.appendChild(uploadInput);
    return uploadInput;
  }

  function makeUploadId(targetUrl, file) {
    const base = String(file?.name || targetUrl || 'upload').replace(/[^\w.-]+/g, '_').replace(/^_+|_+$/g, '') || 'upload';
    const stamp = Date.now().toString(36);
    const rand = Math.random().toString(36).slice(2, 10);
    return `${base}-${stamp}-${rand}`;
  }

  async function uploadFileInSlices(targetUrl, file, onProgress) {
    const total = Number(file?.size || 0);
    if (!total) throw new Error('Selected file is empty.');

    const chunkSize = Math.max(1024 * 1024, Math.min(8 * 1024 * 1024, total));
    const partCount = Math.max(1, Math.ceil(total / chunkSize));
    const uploadId = makeUploadId(targetUrl, file);
    let sent = 0;

    for (let partIndex = 0; partIndex < partCount; partIndex++) {
      const start = partIndex * chunkSize;
      const end = Math.min(total, start + chunkSize);
      const chunk = file.slice(start, end, file.type || 'application/octet-stream');

      const res = await fetch(targetUrl, {
        method: 'PUT',
        body: chunk,
        cache: 'no-store',
        credentials: 'same-origin',
        headers: {
          'Content-Range': `bytes ${start}-${end - 1}/${total}`,
          'X-LibraryJS-Upload-Id': uploadId,
          'X-LibraryJS-Upload-Name': file.name || 'upload',
          'X-LibraryJS-Upload-Size': String(total),
          'X-LibraryJS-Upload-Offset': String(start),
          'X-LibraryJS-Chunk-Index': String(partIndex),
          'X-LibraryJS-Chunk-Count': String(partCount),
          'X-Upload-Id': uploadId,
          'X-Upload-Name': file.name || 'upload',
          'X-Upload-Size': String(total),
          'X-Upload-Offset': String(start),
          'X-Upload-Part': String(partIndex),
          'X-Upload-Count': String(partCount)
        }
      });

      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Upload slice ${partIndex + 1}/${partCount} failed: HTTP ${res.status}${body ? ` - ${body.slice(0, 240)}` : ''}`);
      }

      sent = end;
      onProgress?.(sent, total, partIndex + 1, partCount);
    }

    return { ok: true, status: 200, slices: partCount };
  }

  async function promptUpload(node, which) {
    const targetUrl = getUploadTarget(node, which);
    if (!targetUrl) {
      setStatus(`❌ No upload target found for this item.`);
      return;
    }
    const input = ensureUploadInput();
    input.accept = getUploadAccept(node, which);
    input.value = '';
    input.onchange = async () => {
      const file = input.files && input.files[0];
      if (!file) return;

      setStatus(`Uploading ${file.name}…`);
      setProgressDisplay(0, 1, `Uploading ${file.name}`);

      try {
        await uploadFileInSlices(targetUrl, file, (loaded, total, partIndex, partCount) => {
          setUploadProgress(loaded, total, partIndex, partCount, file.name);
          const pct = total > 0 ? Math.round((loaded / total) * 100) : 0;
          setStatus(`Uploading ${file.name}… ${pct}% (${partIndex}/${partCount})`);
        });
        if (which === 'primary') node.primaryStatus = STATUS.EXISTS;
        else node.secondaryStatus = STATUS.EXISTS;
        setStatus(`✅ Uploaded ${file.name}`);
        renderTree();
        updateStats();
      } catch (err) {
        setStatus(`❌ ${err.message}`);
        renderTree();
      } finally {
        updateProgress();
      }
    };
    input.click();
  }

  async function loadLibrary() {
    const loadingName = Array.isArray(activeConfig.files) && activeConfig.files.length
      ? activeConfig.files.map(file => String(file).split('/').pop()).join(' • ')
      : activeConfig.file;
    setStatus(`Loading ${loadingName}…`);

    if (Array.isArray(activeConfig.files) && activeConfig.files.length) {
      const bundle = await fetchLibraryBundle(activeConfig);
      const raw = await activeConfig.loadData(bundle);
      currentSource = bundle.map(item => item.source).join(' | ');
      hierarchyRoots = activeConfig.build(raw);
    } else {
      const { text, source } = await fetchLibraryText(activeConfig);
      const raw = await activeConfig.loadData(text);
      currentSource = source;
      hierarchyRoots = activeConfig.build(raw);
    }

    expandedNodes = new Set();
    setLibraryUI(activeKey);
    updateStats();
    renderTree();
    setStatus(`✅ Loaded ${flatItems.length} items from ${currentSource}`);
  }

  async function switchLibrary(key) {
    if (!LIBRARIES[key] || key === activeKey) {
      toggleWheel(false);
      return;
    }
    scanQueue = [];
    scanIndex = 0;
    scanning = false;
    paused = false;
    els.pauseBtn.disabled = true;
    els.stopBtn.disabled = true;
    els.scanPrimaryBtn.disabled = false;
    els.scanSecondaryBtn.disabled = false;
    els.search.value = '';
    activeKey = key;
    activeConfig = LIBRARIES[key];
    hierarchyRoots = [];
    flatItems = [];
    nodeMap = new Map();
    expandedNodes = new Set();
    els.tree.innerHTML = '<div class="empty-message">Loading…</div>';
    toggleWheel(false);
    await loadLibrary();
  }

  async function repairOrUploadFromAction(node, action) {
    if (action === 'repair-leaf') {
      openRepairModal(node);
      return;
    }
    if (action === 'upload-primary') {
      await promptUpload(node, 'primary');
      return;
    }
    if (action === 'upload-secondary') {
      await promptUpload(node, 'secondary');
      return;
    }
  }

  function getNodeById(id) {
    return nodeMap.get(id);
  }

  if (els.runBatchSubsBtn) {
    els.runBatchSubsBtn.addEventListener('click', () => {
      if (!subtitleBatchMode) return;
      launchSelectedSubtitles();
    });
  }

  els.pauseBtn.addEventListener('click', () => {
    if (!scanning) return;
    if (paused) resumeScan();
    else pauseScan();
  });

  els.stopBtn.addEventListener('click', () => stopScan());

  els.missingPrimaryCard.addEventListener('click', () => showMissingModal('primary'));
  els.missingSecondaryCard.addEventListener('click', () => showMissingModal('secondary'));
  els.closeModalBtn.addEventListener('click', hideModal);
  els.missingModal.addEventListener('click', e => {
    if (e.target === els.missingModal) hideModal();
  });

  els.closeRepairModalBtn.addEventListener('click', () => {
    if (repairBatchCurrent) {
      repairBatchQueue = [];
      repairBatchCurrent = null;
      clearRepairBatchState();
      updateRepairBatchUi();
    }
    if (subtitleBatchCurrent) {
      subtitleBatchQueue = [];
      subtitleBatchCurrent = null;
      clearSubtitleBatchState();
      updateSubtitleBatchUi();
    }
    hideRepairModal();
  });
  els.repairModal.addEventListener('click', e => {
    if (e.target === els.repairModal) {
      if (repairBatchCurrent) {
        repairBatchQueue = [];
        repairBatchCurrent = null;
        repairBatchMode = false;
        repairBatchSelected = new Set();
        updateRepairBatchUi();
      }
      if (subtitleBatchCurrent) {
        subtitleBatchQueue = [];
        subtitleBatchCurrent = null;
        subtitleBatchMode = false;
        subtitleBatchSelected = new Set();
        updateSubtitleBatchUi();
      }
      hideRepairModal();
    }
  });

  els.closeAddContentModalBtn?.addEventListener('click', hideAddContentModal);
  els.addContentModal?.addEventListener('click', e => {
    if (e.target === els.addContentModal) hideAddContentModal();
  });
  els.nestCollectionBtn?.addEventListener('click', () => openAddContentModal('nest'));
  els.genreContentBtn?.addEventListener('click', openGenreEditorModal);
  els.addContentBtn?.addEventListener('click', () => openAddContentModal('add'));
  els.runBatchRepairBtn?.addEventListener('click', () => startSelectedRepairBatch());
  els.addContentBtn?.addEventListener('click', () => openAddContentModal('add'));
  els.runBatchRepairBtn?.addEventListener('click', () => startSelectedRepairBatch());

  els.backupBtn?.addEventListener('click', () => {
    window.location.href = './Backup-flow.html';
  });
  els.restoreBtn?.addEventListener('click', () => {
    window.location.href = './Restore-flow.html';
  });
  els.browseShellsBtn?.addEventListener('click', () => {
    window.location.href = './browse.html';
  });
  els.libraryHub.addEventListener('click', e => {
    e.stopPropagation();
    toggleWheel();
  });

  els.libraryWheel.addEventListener('click', async e => {
    const btn = e.target.closest('[data-library]');
    if (!btn) return;
    e.stopPropagation();
    const lib = btn.dataset.library;
    if (lib === 'close') {
      toggleWheel(false);
      return;
    }
    await switchLibrary(lib);
  });

  document.addEventListener('click', e => {
    if (!els.librarySwitcher.contains(e.target)) toggleWheel(false);
  });

  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      toggleWheel(false);
      hideModal();
      hideRepairModal();
      hideAddContentModal();
      clearSubtitleBatchState();
      updateSubtitleBatchUi();
      renderTree();
    }
  });

  async function init() {
    setLibraryUI(activeKey);
    try {
      await loadLibrary();
    } catch (e) {
      setStatus(`❌ ${e.message}`);
      els.tree.innerHTML = '<div class="empty-message">Failed to load library file</div>';
    }
    updateStats();
    renderTree();
  }

  init();
})();
</script>


</body>
</html>
