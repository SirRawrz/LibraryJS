<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Radio Player</title>
<style>
/* ---------- Base reset & variables ---------- */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root{
  /* Layout variables you can tweak */
  --bg-top: #050505;
  --bg-mid: #0b0b0b;
  --bg-bottom: #080808;
  --fg: #eaeaea;
  --muted-fg: rgba(255,255,255,0.66);
  --player-radius: 12px;
  --player-padding: 10px;
  --player-max-width: 1200px;
  --default-topbar-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 12px);
}

/* ---------- Page base ---------- */
html, body {
  height: 100%;
  font-family: Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--fg);
  background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 60%, var(--bg-bottom) 100%);
  text-align: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden !important; /* prevent horizontal scroll */
  /* Allow vertical scrolling; previously using overflow:hidden prevented natural mobile scroll */
  overflow-y: auto;
  min-height: 100vh;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(84px + var(--safe-bottom)); /* fallback; JS may override to exact player height */
}

/* Utility */
.hidden { display: none !important; }
.visually-hidden { position: absolute !important; width:1px; height:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap; }

/* ---------- Top bar (desktop default) ---------- */
.top-bar {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  gap: 12px;
  background: rgba(10,10,10,0.35);
  backdrop-filter: blur(6px);
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.top-button {
  background: linear-gradient(180deg,#222,#1a1a1a);
  color: #fff; border: none;
  padding: 8px 12px; border-radius:8px; cursor:pointer;
  font-size:15px; margin:0 6px; display:inline-flex; align-items:center; justify-content:center;
  transition: transform .12s ease, box-shadow .12s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.45);
}
.top-button:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.5); }
.top-button svg { width:18px; height:18px; fill:white; margin-right:6px; }
#profileIcon { width:36px; height:36px; border-radius:10px; object-fit:cover; margin-left:12px; display:none; border:1px solid rgba(255,255,255,0.03); }

/* ---------- COVER / CENTER IMAGE (pulled-down desktop) ---------- */
#coverContainer {
  position: absolute;
  top: 110px; /* pulled down on desktop */
  left: 50%;
  transform: translateX(-50%);
  width: 760px;
  height: 560px;
  overflow: visible;
  background: transparent;
  z-index: 0;
  pointer-events: none;
}
#coverContainer[tabindex] { outline:none; }

/* ---------- Carousel (desktop defaults) ---------- */
#artistCarousel {
  width: 760px;
  height: 420px;
  margin: 8px auto;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1400px;
  pointer-events: none;
}
#artistCarousel img {
  transition: transform 340ms cubic-bezier(.2,.9,.2,1), opacity 300ms ease, filter 300ms ease;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  object-fit: cover;
  user-select: none;
  -webkit-user-drag: none;
  position: absolute;
  pointer-events: auto;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.12));
  border: 1px solid rgba(255,255,255,0.02);
}

/* center scaled up */
#artistCarousel img.center {
  width: 380px;
  height: 380px;
  z-index: 8;
  opacity: 1;
  left: 50%;
  top: 50%;
  transform-origin: center center;
  transform: translate(-50%, -50%) translateZ(0px) scale(1);
  pointer-events: none;
}

/* neighbors sizes */
#artistCarousel img.prev1, #artistCarousel img.next1 { width: 240px; height:240px; z-index:7; opacity:0.98; }
#artistCarousel img.prev2, #artistCarousel img.next2 { width: 180px; height:180px; z-index:6; opacity:0.92; }
#artistCarousel img.prev3, #artistCarousel img.next3 { width: 140px; height:140px; z-index:5; opacity:0.88; }
#artistCarousel img.prev4, #artistCarousel img.next4 { width:110px; height:110px; z-index:4; opacity:0.82; }

/* positioning — left side mirrors and right side */
#artistCarousel img.prev1 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(-170px) translateZ(-8px) rotateY(12deg) scale(0.96); }
#artistCarousel img.prev2 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(-300px) translateZ(-26px) rotateY(14deg) scale(0.86); }
#artistCarousel img.prev3 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(-410px) translateZ(-46px) rotateY(16deg) scale(0.76); }
#artistCarousel img.prev4 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(-500px) translateZ(-70px) rotateY(18deg) scale(0.68); }

#artistCarousel img.next1 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(170px) translateZ(-8px) rotateY(-12deg) scale(0.96); }
#artistCarousel img.next2 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(300px) translateZ(-26px) rotateY(-14deg) scale(0.86); }
#artistCarousel img.next3 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(410px) translateZ(-46px) rotateY(-16deg) scale(0.76); }
#artistCarousel img.next4 { left:50%; top:50%; transform: translate(-50%,-50%) translateX(500px) translateZ(-70px) rotateY(-18deg) scale(0.68); }

#artistCarousel img:hover { filter: saturate(1.06) brightness(1.04); transform: translate(-50%,-50%) scale(1.01); box-shadow: 0 12px 26px rgba(0,0,0,0.55); }

/* ---------- Responsive adjustments (desktop -> tablet -> small) ---------- */
@media (max-width: 1200px) {
  #coverContainer { width: 90%; left:50%; transform:translateX(-50%); top: 100px; }
  #artistCarousel { width: 90%; height: 380px; }
}
@media (max-width: 900px) {
  /* Slightly pull the cover up so it stays visible on narrower devices when landscape */
  #coverContainer { top: 90px; width: 92%; }
  #artistCarousel img.prev3, #artistCarousel img.next3, #artistCarousel img.prev4, #artistCarousel img.next4 { display:none; }
  #artistCarousel img.center { width: 300px; height:300px; }
}
@media (max-width: 600px) {
  #coverContainer { top: 70px; }
  #artistCarousel img.prev2, #artistCarousel img.next2 { display:none; }
  #artistCarousel img.center { width: 220px; height:220px; }
}

/* ---------- Player bar (desktop default) ---------- */
.player-bar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 40px);
  max-width: var(--player-max-width);
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius: var(--player-radius);
  padding: var(--player-padding);
  display: flex;
  gap: 10px;
  align-items: center;
  z-index: 1200;
  box-shadow: 0 8px 22px rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.02);
  backdrop-filter: blur(4px);
  /* ensure player sits above bottom safe area */
  margin-bottom: calc(var(--safe-bottom) * 0);
}

/* Player layout: left, middle, right - keep reasonable flex behaviors */
.player-left, .player-mid, .player-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-left { flex: 0 0 auto; justify-content: flex-start; }
.player-mid  { flex: 1 1 360px; align-items: center; min-width: 160px; }
.player-right{ flex: 0 0 auto; justify-content: flex-end; }

/* Controls */
.btn-ctrl {
  background: linear-gradient(180deg, #111, #0d0d0d);
  border: none; color: #fff;
  padding: 8px 10px; border-radius: 8px; cursor: pointer; font-weight:600;
  display:inline-flex; gap:8px; align-items:center; justify-content:center; box-shadow: 0 6px 14px rgba(0,0,0,0.45);
}
.btn-ctrl:hover { transform: translateY(-2px); }

.time {
  font-size: 13px;
  color: rgba(255,255,255,0.72);
  min-width: 56px;
  text-align:center;
}

/* segmented progress bar */
.progress-seg {
  display: flex;
  gap: 6px;
  align-items: center;
  width: 100%;
  padding: 6px 0;
  box-sizing: border-box;
  outline: none;
}
.progress-seg .seg {
  flex: 1 1 0;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(180deg,#1f1f1f,#2b2b2b);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  cursor: pointer;
  transition: transform 120ms ease, background 160ms ease, box-shadow 160ms ease;
}
.progress-seg .seg.filled {
  background: linear-gradient(90deg,#69f0ae,#00bcd4);
  box-shadow: 0 6px 18px rgba(0,180,200,0.12), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* segmented volume bar */
.volume-seg {
  display: flex;
  gap: 4px;
  align-items: center;
  width: 112px;
  margin-right: 8px;
}
.volume-seg .seg {
  flex: 1 1 0;
  height: 6px;
  border-radius: 3px;
  background: linear-gradient(180deg,#2a2a2a,#1b1b1b);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  cursor: pointer;
  transition: background 120ms ease, transform 120ms ease;
}
.volume-seg .seg.filled {
  background: linear-gradient(90deg,#ffd54f,#ff8a65);
  box-shadow: 0 6px 14px rgba(255,140,100,0.08);
}

/* Focus outlines for accessibility */
.progress-seg:focus, .volume-seg:focus {
  outline: 2px solid rgba(255, 180, 60, 0.3);
  outline-offset: 3px;
}

/* When segments are inactive, reduce accidental pointer interactions */
.progress-seg:not(.activated) .seg,
.volume-seg:not(.activated) .seg { pointer-events: none; }
.seg-activate { pointer-events: auto; }

/* Small responsive tweak for small widths */
@media (max-width: 600px) {
  .volume-seg { width: 86px; gap:3px; }
  .progress-seg { gap: 4px; }
}

/* Small touches */
.muted { opacity: 0.6; }
.track-mini {
  font-size: 14px; color: #fff; text-align:left;
  max-width: 360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.artist-mini { font-size: 12px; color: var(--muted-fg); margin-top:4px; }

/* ---------- Playlist/dialog overlays ---------- */
#playlistDialog {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80vw;
  max-height: 80vh;
  background-color: rgba(0,0,0,0.95);
  padding: 24px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.06);
  z-index: 3000;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  color: #fff;
  overflow-y: auto;
  pointer-events: auto;
}
#dialogOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.5);
  z-index: 2500;
  display: none;
  pointer-events: auto;
}

/* Playlist tiles / management */
#playlistTopArea { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
.playlist-add-square { width:120px; height:120px; background:#222; border-radius:8px; overflow:hidden; position:relative; box-shadow:0 2px 6px rgba(0,0,0,0.4); }
.playlist-add-square img { width:100%; height:100%; object-fit:cover; display:block; }
.playlist-add-square .add-icon { position:absolute; left:6px; top:6px; background:rgba(0,0,0,0.5); color:#fff; padding:4px 6px; border-radius:4px; font-weight:bold; }
.playlist-tiles-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.playlist-tile { width:100px; text-align:center; font-size:12px; cursor:pointer; position:relative; }
.playlist-tile img { width:100px; height:100px; border-radius:6px; object-fit:cover; display:block; }
.playlist-tile .tile-name { margin-top:6px; color:#fff; }
.playlist-tile .add-to-btn { position:absolute; right:6px; bottom:6px; background: rgba(0,0,0,0.6); color:#fff; border:none; border-radius:4px; padding:2px 6px; cursor:pointer; }
.playlist-tile .playlist-gear-btn { position:absolute; right:6px; top:6px; background: rgba(0,0,0,0.6); color:#fff; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; }
.playlist-tile .add-to-btn { transition: transform 140ms ease, background-color 200ms ease; }
.playlist-tile .add-to-btn.checked { transform: scale(1.08); background-color: rgba(0, 255, 0, 0.06); }

/* Original genre UI from Music.html */
#genres {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  padding: 6px 0 12px 0;
}
.genre {
  text-align: center;
  width: 150px;
  cursor: pointer;
  position: relative;
}
.genre img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  display: block;
}
.genre p {
  font-weight: bold;
  margin-top: 5px;
  color: #fff;
}
.genre input {
  position: absolute;
  top: 5px;
  right: 5px;
  transform: scale(2.3);
  transform-origin: top right;
  accent-color: #1ABC9C;
}

/* Manage dialog */
#managePlaylistDialog { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); background:#111; padding:16px; border-radius:8px; z-index:4000; width:90%; max-width:600px; display:none; }
#managePlaylistDialog .cover-preview { width:120px; height:120px; object-fit:cover; border-radius:6px; }
#managePlaylistDialog .song-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
#managePlaylistDialog .song-item .name { flex:1; margin-right:8px; color:#fff; font-size:13px; }
#managePlaylistDialog .close-btn { position:absolute; right:8px; top:8px; background:transparent; color:#fff; border:none; font-size:18px; cursor:pointer; }

/* ---------- Mobile portrait improvements (main changes) ---------- */
/* These rules ensure the top-bar remains in-flow, the cover flows underneath, player spacing adjusts,
   the mute button is removed in portrait so the range doesn't overlap the volume control, and
   safe-area insets are accounted for. */
@media (orientation: portrait) and (max-width: 900px) {

  /* Let page scroll naturally on portrait */
  html, body {
    overflow: auto !important;
    -webkit-overflow-scrolling: touch;
  }

  /* Top-bar becomes sticky and in-flow (wraps without overlapping content) */
  .top-bar {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    z-index: 999;
    /* toned, semi-opaque background for readability while still matching theme */
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid rgba(255,255,255,0.02);
  }

  /* Smaller top-bar controls that can wrap */
  .top-bar button,
  .top-bar .btn,
  .top-bar a.button {
    flex: 0 1 auto;
    min-width: 44px;
    padding: 6px 10px;
    font-size: 14px;
    line-height: 1;
    white-space: nowrap;
    box-sizing: border-box;
  }
  .top-bar .icon-only { padding: 6px; min-width: 40px; }

  /* If the title is lengthy, allow it to take its own line and truncate */
  .top-bar .page-title, .top-bar .profile-text {
    flex: 1 1 100%;
    min-width: 0;
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Cover container: flow in the document (relative) instead of absolute on portrait,
     margin-top uses measured --topbar-height; JS sets this variable for exact height.
     If JS doesn't run, fallback to default topbar height. */
  #coverContainer {
    position: relative !important;
    left: 0 !important;
    transform: none !important;
    top: 0 !important;
    width: 100% !important;
    height: auto !important;
    margin-top: calc(var(--topbar-height, var(--default-topbar-height)) + 8px);
    padding: 8px 0 24px 0;
    pointer-events: auto !important;
  }

  /* Make the carousel sized to viewport (portrait-friendly) */
  #artistCarousel {
    width: 100%;
    height: min(52vh, 420px);
    perspective: 900px;
    margin: 0 auto;
  }
  #artistCarousel img.center {
    width: min(54vmin, 260px);
    height: min(54vmin, 260px);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) translateZ(0) scale(1);
  }
  #artistCarousel img.prev1, #artistCarousel img.next1 {
    width: min(34vmin, 160px);
    height: min(34vmin, 160px);
  }
  /* hide distant neighbors to reduce clutter */
  #artistCarousel img.prev3, #artistCarousel img.next3,
  #artistCarousel img.prev4, #artistCarousel img.next4 {
    display: none;
  }

  /* Player: become full width and easier to tap */
  .player-bar {
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: calc(100% - 20px) !important;
    max-width: 100% !important;
    border-radius: 10px !important;
    padding: 12px !important;
    bottom: calc(10px + var(--safe-bottom)) !important;
  }

  /* Remove Mute button in portrait to avoid overlapping controls.
     The JS also hides it dynamically; this CSS provides a no-JS fallback. */
  .player-bar .mute-button,
  .player-bar #muteBtn,
  .player-bar .btn-mute,
  .player-bar [data-action="mute"],
  .player-bar [aria-label="Mute"] {
    display: none !important;
    visibility: hidden !important;
  }

  /* Layout: flex containers for controls so range never overlaps volume.
     min-width:0 is required to allow flex children to shrink properly. */
  .player-bar .controls,
  .player-bar .control-row {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
  }
  .player-bar input[type="range"],
  .player-bar .progress {
    flex: 1 1 auto !important;
    min-width: 0 !important;
    margin-right: 6px !important;
  }
  .player-bar .volume,
  .player-bar .volume-control,
  .player-bar .vol {
    flex: 0 0 56px !important;
    min-width: 40px !important;
    text-align: center !important;
  }

  /* Slightly reduce button/icon scale on phones to save space */
  .player-bar .icon, .player-bar button { transform: scale(0.92); }

  /* Ensure the page bottom has space so player doesn't obscure content;
     the runtime script will adjust body padding-bottom to exact player height when possible. */
  body { padding-bottom: calc(84px + var(--safe-bottom)) !important; }
}

/* Tighter portrait rules for very small phones */
@media (orientation: portrait) and (max-width: 420px) {
  #artistCarousel img.center { width: 48vmin; height: 48vmin; }
  #artistCarousel { height: 46vh; }
  .player-bar { padding: 10px; bottom: calc(8px + var(--safe-bottom)); }
  .top-bar { padding: 6px 8px; gap: 5px; }
  .top-bar button, .top-bar .btn { font-size: 13px; padding: 6px 8px; min-width: 40px; }
  .top-bar .page-title { font-size: 14px; }
}

/* Reordering and icon-only fullscreen button in portrait (safe available selectors included) */
@media (orientation: portrait) and (max-width: 900px) {
  /* best-effort selectors: adapt if your DOM uses different IDs */
  #playlistBtn { order: 1 !important; }
  #fullscreenBtn { order: 2 !important; }

  #fullscreenBtn {
    width: 42px !important;
    height: 42px !important;
    padding: 6px !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    font-size: 0 !important; /* hide textual label visually */
  }
  #fullscreenBtn::before {
    content: "⛶";
    font-size: 20px;
    line-height: 1;
  }
  /* hide child text labels if present */
  #fullscreenBtn .label { display: none !important; }
}

/* Fullscreen fine-tuning */
:fullscreen #coverContainer {
  width: 100% !important;
  height: calc(100vh - 120px) !important;
  top: 70px !important;
}
:fullscreen #artistCarousel { width: 100% !important; height: 100% !important; }
:fullscreen #artistCarousel img.center { width: 50vmin !important; height: 50vmin !important; }
:fullscreen #artistCarousel img.prev1, :fullscreen #artistCarousel img.next1 { width: 32vmin !important; height: 32vmin !important; }
:fullscreen #artistCarousel img.prev2, :fullscreen #artistCarousel img.next2 { width: 24vmin !important; height: 24vmin !important; }
:fullscreen #artistCarousel img.prev3, :fullscreen #artistCarousel img.next3 { width: 18vmin !important; height: 18vmin !important; }
:fullscreen #artistCarousel img.prev4, :fullscreen #artistCarousel img.next4 { width: 14vmin !important; height: 14vmin !important; }
:fullscreen .player-bar { max-width: 95% !important; bottom: 20px !important; }

/* Small helpers for segmented UI */
.seg-container { display:flex; align-items:center; gap:8px; }
.seg-activate {
  min-width:28px; height:28px; border-radius:6px;
  border:1px solid rgba(255,255,255,0.06);
  background: linear-gradient(180deg,#111,#222);
  color:#fff; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; padding:0 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.seg-activate[aria-pressed="true"] {
  background: linear-gradient(90deg,#69f0ae,#00bcd4);
  color:#002b2b; transform: translateY(-1px);
  box-shadow: 0 8px 22px rgba(0,180,200,0.08);
}

/* Visible outline when a segmented container is focused */
.progress-seg:focus, .volume-seg:focus { outline: 2px solid rgba(255, 180, 60, 0.3); outline-offset: 3px; }
.progress-seg.activated { outline: 3px solid rgba(255, 180, 60, 0.3); outline-offset: 4px; }

/* Prevent pointer on inactive segments but allow activation button to be clicked */
.progress-seg:not(.activated) .seg, .volume-seg:not(.activated) .seg { pointer-events: none; }
.seg-activate { pointer-events: auto; }

/* ---------- End of stylesheet ---------- */
</style>
</head>
<script>
(function(){
  function reorderTopBarDOM(){
    // match the same portrait query as the CSS
    const m = window.matchMedia("(orientation: portrait) and (max-width: 900px)");
    const top = document.querySelector('.top-bar') || document.querySelector('.topbar') || document.getElementById('topbar');
    if(!top) return;

    const playlist = top.querySelector('#playlistBtn');
    const fullscreen = top.querySelector('#fullscreenBtn');

    if(m.matches){
      // if both exist and are siblings, ensure playlist appears immediately before fullscreen

    ? window.musicLibraryGenreMap
    : Object.create(null);
}

function rebuildGenreCodeLookup() {
  const map = getMusicLibraryGenreMap();
  for (const key of Object.keys(MUSIC_LIBRARY_GENRE_CODE_BY_NAME)) {
    delete MUSIC_LIBRARY_GENRE_CODE_BY_NAME[key];
  }
  for (const [code, name] of Object.entries(map)) {
    if (name != null) {
      MUSIC_LIBRARY_GENRE_CODE_BY_NAME[String(name)] = String(code);
    }
  }
}

function parseLibraryEntry(entry) {
  const raw = String(entry == null ? '' : entry).trim();
  if (!raw) return null;

  const idx = raw.lastIndexOf('$');
  if (idx === -1) {
    const baseOnly = normalizeSongBase(raw);
    return baseOnly ? { base: baseOnly, code: '', genre: '', raw } : null;
  }

  const base = normalizeSongBase(raw.slice(0, idx));
  const code = raw.slice(idx + 1).trim();
  if (!base) return null;

  const genreMap = getMusicLibraryGenreMap();
  return { base, code, genre: genreMap[code] || '', raw };
}

let MUSIC_LIBRARY_ENTRIES = [];

function refreshMusicLibraryIndex() {
  rebuildGenreCodeLookup();
  const lib = (typeof window.musicLibrary !== 'undefined' && Array.isArray(window.musicLibrary))
    ? window.musicLibrary
    : [];
  MUSIC_LIBRARY_ENTRIES = lib.map(parseLibraryEntry).filter(Boolean);
  return MUSIC_LIBRARY_ENTRIES;
}

function ensureMusicLibraryIndex() {
  if (!Array.isArray(MUSIC_LIBRARY_ENTRIES) || MUSIC_LIBRARY_ENTRIES.length === 0) {
    refreshMusicLibraryIndex();
  }
  return MUSIC_LIBRARY_ENTRIES;
}

refreshMusicLibraryIndex();

function getAllGenreNames() {
  ensureMusicLibraryIndex();
  const seen = new Set();
  const names = [];
  MUSIC_LIBRARY_ENTRIES.forEach(rec => {
    if (!rec || !rec.genre || seen.has(rec.genre)) return;
    seen.add(rec.genre);
    names.push(rec.genre);
  });
  return names.sort((a, b) => a.localeCompare(b));
}

function getGenreCodeFromName(genreName) {
  ensureMusicLibraryIndex();
  return MUSIC_LIBRARY_GENRE_CODE_BY_NAME[String(genreName)] || '';
}

function getGenreNameFromCode(code) {
  const map = getMusicLibraryGenreMap();
  return map[String(code)] || '';
}

function getSongsForGenre(genreName) {
  ensureMusicLibraryIndex();
  const want = String(genreName || '').trim();
  if (!want) return [];
  return MUSIC_LIBRARY_ENTRIES.filter(rec => rec.genre === want).map(rec => rec.base).filter(Boolean);
}

function getSongsForArtist(artistName) {
  ensureMusicLibraryIndex();
  const want = String(artistName || '').trim();
  if (!want) return [];
  const songs = [];
  const seen = new Set();
  MUSIC_LIBRARY_ENTRIES.forEach(rec => {
    const artist = getArtistFromFilename(rec.base);
    if (artist === want && !seen.has(rec.base)) {
      seen.add(rec.base);
      songs.push(rec.base);
    }
  });
  return songs;
}

function normalizeLoadedPlaylist(list) {
  const out = [];
  const seen = new Set();
  flattenStoredList(list).forEach(item => {
    const base = normalizeSongBase(item);
    if (!base || seen.has(base)) return;
    seen.add(base);
    out.push(base);
  });
  return out;
}

function fileToMusicUrl(baseName, ext) {
  const clean = normalizeSongBase(baseName);
  return `Music/${encodeURIComponent(clean)}.${ext}`;
}

async function urlExistsWithin(url, timeoutMs = 100) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const res = await fetch(url, { method: 'HEAD', cache: 'no-store', signal: controller.signal });
    clearTimeout(timer);
    return !!(res && res.ok);
  } catch (e) {
    return false;
  }
}
async function resolveTrackUrl(baseName) {
  const clean = normalizeSongBase(baseName);
  const flacUrl = fileToMusicUrl(clean, 'flac');
  const mp3Url = fileToMusicUrl(clean, 'mp3');
  if (await urlExistsWithin(flacUrl, 100)) return flacUrl;
  if (await urlExistsWithin(mp3Url, 100)) return mp3Url;
  return flacUrl;
}

function _songKey(value) {
  let s = String(value == null ? '' : value).trim();
  if (!s) return '';

  try { s = decodeURIComponent(s); } catch (e) {}

  // Drop any folder path, keep only filename portion
  s = s.split(/[\/]/).pop();
  // Drop query/hash fragments
  s = s.replace(/[?#].*$/, '');
  // Remove ONLY actual audio extensions at the very end (case‑insensitive)
  s = s.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)$/i, '');
  // Normalize whitespace only – preserve all other punctuation (e.g., "GEN.KLOUD")
  s = s.replace(/\s+/g, ' ').trim();
  return s.toLowerCase();
}

function _isLikedSong(rawSong, likedList) {
  const rawKey = _songKey(rawSong);
  if (!rawKey || !Array.isArray(likedList)) return false;

  return likedList.some(item => {
    const itemKey = _songKey(item);
    return itemKey && itemKey === rawKey;
  });
}

function _splitLegacyLikedBundle(value) {
  const s = String(value == null ? '' : value).trim();
  if (!s) return [];

  const commaCount = (s.match(/,/g) || []).length;
  const dashCount = (s.match(/\s-\s/g) || []).length;

  // Only split when it clearly looks like multiple song entries jammed together.
  // This avoids breaking legitimate song titles that contain a comma.
  if (commaCount > 0 && dashCount > 1 && !/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)\b/i.test(s)) {
    return s
      .split(/\s*,\s*/)
      .map(x => String(x).trim())
      .filter(Boolean);
  }

  return [s];
}

function _normalizeLikedSongsArray(arr) {
  const out = [];
  const seen = new Set();

  flattenStoredList(arr).forEach(item => {
    if (item == null) return;

    let str = String(item).trim();
    if (!str) return;

    if ((str.startsWith('"') && str.endsWith('"')) || (str.startsWith("'") && str.endsWith("'"))) {
      str = str.slice(1, -1);
    }

    try { str = decodeURIComponent(str); } catch (e) {}

    _splitLegacyLikedBundle(str).forEach(part => {
      const song = String(part).trim();
      if (!song) return;

      const key = _songKey(song);
      if (!key || seen.has(key)) return;

      seen.add(key);
      out.push(song);
    });
  });

  return out;
}

function setStoredLikedSongs(arr) {
  try {
    const profile = getActiveProfileName();
    const cleaned = _normalizeLikedSongsArray(flattenStoredList(arr));
    const payload = isWindowsUpload()
      ? '[[[' + JSON.stringify(cleaned) + ']]]'
      : JSON.stringify(cleaned);

    // Primary profile-scoped cache
    try { localStorage.setItem(getLikedSongsStorageKey(profile), payload); } catch (e) {}

    // Legacy key kept for backwards compatibility with older builds / helpers
    try { localStorage.setItem('likedSongs', payload); } catch (e) {}
  } catch (e) {
    console.warn('setStoredLikedSongs failed', e);
  }
}

function getStoredLikedSongs() {
  const profile = getActiveProfileName();
  const keys = [getLikedSongsStorageKey(profile), 'likedSongs'];
  let raw = '';
  for (const k of keys) {
    try {
      raw = localStorage.getItem(k) || '';
      if (raw) break;
    } catch (e) {}
  }

  let arr = [];
  try {
    const extracted = extractFirstJsonArray(raw);
    if (extracted) arr = JSON.parse(extracted);
    else if (raw) arr = JSON.parse(raw);
  } catch (e) {
    const match = raw.match(/\[\[\[\s*(\[[\s\S]*?\])\s*\]\]\]/);
    try {
      if (match) arr = JSON.parse(match[1]);
    } catch (e2) {
      arr = [];
    }
  }

  arr = flattenStoredList(arr);
  return _normalizeLikedSongsArray(arr);
}

async function loadLikedSongsFromServer() {
  const profile = getActiveProfileName();
  const fileName = `${profile}-likedsongs.txt`;
  const url = `/Profiles/${encodeURIComponent(fileName)}?_${Date.now()}`;

  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) {
      if (r.status !== 404) throw new Error(`HTTP ${r.status}`);
      setStoredLikedSongs([]);
      updateLikedSongsUI();
      return;
    }

    const text = await r.text();
    let likedSongs = [];

    try {
      const arrString = extractFirstJsonArray(text);
      if (arrString) likedSongs = JSON.parse(arrString);
    } catch (err) {
      console.error('Failed to parse liked songs from server:', err);
    }

    setStoredLikedSongs(normalizeLoadedPlaylist(likedSongs));
    updateLikedSongsUI();
  } catch (err) {
    console.error('Liked songs load failed:', err);
    setStoredLikedSongs([]);
    updateLikedSongsUI();
  }
}

function toggleLikeForFile(fileName) {
  if (!fileName) return;

  const name = String(fileName).trim();
  const liked = getStoredLikedSongs();

  const idx = liked.findIndex(item => _songKey(item) === _songKey(name));
  if (idx === -1) liked.push(name);
  else liked.splice(idx, 1);

  const cleaned = _normalizeLikedSongsArray(liked);
  setStoredLikedSongs(cleaned);
  saveLikedSongsToServer(cleaned);
  updateLikedSongsUI();
}

async function restorePlaylistFromProfile(profileName) {
  const profile = profileName || (localStorage.getItem('activeProfile') || 'Guest');
  const fileName = `${profile}-radio.txt`;
  const tried = [];

  async function tryFetchUrl(url) {
    tried.push(url);
    try {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) return null;

      const text = await r.text();
      const matchTriple = text.match(/\[\[\[([\s\S]*?)\]\]\]/);
      const inner = matchTriple ? matchTriple[1] : extractFirstJsonArray(text);
      if (!inner) return [];

      return JSON.parse(inner.trim());
    } catch (err) {
      console.warn('restorePlaylistFromProfile: parse error for', url, err);
      return null;
    }
  }

  const res = await tryFetchUrl(`/Profiles/${encodeURIComponent(fileName)}?_${Date.now()}`);
  if (Array.isArray(res)) {
    playlist = res.map(x => String(x).trim()).filter(Boolean);
    isPlayingLiked = false;
    updateLikedSongsUI();
    return playlist;
  }

  const altName = `${profile}-radio`;
  const res2 = await tryFetchUrl(`/Profiles/${encodeURIComponent(altName)}?_${Date.now()}`);
  if (Array.isArray(res2)) {
    playlist = res2.map(x => String(x).trim()).filter(Boolean);
    isPlayingLiked = false;
    updateLikedSongsUI();
    return playlist;
  }

  console.warn('restorePlaylistFromProfile: tried urls', tried);
  playlist = [];
  isPlayingLiked = false;
  updateLikedSongsUI();
  return playlist;
}

function normalizeQuotesAndDashes(name) {
  return String(name || '')
    .replace(/[\u2018\u2019\u201B\u201C\u201D]/g, "'")   // curly single/double -> straight '

/*
  setAudioWithFallbacks(audioEl, raw)
  - Same behavior as before but:
    * aborts any in-flight preloads (so a new explicit selection is prioritized)
    * if a prefetch blob exists that matches a candidate URL, prefer it (instant start)
*/
async function setAudioWithFallbacks(audioEl, raw) {
  try {
    try { if (window._audioPreloader && typeof window._audioPreloader.abort === 'function') window._audioPreloader.abort(); } catch(e){}

    const original = String(raw || '');
    const base = normalizeSongBase(original);
    if (!base) throw new Error('No track base');

    const candidates = [];
    const seen = new Set();
    const add = (url) => {
      if (!url) return;
      const s = String(url);
      if (!seen.has(s)) { seen.add(s); candidates.push(s); }
    };

    let resolved = '';
    try {
      resolved = (typeof resolveTrackUrl === 'function') ? await Promise.resolve(resolveTrackUrl(original)) : '';
    } catch(e) {}

    add(resolved);
    add(fileToMusicUrl(base, 'flac'));
    add(fileToMusicUrl(base, 'mp3'));

    const filenameOnly = (original.split('/').pop() || original);
    const normalized = normalizeSongBase(filenameOnly);
    const dir = original.lastIndexOf('/') !== -1 ? original.slice(0, original.lastIndexOf('/') + 1) : 'Music/';
    add(dir + normalized + '.flac');
    add(dir + normalized + '.mp3');

    try {
      if (window._audioPreloader && typeof window._audioPreloader.state === 'function') {
        const s = window._audioPreloader.state();
        if (s && s.url && s.blobUrl) {
          const match = candidates.find(c => c && (c === s.url || c.endsWith(s.url) || s.url.endsWith(c)));
          if (match) {
            try {
              audioEl.src = s.blobUrl;
              audioEl.dataset._prefetched = '1';
              try { audioEl.load(); } catch (e) {}
              if (audioEl.play) audioEl.play().catch(()=>{});
              return;
            } catch (e) {}
          }
        }
      }
    } catch (e) {}

    audioEl.onerror = null;
    audioEl.onloadedmetadata = null;

    let idx = 0;
    const tryNext = () => {
      if (idx >= candidates.length) {
        console.error('[audio] all src attempts failed for', original);
        return;
      }

      const candidate = candidates[idx++];
      if (!candidate) { setTimeout(tryNext, 10); return; }
      console.debug('[audio] attempting to load ->', candidate);

function buildSegments(container, count, segClass) {
  container.innerHTML = '';

    d.className = segClass || 'seg';

async function updateMediaSessionForRaw(raw) {
  if (!raw) return;
  try {
    if (!('mediaSession' in navigator)) return;

    // Derive artist and title from filename if possible (uses existing helper if available)
    var artist = (typeof getArtistFromFilename === 'function') ? getArtistFromFilename(raw) : '';

    if (!title) {
      try {
        title = stripKnownAudioExtension((raw.split('/').pop() || raw));
      } catch (e) {
        title = raw;
      }
    }

    // Define imgPath (use artist-based image if available, otherwise default)
    var imgPath = artist ? ('Music/Images/' + encodeURIComponent(artist) + '.jpg') : 'Music/Images/default.jpg';

    // Safari / iOS lock-screen fallback: set the <audio> element title so Safari will show text
    // (Some iOS Safari versions ignore MediaMetadata artwork/text — the audio.title often shows on lockscreen)
    try {
      if (typeof audioEl !== 'undefined' && audioEl) {
        audioEl.title = title ? (artist ? (title + ' — ' + artist) : title) : '';
      }
    } catch (e) {
      // benign fallback; ignore any errors
    }

    // Build absolute image URL and artwork entries
    var absImg = (new URL(imgPath, location.href)).href;
    var artworks = [
      { src: absImg, sizes: '96x96',   type: 'image/jpeg' },
      { src: absImg, sizes: '192x192', type: 'image/jpeg' },
      { src: absImg, sizes: '512x512', type: 'image/jpeg' }
    ];

    // Set MediaSession metadata (first attempt with the image URL)
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: title || 'Radio',
        artist: artist || '',
        album: '',
        artwork: artworks

// --- Fullscreen scaling: scale whole page to fit viewport while in fullscreen ---
function _applyFullscreenScale() {
  try {
    // compute natural content size (use scrollWidth/Height as approximations)
    const contentW = Math.max(document.documentElement.scrollWidth, document.body.scrollWidth);
    const contentH = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    if (!contentW || !contentH) return;
    const scale = Math.min(winW / contentW, winH / contentH, 1);
    document.body.style.transformOrigin = 'top left';
    document.body.style.transform = 'scale(' + scale + ')';
    // prevent clipping by making body take the scaled dimensions
    document.body.style.width = contentW + 'px';
    document.body.style.height = contentH + 'px';
    document.documentElement.style.overflow = 'auto';
    document.body.style.overflow = 'auto';
  } catch (e) { console.warn('applyFullscreenScale failed', e); }
}

function _clearFullscreenScale() {
  document.body.style.transform = '';
  document.body.style.transformOrigin = '';
  document.body.style.width = '';
  document.body.style.height = '';
  document.documentElement.style.overflow = 'hidden';
  document.body.style.overflow = 'hidden';
}

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    _applyFullscreenScale();
  } else {
    _clearFullscreenScale();
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (document.webkitFullscreenElement) {
    _applyFullscreenScale();
  } else {
    _clearFullscreenScale();
  }
});
// Adjust scale on resize while fullscreen
window.addEventListener('resize', () => {
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    _applyFullscreenScale();
  }
});

// --- Playlist image lookup with deterministic playlistN fallback (1..15) ---
function _hashSlugToInt(s) {
  // djb2-ish hash to keep a deterministic but well-distributed index per slug
  if (!s) return 0;
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
  return Math.abs(h);
}

async function checkPlaylistImageUrl(profile, slug, index) {
  // tries: /Music/Images/<slug>.jpg -> <slug>.png -> playlist{1..15}.jpg -> default.jpg
  const base = `/Music/Images/${encodeURIComponent(slug)}`;
  const fallbackPrefix = `/Music/Images/playlist`;
  const FALLBACK_COUNT = 15; // cycles through playlist1..playlist15

  try {
    // try jpg then png for explicit slug image
    const j = await fetch(base + '.jpg', { method: 'HEAD' });
    if (j && j.ok) return base + '.jpg';
    const p = await fetch(base + '.png', { method: 'HEAD' });
    if (p && p.ok) return base + '.png';
  } catch (e) {
    // ignore network/HEAD errors and continue to fallbacks
  }

  // choose fallback in render order if index provided, otherwise use deterministic hash
  try {
    let n;
    if (typeof index === 'number' && !isNaN(index)) {
      n = (index % FALLBACK_COUNT) + 1; // sequential round-robin by tile index
    } else {
      n = (_hashSlugToInt(slug) % FALLBACK_COUNT) + 1; // previous behavior (fallback to hash)
    }
    const candidate = `${fallbackPrefix}${n}.jpg`;
    const r = await fetch(candidate, { method: 'HEAD' });
    if (r && r.ok) return candidate;
  } catch (e) {
    // ignore and fall through
  }

  // last-resort: try to find any playlistN that exists (1..15)
  for (let k = 1; k <= FALLBACK_COUNT; k++) {
    try {
      const candidate = `${fallbackPrefix}${k}.jpg`;
      const r = await fetch(candidate, { method: 'HEAD' });
      if (r && r.ok) return candidate;
    } catch (e) { /* ignore */ }
  }

  return 'Music/Images/default.jpg';
}

/* -------------------- Exiled (Playlist Profile-ExiledSongs) feature --------------------
   - Saves/loads to the server using the same helpers as other playlist files
   - File used: <profile>-ExiledSongs.txt  (wrapped JSON like other playlists)
   - When loaded, the global window.exiledList (array of basenames) is populated.
   - Use filterOutExiled(arr) to get a version with exiled items removed.
-------------------------------------------------------------------------------------*/

async function loadExiledFromServer(profile) {
  profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
  try {
    const arr = await loadPlaylistFileFromServer(profile, 'ExiledSongs');
    if (!Array.isArray(arr)) return [];
    const out = [];
    const seen = new Set();
    arr.forEach(it => {
      if (!it) return;
      const b = (typeof basename === 'function') ? basename(it) : (String(it).split('/').pop());
      if (b && !seen.has(b)) { seen.add(b); out.push(b); }
    });
    return out;
  } catch (e) {
    console.warn('loadExiledFromServer failed', e);
    return [];
  }
}

async function saveExiledToServer(profile, arr) {
  profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
  try {
    return await savePlaylistFileToServer(profile, 'ExiledSongs', Array.isArray(arr) ? arr : []);
  } catch (e) {
    console.warn('saveExiledToServer failed', e);
    return false;
  }
}

window.exiledList = window.exiledList || [];
window.exiledSet = window.exiledSet || new Set();

async function refreshExiledCache(profile) {
  profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
  try {
    const arr = await loadExiledFromServer(profile);
    window.exiledList = arr || [];
    window.exiledSet = new Set((window.exiledList || []).map(x => (typeof x === 'string' ? x : String(x))));
    return window.exiledList;
  } catch (e) {
    console.warn('refreshExiledCache failed', e);
    window.exiledList = [];
    window.exiledSet = new Set();
    return [];
  }
}

function filterOutExiled(arr) {
  if (!Array.isArray(arr)) return arr;
  const ex = window.exiledSet || new Set();
  if (!ex || ex.size === 0) return arr.slice();
  return arr.filter(item => {
    if (!item) return false;
    const b = (typeof basename === 'function') ? basename(item) : String(item).split('/').pop();
    return !ex.has(b);
  });
}

/* === Exiled feature (safe, minimal, non-invasive) ===
   - Adds a small UI tile 'Exiled' that opens an editor dialog.
   - Stores cleaned names (decoded + no extension) to server via savePlaylistFileToServer.
   - Filters playlists by wrapping loadPlaylistFileFromServer (so exiled items are omitted app-wide).
   - Wraps loadAndPlay (if present) to skip exiled tracks at play time.
   This block is intentionally self-contained and only activates when the original helpers exist.
*/
(function(){
  // helper: clean and decode name, strip common audio extensions
  function cleanNameFromPath(p) {
    if (!p) return '';
    let n = (typeof basename === 'function') ? basename(p) : String(p).split('/').pop();
    try { n = decodeURIComponent(n); } catch(e) {}
    n = n.replace(/\.(mp3|flac|wav|m4a|aac|ogg)$/i, '');
    return n;
  }

  function isExiledSong(p) {
    try {
      if (!window.exiledSet) return false;
      const s = cleanNameFromPath(p).toLowerCase();
      return window.exiledSet.has(s);
    } catch(e) { return false; }
  }

  async function loadExiledFromServer(profile) {
    profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
    try {
      if (typeof loadPlaylistFileFromServer === 'function') {
        const arr = await loadPlaylistFileFromServer(profile, 'ExiledSongs');
        return Array.isArray(arr) ? arr : [];
      }
    } catch(e){ console.warn('loadExiledFromServer', e); }
    return [];
  }

  async function saveExiledToServer(profile, arr) {
    profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
    try {
      if (typeof savePlaylistFileToServer === 'function') {
        return await savePlaylistFileToServer(profile, 'ExiledSongs', arr);
      }
    } catch(e){ console.warn('saveExiledToServer', e); }
    return false;
  }

  async function appendExiledSong(profile, songPath) {
    profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
    try {
      const bn = cleanNameFromPath(songPath);
      let arr = await loadExiledFromServer(profile) || [];
      // compare cleaned names
      const cleanedArr = arr.map(x => cleanNameFromPath(x).toLowerCase());
      if (cleanedArr.includes(bn.toLowerCase())) return true;
      arr.push(bn);
      await saveExiledToServer(profile, arr);
      return true;
    } catch(e){ console.warn('appendExiledSong', e); return false; }
  }

  async function refreshExiledCache(profile) {
    profile = profile || (localStorage.getItem('activeProfile') || 'Guest');
    try {
      const arr = await loadExiledFromServer(profile);
      window.exiledList = [];
      const seen = new Set();
      if (Array.isArray(arr)) {
        arr.forEach(it => {
          if (!it) return;
          const b = cleanNameFromPath(it);
          const key = String(b).toLowerCase();
          if (!seen.has(key)) { seen.add(key); window.exiledList.push(b); }
        });
      }
      window.exiledSet = new Set((window.exiledList || []).map(x => (typeof x === 'string' ? x.toLowerCase() : String(x).toLowerCase())));
      return window.exiledList;
    } catch(e){ console.warn('refreshExiledCache', e); window.exiledList = []; window.exiledSet = new Set(); return []; }
  }

  function filterOutExiled(arr) {
    if (!Array.isArray(arr)) return arr;
    const ex = window.exiledSet || new Set();
    if (!ex || ex.size === 0) return arr.slice();
    return arr.filter(item => {
      if (!item) return false;
      let b = (typeof basename === 'function') ? basename(item) : String(item).split('/').pop();
      try { b = decodeURIComponent(b); } catch(e) {}
      b = b.replace(/\.(mp3|flac|wav|m4a|aac|ogg)$/i, '');
      return !ex.has(String(b).toLowerCase());

  }

  function tryWrapLoadPlaylistLoader() {

// --- compact UI wiring (keeps compact line & numeric volume in sync) ---
const progressLine = document.getElementById('progressLine');
const progressFill = document.getElementById('progressFill');
const volNumber = document.getElementById('volNumber');

// update compact line and volume number whenever segments are re-rendered
function updateCompactUI() {
  // progress line fill
  try {
    const pct = (audioEl.duration && audioEl.currentTime) ? Math.max(0, Math.min(1, (audioEl.currentTime || 0) / audioEl.duration)) : 0;
    if (progressFill) progressFill.style.width = (pct * 100) + '%';
    if (progressLine) progressLine.setAttribute('aria-valuenow', Math.round(pct * 100));
  } catch (e) { /* ignore */ }

  // volume number displayed in tens (0,10,20,...100)
  try {
    const vol = Number(audioEl.volume) || 0;
    const volPct = Math.round(vol * 100 / 10) * 10; // nearest multiple of 10
    if (volNumber) {
      volNumber.textContent = String(volPct);
      volNumber.setAttribute('aria-label', `${volPct} percent`);
    }
  } catch (e) { /* ignore */ }
}

// call updateCompactUI from your existing render helpers
// (they already call renderProgressSegments() and renderVolumeSegments())
// so extend those functions to call updateCompactUI() at the end.
// e.g. at the end of renderProgressSegments() and renderVolumeSegments()
// add: updateCompactUI();
(function wireCompactToExistingRenders() {
  // If render functions exist we can monkey-patch them lightly to ensure sync
  const origProgressRender = window.renderProgressSegments;
  if (typeof origProgressRender === 'function') {
    window.renderProgressSegments = function patchedProgress() {
      origProgressRender();
      updateCompactUI();
    };
  }

  const origVolumeRender = window.renderVolumeSegments;
  if (typeof origVolumeRender === 'function') {
    window.renderVolumeSegments = function patchedVolume() {
      origVolumeRender();
      updateCompactUI();
    };
  }
})();

// --- make compact progress clickable/touchable to seek ---
if (progressLine) {
  progressLine.addEventListener('click', (ev) => {
    if (!audioEl.duration) return;
    const r = progressLine.getBoundingClientRect();
    const x = (ev.clientX !== undefined ? ev.clientX : (ev.touches && ev.touches[0] && ev.touches[0].clientX)) - r.left;
    const pct = Math.max(0, Math.min(1, x / r.width));
    audioEl.currentTime = pct * audioEl.duration;
    renderProgressSegments();
  });
  // keyboard: left/right to nudge seek by 1 segment
  progressLine.addEventListener('keydown', (ev) => {
    if (!audioEl.duration) return;
    if (ev.key === 'ArrowLeft') { ev.preventDefault(); audioEl.currentTime = Math.max(0, audioEl.currentTime - (audioEl.duration / PROG_COUNT)); renderProgressSegments(); }
    else if (ev.key === 'ArrowRight') { ev.preventDefault(); audioEl.currentTime = Math.min(audioEl.duration, audioEl.currentTime + (audioEl.duration / PROG_COUNT)); renderProgressSegments(); }
  });
}

// --- allow clicking / keyboard on volNumber to change volume in tens ---
if (volNumber) {
  volNumber.addEventListener('click', (ev) => {
    // cycle volume by +10% (wrap around at >100 -> 0)
    let cur = Math.round((audioEl.volume || 0) * 100);
    cur = Math.round((cur + 10) / 10) * 10;
    if (cur > 100) cur = 0;
    audioEl.volume = cur / 100;
    renderVolumeSegments();
  });
  volNumber.addEventListener('keydown', (ev) => {
    if (ev.key === 'ArrowLeft' || ev.key === 'ArrowDown') {
      ev.preventDefault();
      let cur = Math.round((audioEl.volume || 0) * 100) - 10;
      cur = Math.max(0, cur);
      audioEl.volume = cur / 100;
      renderVolumeSegments();
    } else if (ev.key === 'ArrowRight' || ev.key === 'ArrowUp') {
      ev.preventDefault();
      let cur = Math.round((audioEl.volume || 0) * 100) + 10;
      cur = Math.min(100, cur);
      audioEl.volume = cur / 100;
      renderVolumeSegments();
    } else if (ev.key === 'Home') {
      ev.preventDefault(); audioEl.volume = 0; renderVolumeSegments();
    } else if (ev.key === 'End') {
      ev.preventDefault(); audioEl.volume = 1; renderVolumeSegments();
    }
  });
}

    const cover = document.getElementById('coverContainer');

    let topHeight = 64;
    if (topBar) {
      topHeight = Math.ceil(topBar.getBoundingClientRect().height);
    }

    document.documentElement.style.setProperty('--topbar-height', topHeight + 'px');

    const isPortrait = window.matchMedia('(orientation: portrait) and (max-width: 900px)').matches;

    if (cover) {
      if (isPortrait) {
        cover.style.position = 'relative';
        cover.style.marginTop = `calc(var(--topbar-height) + 8px)`;
      } else {
        cover.style.position = '';
        cover.style.marginTop = '';
      }
    }

    if (player) {
      const playerHeight = Math.ceil(player.getBoundingClientRect().height);
      document.body.style.paddingBottom =
        `calc(${playerHeight}px + env(safe-area-inset-bottom, 12px))`;
    }
  }

  window.addEventListener('resize', updateMobileLayout, { passive: true });
  window.addEventListener('orientationchange', updateMobileLayout, { passive: true });
  document.addEventListener('DOMContentLoaded', updateMobileLayout);

})();
</script>

</body>
</html>
