/* Loop button: active state — change only color, keep physical dimensions/shape */
#loopButton.active {
  /* visual color */
  background-color: rgba(47,111,109,0.92) !important; /* muted teal */
  color: #ffffff !important;

  /* Preserve physical styling from the base button so it doesn't shrink.
     Use `inherit` where possible; provide safe fallbacks via CSS variables. */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;

  /* Prefer inheriting the sizing from .btn-ctrl; if those are not set,
     fall back to common button sizes so appearance stays consistent. */
  padding: inherit;
  padding: var(--btn-padding, inherit);
  height: inherit;
  height: var(--btn-height, 36px);
  min-width: inherit;
  min-width: var(--btn-min-width, 36px);
  font-size: inherit;
  font-size: var(--btn-font-size, 13px);
  border-radius: inherit;
  border-radius: var(--btn-radius, 6px);
  border: none;

  cursor: pointer;
  transition: background-color 180ms ease, color 180ms ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.22);
}

/* Loop A/B buttons: ensure text is white on both default and active states */
#loopAButton, #loopBButton {
  color: #fff !important;
  text-shadow: 0 1px 0 rgba(0,0,0,0.6);
}

/* Active state (orange background) — keep text white and readable */

}

    /* NEW: 9-image carousel styles (4 prev / center / 4 next) */
    #artistCarousel {
      width: 520px;
      max-width: calc(100% - 20px);
      height: 300px;
      margin: 8px auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      pointer-events: none; /* default; individual imgs will enable pointer events */
    }

    #artistCarousel img {
      transition: transform 300ms cubic-bezier(.2,.9,.2,1), opacity 300ms ease, filter 300ms ease;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.55);
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
      position: absolute;
      pointer-events: auto; /* allow clicking each image individually */
    }

    /* center */
    #artistCarousel img.center {
      width: 260px;
      height: 260px;
      z-index: 6;
      transform: translateZ(0px) translateY(0px) scale(1);
      opacity: 1;
      cursor: default;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      transform: translate(-50%, -50%) translateZ(0px) scale(1);
    }

    /* nearest neighbors (pos1) */
    #artistCarousel img.prev1, #artistCarousel img.next1 {
      width: 160px;
      height: 160px;
      z-index: 5;
      opacity: 0.95;
      filter: saturate(0.9) brightness(0.95);
    }

    /* pos2 */
    #artistCarousel img.prev2, #artistCarousel img.next2 {
      width: 140px;
      height: 140px;
      z-index: 4;
      opacity: 0.9;
      filter: saturate(0.88) brightness(0.92);
    }

    /* pos3 */
    #artistCarousel img.prev3, #artistCarousel img.next3 {
      width: 120px;
      height: 120px;
      z-index: 3;
      opacity: 0.85;
      filter: saturate(0.86) brightness(0.89);
    }

    /* pos4 (farthest) */
    #artistCarousel img.prev4, #artistCarousel img.next4 {
      width: 100px;
      height: 100px;
      z-index: 2;
      opacity: 0.8;
      filter: saturate(0.84) brightness(0.86);
    }
    /* Left side placement (closer -> further) */
    #artistCarousel img.prev1 {
      /* slightly smaller than center but bigger than other neighbors */
      width: 200px;
      height: 200px;
      z-index: 5; /* behind center */
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(-90px) translateZ(-10px) rotateY(10deg) scale(0.92);
      opacity: 0.98;
    }
    #artistCarousel img.prev2 {
      width: 160px;
      height: 160px;
      z-index: 4;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(-160px) translateZ(-25px) rotateY(10deg) scale(0.86);
      opacity: 0.92;
    }
    #artistCarousel img.prev3 {
      width: 130px;
      height: 130px;
      z-index: 3;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(-230px) translateZ(-45px) rotateY(10deg) scale(0.78);
      opacity: 0.86;
    }
    #artistCarousel img.prev4 {
      width: 110px;
      height: 110px;
      z-index: 2;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(-290px) translateZ(-65px) rotateY(10deg) scale(0.70);
      opacity: 0.80;
    }

    /* Right side placement (mirror) */
    #artistCarousel img.next1 {
      width: 200px;
      height: 200px;
      z-index: 5;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(90px) translateZ(-10px) rotateY(-10deg) scale(0.92);
      opacity: 0.98;
    }
    #artistCarousel img.next2 {
      width: 160px;
      height: 160px;
      z-index: 4;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(160px) translateZ(-25px) rotateY(-10deg) scale(0.86);
      opacity: 0.92;
    }
    #artistCarousel img.next3 {
      width: 130px;
      height: 130px;
      z-index: 3;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(230px) translateZ(-45px) rotateY(-10deg) scale(0.78);
      opacity: 0.86;
    }
    #artistCarousel img.next4 {
      width: 110px;
      height: 110px;
      z-index: 2;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateX(290px) translateZ(-65px) rotateY(-10deg) scale(0.70);
      opacity: 0.80;
    }

    /* hover: only subtle brighten, no pop/shake */
    #artistCarousel img:hover {
      filter: saturate(1) brightness(1.03);
      box-shadow: 0 10px 24px rgba(0,0,0,0.65);
    }

    /* mobile: progressively hide far images and shrink center */
    @media (max-width: 900px) {
      #artistCarousel { height: 260px; }
      #artistCarousel img.center {
        width: 220px;
        height: 220px;
        transform: translate(-50%, -50%) translateZ(0px) scale(1);
      }
      #artistCarousel img.prev3, #artistCarousel img.next3,
      #artistCarousel img.prev4, #artistCarousel img.next4 {
        display: none;
      }
    }

    @media (max-width: 600px) {
      #artistCarousel { height: 200px; }
      #artistCarousel img.center { width: 180px; height: 180px; }
      #artistCarousel img.prev2, #artistCarousel img.next2,

/* --- Player layout + minified state (replacement) --- */
/* Main player-bar (normal) */
.player-bar{
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 12px) + 56px);
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 1200px;
  padding: 12px 14px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(51,51,51,0.28), rgba(51,51,51,0.18));
  box-shadow: 0 8px 22px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index:1200;
  border: 1px solid rgba(255,255,255,0.015);
  backdrop-filter: blur(4px);
  box-sizing: border-box;
  transition: all 260ms cubic-bezier(.2,.9,.2,1);
}

/* Top row */
.player-top{ display:flex; width:100%; gap:12px; align-items:flex-start; box-sizing:border-box; }
/* Left (artist) */
.player-left img{ display:block; }
/* Mid (now playing) center-aligned */
.player-mid { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-sizing:border-box; padding:4px 8px; }

.nowPlayingLabel{ font-size:12px; color:#ddd; margin-bottom:4px; }
.np-line{ color:#fff; margin:2px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }

/* Bottom row */
.player-bottom{ display:flex; width:100%; gap:12px; align-items:center; box-sizing:border-box; }

.bottom-left{ display:flex; align-items:center; gap:8px; flex:1 1 0; min-width:0; }
.progress-row { display:flex; align-items:center; gap:8px; flex:1 1 0; min-width:0; }

.progress{
  -webkit-appearance:none; appearance:none;
  height:12px; border-radius:999px; outline:none; cursor:pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  background: linear-gradient(90deg,#2b2b2b,#1f1f1f);
}
.progress::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 6px 12px rgba(0,0,0,0.35); border:2px solid rgba(0,0,0,0.18); }
.progress::-moz-range-thumb{ width:18px; height:18px; border-radius:50%; background:#fff; }

.time{ font-size:13px; color:rgba(255,255,255,0.8); min-width:48px; text-align:center; }

.vol-range{ -webkit-appearance:none; appearance:none; height:8px; border-radius:999px; background:linear-gradient(90deg,#444,#222); }
.vol-range::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#fff; box-shadow:0 6px 12px rgba(0,0,0,0.35); }

.btn-ctrl{ background:linear-gradient(180deg,#111,#0d0d0d); color:#fff; border:none; padding:8px 10px; border-radius:8px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; justify-content:center; }
.btn-ctrl.small{ padding:6px 8px; font-size:13px; }

@media (max-width:700px){
  .player-bar{ width:calc(100% - 24px); padding:10px; }
  .player-top{ flex-direction:row; gap:8px; }
  .player-left{ flex:0 0 28%; }
  .player-mid{ padding:2px 6px; }
  .vol-range{ width:80px !important; }
}

/* ---------- Minified player state ---------- */
.player-bar.minified {
  width: auto !important;
  max-width: 360px !important;
  left: auto !important;
  right: 18px !important;
  transform: none !important;
  bottom: calc(env(safe-area-inset-bottom, 12px) + 62px) !important;
  padding: 8px 10px !important;
  border-radius: 10px !important;
  flex-direction: row !important;
  align-items: center !important;
  gap: 8px !important;
  box-shadow: 0 10px 26px rgba(0,0,0,0.35) !important;
}

/* Hide verbose areas in minified mode */
.player-bar.minified .player-mid,
.player-bar.minified .player-bottom {
  display: none !important;
  opacity: 0;
  height: 0;
  overflow: hidden;
}

/* Compact top row */
.player-bar.minified .player-top {
  display: flex !important;
  align-items: center !important;
  gap: 8px !important;
  width: auto !important;
}

/* Compact left controls */
.player-bar.minified .player-left {
  flex: 0 0 auto !important;
  display: flex !important;
  gap: 6px !important;
  align-items: center !important;
}

/* Reduce primary control button sizes */
.player-bar.minified .player-left .btn-ctrl {
  padding: 6px 8px !important;
  min-width: 40px !important;
  min-height: 40px !important;
  font-size: 18px !important;
  border-radius: 8px !important;
}

/* Artist thumbnail — small and clickable */
.player-bar.minified .player-right {
  flex: 0 0 auto !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  padding-left: 6px !important;
}
.player-bar.minified .player-right img {
  width: 56px !important;
  height: 56px !important;
  border-radius: 6px !important;
  object-fit: cover !important;
  cursor: pointer !important;
  box-shadow: 0 6px 18px rgba(0,0,0,0.34) !important;
}

/* Smooth transitions for appearing/disappearing parts */
.player-top, .player-bottom, .player-mid {
  transition: opacity 200ms ease, transform 200ms ease, height 200ms ease;
}

  <script>
    // Trim #songTitle to the substring before the first hyphen (handles -, – and —).
    (function(){
      function preHyphen(text){
        if(!text) return '';
        return (text.split(/[-–—]/)[0] || text).trim();
      }

      function applyTrim(){
        var el = document.getElementById('songTitle');
        if(!el) return;
        var raw = el.textContent || '';
        var trimmed = preHyphen(raw);
        if(trimmed !== raw.trim()){
          el.textContent = trimmed;
        }
      }

      // Observe changes to #songTitle and wrapper to handle dynamic updates
      var titleEl = document.getElementById('songTitle');
      if(titleEl){
        applyTrim();
        var obs = new MutationObserver(function(){ applyTrim(); });
        obs.observe(titleEl, { childList: true, characterData: true, subtree: true });

        var wrap = document.getElementById('nowPlayingWrap');
        if(wrap){
          var wrapObs = new MutationObserver(function(){ setTimeout(applyTrim, 10); });
          wrapObs.observe(wrap, { childList: true, subtree: true });
        }

        var intval = setInterval(applyTrim, 700);
        window.addEventListener('beforeunload', function(){
          try{ obs.disconnect(); }catch(e){}
          try{ wrapObs && wrapObs.disconnect(); }catch(e){}
          clearInterval(intval);
        });
      }
    })();
  </script>

<script>
  // ====== Playlist integration adapted for Music.html ======
  // Uses Music.html global variables:
  //  - currentPlaylist (array)
  //  - currentSongIndex (int)
  //  - playSong() to start playback of currentPlaylist[currentSongIndex]
  //  - uploadPlaylistToServer() exists in Music.html for uploading "current" list; we leave it intact.
  // If any helper names differ, adjust as necessary.

  (function(){

    // helper: simple basename
    function basename(p){
  try {
    const n = String(p || '').split('/').pop();
    try {
      // decode percent-escapes (e.g. "Dark%20Til%20Daylight" -> "Dark Til Daylight")
      return decodeURIComponent(n);
    } catch (e) {
      // decode failed (malformed % sequences) -> return raw filename
      return n;
    }
  } catch (e) {
    return String(p || '');
  }
}


    /* ====== Server file helpers (adapted from radio.html) ====== */
    async function tryFetchUrl(url) {
      try {
        const r = await fetch(url, { cache: 'no-store' });
        if (!r || !r.ok) return null;
        const t = await r.text();

        // 1) Prefer to extract triple-wrapped payloads [[[ ... ]]] and parse the inner array
        const tripleMatch = t.match(/\[\[\[([\s\S]*?)\]\]\]/);
        if (tripleMatch && tripleMatch[1]) {
          try {
            const parsed = JSON.parse(tripleMatch[1]);
            if (Array.isArray(parsed)) return flattenStoredList(parsed);
          } catch (e) { /* fall through to other attempts */ }
        }

        // 2) Try to find the first JSON array slice in arbitrary text (existing fallback style)
        const extractFirstJsonArray = (text) => {
          if (!text || typeof text !== 'string') return null;
          for (let i = 0; i < text.length; i++) {
            if (text[i] === '[') {
              let depth = 0;
              for (let j = i; j < text.length; j++) {
                if (text[j] === '[') depth++;
                else if (text[j] === ']') {
                  depth--;
                  if (depth === 0) return text.slice(i, j + 1);
                }
              }
              break;
            }
          }
          return null;
        };

        const arrSlice = extractFirstJsonArray(t);
        if (arrSlice) {
          try {
            const parsed = JSON.parse(arrSlice);
            // normalize case where JSON is nested once (e.g. [[ "A","B" ]]) — flatten one level
            if (Array.isArray(parsed) && parsed.length === 1 && Array.isArray(parsed[0])) return flattenStoredList(parsed[0]);
            if (Array.isArray(parsed)) return flattenStoredList(parsed);
          } catch (e) { /* ignore parse errors */ }
        }

        // 3) Try parsing the whole text if it is directly a JSON array
        try {
          const whole = JSON.parse(t);
          if (Array.isArray(whole)) return flattenStoredList(whole);
        } catch (e) { /* ignore */ }

        return null;
      } catch (e) {
        return null;
      }
    }

    async function loadPlaylistFileFromServer(profile, playlistSlug) {
      profile = profile || getActiveProfileName();
      if (!playlistSlug) return [];
      const fileName = `${profile}-${playlistSlug}.txt`;
      // try windows-style
      let tried = [];
      const p1 = `/Profiles/${encodeURIComponent(fileName)}?_=${Date.now()}`;
      tried.push(p1);
      let res = await tryFetchUrl(p1);
      if (Array.isArray(res)) return normalizeLoadedPlaylist(res);
      // try alternative (no extension)
      const p2 = `/Profiles/${encodeURIComponent(profile + '-' + playlistSlug)}?_=${Date.now()}`;
      tried.push(p2);
      res = await tryFetchUrl(p2);
      if (Array.isArray(res)) return normalizeLoadedPlaylist(res);
      // try Android / /api/file path
      try {
        const androidPath = `/Profiles/${encodeURIComponent(fileName)}?_=${Date.now()}`;
        res = await tryFetchUrl(androidPath);
        if (Array.isArray(res)) return res.map(basename);
      } catch(e){}
      return [];
    }

// NEW savePlaylistFileToServer — ensures arr is saved as basenames
async function savePlaylistFileToServer(profile, playlistSlug, arr) {
  profile = profile || getActiveProfileName();
  if (!playlistSlug) return false;
  const fileName = `${profile}-${playlistSlug}.txt`;
  const androidPath = '/Profiles/';

  // Normalize elements to basenames (strip any leading path/ Music/ )
  const basenames = (Array.isArray(arr) ? arr : []).map(a => {
    if (!a) return a;
    try { return String(a).split('/').pop(); } catch (e) { return a; }
  });

  const sanitized = `[[[\n${JSON.stringify(basenames, null, 2)}\n]]]`;

  // Try Windows PUT
  try {
    await fetch(`/Profiles/${encodeURIComponent(fileName)}`, { method: 'PUT', headers: { 'Content-Type':'text/plain' }, body: sanitized });
    return true;
  } catch(e){ /* continue to other attempts */ }

  // Try API PUT (android-style)
  try {
    const blob = new Blob([sanitized], { type: 'text/plain' });
    const form = new FormData();
    form.append('files[]', blob, fileName);
    await fetch(`/api/file/upload?path=${encodeURIComponent(androidPath)}`, { method: 'PUT', body: form });
    return true;
  } catch(e){}

  // final fallback: attempt simpler put
  try {
    await fetch(`/Profiles/${encodeURIComponent(fileName)}`, { method: 'PUT', headers: { 'Content-Type':'text/plain' }, body: sanitized });
    return true;
  } catch(e){ console.warn('savePlaylistFileToServer failed', e); return false; }
}


    async function loadMasterPlaylistsFromServer(profile) {
      profile = profile || getActiveProfileName();
      const fileName = `${profile}-playlists.txt`;
      const url = `/Profiles/${encodeURIComponent(fileName)}?_=${Date.now()}`;
      const arr = await tryFetchUrl(url);
      if (Array.isArray(arr)) return flattenStoredList(arr);
      // maybe saved as profile-playlists (no ext)
      const url2 = `/Profiles/${encodeURIComponent(profile + '-playlists')}?_=${Date.now()}`;
      const arr2 = await tryFetchUrl(url2);
      if (Array.isArray(arr2)) return flattenStoredList(arr2);
      return [];
    }

    async function saveMasterPlaylistsToServer(profile, arr) {
      profile = profile || getActiveProfileName();
      const fileName = `${profile}-playlists.txt`;
      try { await savePlaylistFileToServer(profile, 'playlists', arr); return true; } catch(e){ return false; }

    async function uploadPlaylistImage(profile, playlistSlug, file) {
      // adapted from radio.html: try both api upload and direct PUT
      const ext = (file && file.name && file.name.match(/\.\w+$/)) ? file.name.match(/\.\w+$/)[0] : '.jpg';
      const targetName = `${playlistSlug}${ext}`;
      const androidPath = '/Music/Images/';
      try {
        const form = new FormData();
        form.append('files[]', file, targetName);
        await fetch(`/api/file/upload?path=${encodeURIComponent(androidPath)}`, { method: 'PUT', body: form });
        return true;
      } catch (e) { /* fallback */ }
      try {
        await fetch(`/Profiles/${encodeURIComponent(targetName)}`, { method: 'PUT', headers: { 'Content-Type': file.type || 'application/octet-stream' }, body: file });
        return true;
      } catch (e) { console.warn('uploadPlaylistImage failed', e); return false; }
    }

    // deterministic hash used to pick a playlistN.jpg fallback
    function hashString(s) {
      let h = 0;
      if (!s) return 0;
      for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i);
        h |= 0; // force 32-bit int
      }
      return h;
    }

    async function checkPlaylistImageUrl(profile, slug, index) {
      profile = profile || getActiveProfileName();
      if (!slug) return 'Music/Images/default.jpg';

      // base path uses slug (slugs created by sanitizePlaylistName are safe; encodeURIComponent for safety)
      const base = `/Music/Images/${encodeURIComponent(slug)}`;

      try {
        const j = await fetch(base + '.jpg', { method: 'HEAD' });
        if (j && j.ok) return base + '.jpg';
      } catch (e) { /* ignore */ }

      try {
        const p = await fetch(base + '.png', { method: 'HEAD' });
        if (p && p.ok) return base + '.png';
      } catch (e) { /* ignore */ }

      // fallback: deterministic playlist1..playlist15.jpg
      const idx = (typeof index === 'number') ? ((index % 15) + 1) : (Math.abs(hashString(slug) % 15) + 1);
      const fallback = `/Music/Images/playlist${idx}.jpg`;

      try {
        const f = await fetch(fallback, { method: 'HEAD' });
        if (f && f.ok) return fallback;
      } catch (e) { /* ignore */ }

      // final fallback
      return 'Music/Images/default.jpg';
    }

    function sanitizePlaylistName(s) {
      if (!s) return null;
      return String(s).trim().replace(/[^a-z0-9\-_\s]/gi, '').replace(/\s+/g,'-').toLowerCase();
    }

    /* ====== Append helper: add current track to playlist file + update in-memory currentPlaylist ====== */
    async function appendSongToPlaylist(profile, playlistSlug, songPath) {
      profile = profile || getActiveProfileName();
      if (!playlistSlug || !songPath) return false;
      const songName = normalizeSongBase(songPath);
      try {
        const arr = await loadPlaylistFileFromServer(profile, playlistSlug) || [];
        if (!Array.isArray(arr)) return false;
        // dedupe by basename
        if (arr.find(x => (x||'').split('/').pop() === songName)) return true;
        arr.push(songName);
        const ok = await savePlaylistFileToServer(profile, playlistSlug, arr);
        if (ok) {
          // if playlist currently loaded in-memory, update it (keep Music/ path normalization)
          try {
            if (Array.isArray(window.currentPlaylist)) {
              const norm = /^https?:\/\//i.test(songPath) || songPath.startsWith('/') ? songPath : (songPath.startsWith('Music/') ? songPath : ('Music/' + songPath));
              window.currentPlaylist.push(norm);
            }
          } catch(e){}
        }
        return ok;
      } catch(e){
        console.warn('appendSongToPlaylist failed', e);
        return false;
      }
    }

    /* ====== UI functions ====== */
    const playlistGrid = document.getElementById('playlistGrid');
    const playlistDialog = document.getElementById('playlistDialog');
    const dialogOverlay = document.getElementById('dialogOverlay');

    function hidePlaylistDialog(){
      try { playlistDialog.style.display = 'none'; dialogOverlay.style.display = 'none'; } catch(e){}
      try { document.getElementById('managePlaylistDialog').style.display = 'none'; } catch(e){}
    }

    dialogOverlay && dialogOverlay.addEventListener('click', hidePlaylistDialog);

    async function renderPlaylistTiles(){
      if (!playlistGrid) return;
      playlistGrid.innerHTML = '';
      // top row (back / create)
      const topRow = document.createElement('div');
      topRow.style.display = 'flex';

function getCurrentTrack() {
  try {
    // 1) Prefer Music.html globals if present
    if (Array.isArray(window.currentPlaylist) && typeof window.currentSongIndex !== 'undefined' && window.currentSongIndex !== null) {
      // allow string index like "0"
      const idx = Number(window.currentSongIndex);
      if (Number.isFinite(idx) && window.currentPlaylist[idx]) {
        return window.currentPlaylist[idx];
      }
      // if index is invalid but playlist has items, return first item as reasonable fallback
      if (window.currentPlaylist.length > 0) return window.currentPlaylist[0];
    }

    // 2) Some apps keep a single object/string under other names — try several common ones
    const altNames = ['currentTrack','currentSong','currentPlaying','nowPlaying','now_playing','nowPlayingTrack','playingTrack'];
    for (const name of altNames) {
      const val = window[name];
      if (!val) continue;
      if (typeof val === 'string') return val;
      if (typeof val === 'object') {
        // try common fields
        if (val.src) return val.src;
        if (val.url) return val.url;
        if (val.path) return val.path;
        if (val.file) return val.file;
        if (val.filename) return val.filename;
        if (val.name) return val.name;
      }
    }

    // 3) Try the audio element on the page (HTMLAudioElement)
    const audio = document.querySelector('audio') || document.getElementById('audio') || document.querySelector('audio#playerAudio');
    if (audio) {
      if (audio.currentSrc) return audio.currentSrc;
      if (audio.src) return audio.src;
      if (audio.dataset && audio.dataset.src) return audio.dataset.src;
    }

    // 4) Check player DOM for data attributes
    const playerEl = document.getElementById('player');
    if (playerEl) {
      if (playerEl.dataset && playerEl.dataset.currentTrack) return playerEl.dataset.currentTrack;
      const attr = playerEl.getAttribute && playerEl.getAttribute('data-current-track');
      if (attr) return attr;
    }

    return null;
  } catch (e) {
    console.warn('getCurrentTrack error', e);
    return null;
  }
}

function normalizeSongBase(raw) {
  let s = String(raw == null ? '' : raw).trim();
  try { s = decodeURIComponent(s); } catch (e) {}
  s = s.split(/[\/]/).pop();
  s = s.replace(/[?#].*$/, '');
  s = s.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)(\?.*)?$/i, '');
  s = s.replace(/\$[9AM\+RPUHEBC]$/i, '');
  return s.trim();
}

function flattenStoredList(input) {
  const out = [];
  const walk = (item) => {
    if (item == null) return;
    if (Array.isArray(item)) {
      item.forEach(walk);
      return;
    }
    let str = String(item).trim();
    if (!str) return;

    // Some legacy saves store arrays as strings; expand them recursively.
    if (str.startsWith('[') && str.endsWith(']')) {
      try {
        const parsed = JSON.parse(str);
        if (Array.isArray(parsed)) {
          walk(parsed);
          return;
        }
      } catch (e) {}
    }

    out.push(str);
  };

  walk(input);
  return out;
}

function parseLibraryEntry(entry) {
  const raw = String(entry == null ? '' : entry).trim();
  if (!raw) return null;
  const idx = raw.lastIndexOf('$');
  if (idx === -1) {
    const baseOnly = normalizeSongBase(raw);
    return baseOnly ? { base: baseOnly, code: '', genre: '' } : null;
  }
  const base = normalizeSongBase(raw.slice(0, idx));
  const code = raw.slice(idx + 1).trim();
  if (!base) return null;
  return {
    base,
    code,
    genre: MUSIC_LIBRARY_GENRE_MAP[code] || code,
    raw
  };
}

async function urlExistsWithin(url, timeoutMs = 100) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const res = await fetch(url, {
      method: 'HEAD',
      cache: 'no-store',
      signal: controller.signal
    });
    clearTimeout(timer);
    return !!(res && res.ok);
  } catch (e) {
    return false;
  }
}

// Robust filename parser (handles "Title - Artist", "Artist - Title", "01 - Artist - Title", etc.)
function parseFilename(filename) {
  if (!filename) return { title: '', artist: '' };
  const base = normalizeSongBase(filename);
  const parts = base.split(' - ').map(p => p.trim()).filter(Boolean);
  if (parts.length === 0) return { title: '', artist: '' };
  if (parts.length === 1) return { title: parts[0], artist: '' };
  if (parts.length >= 3 && /^\d+$/.test(parts[0])) {
    const artist = parts[1];
    const title = parts.slice(2).join(' - ');
    return { title, artist };
  }
  if (parts.length === 2) {
    return { title: parts[0], artist: parts[1] };
  }
  const artist = parts[parts.length - 1];
  const title = parts.slice(0, parts.length - 1).join(' - ');
  return { title, artist };
}

function getTitleFromFilename(filename) {
  return parseFilename(filename).title || '';
}

function getArtistFromFilename(filename) {
  return parseFilename(filename).artist || '';
}

function getSongsForArtist(artistName) {
  const songs = [];
  const seen = new Set();
  const target = String(artistName || '').trim();
  if (!target) return songs;

  MUSIC_LIBRARY_ENTRIES.forEach(rec => {
    const artist = getArtistFromFilename(rec.base);
    if (artist === target && !seen.has(rec.base)) {
      seen.add(rec.base);
      songs.push(rec.base);
    }
  });

  return songs;
}

    function shuffle(array) {

        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function updatePlaylistOrder() {
      const listEl = document.getElementById("playlistOrder");
      listEl.innerHTML = "";

      const windowSize = 3;
      const total = currentPlaylist.length;
      if (total === 0) return;

      let start = currentSongIndex - Math.floor(windowSize / 2);
      start = Math.max(0, Math.min(start, total - windowSize));
      const end = Math.min(total, start + windowSize);

      for (let i = start; i < end; i++) {
        const fileName = currentPlaylist[i];
        const title = fileName.replace(/\.(mp3|flac)$/i, "");
        const li = document.createElement("li");
        li.innerText = title;
        li.style.cursor = "pointer";
        li.onclick = () => {
          currentSongIndex = i;
          playSong();
          uploadPlaylistToServer(currentPlaylist);
        };
        if (i === currentSongIndex) {
          li.classList.add("active");
          setTimeout(() => li.scrollIntoView({ behavior: "smooth", block: "nearest" }), 0);
        }
        listEl.appendChild(li);

  function basename(path) {
    try { return ('' + path).split('/').pop(); } catch (e) { return path || ''; }
  }
  function stripExt(s) { return (s || '').replace(/\.[^/.]+$/, ''); }
  function norm(s) { return (s || '').toString().trim().toLowerCase(); }
  function stripQuotes(s) { return (s || '').replace(/^["']+|["']+$/g, '').trim(); }

  // Parse either "Song - Artist" or "Artist - Song". We return both possibilities.
  function parseSongArtistFromName(name) {
    const out = { song: '', artist: '' };
    if (!name || typeof name !== 'string') return out;
    const clean = stripExt(basename(name)).trim();
    if (clean.includes(' - ')) {
      const parts = clean.split(' - ').map(p => p.trim()).filter(Boolean);
      if (parts.length >= 2) {
        // default: assume left = song, right = artist
        out.song = parts.slice(0, parts.length - 1).join(' - ').trim();
        out.artist = parts.slice(-1)[0].trim();
        // also provide alternate possibility (artist first)
        out.alt = {
          song: parts.slice(1).join(' - ').trim(),
          artist: parts[0].trim()
        };
      } else {
        out.song = clean;
      }
    } else if (clean.includes('-')) {
      const parts = clean.split('-').map(p => p.trim()).filter(Boolean);
      if (parts.length >= 2) {
        out.song = parts.slice(0, parts.length - 1).join(' - ').trim();
        out.artist = parts.slice(-1)[0].trim();
        out.alt = { song: parts.slice(1).join(' - ').trim(), artist: parts[0].trim() };
      } else {
        out.song = clean;
      }
    } else {
      out.song = clean;
    }
    return out;
  }

audio.src = src;

      const targetArtist = parsedTarget.artist || (parsedTarget.alt && parsedTarget.alt.artist) || '';

      const allSongs = [];
      try {
        if (Array.isArray(MUSIC_LIBRARY_ENTRIES)) {
          MUSIC_LIBRARY_ENTRIES.forEach(rec => { if (rec && rec.base && !allSongs.includes(rec.base)) allSongs.push(rec.base); });

      // 1) Exact basename match (highest priority)
      let found = allSongs.find(fn => norm(stripExt(basename(fn))) === norm(targetBasename));
      if (!found) {
        // 2) song+artist exact match
        if (targetSong && targetArtist) {
          const bySongArtist = allSongs.find(fn => {
            const p = parseSongArtistFromName(fn);
            return norm(p.song) === norm(targetSong) && norm(p.artist) === norm(targetArtist);
          });

        }
      }

      // 3) song-only match
      if (!found && targetSong) {
        const bySong = allSongs.find(fn => {

          return norm(p.song) === norm(targetSong);
        });

      }

      // 4) artist-first fallback
      if (!found && targetArtist) {

      if (!found && targetBasename) {

      let artistSongs = getSongsForArtistCandidates(uniqArtists);

      try { const artistsEl = document.getElementById('artists'); if (artistsEl) artistsEl.style.display = 'none'; } catch(e){}

      // Try to pre-select/check the artist checkbox in UI if present (best-effort)
      try {

        if (artistName) {
          const cb = document.querySelector(`#search-artist-cb-${CSS.escape(artistName)}`);
          if (cb) cb.checked = true;
          setArtistCheckedSafe(artistName, true);

      } catch(e){}

      // Let the page's playSong() do the UI & image updates. If it's available, call it.
      let played = false;
      try {
        if (typeof playSong === 'function') {
          playSong();
          played = true;
        } else if (typeof playCurrentSong === 'function') {

      }

      try { if (typeof uploadPlaylistToServer === 'function') uploadPlaylistToServer(playlist); } catch(e){}
      try { const p = document.getElementById('player'); if (p) p.scrollIntoView({ behavior: 'smooth' }); } catch(e){}
    } catch (e) {

// simple basename helper (returns last path segment)
function basename(path) {
  if (!path && path !== 0) return '';
  try {
    var p = String(path).trim().replace(/^["']|["']$/g, '');
    var parts = p.split(/[\/]/);
    var last = parts[parts.length - 1] || '';
    return last.trim();
  } catch (e) { return String(path); }
}

// toggle like/unlike for a given file (accepts full path or bare filename)
function toggleLikeForFile(fileName) {
  if (!fileName) return;
  var name = normalizeSongBase(fileName);
  var liked = Array.isArray(getStoredLikedSongs()) ? getStoredLikedSongs().slice() : [];
  // ensure stored values are basenames
  liked = liked.map(x => normalizeSongBase(x));
  var idx = liked.indexOf(name);
  if (idx === -1) {
    liked.push(name);
  } else {
    liked.splice(idx, 1);
  }
  setStoredLikedSongs(liked);
  try { if (typeof saveLikedSongsToServer === 'function') saveLikedSongsToServer(liked); } catch(e){}
  // update UI
  updateLikedSongs();
  updateLikedSongsUI();
}

/* Robust setNowPlayingMetadata (paste over existing function) */
function setNowPlayingMetadata(artist, title, imagePath) {
  try {
    if (!('mediaSession' in navigator)) {
      console.debug('[setNowPlayingMetadata] mediaSession not supported');
      return;
    }

    const metaTitle = title || '';
    const metaArtist = artist || '';
    // Build absolute URL for artwork (avoids relative path issues)
    const artUrl = (imagePath && (imagePath.indexOf('http') === 0)) ? imagePath : new URL(imagePath || ('Music/Images/' + (artist || 'default') + '.jpg'), location.href).href;

    // Ensure audio element is CORS-enabled (for blob fetches and some platform requirements)
    try { if (typeof audio !== 'undefined' && audio) audio.crossOrigin = audio.crossOrigin || 'anonymous'; } catch(e){}

    // Quick set using absolute URL (some platforms can use it immediately)
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: metaTitle || 'Unknown Title',
        artist: metaArtist || 'Unknown Artist',
        album: '',
        artwork: [
          { src: artUrl, sizes: '96x96',   type: 'image/jpeg' },
          { src: artUrl, sizes: '128x128', type: 'image/jpeg' },
          { src: artUrl, sizes: '192x192', type: 'image/jpeg' },
          { src: artUrl, sizes: '512x512', type: 'image/jpeg' }
        ]
      });
      navigator.mediaSession.playbackState = (typeof audio !== 'undefined' && audio && !audio.paused) ? 'playing' : 'paused';
      console.debug('[setNowPlayingMetadata] set absolute artwork url', artUrl);
    } catch (e) {
      console.warn('[setNowPlayingMetadata] initial metadata set failed', e);
    }

    // Try fetch -> blob (CORS required). If successful, replace artwork with blob URL.
    (async function tryFetchAndSetBlob() {
      try {
        const resp = await fetch(artUrl, { mode: 'cors', cache: 'force-cache', credentials: 'omit' });
        if (!resp.ok) throw new Error('fetch failed: ' + resp.status);
        const blob = await resp.blob();
        const blobUrl = URL.createObjectURL(blob);
        try {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: metaTitle || 'Unknown Title',
            artist: metaArtist || 'Unknown Artist',
            album: '',
            artwork: [
              { src: blobUrl, sizes: '96x96',   type: blob.type || 'image/jpeg' },
              { src: blobUrl, sizes: '128x128', type: blob.type || 'image/jpeg' },
              { src: blobUrl, sizes: '192x192', type: blob.type || 'image/jpeg' },
              { src: blobUrl, sizes: '512x512', type: blob.type || 'image/jpeg' }
            ]
          });
          console.debug('[setNowPlayingMetadata] replaced artwork with blob url');
          // Revoke later (grace period so platform can use it)
          setTimeout(() => { try { URL.revokeObjectURL(blobUrl); } catch(e){} }, 60_000);
        } catch(e) {
          console.warn('[setNowPlayingMetadata] failed to set blob artwork metadata', e);
        }
      } catch (e) {
        console.debug('[setNowPlayingMetadata] blob fetch failed or CORS blocked; falling back to absolute URL', e);
      }
    })();
  } catch (e) {
    console.warn('setNowPlayingMetadata failed', e);
  }
}

    } else {

<script>
/* ====== platform detection (reads ./platform.txt like index.html) ====== */
async function getCachedPlatform() {
  if (window.__cachedPlatform) return window.__cachedPlatform;
  try {
    const r = await fetch('./platform.txt', { cache: 'no-store' });
    if (r && r.ok) {
      window.__cachedPlatform = (await r.text()).trim().toLowerCase();
      return window.__cachedPlatform;
    }
  } catch (e) {
    console.warn('Could not fetch platform.txt, falling back to localStorage or "windows".', e);
  }
  window.__cachedPlatform = (localStorage.getItem('SERVER_UPLOAD_STYLE') || 'windows').toLowerCase();
  return window.__cachedPlatform;
}
document.addEventListener('DOMContentLoaded', async () => {
  window.detectedPlatform = await getCachedPlatform().catch(()=> 'windows');
  try { localStorage.setItem('SERVER_UPLOAD_STYLE', window.detectedPlatform); } catch(e){}
});
function platformNow() {
  return (window.detectedPlatform || window.__cachedPlatform || localStorage.getItem('SERVER_UPLOAD_STYLE') || 'windows').toLowerCase();
}
function isWindowsUpload() { return platformNow().includes('windows'); }
function isAndroidUpload() { return platformNow().includes('android'); }
function isIphoneUpload() { 
  const p = platformNow();
  return p.includes('iphone') || p === 'iphones';
}

/* ====== pocketserver helpers (copied from index.html) ====== */
async function pocketUpload(name, targetDir, payloadText) {
  try {
    const blob = new Blob([payloadText || window.__pocketPayload || ''], { type: 'application/json' });
    const form = new FormData();
    form.append('files[]', blob, name);
    form.append('targetDir', targetDir);
    const r = await fetch('/pocketserver-api/upload', { method: 'POST', body: form, credentials: 'include' });
    const txt = await r.text().catch(()=> '');
    console.log('[pocketUpload] ', name, '->', r.status, txt);
    return r.ok;
  } catch (e) {
    console.warn('[pocketUpload] failed', name, e);
    return false;
  }
}
async function listProfiles(targetDir) {
  try {
    const q = encodeURIComponent(targetDir);
    const r = await fetch(`/pocketserver-api/list?q=${q}`, { credentials: 'include' });
    if (!r.ok) { console.warn('[pocket] list failed', r.status); return null; }
    const text = await r.text();
    try { return JSON.parse(text); } catch { return text; }
  } catch (e) {
    console.error('[pocket] listProfiles error', e);
    return null;
  }
}
async function deletePath(fullPath) {
  try {
    const body = { command: "delete", paths: [ fullPath ], name: "", targetDir: "" };
    const r = await fetch('/pocketserver-api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'include'
    });
    const txt = await r.text().catch(()=> '');
    console.log('[pocket] deletePath', fullPath, '->', r.status, txt);
    return r.ok;
  } catch (e) {
    console.error('[pocket] deletePath error', fullPath, e);
    return false;
  }
}
async function pocketReplace(baseName, targetDir, payloadText) {
  const tempName = baseName + '.__new__';
  // upload temp
  const tempOk = await pocketUpload(tempName, targetDir, payloadText);
  if (!tempOk) { console.warn('[pocketReplace] temp upload failed', tempName); return false; }
  // verify visible
  const midList = await listProfiles(targetDir);
  const midText = midList ? (typeof midList === 'string' ? midList : JSON.stringify(midList)) : '';
  if (!midText.includes(tempName)) { console.warn('[pocketReplace] temp not visible', tempName); return false; }
  // delete existing desired
  const desiredFullPath = targetDir + baseName;
  const delOk = await deletePath(desiredFullPath);
  if (!delOk) { console.warn('[pocketReplace] could not delete existing', desiredFullPath); return false; }
  // upload final
  const finalOk = await pocketUpload(baseName, targetDir, payloadText);
  if (!finalOk) { console.warn('[pocketReplace] final upload failed', baseName); return false; }
  // cleanup temp
  await deletePath(targetDir + tempName).catch(()=>{});
  return finalOk;
}

// NEW uploadPlaylistToServer — saves basenames (no "Music/" prefix) so playlists match legacy files
async function uploadPlaylistToServer(playlistArray) {
  const profile = getActiveProfileName();
  const fileNameTxt = `${profile}-radio.txt`;
  const fileNameNoExt = `${profile}-radio`;
  const androidPath = '/Profiles/';

  // Normalize to basenames (strip any "Music/" or path parts) so stored playlists use plain filenames
  // Normalize to basenames (strip any "Music/" or path parts) so stored playlists use plain filenames
  const basenames = (Array.isArray(playlistArray) ? playlistArray : []).map(item => {
    if (!item) return item;
    try {
      const name = String(item).split('/').pop(); // filename portion
      try {
        // decode percent-escapes (turn "Dark%20Til%20Daylight..." -> "Dark Til Daylight...")
        return decodeURIComponent(name);
      } catch (e) {
        // if it isn't percent-encoded (or decode fails), return the raw name
        return name;
      }
    } catch (e) {
      return item;
    }
  });

  const jsonArray = JSON.stringify(basenames, null, 2);
  const sanitized = `[[[\n${jsonArray}\n]]]`;

  // stash payload for pocket helpers (keeps compatibility with your iPhone helpers)
  window.__pocketPayload = sanitized;

  // iPhone branch (unchanged) — attempts pocketReplace/pocketUpload then fallback
  if (isIphoneUpload && isIphoneUpload()) {
    const targetDir = 'file:///private/var/mobile/Library/LiveFiles/com.apple.filesystems.userfsd/2B3E705A-D115-3563-8EB1-F240305273C0/VideoServer/Profiles/';
    try {
      const ok = await pocketReplace(fileNameNoExt, targetDir, sanitized);
      if (ok) { console.log('[uploadPlaylistToServer] iphone pocketReplace OK'); return; }
      const up = await pocketUpload(fileNameNoExt, targetDir, sanitized);
      if (up) return;
    } catch(e) { console.warn('[uploadPlaylistToServer] iphone flow exception', e); }
    await putTxtCopy(encodeURIComponent(fileNameNoExt), sanitized);
    return;
  }

  // Android branch: FormData upload — same as before but payload uses basenames
  if (isAndroidUpload && isAndroidUpload()) {
    try {
      const blob = new Blob([sanitized], { type: "application/json" });
      const form = new FormData();
      form.append("files[]", blob, fileNameTxt);
      form.append("files[]", blob, fileNameNoExt);
      await fetch(`/api/file/upload?path=${encodeURIComponent(androidPath)}`, { method: 'PUT', body: form });
      return;
    } catch (err) {
      console.error('Playlist upload (android) failed:', err);
    }
  }

  // Windows or fallback: PUT .txt then try no-ext variant (same endpoints, but payload is basenames)
  try {
    await fetch(`/Profiles/${encodeURIComponent(fileNameTxt)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'text/plain' },
      body: sanitized
    });
  } catch (err) { console.warn('Playlist upload (windows .txt) failed:', err); }

  try {
    await fetch(`/Profiles/${encodeURIComponent(fileNameNoExt)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'text/plain' },
      body: sanitized
    });
  } catch (err) { console.warn('Playlist upload (windows no-ext) failed:', err); }
}

(function(){
  const toastEl = document.getElementById('sys-toast');
  const modalOverlay = document.getElementById('sys-modal-overlay');
  const modalTitle = document.getElementById('sys-modal-title');
  const modalMessage = document.getElementById('sys-modal-message');
  const modalYes = document.getElementById('sys-modal-yes');
  const modalNo = document.getElementById('sys-modal-no');
  let toastTimer = null;

  function showToast(msg, ms=3000) {
    if (!toastEl) return;
    toastEl.textContent = String(msg || '');
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove('show');
    }, ms);
  }

  // showAlert (non-blocking) — for replacing alert()
  function showAlert(msg) {
    showToast(msg, 3000);
  }

  // showConfirm returns a Promise<boolean>
  function showConfirm({ title = 'Confirm', message = 'Are you sure?' } = {}) {
    return new Promise((resolve) => {
      if (!modalOverlay) return resolve(false);
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalOverlay.classList.add('show');
      modalOverlay.setAttribute('aria-hidden', 'false');

      function cleanup() {
        modalOverlay.classList.remove('show');
        modalOverlay.setAttribute('aria-hidden', 'true');
        modalYes.removeEventListener('click', onYes);
        modalNo.removeEventListener('click', onNo);
        document.removeEventListener('keydown', onKey);
      }
      function onYes() { cleanup(); resolve(true); }
      function onNo() { cleanup(); resolve(false); }
      function onKey(e) {
        if (e.key === 'Escape') { onNo(); }
        if (e.key === 'Enter') { onYes(); }
      }

      modalYes.addEventListener('click', onYes);
      modalNo.addEventListener('click', onNo);
      document.addEventListener('keydown', onKey);
      // focus primary button
      setTimeout(()=> modalYes.focus(), 50);
    });
  }

  // Expose
  window.SysNotify = {
    toast: showToast,
    alert: showAlert,
    confirm: (msg, title) => showConfirm({ title: title || 'Confirm', message: msg || '' })
  };

  // Replace window.alert to route to toast so old alert() calls don't show native modals
  // (non-blocking)
  try { window.alert = (m) => { window.SysNotify && window.SysNotify.alert(m); }; } catch(e){}

})();

  // ---------- MARQUEE: create, update, measure, animate ----------
  function createMarqueeIfMissing() {
    if (marquee) return marquee;
    marquee = document.createElement('div');
    marquee.id = 'playerBarMarquee';
    marquee.setAttribute('aria-hidden','false');
    Object.assign(marquee.style, {
      position: 'absolute',
      bottom: '0px',
      height: MARQUEE_HEIGHT + 'px',
      left: '0px', // Span full width of player bar
      right: '0px', // Span full width of player bar
      overflow: 'hidden',
      pointerEvents: 'auto',
      zIndex: 2147483646,
      display: 'none',
      alignItems: 'center',
      background: 'transparent'
    });

    marqueeText = document.createElement('div');
    marqueeText.id = 'playerBarMarqueeText';
    Object.assign(marqueeText.style, {
      whiteSpace: 'nowrap',
      fontWeight: '800',
      color: '#ffffff',
      fontSize: '14px',
      lineHeight: MARQUEE_HEIGHT + 'px',
      paddingLeft: '12px', // Add some padding so text doesn't start right at edge
      paddingRight: '12px', // Add some padding so text doesn't end right at edge
      transform: 'translateX(0px)',
      willChange: 'transform',
      display: 'inline-block',
      textRendering: 'optimizeLegibility',
      pointerEvents: 'auto',
    });

    marquee.appendChild(marqueeText);
    playerBar.appendChild(marquee);
    return marquee;
  }

  function destroyMarquee() {
    stopMarqueeAnimation();
    if (marquee && marquee.parentNode) marquee.parentNode.removeChild(marquee);
    marquee = null;
    marqueeText = null;
  }

  function stopMarqueeAnimation() {
    try {
      if (marqueeAnimation && marqueeAnimation.cancel) marqueeAnimation.cancel();
      marqueeAnimation = null;
      if (marqueeText) {
        marqueeText.style.transform = 'translateX(0px)';
        marqueeText.style.animation = '';
      }
    } catch(e){}
  }

  function startMarqueeIfNeeded() {
    if (!marquee || !marqueeText) return;
    try {
      // Use the full player bar width for marquee
      const playerRect = playerBar.getBoundingClientRect();
      const containerWidth = playerRect.width;
      
      marquee.style.display = 'flex';
      
      // Remove any previous left/right styling that might be constraining it
      marquee.style.left = '0px';
      marquee.style.right = '0px';

      const textWidth = marqueeText.getBoundingClientRect().width;
      stopMarqueeAnimation();

      if (textWidth > containerWidth) {
        const distance = textWidth - containerWidth + 24; // Extra space for smooth looping
        const speed = 30; // px/sec
        const duration = Math.max(2000, Math.round((distance / speed) * 1000));
        
        marqueeAnimation = marqueeText.animate(
          [
            { transform: 'translateX(0px)' },
            { transform: `translateX(${-distance}px)` }
          ],
          {
            duration: duration,
            iterations: Infinity,
            direction: 'alternate',
            easing: 'linear'
          }
        );
      } else {
        // Text fits, just center it
        marqueeText.style.transform = 'translateX(0px)';
        marquee.style.justifyContent = 'center';
      }
    } catch (e) {
      console.warn('marquee start error', e);
    }
  }

  function refreshMarqueeLayout() {
    if (overlay) {
      overlay.style.bottom = (playerBar.classList.contains('minified') ? `${MARQUEE_HEIGHT + MARQUEE_GAP}px` : '0px');
    }
    if (!playerBar.classList.contains('minified')) {
      if (marquee) marquee.style.display = 'none';
      stopMarqueeAnimation();
      return;
    }
    createMarqueeIfMissing();
    
    // Small delay to ensure DOM is updated before starting marquee
    setTimeout(() => {
      startMarqueeIfNeeded();
    }, 50);
  }

  // improved filename cleaning: decode percent-encoding, strip extension, collapse underscores/dots, trim
  function filenameNoExt(path) {
    try {
      if (!path) return '';
      let name = String(path).trim();
      try { name = decodeURIComponent(name); } catch(e){}
      
      // Handle various URL formats and extract the meaningful part
      name = name.split('?')[0].split('#')[0];
      
      // Try to extract title from URL parameters for streaming services
      const urlParams = new URLSearchParams(path.split('?')[1]);
      const titleFromParams = urlParams.get('title') || urlParams.get('name') || urlParams.get('track');
      if (titleFromParams) {
        return titleFromParams.replace(/[_\.]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
      }
      
      const parts = name.split('/');
      name = parts.pop() || parts.pop() || '';
      name = name.replace(/\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac)(\?.*)?$/i, '');
      name = name.replace(/[_\.]+/g, ' ');
      name = name.replace(/\+/g, ' ');
      name = name.replace(/\s{2,}/g, ' ').trim();
      
      // If we still have nothing meaningful, provide a default
      return name || 'Unknown Track';
    } catch(e){
      return 'Unknown Track';
    }
  }

  function detectCurrentFilePath() {
    try {
      const audio = document.querySelector('audio') || document.getElementById('audio');
      if (audio) {
        if (audio.currentSrc) return audio.currentSrc;
        if (audio.src) return audio.src;
        if (audio.dataset && audio.dataset.src) return audio.dataset.src;
      }

      if (Array.isArray(window.currentPlaylist) && typeof window.currentSongIndex !== 'undefined' && window.currentSongIndex !== null) {
        const idx = Number(window.currentSongIndex);
        if (Number.isFinite(idx) && window.currentPlaylist[idx]) return window.currentPlaylist[idx];
        if (window.currentPlaylist.length > 0) return window.currentPlaylist[0];
      }

      if (playerBar && playerBar.dataset && playerBar.dataset.currentTrack) return playerBar.dataset.currentTrack;
      const attr = playerBar.getAttribute && playerBar.getAttribute('data-current-track');
      if (attr) return attr;

      const alt = ['currentTrack','currentSong','nowPlaying','now_playing','playingTrack','now_playing_url'];
      for (const n of alt) {
        if (window[n]) {
          if (typeof window[n] === 'string') return window[n];
          if (typeof window[n] === 'object') {
            const o = window[n];
            return o.src || o.url || o.path || o.file || o.filename || o.name || null;
          }
        }
      }
      return null;
    } catch (e) {
      console.warn('detectCurrentFilePath error', e);
      return null;
    }
  }

  function updateMarqueeTextIfChanged() {
    try {
      if (!playerBar.classList.contains('minified')) return;
      createMarqueeIfMissing();
      const raw = detectCurrentFilePath() || '';
      const fallbackTitleEl = document.getElementById('songTitle');
      const base = filenameNoExt(raw) || (fallbackTitleEl ? fallbackTitleEl.textContent.trim() : '');
      if (!base) {
        if (marqueeText) marqueeText.textContent = '';
        if (marquee) marquee.style.display = 'none';
        stopMarqueeAnimation();
        currentMarqueeValue = '';
        return;
      }
      // If the value hasn't changed, normally skip — but if our marquee node/text doesn't exist or is empty, force an update
      if (base === currentMarqueeValue) {
        if (marqueeText && marqueeText.textContent && marqueeText.textContent.trim()) {
          return;
        }
        // else fall through and re-populate marqueeText
      }
      currentMarqueeValue = base;
      if (marqueeText) {
        marqueeText.textContent = base + '   ';
      }
      setTimeout(refreshMarqueeLayout, 55);
    } catch(e){ console.warn('updateMarqueeText error', e); }
  }

  // lock size & fix position; after that create overlay inside playerBar
  function lockSizeAndFixPosition() {
    const rect = playerBar.getBoundingClientRect();
    // extend the fixed height downward to include marquee space so it's not overlapped
    const extendedHeight = Math.round(rect.height + MARQUEE_HEIGHT + MARQUEE_GAP);
    playerBar.style.width = Math.round(rect.width) + 'px';
    playerBar.style.height = extendedHeight + 'px';
    playerBar.style.position = 'fixed';
    // lock the current visual top so enlarging the bar doesn't move it
    playerBar.style.top = Math.round(rect.top) + 'px';
    playerBar.style.left = Math.round(rect.left) + 'px';
    playerBar.style.right = 'auto';
    playerBar.style.bottom = 'auto';
    playerBar.style.transform = 'none';

    createMarqueeIfMissing();

    // overlay is created after marquee so we can reserve the bottom area
    createOverlayInside();
  }

  // clear inline sizing/position and remove overlay
  function clearLockedPosition() {
    playerBar.style.width = '';
    playerBar.style.height = '';
    playerBar.style.position = '';
    playerBar.style.left = '';
    playerBar.style.top = '';
    playerBar.style.right = '';
    playerBar.style.bottom = '';
    playerBar.style.transform = '';
    artImg.style.touchAction = '';
    artImg.style.cursor = '';
    if (overlay) removeOverlay();
    destroyMarquee();
  }

  function enterMinified() {
    playerBar.classList.add('minified');
    artImg.setAttribute('aria-pressed','true');

    // ensure we will regenerate marquee text when entering
    currentMarqueeValue = '';

    lockSizeAndFixPosition();
    applySavedTop();
    artImg.style.touchAction = 'none';
    artImg.style.cursor = 'grab';
    if (overlay) {
      overlay.style.touchAction = 'none';
      overlay.style.cursor = 'grab';
      attachOverlayListeners();
    }
    updateMarqueeTextIfChanged();
    if (marqueePollInterval) clearInterval(marqueePollInterval);
    marqueePollInterval = setInterval(updateMarqueeTextIfChanged, 800);
    if (overlay) overlay.style.bottom = `${MARQUEE_HEIGHT + MARQUEE_GAP}px`;
  }

  function exitMinified() {
    playerBar.classList.remove('minified');
    artImg.setAttribute('aria-pressed','false');

    // clear the remembered marquee so returning will rebuild it
    currentMarqueeValue = '';

    clearLockedPosition();
    if (marqueePollInterval) { clearInterval(marqueePollInterval); marqueePollInterval = null; }
    stopMarqueeAnimation();
  }

  function toggleMinified() {
    if (playerBar.classList.contains('minified')) exitMinified();
    else enterMinified();
  }

  let suppressClick = false;
  artImg.addEventListener('click', function(e){
    if (suppressClick) { e.stopPropagation(); e.preventDefault(); suppressClick = false; return; }
    e.stopPropagation();
    toggleMinified();
  });

  artImg.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); artImg.click(); }
  });

  function attachOverlayListeners() {
    if (!overlay) return;
    overlay.removeEventListener('pointerdown', overlayPointerDown);
    overlay.addEventListener('pointerdown', overlayPointerDown, { passive: false });
  }

  function overlayPointerDown(e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (!playerBar.classList.contains('minified')) return;
    e.preventDefault();

    try { overlay.setPointerCapture && overlay.setPointerCapture(e.pointerId); } catch(err){}

    let startY = e.clientY;
    const rect = playerBar.getBoundingClientRect();
    const origTop = rect.top;
    const height = rect.height;
    let moved = false;

    overlay.style.cursor = 'grabbing';

    function onMove(ev) {
      ev.preventDefault();
      const dy = ev.clientY - startY;
      if (!moved && Math.abs(dy) >= MOVE_THRESHOLD) moved = true;
      let newTop = origTop + dy;
      newTop = Math.max(MARGIN, Math.min(newTop, window.innerHeight - height - MARGIN));
      playerBar.style.top = Math.round(newTop) + 'px';
    }

    function onUp(ev) {
      try { overlay.releasePointerCapture && overlay.releasePointerCapture(ev.pointerId); } catch(err){}
      overlay.style.cursor = 'grab';
      overlay.removeEventListener('pointermove', onMove);
      overlay.removeEventListener('pointerup', onUp);

      if (moved) {
        saveTop();
        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 250);
      } else {
        overlay.style.display = 'none';
        const underlying = document.elementFromPoint(ev.clientX, ev.clientY);
        overlay.style.display = '';
        if (underlying) {
          const clickEv = new MouseEvent('click', {
            view: window, bubbles: true, cancelable: true,
            clientX: ev.clientX, clientY: ev.clientY
          });
          underlying.dispatchEvent(clickEv);
        }
      }
    }

    overlay.addEventListener('pointermove', onMove, { passive: false });
    overlay.addEventListener('pointerup', onUp, { passive: false });
  }

  window.addEventListener('resize', function(){
    if (!playerBar.classList.contains('minified')) return;
    try {
      const rect = playerBar.getBoundingClientRect();
      const height = rect.height;
      let top = rect.top;
      let changed = false;
      if (top > window.innerHeight - height - MARGIN) { top = Math.max(MARGIN, window.innerHeight - height - MARGIN); changed = true; }
      if (changed) {
        playerBar.style.top = Math.round(top) + 'px';
        saveTop();
      }
      refreshMarqueeLayout();
      if (overlay) {
        overlay.style.bottom = `${MARQUEE_HEIGHT + MARQUEE_GAP}px`;
      }
    } catch(e){}
  });

  if (playerBar.classList.contains('minified')) {
    lockSizeAndFixPosition();
    applySavedTop();
    artImg.style.touchAction = 'none';
    artImg.style.cursor = 'grab';
    if (overlay) {
      overlay.style.touchAction = 'none';
      overlay.style.cursor = 'grab';
      attachOverlayListeners();
    }
    updateMarqueeTextIfChanged();
    marqueePollInterval = setInterval(updateMarqueeTextIfChanged, 800);
  }

  (function attachDetectors(){
    try {
      const audio = document.querySelector('audio') || document.getElementById('audio');
      if (audio) {
        const obs = new MutationObserver(function(m){
          updateMarqueeTextIfChanged();
        });
        obs.observe(audio, { attributes: true, attributeFilter: ['src'] });
      }
    } catch(e){}
    setInterval(updateMarqueeTextIfChanged, 1400);
  })();

})();
