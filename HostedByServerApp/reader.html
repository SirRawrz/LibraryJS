<title>Book Library</title>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const requestedLib = String(params.get('lib') || '').trim().toLowerCase();
  const libraryMap = {
    books: '/books.js',
    manga: '/manga.js',
    guidebooks: '/guidebooks.js'
  };

  window.readerRequestedLib = requestedLib;
  window.readerCombinedView = !libraryMap[requestedLib];
  window.readerActiveLibraryKey = libraryMap[requestedLib] ? requestedLib : 'books';
  window.readerLibraryDataMap = {};
  window.readerLibrariesReady = Promise.resolve();

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.async = false;
      script.onload = () => resolve();
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  window.readerLibrariesReady = (async () => {
    if (libraryMap[requestedLib]) {
      await loadScript(libraryMap[requestedLib]);
      window.readerLibraryDataMap[requestedLib] = Array.isArray(window.libraryData?.items)
        ? window.libraryData.items.slice()
        : [];
      window.readerCombinedView = false;
      window.readerActiveLibraryKey = requestedLib;
      return;
    }

    for (const key of ['books', 'manga', 'guidebooks']) {
      await loadScript(libraryMap[key]);
      window.readerLibraryDataMap[key] = Array.isArray(window.libraryData?.items)
        ? window.libraryData.items.slice()
        : [];
    }

    window.readerCombinedView = true;
    window.readerActiveLibraryKey = 'books';
  })();
})();
</script>

function parseAudiobookTime(value) {
  if (value === null || value === undefined || value === '') return null;

  if (parts.length === 3) {
    seconds = (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseFloat(parts[2]);
  } else if (parts.length === 2) {
    seconds = (parseInt(parts[0], 10) * 60) + parseFloat(parts[1]);
  } else {
    seconds = parseFloat(parts[0]);
  }
  return Number.isFinite(seconds) ? seconds : null;
}

  if (!Array.isArray(audiobookCues) || !audiobookCues.length) return null;

  for (const cue of audiobookCues) {
    if (currentTime >= cue.start && currentTime <= cue.end) {
      targetCue = cue;
      break;
    }
  }

  if (targetCue === null) {
    let closestIndex = -1;
    let closestDiff = Infinity;
    for (let i = 0; i < audiobookCues.length; i++) {
      const diff = currentTime - audiobookCues[i].start;
      if (diff >= 0 && diff < closestDiff) {
        closestDiff = diff;

      }
    }
    if (closestIndex >= 0) targetCue = audiobookCues[closestIndex];
  }

    window.currentTile = currentTile;
  } else {
    nextPage = Math.max(1, Math.min(nextPage, pdfDoc.numPages));
    if (nextPage === previousPage) {
      audioCurrentPage = normalizedTarget;
      return;
    }
    currentTile = 1;
    window.currentTile = 1;
  }

  audioCurrentPage = normalizedTarget;
  pageNum = nextPage;
  window.pageNum = pageNum;

  if (!renderCurrentModePage()) {
    if (mode === 'double' && typeof renderDoublePage === 'function') {
      renderDoublePage(pageNum);
    }
  }
}

function syncAudiobookToPage(targetPage, preferredPosition = null) {

  const audioEl = document.getElementById('audioEl');
  if (!audioEl || !audiobookCues.length) return null;

  const exactTime = findAudiobookTimeForPage(targetPage, preferredPosition ?? getAudiobookPreferredPositionForPageJump());
  if (exactTime !== null) {
    audioEl.currentTime = exactTime;
    updateAudiobookAudioUI();
    return exactTime;
  }

  const pageNumber = Number(targetPage);
  if (!Number.isFinite(pageNumber)) return null;

  let fallbackTime = null;
  let fallbackPage = -Infinity;
  for (const cue of audiobookCues) {
    if (cue.page <= pageNumber && cue.page > fallbackPage) {
      fallbackPage = cue.page;
      fallbackTime = cue.start;
    }
  }

  if (fallbackTime === null) return null;
  audioEl.currentTime = fallbackTime;
  updateAudiobookAudioUI();
  return fallbackTime;
}

function syncAudiobookToCurrentView(targetPage = null, preferredPosition = null) {
  const context = getAudiobookReadingContext();
  const resolvedPage = targetPage === null || targetPage === undefined
    ? context.displayPage
    : Number(targetPage);
  const resolvedPosition = normalizeAudiobookPositionHint(preferredPosition) || context.position;
  return syncAudiobookToPage(resolvedPage, resolvedPosition);
}

async function fetchWithRetry(url, options, attempts = 3, delayMs = 250) {
  let lastError = null;
  for (let i = 0; i < attempts; i++) {
    try {
      return await fetch(url, options);
    } catch (err) {
      lastError = err;
      if (i + 1 < attempts) {
        await new Promise(resolve => setTimeout(resolve, delayMs * (i + 1)));
      }
    }
  }
  throw lastError || new Error(`Failed to fetch ${url}`);
}

async function probeAudiobookAudio(url, sessionId) {
  const methods = [
    { method: 'HEAD', cache: 'no-store', redirect: 'follow' },
    { method: 'GET', cache: 'no-store', redirect: 'follow', headers: { Range: 'bytes=0-0' } }
  ];

  for (const options of methods) {
    try {
      const response = await fetchWithRetry(url, options, 2, 200);
      if (sessionId !== readerSessionId) return false;
      if (response && response.ok) return true;
    } catch (err) {
      console.log('[Audiobook] audio probe failed:', url, err);
    }
  }

  return false;
}

async function loadAudiobookForBook(bookUrl, sessionId = readerSessionId) {
  const requestedLib = String(new URLSearchParams(window.location.search).get('lib') || '').trim().toLowerCase();
  if (requestedLib !== 'books') {
    resetAudiobookState();
    return;
  }

  const manifestCandidates = buildAudiobookManifestCandidates(bookUrl);
  const manifestUrl = manifestCandidates[0];
  audiobookManifestUrl = manifestUrl;
  audiobookAvailable = false;
  audiobookLoaded = false;
  audiobookManifest = null;
  audiobookCues = [];
  audiobookAudioUrl = '';

  let response = null;
  let parsedManifest = null;
  let lastManifestError = null;

  for (const candidateUrl of manifestCandidates) {
    console.log('[Audiobook] checking manifest:', candidateUrl);
    try {
      response = await fetchWithRetry(candidateUrl, { cache: 'no-store', redirect: 'follow' }, 3, 250);
      if (sessionId !== readerSessionId) return;
      if (!response.ok) {
        lastManifestError = new Error(`HTTP ${response.status} ${response.statusText}`);
        continue;
      }
      parsedManifest = await response.json();
      audiobookManifestUrl = candidateUrl;
      break;
    } catch (err) {
      lastManifestError = err;
      console.log('[Audiobook] manifest probe failed:', candidateUrl, err);
    }
  }

  if (sessionId !== readerSessionId) return;

  if (!parsedManifest) {
    console.log('[Audiobook] no audiobook JSON found for book:', bookUrl, lastManifestError || '');
    resetAudiobookState();
    if (typeof updatePageIndicator === 'function') updatePageIndicator();
    return;
  }

  try {
    audiobookManifest = parsedManifest;
    audiobookCues = normalizeAudiobookManifest(audiobookManifest);
    audiobookAvailable = true;
    console.log('[Audiobook] manifest found:', audiobookManifestUrl, 'cue count:', audiobookCues.length);
    console.log('[Audiobook] audiobook JSON exists for book:', bookUrl);
    const pageSyncEl = document.getElementById('audioPageSync');
    if (pageSyncEl) {
      pageSyncEl.textContent = `Page sync: Loaded (${audiobookCues.length} cues)`;
    }
  } catch (err) {
    console.log('[Audiobook] manifest parsed but could not be read:', audiobookManifestUrl, err);
    resetAudiobookState();
    if (typeof updatePageIndicator === 'function') updatePageIndicator();
    return;
  }

  const audioCandidates = buildAudiobookAudioCandidates(bookUrl);
  const audioEl = document.getElementById('audioEl');
  let audioFound = false;

  for (const audioPath of audioCandidates) {
    console.log('[Audiobook] checking audio file:', audioPath);
    if (sessionId !== readerSessionId) return;
    if (await probeAudiobookAudio(audioPath, sessionId)) {
      audiobookAudioUrl = audioPath;
      audioFound = true;
      if (audioEl) {
        audioEl.src = audioPath;
        audioEl.load();
      }
      console.log('[Audiobook] audio file found:', audioPath);
      break;
    }
  }

  audiobookLoaded = audioFound;
  if (!audioFound) {
    console.log('[Audiobook] manifest found but audio file was not found for:', bookUrl);
    const cueCount = audiobookCues.length;
    resetAudiobookState();
    const statusEl = document.getElementById('audioStatus');
    if (statusEl) statusEl.textContent = 'Audio: Not found';
    const pageSyncEl = document.getElementById('audioPageSync');
    if (pageSyncEl) pageSyncEl.textContent = `Page sync: Audio missing (${cueCount} cues)`;
    if (typeof updatePageIndicator === 'function') updatePageIndicator();
    return;
  }

  const statusEl = document.getElementById('audioStatus');
  if (statusEl) {
    statusEl.textContent = audioFound ? 'Audio: Loaded' : 'Audio: Not found';
  }

  if (typeof updatePageIndicator === 'function') updatePageIndicator();
}

function initAudiobookPlayer() {
  const audioEl = document.getElementById('audioEl');
  const playBtn = document.getElementById('audioPlayBtn');
  const progress = document.getElementById('audioProgress');
  const syncBtn = document.getElementById('syncToggleBtn');

  if (!audioEl || !playBtn || !progress || !syncBtn) return;

  function syncAudioToVisiblePageBeforePlay() {
    if (!audiobookCues.length) return null;

    const context = getAudiobookReadingContext();
    const targetPage = Number.isFinite(context.displayPage) && context.displayPage > 0 ? Math.floor(context.displayPage) : 1;
    const targetPosition = normalizeAudiobookPositionHint(context.position) || '↑';
    const seekTime = syncAudiobookToCurrentView(targetPage, targetPosition);
    if (Number.isFinite(seekTime)) {
      audioEl.currentTime = seekTime;
      updateAudiobookAudioUI();
      lastSyncTime = 0;
      console.log('[Audiobook] play re-anchored to visible page:', {
        mode: context.mode,
        basePage: context.basePage,
        displayPage: targetPage,
        position: targetPosition,
        tile: context.tile,
        seekTime
      });
    } else {
      console.log('[Audiobook] no exact audiobook cue for visible page:', {
        mode: context.mode,
        basePage: context.basePage,
        displayPage: targetPage,
        position: targetPosition,
        tile: context.tile
      });
    }
    return seekTime;
  }

  playBtn.addEventListener('click', () => {
    if (audioEl.paused) {
      const resumeShouldResync = shouldResyncAudiobookOnResume();
      const shouldRestorePausedTime = audiobookPausedSnapshot && !resumeShouldResync && Number.isFinite(audiobookPausedSnapshot.currentTime);
      const seekTime = shouldRestorePausedTime
        ? audiobookPausedSnapshot.currentTime
        : syncAudioToVisiblePageBeforePlay();

      audiobookPlaybackState = 'playing';
      syncAudiobookToggleIconState('playing');

      if (Number.isFinite(seekTime)) {
        audioEl.currentTime = seekTime;
        updateAudiobookAudioUI();
        lastSyncTime = 0;
      }

      audioEl.play().then(() => {
        playBtn.textContent = '⏸';
        playBtn.classList.add('playing');
        startAudiobookSync();
      }).catch(err => {
        console.error('[Audiobook] audio play failed:', err);
        audiobookPlaybackState = 'paused';
        syncAudiobookToggleIconState('paused');
        const statusEl = document.getElementById('audioStatus');
        if (statusEl) statusEl.textContent = 'Audio: Play failed';
      });
    } else {
      audiobookPlaybackState = 'paused';
      captureAudiobookPauseSnapshot();
      audioEl.pause();
      playBtn.textContent = '▶';
      playBtn.classList.remove('playing');
      syncAudiobookToggleIconState('paused');
      stopAudiobookSync();
    }
  });

  audioEl.addEventListener('play', () => {
    audioHasEverPlayed = true;
    audiobookPlaybackState = 'playing';
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    syncAudiobookToggleIconState('playing');
    startAudiobookSync();
  });

  audioEl.addEventListener('pause', () => {
    audiobookPlaybackState = 'paused';
    captureAudiobookPauseSnapshot();
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
    syncAudiobookToggleIconState('paused');
    stopAudiobookSync();
  });

  progress.addEventListener('input', (e) => {
    if (!audioEl.duration) return;
    audioEl.currentTime = (Number(e.target.value) / 100) * audioEl.duration;
    updateAudiobookAudioUI();
    if (!audioEl.paused && isAutoSync && audiobookCues.length) {
      syncPageToAudiobookTime(audioEl.currentTime);
    }
  });

  audioEl.addEventListener('timeupdate', () => {
    updateAudiobookAudioUI();
    if (!audioEl.paused && isAutoSync && audiobookCues.length) {
      const now = Date.now();
      if (now - lastSyncTime > SYNC_THRESHOLD) {
        syncPageToAudiobookTime(audioEl.currentTime);
        lastSyncTime = now;
      }
    }
  });

  audioEl.addEventListener('ended', () => {
    audiobookPlaybackState = 'paused';
    clearAudiobookPauseSnapshot();
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
    syncAudiobookToggleIconState('paused');
    stopAudiobookSync();
  });

  audioEl.addEventListener('loadedmetadata', () => {
    const statusEl = document.getElementById('audioStatus');
    if (statusEl) statusEl.textContent = 'Audio: Loaded';
    const durationEl = document.getElementById('audioDuration');
    if (durationEl) durationEl.textContent = formatAudiobookTime(audioEl.duration || 0);
    const pageSyncEl = document.getElementById('audioPageSync');
    if (pageSyncEl && audiobookCues.length) {
      pageSyncEl.textContent = `Page sync: Ready (${audiobookCues.length} cues)`;
    }
    audiobookLoaded = true;
    syncAudiobookToggleIconState(audiobookPlaybackState);
  });

  syncBtn.addEventListener('click', () => {
    isAutoSync = !isAutoSync;
    syncBtn.classList.toggle('active', isAutoSync);
    syncBtn.textContent = `Auto-Sync: ${isAutoSync ? 'ON' : 'OFF'}`;
  });

  const audioIcon = document.querySelector('.audio-toggle-icon');
  if (audioIcon) {
    audioIcon.onclick = () => playBtn.click();
  }

  syncAudiobookToggleIconState(audiobookPlaybackState);
}

function prepareHiDPICanvas(canvas, logicalWidth, logicalHeight) {
  const outputScale = GUIDEBOOK_RENDER_DPR;
  const width = Math.max(1, Math.round(logicalWidth));
  const height = Math.max(1, Math.round(logicalHeight));

  canvas.width = Math.max(1, Math.round(width * outputScale));
  canvas.height = Math.max(1, Math.round(height * outputScale));
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';

  return {
    ctx: canvas.getContext('2d'),
    transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0]
  };
}

function renderPdfPageToCanvas(page, canvas, scale) {
  const viewport = page.getViewport({ scale });
  const prep = prepareHiDPICanvas(canvas, viewport.width, viewport.height);
  const renderOptions = {
    canvasContext: prep.ctx,
    viewport
  };
  if (prep.transform) renderOptions.transform = prep.transform;
  return page.render(renderOptions).promise;
}

    function nextPage() {
      const mode = window.pageViewMode || (window.halfMode ? 'half' : 'double') || 'double';

      if (mode === 'half') {
        if (typeof window.nextHalf === 'function') return window.nextHalf();
        if (!pdfDoc) return;
        if (currentTile < 4) {
          currentTile++;
        } else {
          if (pageNum + 2 <= pdfDoc.numPages) pageNum += 2;
          currentTile = 1;
        }
        window.pageNum = pageNum;
        window.currentTile = currentTile;
        persistProgress(getActiveProfile(), currentBook, pageNum, { upload: true });
        if (typeof renderCurrentModePage === 'function') renderCurrentModePage();
        syncAudiobookToCurrentView();
        return;
      }

      if (!pdfDoc) return;
      const isManga = (new URLSearchParams(window.location.search).get('lib') || 'books') === 'manga';

      if (mode === 'single') {
          clearHalfViewState();
          if (isManga) {
              if (pageNum % 2 === 0) {
                  pageNum = pageNum - 1;
              } else {
                  let nextVal = pageNum + 3;
                  if (nextVal > pdfDoc.numPages) {
                      nextVal = pageNum + 2;
                      if (nextVal > pdfDoc.numPages) nextVal = pageNum;
                  }
                  pageNum = nextVal;
              }
          } else {
              pageNum = Math.min(pdfDoc.numPages, pageNum + 1);
          }
      } else {
          clearHalfViewState();
          pageNum = Math.min(pdfDoc.numPages, pageNum + 2);
      }
      window.pageNum = pageNum;
      persistProgress(getActiveProfile(), currentBook, pageNum, { upload: true });
      if (typeof renderCurrentModePage === 'function') renderCurrentModePage();

    function prevPage() {

      if (mode === 'half') {
        if (typeof window.prevHalf === 'function') return window.prevHalf();
        if (!pdfDoc) return;
        if (currentTile > 1) {
          currentTile--;
        } else {
          if (pageNum - 2 >= 1) pageNum -= 2;
          currentTile = 4;
        }
        window.pageNum = pageNum;
        window.currentTile = currentTile;
        persistProgress(getActiveProfile(), currentBook, pageNum, { upload: true });
        if (typeof renderCurrentModePage === 'function') renderCurrentModePage();
        syncAudiobookToCurrentView();
        return;

      if (!pdfDoc) return;
      const isManga = (new URLSearchParams(window.location.search).get('lib') || 'books') === 'manga';

      if (mode === 'single') {
          clearHalfViewState();
          if (isManga) {
              if (pageNum % 2 === 0) {
                  pageNum = pageNum - 3;
                  if (pageNum < 1) pageNum = 2;
              } else {
                  let nextVal = pageNum + 1;
                  if (nextVal > pdfDoc.numPages) nextVal = pageNum - 2;
                  pageNum = nextVal;
              }
          } else {
              pageNum = Math.max(1, pageNum - 1);
          }
      } else {
          clearHalfViewState();
          pageNum = Math.max(1, pageNum - 2);

      window.pageNum = pageNum;
      persistProgress(getActiveProfile(), currentBook, pageNum, { upload: true });
      if (typeof renderCurrentModePage === 'function') renderCurrentModePage();
      syncAudiobookToCurrentView();

    function getProgressLibraryScope() {
      const lib = new URLSearchParams(window.location.search).get('lib') || 'books';
      return String(lib).trim().toLowerCase().replace(/[^a-z0-9]/gi, '_') || 'books';
    }

    function getLegacyProgressBookKey(rawValue) {
      return String(rawValue || '').replace(/[^a-z0-9]/gi, '_');
    }

    function getProgressBookKey(rawValue) {
      const scope = getProgressLibraryScope();
      const legacy = getLegacyProgressBookKey(rawValue);
      return `${scope}__${legacy}`;
    }

    function parseProgressEntry(key, value) {
      const textValue = String(value || '').trim();

      // Newer format: bookPage-Profile-bookKey
      let match = key.match(/^bookPage-([^ -]+)-(.+)$/);
      if (match) {
        return {
          profile: match[1] || getActiveProfile(),
          bookKey: match[2] || '',
          page: parseInt(textValue, 10)
        };
      }

      // Legacy format: bookPage_<raw book url/path>
      match = key.match(/^bookPage_(.+)$/);
      if (match) {
        return {
          profile: getActiveProfile(),
          bookKey: getProgressBookKey(match[1]),
          page: parseInt(textValue, 10)
        };
      }

      return null;
    }

    function persistProgressLocally(profile, rawUrl, page) {
      const pageText = String(page);
      const scopedBookKey = getProgressBookKey(rawUrl);
      const legacyBookKey = getLegacyProgressBookKey(rawUrl);

      localStorage.setItem(`bookPage-${profile}-${scopedBookKey}`, pageText);
      localStorage.setItem(`bookPage-${profile}-${legacyBookKey}`, pageText);
      localStorage.setItem(`bookPage-${profile}-${rawUrl}`, pageText);
      localStorage.setItem(`bookPage_${rawUrl}`, pageText);
    }

    function readPersistedProgress(profile, rawUrl) {
      const scopedBookKey = getProgressBookKey(rawUrl);
      const legacyBookKey = getLegacyProgressBookKey(rawUrl);
      const candidates = [
        `bookPage-${profile}-${scopedBookKey}`,
        `bookPage-${profile}-${legacyBookKey}`,
        `bookPage-${profile}-${rawUrl}`,
        `bookPage_${rawUrl}`
      ];

      for (const key of candidates) {
        const page = parseInt(localStorage.getItem(key), 10);
        if (Number.isFinite(page) && page > 0) return page;
      }

      return null;
    }

    function persistProgress(profile, rawUrl, page, options = {}) {
      const normalizedPage = parseInt(page, 10);
      if (!rawUrl || !Number.isFinite(normalizedPage) || normalizedPage < 1) return;

      persistProgressLocally(profile, rawUrl, normalizedPage);

      const shouldUpload = options.upload !== false;
      if (shouldUpload && typeof uploadPageProgress === 'function') {
        const bookKey = getProgressBookKey(rawUrl);
        Promise.resolve(uploadPageProgress(profile, bookKey, normalizedPage)).catch((err) => {
          console.warn('Progress upload failed:', err);
        });
      }
    }

    function normalizeRestoredProgressLocally(backupData) {
      for (const [key, value] of Object.entries(backupData || {})) {
        const entry = parseProgressEntry(key, value);
        if (!entry || !entry.bookKey || !Number.isFinite(entry.page)) continue;
        localStorage.setItem(`bookPage-${entry.profile}-${entry.bookKey}`, String(entry.page));
      }
    }

    async function syncRestoredProgressToServer(backupData) {
      const uploads = [];

      for (const [key, value] of Object.entries(backupData || {})) {
        const entry = parseProgressEntry(key, value);
        if (!entry || !entry.bookKey || !Number.isFinite(entry.page)) continue;
        uploads.push(uploadPageProgress(entry.profile, entry.bookKey, entry.page));
      }

      if (uploads.length) {
        await Promise.allSettled(uploads);
      }
    }

    // Backup function: creates a JSON string with all keys from localStorage that start with progress keys
    function backupProgress() {
      const backupData = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('bookPage_') || key.startsWith('bookPage-')) {
          backupData[key] = localStorage.getItem(key);
        }
      }
      const backupText = JSON.stringify(backupData, null, 2);
      const blob = new Blob([backupText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'book_backup.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    // Restore function: reads a backup file and updates localStorage accordingly
    function restoreProgress(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const backupData = JSON.parse(e.target.result);
          for (const key in backupData) {
            if (backupData.hasOwnProperty(key)) {
              localStorage.setItem(key, backupData[key]);
            }
          }

          normalizeRestoredProgressLocally(backupData);

          Promise.resolve(syncRestoredProgressToServer(backupData))
            .then(() => {
              alert('Progress restored successfully!');
            })
            .catch((error) => {
              console.warn('Progress restored locally, but server sync had an issue:', error);
              alert('Progress restored successfully!');
            });
        } catch (error) {
          alert('Failed to restore progress: invalid file format.');
        }
      };
      reader.readAsText(file);
    }

function getActiveProfile() {

function addBookmark() {
  const noteInput = document.getElementById('bookmarkNote');
  const note = noteInput.value.trim();
  const profile = getActiveProfile();
  const key = `bookmark-${profile}-${currentBook}-${pageNum}`;

  // Store both page number and note
  const data = { page: pageNum, note };
  localStorage.setItem(key, JSON.stringify(data));

  // Clear the note input after bookmarking
  noteInput.value = '';

  loadBookmarks();
}

function loadBookmarks() {
  const list = document.getElementById('bookmarkList');
  list.innerHTML = '';
  const profile = getActiveProfile();
  const prefix = `bookmark-${profile}-${currentBook}-`;

  Object.keys(localStorage).forEach(k => {
    if (k.startsWith(prefix)) {
      const value = localStorage.getItem(k);
      let data;

      try {
        data = JSON.parse(value);
        // Handle old format where only page number was stored
        if (typeof data === 'number') {
          data = { page: data, note: '' };
        }
      } catch (e) {
        data = { page: parseInt(value, 10), note: '' };
      }

      const li = document.createElement('li');

      // Top row: Page number and remove button
      const topRow = document.createElement('div');
      topRow.style.display = 'flex';
      topRow.style.justifyContent = 'space-between';
      topRow.style.alignItems = 'center';

      const pageSpan = document.createElement('span');
      pageSpan.textContent = `Page ${data.page}`;

      const removeBtn = document.createElement('button');
      removeBtn.textContent = '×';
      removeBtn.className = 'remove-btn';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        localStorage.removeItem(k);
        loadBookmarks();
      };

      topRow.appendChild(pageSpan);
      topRow.appendChild(removeBtn);
      li.appendChild(topRow);

      // Add note if exists
      if (data.note) {
        const noteDiv = document.createElement('div');
        noteDiv.className = 'bookmark-note';
        noteDiv.textContent = data.note;
        li.appendChild(noteDiv);
      }

      li.onclick = () => {
        jumpToPageAndSyncAudio(data.page, { closeDialog: true });
      };

      list.appendChild(li);
    }
  });
}

// ==== SERVER-BASED BOOKMARK MANAGEMENT ====
const BOOKMARK_PATH = '/Books/progress/';

function wrapPayload(obj) {
  return `[[[${JSON.stringify(obj)}]]]`;
}
async function uploadBookmarks(profile, bookKey, bookmarks) {
  const payload = wrapPayload(bookmarks);
  const blob = new Blob([payload], { type: 'application/json' });
  const form = new FormData();
  form.append('files[]', blob, `${profile}-${bookKey}-Bookmarks`);
  try {
    await fetch(`/api/file/upload?path=${encodeURIComponent(BOOKMARK_PATH)}`, {
      method: 'PUT',
      body: form
    });
    console.log('Bookmarks uploaded');
  } catch (err) {
    console.error('Bookmark upload failed:', err);
  }
}
async function loadServerBookmarks(profile, bookKey) {
  try {
    const res = await fetch(`${BOOKMARK_PATH}${encodeURIComponent(profile + '-' + bookKey + '-Bookmarks')}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('No server save');
    const txt = await res.text();
    const m = txt.match(/\[\[\[([\s\S]*?)\]\]\]/);
    if (!m) throw new Error('Bad payload');
    return JSON.parse(m[1]);
  } catch (err) {
    console.warn('Could not load server bookmarks:', err);
    return null;
  }
}
function getBookKey(bookUrl) {
  return bookUrl.replace(/[^a-z0-9]/gi, '_');
}

// Bookmark dialog functionality
function openBookmarkDialog() {
  const dlg = document.getElementById('bookmarkDialog');
  if (dlg) {
    document.getElementById('bookmarkTitle').textContent = `${currentBookTitle}'s Bookmarks`;
    dlg.style.display = 'block';
    loadBookmarks();
  }
}
function closeBookmarkDialog() {
  const dlg = document.getElementById('bookmarkDialog');
  if (dlg) dlg.style.display = 'none';
}
async function addBookmark() {
  const noteInput = document.getElementById('bookmarkNote');
  const note = noteInput ? noteInput.value.trim() : '';
  const profile = getActiveProfile();
  const bookKey = getBookKey(currentBook);
  const key = `bookmark-${profile}-${bookKey}-${pageNum}`;
  const data = { page: pageNum, note };
  localStorage.setItem(key, JSON.stringify(data));
  const bookmarks = await getAllBookmarksForBook(profile, bookKey);
  bookmarks[pageNum] = note;
  await uploadBookmarks(profile, bookKey, bookmarks);
  if (noteInput) noteInput.value = '';
  loadBookmarks();
}
async function getAllBookmarksForBook(profile, bookKey) {
  const prefix = `bookmark-${profile}-${bookKey}-`;
  const bookmarks = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) {
      const page = k.split('-').pop();
      try {
        const data = JSON.parse(localStorage.getItem(k));
        bookmarks[page] = data.note;
      } catch (e) {
        console.warn('Invalid bookmark format', k);
      }
    }
  }
  return bookmarks;
}
async function loadBookmarks() {
  const list = document.getElementById('bookmarkList');
  if (!list) return;
  list.innerHTML = '';
  const profile = getActiveProfile();
  const bookKey = getBookKey(currentBook);
  const serverBookmarks = await loadServerBookmarks(profile, bookKey);
  if (serverBookmarks) {
    for (const [page, note] of Object.entries(serverBookmarks)) {
      const key = `bookmark-${profile}-${bookKey}-${page}`;
      localStorage.setItem(key, JSON.stringify({ page: parseInt(page), note }));
    }
  }
  const prefix = `bookmark-${profile}-${bookKey}-`;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) {
      let data;
      try {
        data = JSON.parse(localStorage.getItem(k));
        if (typeof data === 'number') {
          data = { page: data, note: '' };
        }
      } catch (e) {
        data = { page: parseInt(localStorage.getItem(k), 10), note: '' };
      }
      const li = document.createElement('li');
      const topRow = document.createElement('div');
      topRow.style.display = 'flex';
      topRow.style.justifyContent = 'space-between';
      topRow.style.alignItems = 'center';
      const pageSpan = document.createElement('span');
      pageSpan.textContent = `Page ${data.page}`;
      const removeBtn = document.createElement('button');
      removeBtn.textContent = '×';
      removeBtn.className = 'remove-btn';
      removeBtn.onclick = async (e) => {
        e.stopPropagation();
        localStorage.removeItem(k);
        const all = await getAllBookmarksForBook(profile, bookKey);
        delete all[data.page];
        await uploadBookmarks(profile, bookKey, all);
        loadBookmarks();
      };
      topRow.appendChild(pageSpan);
      topRow.appendChild(removeBtn);
      li.appendChild(topRow);
      if (data.note) {
        const noteDiv = document.createElement('div');
        noteDiv.className = 'bookmark-note';
        noteDiv.textContent = data.note;
        li.appendChild(noteDiv);
      }
      li.onclick = () => {
        jumpToPageAndSyncAudio(data.page, { closeDialog: true });
      };
      list.appendChild(li);
    }
  }
}

function jumpToPageAndSyncAudio(targetPage, options = {}) {
  const pageNumber = Number(targetPage);
  if (!Number.isFinite(pageNumber) || pageNumber < 1) return;

  const totalPages = (pdfDoc && Number.isFinite(pdfDoc.numPages)) ? pdfDoc.numPages : null;
  const boundedPage = totalPages ? Math.min(totalPages, Math.max(1, Math.floor(pageNumber))) : Math.max(1, Math.floor(pageNumber));
  const mode = window.pageViewMode || (window.halfMode ? 'half' : 'double') || 'double';
  clearHalfViewState();

  if (mode === 'half') {
    const desiredPosition = normalizeAudiobookPositionHint(options.position) || '↑';
    pageNum = getDisplayPageForMode(boundedPage, 'half');
    window.pageNum = pageNum;
    currentTile = getHalfModeTileForPage(boundedPage, desiredPosition);
    window.currentTile = currentTile;
  } else if (mode === 'single') {
    pageNum = boundedPage;
    window.pageNum = pageNum;
    currentTile = 1;
    window.currentTile = 1;
  } else {
    pageNum = getDisplayPageForMode(boundedPage, 'double');
    window.pageNum = pageNum;
    currentTile = 1;
    window.currentTile = 1;
  }

  if (!renderCurrentModePage()) {
    if (mode === 'double' && typeof renderDoublePage === 'function') {
      renderDoublePage(pageNum);
    } else if (mode === 'single' && typeof renderOnePage === 'function') {
      renderOnePage(pageNum);
    } else if (mode === 'half' && typeof renderHalfPage === 'function') {
      renderHalfPage(pageNum, currentTile || 1);
    }
  }

  syncAudiobookToCurrentView(boundedPage, mode === 'half' ? getAudiobookPreferredPositionForView() : '↑');

  if (options.closeDialog && typeof closeBookmarkDialog === 'function') {
    closeBookmarkDialog();
  }
  if (options.hideSearchResultsId) {
    const panel = document.getElementById(options.hideSearchResultsId);
    if (panel) panel.style.display = 'none';
  }
}

<script>
function normalizeChapterLookup(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[\s._-]/g, '');
}

function findChapterSourceForCurrentBook() {
  const currentTitleKey = normalizeChapterLookup(currentBookTitle);
  const currentFileKey = normalizeChapterLookup(currentBook);

  const searchKeys = getReaderCombinedMode()
    ? ['books', 'manga', 'guidebooks']
    : [String(window.readerActiveLibraryKey || activeLibraryKey || 'books').toLowerCase()];

  for (const key of searchKeys) {
    const allItems = getReaderItemsForKey(key);
    for (const entry of allItems) {
      const books = entry && entry.group && Array.isArray(entry.books) ? entry.books : [entry];
      for (const book of books) {
        if (!book || !book.chapters) continue;

        const titleKey = normalizeChapterLookup(book.title);
        const fileKey = normalizeChapterLookup(book.file);

        const titleMatch =
          currentTitleKey &&
          titleKey &&
          (titleKey === currentTitleKey ||
            titleKey.includes(currentTitleKey) ||
            currentTitleKey.includes(titleKey));

        const fileMatch =
          currentFileKey &&
          fileKey &&
          fileKey === currentFileKey;

        if (titleMatch || fileMatch) {
          return book;
        }
      }
    }
  }
  return null;
}

async function openBookmarkDialog() {
  document.getElementById('bookmarkTitle').textContent = `${currentBookTitle}'s Bookmarks`;
  const dialog = document.getElementById('bookmarkDialog');
  dialog.style.display = 'block';

  const chapterSelect = document.getElementById('chapterSelect');
  const btnChapterGo = document.getElementById('btnChapterGo');
  if (!chapterSelect || !btnChapterGo) return;

  // Start hidden until we confirm chapter data actually exists.
  chapterSelect.style.display = 'none';
  btnChapterGo.style.display = 'none';
  chapterSelect.innerHTML = '<option value="">Select Chapter</option>';

  const chapterSource = findChapterSourceForCurrentBook();
  if (!chapterSource || !chapterSource.chapters) {
    return;
  }

  try {
    const response = await fetch(chapterSource.chapters, { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    if (!Array.isArray(data) || data.length === 0) {
      return;
    }

    data.forEach(chap => {
      if (!chap || chap.page == null) return;
      const opt = document.createElement('option');
      opt.value = chap.page;
      opt.textContent = `Pg. ${chap.page} - ${chap.title || 'Chapter'}`;
      chapterSelect.appendChild(opt);
    });

    chapterSelect.style.display = 'block';
    btnChapterGo.style.display = 'block';
  } catch (err) {
    console.warn('Chapter list could not be loaded for', currentBookTitle, err);
    chapterSelect.style.display = 'none';
    btnChapterGo.style.display = 'none';
  }
}

<script>
function normalizeTitleKey(value) {
  return (value || '').replace(/[\s\-]/g, '').toLowerCase();
}

function readStartPageFromQuery(params) {
  const candidates = ['page', 'pageNum', 'startPage'];
  for (const key of candidates) {
    const raw = params.get(key);
    if (raw) {
      const num = parseInt(raw, 10);
      if (!Number.isNaN(num) && num > 0) return num;
    }
  }
  return null;
}

function findLibraryItemByTitle(queryTitle) {
  const normalized = normalizeTitleKey(decodeURIComponent(queryTitle));
  const searchKeys = getReaderCombinedMode()
    ? ['books', 'manga', 'guidebooks']
    : [String(window.readerActiveLibraryKey || activeLibraryKey || 'books').toLowerCase()];

  for (const key of searchKeys) {
    const scopedItems = getReaderItemsForKey(key);
    for (const item of scopedItems) {
      if (item && !item.group && normalizeTitleKey(item.title) === normalized) {
        return item;
      }
      if (item && item.group && Array.isArray(item.books)) {
        for (const book of item.books) {
          if (normalizeTitleKey(book.title) === normalized) {
            return book;
          }
        }
      }
    }
  }
  return null;
}

window.addEventListener('DOMContentLoaded', async function() {
  await Promise.resolve(window.readerLibrariesReady);

  const libraryTitle = getReaderCombinedMode()
    ? 'Library'
    : (window.libraryData && window.libraryData.title) || getLibraryDisplayTitle(activeLibraryKey || window.readerActiveLibraryKey || 'books');
  document.title = libraryTitle;
  const heading = document.querySelector('h1.centered-title');
  if (heading) heading.textContent = libraryTitle;

  const params = new URLSearchParams(window.location.search);
  const requestedTitle = params.get('Book') || params.get('Guidebook') || params.get('title');
  if (!requestedTitle) return;

  const found = findLibraryItemByTitle(requestedTitle);
  if (!found) return;

  const startPage = readStartPageFromQuery(params);
  if (typeof openPDF === 'function') openPDF(rootAssetUrl(found.file), found.title, startPage);
});

      const readerVisible = reader.style.display === 'flex';
      reader.classList.toggle('reader-locked', locked);
      lockBtn.classList.toggle('is-locked', locked);
      lockBtn.textContent = locked ? '🔒' : '🔓';
      lockBtn.style.display = readerVisible ? 'flex' : 'none';
    }

    function setLocked(next) {
      locked = !!next;
      sync();
    }

    function toggleLocked() {
      setLocked(!locked);
    }

    lockBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleLocked();
    });

    function wrap(name) {
      const original = window[name];
      if (typeof original !== 'function') return;
      window[name] = function (...args) {
        const result = original.apply(this, args);
        queueMicrotask(sync);
        return result;
      };
      window[name]._original = original;
    }

    wrap('openPDF');
    wrap('closeReader');
    wrap('renderDoublePage');

    const observer = new MutationObserver(sync);
    observer.observe(reader, { attributes: true, attributeFilter: ['style', 'class'] });

    sync();
    window.__readerLockSync = sync;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initReaderLock);
  } else {
    initReaderLock();
  }
})();
</script>
</div>
<script>
(function () {
  const readerDPR = Math.max(2, window.devicePixelRatio || 1);

  function getViewportSize() {
    const viewer = document.getElementById('viewer');
    const rect = viewer ? viewer.getBoundingClientRect() : null;
    const width = Math.max(320, Math.floor((rect?.width || window.innerWidth || 0) * 0.985));
    const height = Math.max(320, Math.floor((rect?.height || window.innerHeight || 0) * 0.915));
    return { width, height };
  }

  function renderPageToOffscreen(page, scale) {
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.setAttribute('data-allow-page-nav', '1');
    const prep = prepareHiDPICanvas(canvas, viewport.width, viewport.height);
    const renderOptions = {
      canvasContext: prep.ctx,
      viewport
    };
    if (prep.transform) renderOptions.transform = prep.transform;
    return page.render(renderOptions).promise.then(() => ({ canvas, viewport }));
  }

  async function renderSpread(num) {
    if (!pdfDoc) return;
    if (pageRendering) {
      pageNumPending = num;
      return;
    }

    pageRendering = true;
    pageNum = num;

    try {
      const leftPageNum = num;
      const rightPageNum = num + 1;
      const leftPage = await pdfDoc.getPage(leftPageNum);
      const rightPage = rightPageNum <= pdfDoc.numPages ? await pdfDoc.getPage(rightPageNum) : null;

      const leftBase = leftPage.getViewport({ scale: 1 });
      const rightBase = rightPage ? rightPage.getViewport({ scale: 1 }) : null;
      const spreadNaturalWidth = leftBase.width + (rightBase ? rightBase.width : 0);
      const spreadNaturalHeight = Math.max(leftBase.height, rightBase ? rightBase.height : 0);
      const available = getViewportSize();

      let scale = Math.min(
        available.width / Math.max(1, spreadNaturalWidth),
        available.height / Math.max(1, spreadNaturalHeight)
      ) * 1.1;
      if (!Number.isFinite(scale) || scale <= 0) scale = 1;

      const left = await renderPageToOffscreen(leftPage, scale);
      const right = rightPage ? await renderPageToOffscreen(rightPage, scale) : null;

      const spreadWidth = Math.max(1, Math.round(left.viewport.width + (right ? right.viewport.width : 0)));
      const spreadHeight = Math.max(1, Math.round(Math.max(left.viewport.height, right ? right.viewport.height : 0)));

      const viewer = document.getElementById('viewer');
      if (!viewer) {
        pageRendering = false;
        return;
      }

      const spreadCanvas = document.createElement('canvas');
      spreadCanvas.setAttribute('data-allow-page-nav', '1');
      spreadCanvas.style.maxWidth = 'none';
      spreadCanvas.style.maxHeight = 'none';
      const prep = prepareHiDPICanvas(spreadCanvas, spreadWidth, spreadHeight);
      const ctx = prep.ctx;

      ctx.clearRect(0, 0, spreadCanvas.width, spreadCanvas.height);
      ctx.drawImage(left.canvas, 0, 0, left.canvas.width, left.canvas.height, 0, 0, left.canvas.width, left.canvas.height);
      if (right) {
        ctx.drawImage(
          right.canvas,
          0,
          0,
          right.canvas.width,
          right.canvas.height,
          left.canvas.width,
          0,
          right.canvas.width,
          right.canvas.height
        );
      }

      viewer.innerHTML = '';
      viewer.style.display = 'flex';
      viewer.style.flexDirection = 'row';
      viewer.style.justifyContent = 'center';
      viewer.style.alignItems = 'center';
      viewer.style.gap = '0px';
      viewer.style.columnGap = '0px';
      viewer.style.rowGap = '0px';
      viewer.style.padding = '0';
      viewer.style.margin = '0';
      viewer.style.fontSize = '0';
      viewer.style.lineHeight = '0';
      viewer.appendChild(spreadCanvas);

      spreadCanvas.style.filter = isDarkMode ? 'invert(1)' : 'none';

      localStorage.setItem(`bookPage_${currentBook}`, pageNum);
      if (typeof updatePageIndicator === 'function') updatePageIndicator();
    } catch (err) {
      console.error('Spread render failed:', err);
    } finally {
      pageRendering = false;
      const pending = pageNumPending;
      pageNumPending = null;
      if (pending !== null && pending !== num) {
        setTimeout(() => renderSpread(pending), 0);
      }
      if (typeof window.__readerLockSync === 'function') {
        queueMicrotask(window.__readerLockSync);
      }
    }
  }

  window.renderDoublePage = renderSpread;

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    const reader = document.getElementById('reader-container');
    if (!reader || reader.style.display !== 'flex') return;
    if ((window.pageViewMode || 'double') !== 'double') return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (typeof window.renderDoublePage === 'function') {
        window.renderDoublePage(pageNum);
      }
    }, 150);
  });
})();
</script>
