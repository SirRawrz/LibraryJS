<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Genres</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #171b24;
      --panel-2: #1d2330;
      --text: #eef2fb;
      --muted: #9aa7bd;
      --line: #2b3445;
      --accent: #67b7ff;
      --accent-2: #8fe1c0;
      --danger: #ff7d7d;
      --warn: #f2c36b;
      --ok: #82e08d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b0e13, var(--bg));
      color: var(--text);
      padding: 18px;
    }
    body.embedded { padding: 12px; background: var(--bg); }
    body.embedded #generatedPreviewPanel,
    body.embedded #downloadBtn { display: none; }
    body.embedded .top-actions { display: none; }
    .shell { max-width: 1200px; margin: 0 auto; }
    header, .panel {
      background: rgba(23, 27, 36, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
    }
    header { padding: 16px 18px; margin-bottom: 14px; display:flex; justify-content:space-between; gap:16px; align-items:center; }
    h1 { margin: 0; font-size: 24px; }
    .sub { color: var(--muted); margin-top: 4px; }
    .top-actions, .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button, input, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      background: var(--accent);
      color: #08111b;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #2a3242; color: var(--text); }
    button.warn { background: #4a2b2b; color: #ffd9d9; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .panel { padding: 16px; }
    .panel h2 { margin: 0 0 8px 0; font-size: 18px; }
    .panel p { margin: 0 0 12px 0; color: var(--muted); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom: 12px; }
    .toolbar input { flex: 1 1 260px; }
    input[type="text"], textarea {
      background: #111621;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      width: 100%;
    }
    .genres { display:flex; flex-direction:column; gap: 12px; }
    .genre-card {
      display:grid;
      grid-template-columns: 120px 1fr auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      align-items: start;
    }
    .genre-card.changed { outline: 1px solid rgba(103,183,255,.35); }
    .preview {
      width: 120px; height: 120px; border-radius: 14px; border: 1px solid var(--line);
      background: #0e1118; object-fit: cover; display:block;
    }
    .fields { display:grid; grid-template-columns: 90px 1fr; gap: 10px; align-items:center; }
    .fields label { color: var(--muted); font-size: 12px; }
    .stack { display:flex; flex-direction:column; gap: 10px; }
    .meta { color: var(--muted); font-size: 12px; }
    .meta strong { color: var(--text); }
    .actions { display:flex; flex-direction:column; gap: 8px; align-items:flex-end; }
    .status { margin-top: 12px; color: var(--muted); }
    .status.good { color: var(--ok); }
    .status.bad { color: var(--danger); }
    .status.warn { color: var(--warn); }
    .codebox { width: 100%; min-height: 260px; margin-top: 10px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .fileline { display:flex; gap: 8px; align-items:center; flex-wrap:wrap; }
    .fileline input[type="file"] { max-width: 100%; }
    .count { color: var(--muted); font-size: 12px; }
    .empty { padding: 16px; color: var(--muted); border: 1px dashed var(--line); border-radius: 14px; text-align:center; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Music Genres</h1>
        <div class="sub">Edit genre names and codes, upload matching images, then safely publish only the genre map when it actually changed.</div>
      </div>
      <div class="top-actions">
        <button id="addGenreBtn" type="button">Add genre</button>
        <button id="updateBtn" type="button">Update on server</button>
      </div>
    </header>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Search code, genre, or song count" />
        <button id="refreshBtn" class="secondary" type="button">Refresh previews</button>
      </div>
      <div id="genreList" class="genres"></div>
      <div id="emptyState" class="empty" style="display:none;">No genres loaded.</div>
      <div class="status" id="status">Ready.</div>
    </section>

    <section class="panel generated-panel" id="generatedPreviewPanel">
      <h2>Generated musiclibrary.js</h2>
      <p>This preview keeps the existing song list and rewrites only the genre map when you publish.</p>
      <textarea id="outputText" class="codebox" spellcheck="false"></textarea>
    </section>
  </div>

  <script src="./musiclibrary.js"></script>
  <script>
  (() => {
    const $ = (id) => document.getElementById(id);
    const EMBED = new URLSearchParams(window.location.search || '').has('embed') || window.self !== window.top;
    document.body.classList.toggle('embedded', EMBED);
    if (EMBED) {
      const downloadBtn = $('downloadBtn');
      if (downloadBtn) downloadBtn.hidden = true;
    }

    const DEFAULT_IMAGE = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
        <rect width="320" height="320" rx="26" fill="#111621"/>
        <circle cx="160" cy="128" r="58" fill="none" stroke="#67b7ff" stroke-width="10"/>
        <text x="160" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#9aa7bd">No Image</text>
      </svg>
    `);

    const ORIGINAL_MAP = JSON.parse(JSON.stringify(window.musicLibraryGenreMap || {}));
    const ORIGINAL_LIBRARY = Array.isArray(window.musicLibrary) ? window.musicLibrary.slice() : [];
    const SERVER_IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
    const state = {
      rows: [],
      imageCache: new Map(),
      baseUrl: null,
      loading: null,
      outputText: ''
    };

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>\"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }

    function sanitizeText(value) {
      return String(value ?? '').replace(/[\r\n]+/g, ' ').trim();
    }

    function sanitizeGenreName(value) {
      return sanitizeText(value).replace(/[\\/]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function sanitizeGenreCode(value) {
      return sanitizeText(value).toUpperCase().slice(0, 8);
    }

    function normalizeMap(map) {
      const out = [];
      Object.entries(map || {}).forEach(([code, name]) => {
        const cleanCode = sanitizeGenreCode(code);
        const cleanName = sanitizeGenreName(name);
        if (!cleanCode || !cleanName) return;
        out.push([cleanCode, cleanName]);
      });
      return out;
    }

    function parseLibraryEntry(entry) {
      const raw = String(entry == null ? '' : entry).trim();
      const idx = raw.lastIndexOf('$');
      const base = idx === -1 ? raw : raw.slice(0, idx).trim();
      const code = idx === -1 ? '' : raw.slice(idx + 1).trim();
      return { base, code };
    }

    function countSongsByCode() {
      const counts = new Map();
      ORIGINAL_LIBRARY.forEach(entry => {
        const { code } = parseLibraryEntry(entry);
        if (!code) return;
        counts.set(code, (counts.get(code) || 0) + 1);
      });
      return counts;
    }

    function getSongCount(code) {
      return countSongsByCode().get(String(code || '')) || 0;
    }

    function urlExists(url) {
      return fetch(url, { method: 'HEAD', cache: 'no-store' }).then(res => !!(res && res.ok)).catch(() => false);
    }

    async function resolveGenreImage(name) {
      const clean = sanitizeGenreName(name);
      if (!clean) return '';
      if (state.imageCache.has(clean)) return state.imageCache.get(clean);
      const base = `Music/Images/${encodeURIComponent(clean)}`;
      for (const ext of SERVER_IMAGE_EXTS) {
        const url = `${base}.${ext}`;
        if (await urlExists(url)) {
          state.imageCache.set(clean, url);
          return url;
        }
      }
      state.imageCache.set(clean, '');
      return '';
    }

    async function getServerBaseUrl() {
      if (state.baseUrl) return state.baseUrl;
      if (state.loading) return state.loading;
      state.loading = (async () => {
        try {
          const res = await fetch('./serverip.txt', { cache: 'no-store' });
          if (res.ok) {
            const txt = (await res.text()).trim();
            if (txt) {
              const cleaned = txt.startsWith('http://') || txt.startsWith('https://') ? txt : `http://${txt}`;
              state.baseUrl = new URL(cleaned).origin;
              return state.baseUrl;
            }
          }
        } catch (e) {}
        state.baseUrl = window.location.origin || new URL('.', window.location.href).origin;
        return state.baseUrl;
      })();
      return state.loading;
    }

    async function waitForServerReady(baseUrl, { timeoutMs = 30000, intervalMs = 250 } = {}) {
      const readyUrl = new URL('/api/health', baseUrl).href;
      const deadline = Date.now() + timeoutMs;
      while (Date.now() <= deadline) {
        try {
          const res = await fetch(readyUrl, { cache: 'no-store' });
          if (res.ok) return true;
        } catch (e) {}
        await new Promise(r => setTimeout(r, intervalMs));
      }
      throw new Error('Timed out waiting for server readiness');
    }

    async function uploadBinaryToUrl(blob, url) {
      const requestUrl = String(url || '').trim();
      const response = await fetch(requestUrl, { method: 'PUT', body: blob, credentials: 'omit' });
      if (!response.ok) {
        const body = await response.text().catch(() => '');
        throw new Error(`${response.status} ${response.statusText}${body ? ` — ${body.slice(0, 160)}` : ''}`);
      }
    }

    function buildOutputText(map) {
      const lines = [];
      lines.push('// Flat master music library with genre codes.');
      lines.push('window.musicLibraryGenreMap = {');
      normalizeMap(map).forEach(([code, name], index, arr) => {
        lines.push(`  ${JSON.stringify(code)}: ${JSON.stringify(name)}${index < arr.length - 1 ? ',' : ''}`);
      });
      lines.push('};');
      lines.push('');
      lines.push('window.musicLibrary = [');
      ORIGINAL_LIBRARY.forEach((entry, index) => {
        lines.push(`  ${JSON.stringify(entry)}${index < ORIGINAL_LIBRARY.length - 1 ? ',' : ''}`);
      });
      lines.push('];');
      lines.push('');
      lines.push('// Optional alias for compatibility.');
      lines.push('var musicLibrary = window.musicLibrary;');
      lines.push('window.musicLibraryFlat = Array.isArray(window.musicLibrary) ? window.musicLibrary.slice() : [];');
      lines.push('');
      lines.push('window.musicLibraryParseEntry = function(entry) {');
      lines.push("  const raw = String(entry == null ? '' : entry).trim();");
      lines.push("  const idx = raw.lastIndexOf('$');");
      lines.push("  const base = idx === -1 ? raw : raw.slice(0, idx).trim();");
      lines.push("  const code = idx === -1 ? '' : raw.slice(idx + 1).trim();");
      lines.push("  return { base, codes: code ? [code] : [] }; ");
      lines.push('};');
      lines.push('');
      lines.push('window.musicLibraryNormalizeBase = function(raw) {');
      lines.push("  let s = String(raw == null ? '' : raw).trim();");
      lines.push("  try { s = decodeURIComponent(s); } catch (e) {}");
      lines.push("  s = s.split(/[\\\\/]/).pop();");
      lines.push("  s = s.replace(/\\.(mp3|flac|wav|m4a|ogg|aac|opus|wma|alac|mp4|m4v|mov|webm|mkv)(\\?.*)?$/i, '');");
      lines.push("  s = s.replace(/(?:\\$[A-Za-z0-9+]+)+$/g, '');");
      lines.push("  return s.trim();");
      lines.push('};');
      return lines.join('\n');
    }

    function setStatus(message, kind = '') {
      const el = $('status');
      el.className = `status ${kind}`.trim();
      el.textContent = message;
    }

    function createRow(code, name) {
      const card = document.createElement('div');
      card.className = 'genre-card';
      card.dataset.originalCode = String(code || '');
      card.dataset.originalName = String(name || '');
      card.dataset.pending = '0';

      card.innerHTML = `
        <img class="preview" alt="Genre image preview" src="${DEFAULT_IMAGE}" />
        <div class="stack">
          <div class="fields">
            <label>Code</label>
            <input class="code" type="text" maxlength="8" value="${escapeHtml(code)}" placeholder="A" />
            <label>Name</label>
            <input class="name" type="text" value="${escapeHtml(name)}" placeholder="Alternative" />
          </div>
          <div class="meta">
            <div><strong>Tracks:</strong> <span class="count">${getSongCount(code)}</span></div>
            <div class="fileline" style="margin-top:8px;">
              <input class="file" type="file" accept="image/*" />
              <span class="fileName">No new image selected</span>
            </div>
            <div class="metaLine" style="margin-top:8px;">Image files are published to <code>/Music/Images/</code> using the genre name.</div>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="secondary previewBtn">Preview</button>
          <button type="button" class="warn deleteBtn">Delete</button>
        </div>
      `;

      const codeInput = card.querySelector('.code');
      const nameInput = card.querySelector('.name');
      const fileInput = card.querySelector('.file');
      const fileName = card.querySelector('.fileName');
      const img = card.querySelector('.preview');
      const count = card.querySelector('.count');
      const deleteBtn = card.querySelector('.deleteBtn');
      const previewBtn = card.querySelector('.previewBtn');

      async function refreshPreview() {
        const currentName = sanitizeGenreName(nameInput.value);
        const currentCode = sanitizeGenreCode(codeInput.value);
        count.textContent = String(getSongCount(currentCode));
        if (card.dataset.pending === '1') {
          img.src = card.dataset.objectUrl || DEFAULT_IMAGE;
          return;
        }
        const resolved = await resolveGenreImage(currentName);
        img.src = resolved || DEFAULT_IMAGE;
      }

      function markChanged() {
        const codeChanged = sanitizeGenreCode(codeInput.value) !== String(card.dataset.originalCode || '');
        const nameChanged = sanitizeGenreName(nameInput.value) !== String(card.dataset.originalName || '');
        card.classList.toggle('changed', codeChanged || nameChanged || fileInput.files.length > 0);
      }

      codeInput.addEventListener('input', () => { markChanged(); refreshPreview(); refreshOutput(); });
      nameInput.addEventListener('input', () => { markChanged(); refreshPreview(); refreshOutput(); });
      fileInput.addEventListener('change', () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          fileName.textContent = 'No new image selected';
          card.dataset.pending = '0';
          if (card.dataset.objectUrl) URL.revokeObjectURL(card.dataset.objectUrl);
          card.dataset.objectUrl = '';
          refreshPreview();
          markChanged();
          refreshOutput();
          return;
        }
        fileName.textContent = file.name;
        card.dataset.pending = '1';
        if (card.dataset.objectUrl) URL.revokeObjectURL(card.dataset.objectUrl);
        card.dataset.objectUrl = URL.createObjectURL(file);
        img.src = card.dataset.objectUrl;
        markChanged();
        refreshOutput();
      });
      previewBtn.addEventListener('click', refreshPreview);
      deleteBtn.addEventListener('click', () => {
        const used = getSongCount(codeInput.value);
        if (used && !window.confirm(`Delete ${sanitizeGenreName(nameInput.value) || 'this genre'}? ${used} song(s) still use this code.`)) {
          return;
        }
        if (card.dataset.objectUrl) URL.revokeObjectURL(card.dataset.objectUrl);
        card.remove();
        refreshOutput();
      });

      refreshPreview();
      return card;
    }

    function getCurrentMapFromUi() {
      const rows = Array.from(document.querySelectorAll('.genre-card'));
      const map = {};
      const seenNames = new Set();
      for (const row of rows) {
        const code = sanitizeGenreCode(row.querySelector('.code')?.value || '');
        const name = sanitizeGenreName(row.querySelector('.name')?.value || '');
        if (!code || !name) continue;
        if (Object.prototype.hasOwnProperty.call(map, code)) {
          throw new Error(`Duplicate genre code: ${code}`);
        }
        const nameKey = name.toLowerCase();
        if (seenNames.has(nameKey)) {
          throw new Error(`Duplicate genre name: ${name}`);
        }
        seenNames.add(nameKey);
        map[code] = name;
      }
      return map;
    }

    function getImageUploads() {
      const uploads = [];
      document.querySelectorAll('.genre-card').forEach(row => {
        const file = row.querySelector('.file')?.files?.[0];
        const name = sanitizeGenreName(row.querySelector('.name')?.value || '');
        if (file && name) uploads.push({ file, name, row });
      });
      return uploads;
    }

    function refreshOutput() {
      try {
        const map = getCurrentMapFromUi();
        state.outputText = buildOutputText(map);
        $('outputText').value = state.outputText;
        const original = JSON.stringify(normalizeMap(ORIGINAL_MAP));
        const current = JSON.stringify(normalizeMap(map));
        setStatus(original === current ? 'No genre map changes detected yet.' : 'Genre map has changes ready to publish.', original === current ? 'warn' : 'good');
      } catch (err) {
        $('outputText').value = '';
        setStatus(err.message, 'bad');
      }
    }

    async function uploadImages() {
      const uploads = getImageUploads();
      if (!uploads.length) return 0;
      const baseUrl = await getServerBaseUrl();
      await waitForServerReady(baseUrl);
      let count = 0;
      for (const item of uploads) {
        const extMatch = (item.file.name || '').match(/\.[a-z0-9]+$/i);
        const ext = extMatch ? extMatch[0] : '.jpg';
        const target = new URL(`./Music/Images/${encodeURIComponent(item.name)}${ext}`, baseUrl).href;
        await uploadBinaryToUrl(item.file, target);
        count += 1;
      }
      return count;
    }

    async function saveToServer() {
      let currentMap;
      try {
        currentMap = getCurrentMapFromUi();
      } catch (err) {
        setStatus(err.message, 'bad');
        return false;
      }

      const originalNormalized = JSON.stringify(normalizeMap(ORIGINAL_MAP));
      const currentNormalized = JSON.stringify(normalizeMap(currentMap));
      const imageCount = await uploadImages().catch(err => { throw err; });

      if (originalNormalized === currentNormalized) {
        setStatus(imageCount ? `Uploaded ${imageCount} image${imageCount === 1 ? '' : 's'}; genre map unchanged, so musiclibrary.js was not touched.` : 'No genre changes detected; musiclibrary.js was not touched.', imageCount ? 'good' : 'warn');
        return true;
      }

      const text = buildOutputText(currentMap);
      const baseUrl = await getServerBaseUrl();
      const targetUrl = new URL('./musiclibrary.js', baseUrl).href;
      await waitForServerReady(baseUrl);
      await uploadBinaryToUrl(new Blob([text], { type: 'text/javascript;charset=utf-8' }), targetUrl);
      setStatus(imageCount ? `Uploaded ${imageCount} image${imageCount === 1 ? '' : 's'} and updated musiclibrary.js.` : 'Updated musiclibrary.js with the new genre map.', 'good');
      return true;
    }

    function downloadFile() {
      try {
        const map = getCurrentMapFromUi();
        const text = buildOutputText(map);
        const blob = new Blob([text], { type: 'text/javascript;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'musiclibrary.js';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus('Downloaded musiclibrary.js.', 'good');
      } catch (err) {
        setStatus(err.message, 'bad');
      }
    }

    function refreshPreviewImages() {
      document.querySelectorAll('.genre-card').forEach(row => {
        const img = row.querySelector('.preview');
        const name = row.querySelector('.name')?.value || '';
        const pending = row.dataset.pending === '1';
        if (pending && row.dataset.objectUrl) {
          img.src = row.dataset.objectUrl;
          return;
        }
        resolveGenreImage(name).then(src => { img.src = src || DEFAULT_IMAGE; }).catch(() => { img.src = DEFAULT_IMAGE; });
      });
    }

    function addGenreRow() {
      const row = createRow('', '');
      document.getElementById('genreList').appendChild(row);
      refreshOutput();
      filterRows();
      syncManagedFlowControls();
      return row;
    }

    function getManagedFlowHostDocument() {
      try {
        return window.parent && window.parent !== window ? window.parent.document : null;
      } catch (_) {
        return null;
      }
    }

    function syncManagedFlowControls() {
      if (!EMBED || window.parent === window) return;
      const hostDoc = getManagedFlowHostDocument();
      if (!hostDoc) return;
      const slot = hostDoc.getElementById('addContentModalActions');
      if (!slot) return;

      slot.innerHTML = `
        <span class="embed-flow-meta" title="Genres editor">Genres editor</span>
        <button type="button" class="embed-flow-btn secondary" data-embed-control="addGenre">Add genre</button>
        <button type="button" class="embed-flow-btn secondary" data-embed-control="refresh">Refresh previews</button>
        <button type="button" class="embed-flow-btn" data-embed-control="publish">Update on server</button>
      `;
    }

    function downloadOutput() {
      downloadFile();
    }

    function bindEvents() {
      $('addGenreBtn').addEventListener('click', () => addGenreRow());
      $('updateBtn').addEventListener('click', () => saveToServer().catch(err => setStatus(err.message, 'bad')));
      const downloadBtn = $('downloadBtn');
      if (downloadBtn) downloadBtn.style.display = 'none';
      $('refreshBtn').addEventListener('click', () => { refreshPreviewImages(); refreshOutput(); syncManagedFlowControls(); });
      $('searchInput').addEventListener('input', () => filterRows());
    }

    function filterRows() {
      const term = sanitizeText($('searchInput').value).toLowerCase();
      document.querySelectorAll('.genre-card').forEach(row => {
        const code = row.querySelector('.code')?.value || '';
        const name = row.querySelector('.name')?.value || '';
        const count = String(getSongCount(code));
        const text = `${code} ${name} ${count}`.toLowerCase();
        row.style.display = !term || text.includes(term) ? '' : 'none';
      });
    }

    window.__lmFlowApi = {
      addGenre: () => addGenreRow(),
      refresh: () => { refreshPreviewImages(); refreshOutput(); syncManagedFlowControls(); },
      save: () => saveToServer(),
      download: () => downloadOutput(),
      currentStepKey: () => 'genres',
      refreshControls: syncManagedFlowControls
    };

    function init() {
      const list = $('genreList');
      list.innerHTML = '';
      const entries = normalizeMap(ORIGINAL_MAP);
      if (!entries.length) {
        $('emptyState').style.display = 'block';
      }
      entries.forEach(([code, name]) => list.appendChild(createRow(code, name)));
      $('outputText').value = buildOutputText(ORIGINAL_MAP);
      bindEvents();
      refreshOutput();
      filterRows();
      syncManagedFlowControls();
    }

    init();
  })();
  </script>
</body>
</html>
