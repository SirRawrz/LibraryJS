  document.getElementById('btnSearch').onclick = function searchPDF() {
    const term = document.getElementById('searchTerm').value.trim().toLowerCase();
    if (!pdfDoc || !term) return;
    const resultsList = document.getElementById('resultsList');
    resultsList.innerHTML = '';
    document.getElementById('searchResults').style.display = 'block';
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      pdfDoc.getPage(i).then(page => {
        page.getTextContent().then(tc => {
          const text = tc.items.map(it => it.str).join(' ').toLowerCase();
          if (text.includes(term)) {
      const li = document.createElement('li');
      const idx = text.indexOf(term);
      const start = Math.max(0, idx - 30);
      const end = Math.min(text.length, idx + term.length + 30);
      const snippet = (start > 0 ? '...':'') + text.substring(start, end) + (end < text.length ? '...':'');
      li.innerHTML = '<strong>Page ' + i + ':</strong> ' + snippet;
            li.onclick = () => { pageNum = i; renderDoublePage(i); document.getElementById('searchResults').style.display = 'none'; };
            resultsList.appendChild(li);
          }
        });
      });
    }
  };

<script>
  let currentBookTitle = "";
  let pdfDoc = null;
  let pageNum = 1;
  let pageRendering = false;
  let pageNumPending = null;
  let isDarkMode = false;    // Default to light mode off
  let isFullscreen = false;  // Track fullscreen state
  let currentBook = "";      // To track the current book file



const items = (window.libraryData && window.libraryData.items) || [];

   document.addEventListener("DOMContentLoaded", function() {
  const container = document.getElementById('bookContainer');

  // Create the "Back to Title Selection" button
  const backButton = document.createElement('button');
  backButton.className = 'return-button';
  backButton.innerText = 'Back to Title Selection';
  backButton.onclick = () => {
    window.location.href = './index.html';
  };
  container.appendChild(backButton);

  // Loop through each item (book or group)
  items.forEach(item => {
    if (item.group) {
      // Create group header
      const groupHeader = document.createElement('div');
      groupHeader.classList.add('group-header');
      groupHeader.innerHTML = `
        <img src="${item.cover}" alt="${item.title}">
        <p>${item.title}</p>
      `;
      groupHeader.onclick = () => {
        const groupContainer = groupHeader.nextElementSibling;
        groupContainer.style.display =
          groupContainer.style.display === 'flex' ? 'none' : 'flex';
      };
      container.appendChild(groupHeader);

      // Create a container for the group's books
      const groupContainer = document.createElement('div');
      groupContainer.classList.add('group-container');
      groupContainer.style.display = 'none';

      item.books.forEach(book => {
        const bookDiv = document.createElement('div');
        bookDiv.classList.add('book');
        bookDiv.innerHTML = `
          <img src="${book.cover}" alt="${book.title}">
          <p>${book.title}</p>
        `;
        bookDiv.onclick = () => { openPDF(book.file, book.title); };
        groupContainer.appendChild(bookDiv);
      });
      container.appendChild(groupContainer);

    } else {
      const bookDiv = document.createElement('div');
      bookDiv.classList.add('book');
      bookDiv.innerHTML = `
        <img src="${item.cover}" alt="${item.title}">
        <p>${item.title}</p>
      `;
      bookDiv.onclick = () => { openPDF(item.file, item.title); };
      container.appendChild(bookDiv);
    }
  });

  // -------- Deep‑link handling starts here --------
  const params = new URLSearchParams(window.location.search);
  const target = params.get('Guidebook');
  if (target) {
    const decoded = decodeURIComponent(target);
    // normalize: remove spaces and hyphens, lowercase
    const norm = decoded.replace(/[\s\-]/g, '').toLowerCase();
    let found = false;

    for (const item of items) {
      if (!item.group) {
       if (item.title.replace(/[\s\-]/g, '').toLowerCase() === norm) {
          openPDF(item.file, item.title);
          found = true;
          break;
        }
      }
    }

    if (!found) {
      for (const item of items) {
        if (item.group) {

function renderDoublePage(num) {
  if (!pdfDoc) return;
  pageRendering = true;

  const leftPageNum = num;
  const rightPageNum = num + 1;

  const canvasLeft = document.createElement('canvas');
  const canvasRight = document.createElement('canvas');
  const ctxLeft = canvasLeft.getContext('2d');
  const ctxRight = canvasRight.getContext('2d');

  // ✅ Mark canvases as allowed for page navigation (not focusable)
  canvasLeft.setAttribute('data-allow-page-nav', '1');
  canvasRight.setAttribute('data-allow-page-nav', '1');

  // Render left page
  pdfDoc.getPage(leftPageNum).then(page => {
    const scale = 1.5;
    const viewportLeft = page.getViewport({ scale: scale });

    canvasLeft.height = viewportLeft.height;
    canvasLeft.width = viewportLeft.width;

    const renderContextLeft = {
      canvasContext: ctxLeft,
      viewport: viewportLeft
    };

    page.render(renderContextLeft).promise.then(() => {
      if (rightPageNum <= pdfDoc.numPages) {
        pdfDoc.getPage(rightPageNum).then(page => {
          const viewportRight = page.getViewport({ scale: scale });

          canvasRight.height = viewportRight.height;
          canvasRight.width = viewportRight.width;

          const renderContextRight = {
            canvasContext: ctxRight,
            viewport: viewportRight
          };

          page.render(renderContextRight).promise.then(() => {
            const viewer = document.getElementById('viewer');
            viewer.innerHTML = '';
            viewer.appendChild(canvasLeft);
            viewer.appendChild(canvasRight);

            // Apply filters based on mode
            if (isDarkMode) {
              canvasLeft.style.filter = 'invert(1)';
              canvasRight.style.filter = 'invert(1)';
            } else {
              canvasLeft.style.filter = 'none';
              canvasRight.style.filter = 'none';
            }

            pageRendering = false;

            // Save the current page number for this book
            localStorage.setItem(`bookPage_${currentBook}`, pageNum);

            if (pageNumPending !== null) {
              renderDoublePage(pageNumPending);
              pageNumPending = null;
            }
          });
        });
      }
    });
  });
}

    function backupProgress() {
      const backupData = {};

        if (key.startsWith('bookPage_')) {
          backupData[key] = localStorage.getItem(key);

    // Restore function: reads a backup file and updates localStorage accordingly
    function restoreProgress(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const backupData = JSON.parse(e.target.result);
          for (const key in backupData) {
            if (backupData.hasOwnProperty(key)) {
              localStorage.setItem(key, backupData[key]);

// only advance pages when focus is on prev/next buttons OR inside #viewer OR on elements explicitly allowing page nav.
document.addEventListener('keydown', (e) => {
  const reader = document.getElementById('reader-container');
  if (!reader || reader.style.display !== 'flex') return;

  // Only care about left/right
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;

  const active = document.activeElement;
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  // helper — returns true if an element is allowed to trigger page nav
  const isAllowedForPageNav = (el) => {
    if (!el) return false;
    if (el === prevBtn || el === nextBtn) return true;
    if (el.closest && el.closest('#viewer')) return true;              // e.g. focused canvas inside viewer
    if (el.hasAttribute && el.hasAttribute('data-allow-page-nav')) return true;
    return false;
  };

  if (!isAllowedForPageNav(active)) {
    // Not allowed: let the key event do normal focus movement (don't preventDefault)
    return;
  }

  // allowed: flip pages and consume the event
  e.preventDefault();
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'ArrowRight') nextPage();

function closeBookmarkDialog() {

  const noteInput = document.getElementById('bookmarkNote');

function loadBookmarks() {
  const list = document.getElementById('bookmarkList');
  list.innerHTML = '';
  const profile = getActiveProfile();
  const prefix = `bookmark-${profile}-${currentBook}-`;

  Object.keys(localStorage).forEach(k => {
    if (k.startsWith(prefix)) {
      const value = localStorage.getItem(k);
      let data;

      try {
        data = JSON.parse(value);
        // Handle old format where only page number was stored
        if (typeof data === 'number') {
          data = { page: data, note: '' };
        }
      } catch (e) {
        data = { page: parseInt(value, 10), note: '' };
      }

      const li = document.createElement('li');

      // Top row: Page number and remove button
      const topRow = document.createElement('div');
      topRow.style.display = 'flex';

      const removeBtn = document.createElement('button');
      removeBtn.textContent = '×';
      removeBtn.className = 'remove-btn';
      removeBtn.onclick = (e) => {
        e.stopPropagation();
        localStorage.removeItem(k);
        loadBookmarks();

      topRow.appendChild(pageSpan);
      topRow.appendChild(removeBtn);
      li.appendChild(topRow);

<script>
// ==== SERVER-BASED BOOKMARK MANAGEMENT ====
const BOOKMARK_PATH = '/Books/progress/';

function wrapPayload(obj) {
  return `[[[${JSON.stringify(obj)}]]]`;
}
async function uploadBookmarks(profile, bookKey, bookmarks) {
  const payload = wrapPayload(bookmarks);
  const blob = new Blob([payload], { type: 'application/json' });
  const form = new FormData();
  form.append('files[]', blob, `${profile}-${bookKey}-Bookmarks`);
  try {
    await fetch(`/api/file/upload?path=${encodeURIComponent(BOOKMARK_PATH)}`, {
      method: 'PUT',
      body: form
    });
    console.log('Bookmarks uploaded');
  } catch (err) {
    console.error('Bookmark upload failed:', err);
  }
}
async function loadServerBookmarks(profile, bookKey) {
  try {
    const res = await fetch(`${BOOKMARK_PATH}${encodeURIComponent(profile + '-' + bookKey + '-Bookmarks')}`, { cache: 'no-store' });
    if (!res.ok) throw new Error('No server save');
    const txt = await res.text();
    const m = txt.match(/\[\[\[([\s\S]*?)\]\]\]/);
    if (!m) throw new Error('Bad payload');
    return JSON.parse(m[1]);
  } catch (err) {
    console.warn('Could not load server bookmarks:', err);
    return null;
  }
}
function getBookKey(bookUrl) {
  return bookUrl.replace(/[^a-z0-9]/gi, '_');
}

// Bookmark dialog functionality
function openBookmarkDialog() {
  const dlg = document.getElementById('bookmarkDialog');
  if (dlg) {
    document.getElementById('bookmarkTitle').textContent = `${currentBookTitle}'s Bookmarks`;
    dlg.style.display = 'block';
    loadBookmarks();
  }
}
function closeBookmarkDialog() {
  const dlg = document.getElementById('bookmarkDialog');
  if (dlg) dlg.style.display = 'none';
}
async function addBookmark() {
  const noteInput = document.getElementById('bookmarkNote');
  const note = noteInput ? noteInput.value.trim() : '';
  const profile = getActiveProfile();
  const bookKey = getBookKey(currentBook);
  const key = `bookmark-${profile}-${bookKey}-${pageNum}`;
  const data = { page: pageNum, note };
  localStorage.setItem(key, JSON.stringify(data));
  const bookmarks = await getAllBookmarksForBook(profile, bookKey);
  bookmarks[pageNum] = note;
  await uploadBookmarks(profile, bookKey, bookmarks);
  if (noteInput) noteInput.value = '';
  loadBookmarks();
}
async function getAllBookmarksForBook(profile, bookKey) {
  const prefix = `bookmark-${profile}-${bookKey}-`;
  const bookmarks = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) {
      const page = k.split('-').pop();
      try {
        const data = JSON.parse(localStorage.getItem(k));
        bookmarks[page] = data.note;
      } catch (e) {
        console.warn('Invalid bookmark format', k);
      }
    }
  }
  return bookmarks;
}
async function loadBookmarks() {
  const list = document.getElementById('bookmarkList');
  if (!list) return;
  list.innerHTML = '';
  const profile = getActiveProfile();
  const bookKey = getBookKey(currentBook);
  const serverBookmarks = await loadServerBookmarks(profile, bookKey);
  if (serverBookmarks) {
    for (const [page, note] of Object.entries(serverBookmarks)) {
      const key = `bookmark-${profile}-${bookKey}-${page}`;
      localStorage.setItem(key, JSON.stringify({ page: parseInt(page), note }));
    }
  }
  const prefix = `bookmark-${profile}-${bookKey}-`;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) {
      let data;
      try {
        data = JSON.parse(localStorage.getItem(k));
        if (typeof data === 'number') {
          data = { page: data, note: '' };
        }
      } catch (e) {
        data = { page: parseInt(localStorage.getItem(k), 10), note: '' };
      }
      const li = document.createElement('li');
      const topRow = document.createElement('div');
      topRow.style.display = 'flex';
      topRow.style.justifyContent = 'space-between';
      topRow.style.alignItems = 'center';
      const pageSpan = document.createElement('span');
      pageSpan.textContent = `Page ${data.page}`;
      const removeBtn = document.createElement('button');
      removeBtn.textContent = '×';
      removeBtn.className = 'remove-btn';
      removeBtn.onclick = async (e) => {
        e.stopPropagation();
        localStorage.removeItem(k);
        const all = await getAllBookmarksForBook(profile, bookKey);
        delete all[data.page];
        await uploadBookmarks(profile, bookKey, all);
        loadBookmarks();
      };
      topRow.appendChild(pageSpan);
      topRow.appendChild(removeBtn);
      li.appendChild(topRow);
      if (data.note) {
        const noteDiv = document.createElement('div');
        noteDiv.className = 'bookmark-note';
        noteDiv.textContent = data.note;
        li.appendChild(noteDiv);
      }
      li.onclick = () => {
        pageNum = data.page;
        if (typeof renderDoublePage === 'function') renderDoublePage(pageNum);
        closeBookmarkDialog();
      };
      list.appendChild(li);
    }
  }
}
function updatePageIndicator() {
  // Remove any old indicators
  document.querySelector('.page-indicator')?.remove();
  document.querySelector('.tile-indicator')?.remove();

  const container = document.getElementById('reader-container');

  if (window.halfMode) {
    // --- Tile indicator (as before) ---
  const tileIndicator = document.createElement('div');

<script>
function normalizeTitleKey(value) {
  return (value || '').replace(/[\s\-]/g, '').toLowerCase();
}

function readStartPageFromQuery(params) {
  const candidates = ['page', 'pageNum', 'startPage'];
  for (const key of candidates) {
    const raw = params.get(key);
    if (raw) {
      const num = parseInt(raw, 10);
      if (!Number.isNaN(num) && num > 0) return num;
    }
  }
  return null;
}

function findLibraryItemByTitle(queryTitle) {
  const normalized = normalizeTitleKey(decodeURIComponent(queryTitle));
  for (const item of items) {
    if (item && !item.group && normalizeTitleKey(item.title) === normalized) {
      return item;
    }
    if (item && item.group && Array.isArray(item.books)) {
      for (const book of item.books) {
        if (normalizeTitleKey(book.title) === normalized) {
          return book;
        }
      }
    }
  }
  return null;
}

window.addEventListener('DOMContentLoaded', function() {
  const libraryTitle = (window.libraryData && window.libraryData.title) || 'Book Library';
  document.title = libraryTitle;
  const heading = document.querySelector('h1.centered-title');
  if (heading) heading.textContent = libraryTitle;

  const params = new URLSearchParams(window.location.search);
  const requestedTitle = params.get('Book') || params.get('Guidebook') || params.get('title');
  if (!requestedTitle) return;

  const found = findLibraryItemByTitle(requestedTitle);
  if (!found) return;

  const startPage = readStartPageFromQuery(params);
  openPDF(found.file, found.title, startPage);
});
</script>

(function () {

    if (window.halfMode) return 'half';

  function getBasePageNumber() {
    const raw = (typeof pageNum !== 'undefined') ? pageNum : window.pageNum;
    const n = parseInt(raw || 1, 10);
    return Number.isFinite(n) && n > 0 ? n : 1;
  }

  function getCurrentTile() {
    const raw = (typeof currentTile !== 'undefined') ? currentTile : window.currentTile;
    const n = parseInt(raw || 1, 10);
    return Number.isFinite(n) && n > 0 ? n : 1;
  }

  function getDisplayedPageNumber() {
    const mode = getPageViewMode();
    const basePage = getBasePageNumber();

    if (mode === 'half') {
      return getCurrentTile() >= 3 ? basePage + 1 : basePage;
    }

    return basePage;
  }

  function getPageIndicatorText() {
    const mode = getPageViewMode();
    const basePage = getBasePageNumber();

    if (mode === 'single') {
      return `Pg. ${basePage}`;
    }

    if (mode === 'half') {
      const displayedPage = getDisplayedPageNumber();
      const tile = getCurrentTile();
      const arrow = (tile === 1 || tile === 3) ? '↑' : '↓';
      return `Pg. ${displayedPage}${arrow}`;
    }

    const totalPages = (typeof pdfDoc !== 'undefined' && pdfDoc && Number.isFinite(pdfDoc.numPages))
      ? pdfDoc.numPages
      : basePage + 1;
    return `Pg. ${basePage} - ${Math.min(basePage + 1, totalPages)}`;
  }

  function buildModePreview(mode, basePage) {
    const tileIndicator = document.createElement('div');
    tileIndicator.className = `tile-indicator ${mode}`;

    const tileCount = mode === 'half' ? 4 : 2;
    const activeIndex = mode === 'half'
      ? getCurrentTile()
      : ((basePage % 2 === 0) ? 2 : 1);

    for (let i = 1; i <= tileCount; i++) {
      const tile = document.createElement('div');
      tile.className = `tile ${i === activeIndex ? 'active' : ''}`;
      tile.dataset.tile = String(i);

      if (mode === 'half') {
        const labels = ['Upper-left', 'Lower-left', 'Upper-right', 'Lower-right'];
        tile.title = labels[i - 1];
        tile.addEventListener('click', () => {
          if (typeof window.currentTile !== 'undefined') {
            window.currentTile = i;
          }
          if (typeof currentTile !== 'undefined') {
            currentTile = i;
          }
          if (typeof renderHalfPage === 'function') {
            renderHalfPage(getBasePageNumber(), i);
          }
          updatePageIndicator();
        });
      } else {
        tile.title = i === 1 ? 'Left side' : 'Right side';
      }

      tileIndicator.appendChild(tile);
    }

    return tileIndicator;
  }

  function updatePageIndicator() {
    const container = document.getElementById('reader-container');
    if (!container) return;

    container.querySelector('.page-indicator')?.remove();
    container.querySelector('.tile-indicator')?.remove();
    container.querySelector('#pageNoteDisplay')?.remove();

    const mode = getPageViewMode();
    const basePage = getBasePageNumber();
    const indicator = document.createElement('div');
    indicator.className = 'page-indicator';

    indicator.onclick = typeof openBookmarkDialog === 'function' ? openBookmarkDialog : null;

    const notePage = getDisplayedPageNumber();

  window.updatePageIndicator = updatePageIndicator;

<!-- ==== SERVER-BASED PROGRESS MANAGEMENT AND BOOKMARK MANAGEMENT ====
     Using only server; no localStorage. Cancelling previous uploads with AbortController. -->
<script>
const PROGRESS_PATH = '/Books/progress/';
const BOOKMARK_PATH = '/Books/progress/';
const uploadControllers = {};

function wrapPayload(obj) {
  return `[[[${JSON.stringify(obj)}]]]`;
}

async function uploadWithCancel(path, payloadObj, filename) {
  // Cancel previous for this filename
  if (uploadControllers[filename]) {
    uploadControllers[filename].abort();
  }
  const controller = new AbortController();
  uploadControllers[filename] = controller;

  const blob = new Blob([wrapPayload(payloadObj)], { type: 'application/json' });
  const form = new FormData();
  form.append('files[]', blob, filename);

  try {
    await fetch(path + '?path=' + encodeURIComponent(path), {
      method: 'PUT',
      body: form,
      signal: controller.signal
    });
    console.log('Upload success', filename);
  } catch (err) {
    if (err.name === 'AbortError') {
      console.log('Upload aborted', filename);
    } else {
      console.error('Upload failed', err);
    }
  } finally {
    delete uploadControllers[filename];
  }
}

async function uploadPageProgress(profile, bookKey, page) {
  await uploadWithCancel('/api/file/upload', { [bookKey]: page }, `${profile}-${bookKey}`);
}

async function loadPageProgress(profile, bookKey) {
  try {
    const res = await fetch(PROGRESS_PATH + encodeURIComponent(profile + '-' + bookKey), { cache: 'no-store' });
    if (!res.ok) throw new Error();
    const txt = await res.text();
    const m = txt.match(/\[\[\[([\s\S]*?)\]\]\]/);
    if (!m) throw new Error();
    const parsed = JSON.parse(m[1]);
    return parsed[bookKey] || 1;
  } catch {
    return 1;
  }
}

const toggleBtn = document.getElementById('pageModeToggle');
if (toggleBtn) {
  window.pageViewMode = window.pageViewMode || 'double'; // double | half | single

  const syncToggleLabel = () => {
    const mode = window.pageViewMode || 'double';

    if (mode === 'double') {

      toggleBtn.dataset.mode = 'double';
      toggleBtn.classList.remove('active');
    } else if (mode === 'half') {

      toggleBtn.dataset.mode = 'single';

    }
  };

  const renderOnePage = function (num) {
    if (!pdfDoc) return;
    pageRendering = true;

    pdfDoc.getPage(num).then(page => {
      const scale = 1.5;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');

      });
    });
  };

  const renderCurrent = () => {
    if (!pdfDoc) return;
    const mode = window.pageViewMode || 'double';

    if (mode === 'half') {
      if (typeof renderHalfPage !== 'function') {
        initHalfPageMode();
        return;
      }
      window.halfMode = true;
      renderHalfPage(pageNum, currentTile || 1);
    } else if (mode === 'single') {
      window.halfMode = false;
      renderOnePage(pageNum);
    } else {
      window.halfMode = false;
      renderDoublePage(pageNum);
    }

    updatePageIndicator();
  };

  const syncNav = () => {
    window.nextPage = () => {
      const mode = window.pageViewMode || 'double';

      if (mode === 'half') {
        return typeof nextHalf === 'function' ? nextHalf() : null;
      }

      if (!pdfDoc) return;

      pageNum = Math.min(pdfDoc.numPages, pageNum + (mode === 'single' ? 1 : 2));
      renderCurrent();
    };

    window.prevPage = () => {
      const mode = window.pageViewMode || 'double';

      if (mode === 'half') {
        return typeof prevHalf === 'function' ? prevHalf() : null;
      }

      if (!pdfDoc) return;

      pageNum = Math.max(1, pageNum - (mode === 'single' ? 1 : 2));
      renderCurrent();
    };
  };

  const setMode = (mode) => {
    window.pageViewMode = mode;
    window.halfMode = mode === 'half';
    syncToggleLabel();
    syncNav();
    renderCurrent();
  };

  toggleBtn.addEventListener('click', () => {
    const mode = window.pageViewMode || 'double';
    const nextMode = mode === 'double' ? 'half' : mode === 'half' ? 'single' : 'double';
    setMode(nextMode);
  });

  window.applyPageMode = setMode;

  // 2) Half-Page bootstrap (runs once, on demand)
  function initHalfPageMode() {
    window.pageNum     = window.pageNum     || 1;
    window.currentTile = window.currentTile || 1;
    window.halfMode    = true;

    window.renderHalfPage = function (pageNum, tile) {
      if (!pdfDoc) return;
      pageRendering = true;
      let targetPage = (tile <= 2) ? pageNum : pageNum + 1;

      pdfDoc.getPage(targetPage).then(page => {
        const isTopTile = (tile % 2 === 1);
        const baseScale = 1.5;
        const fullVp    = page.getViewport({ scale: baseScale });

        // off-screen
        const offCanvas = document.createElement('canvas');
        const offCtx    = offCanvas.getContext('2d');
        offCanvas.width  = Math.round(fullVp.width);
        offCanvas.height = Math.round(fullVp.height);

        page.render({ canvasContext: offCtx, viewport: fullVp }).promise.then(() => {
          const isOddPage = (targetPage % 2 === 1);
          const hCrop = {
            left: 0.01,
            right: 0.01
          };
          const vCrop = isTopTile
            ? { yStart: 0.01, height: 0.49 }
            : { yStart: 0.50, height: 0.49 };

          const cropX = Math.round(fullVp.width  * hCrop.left);
          const cropW = Math.round(fullVp.width  * (1 - hCrop.left - hCrop.right));
          const cropY = Math.round(fullVp.height * vCrop.yStart);
          const cropH = Math.round(fullVp.height * vCrop.height);

          // clear and draw
          const viewer = document.getElementById('viewer');
          viewer.innerHTML = '';
          const canvas = document.createElement('canvas');
          canvas.width  = cropW;
          canvas.height = cropH;
          canvas.style.filter = isDarkMode ? 'invert(1)' : '';
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = false;

          ctx.drawImage(
            offCanvas,
            cropX, cropY, cropW, cropH,
            0,    0,     cropW, cropH
          );
          viewer.appendChild(canvas);
          pageRendering = false;

          if (tile === 1) {
            localStorage.setItem(
              `bookPage-${getActiveProfile()}-${currentBook}`,
              pageNum
            );
          }
          updatePageIndicator();
        });
      });
    };

    // c) nextHalf / prevHalf
    window.nextHalf = function() {
      if (!pdfDoc) return;
      if (currentTile < 4) {
        currentTile++;
      } else {
        if (pageNum + 2 <= pdfDoc.numPages) pageNum += 2;
        currentTile = 1;
      }
      window.pageNum = pageNum;
      renderHalfPage(pageNum, currentTile);
      updatePageIndicator();
    };

    window.prevHalf = function() {
      if (!pdfDoc) return;
      if (currentTile > 1) {
        currentTile--;
      } else {
        if (pageNum - 2 >= 1) pageNum -= 2;
        currentTile = 4;
      }
      window.pageNum = pageNum;
      renderHalfPage(pageNum, currentTile);
      updatePageIndicator();
    };

    // d) override Next/Prev globally
    const _origNext = window.nextPage;
    const _origPrev = window.prevPage;
    window.nextPage = () => window.pageViewMode === 'half' ? nextHalf() : _origNext();
    window.prevPage = () => window.pageViewMode === 'half' ? prevHalf() : _origPrev();

    // e) initial draw
    renderHalfPage(pageNum, currentTile);
    updatePageIndicator();
  }

  window.initHalfPageMode = initHalfPageMode;

  const originalRenderDoublePage = window.renderDoublePage;
  window.renderDoublePage = function (num) {
    const mode = window.pageViewMode || 'double';
    pageNum = num;

    if (mode === 'half') {
      if (typeof renderHalfPage !== 'function') {
        initHalfPageMode();
        return;
      }
      window.halfMode = true;
      return renderHalfPage(num, currentTile || 1);
    }

    if (mode === 'single') {
      window.halfMode = false;
      return renderOnePage(num);
    }

    window.halfMode = false;
    return originalRenderDoublePage(num);
  };

  syncNav();
  syncToggleLabel();
}

<script>
(function () {
  function initReaderLock() {
    const reader = document.getElementById('reader-container');
    if (!reader || document.getElementById('readerLockBtn')) return;

    const style = document.createElement('style');
    style.textContent = `
      #readerLockBtn {
        position: fixed;
        right: 14px;
        bottom: 14px;
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        line-height: 1;
        opacity: 0.5;
        cursor: pointer;
        z-index: 10020;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        pointer-events: auto;
      }
      #readerLockBtn.is-locked {
        background: rgba(255, 215, 0, 0.45);
      }
      #reader-container.reader-locked .reader-buttons {
        display: none !important;
      }
      #reader-container.reader-locked .controls button {
        opacity: 0.2 !important;
      }
      #reader-container.reader-locked .controls button:hover {
        opacity: 0.2 !important;
        transform: none !important;
      }
      #reader-container.reader-locked #readerLockBtn {
        opacity: 0.5 !important;
        display: flex !important;
      }
    `;
    document.head.appendChild(style);

    const lockBtn = document.createElement('button');
    lockBtn.id = 'readerLockBtn';
    lockBtn.type = 'button';
    lockBtn.setAttribute('aria-label', 'Lock reader controls');
    lockBtn.setAttribute('title', 'Lock reader controls');
    lockBtn.textContent = '🔓';
    reader.appendChild(lockBtn);

    let locked = false;

    function sync() {
      const readerVisible = reader.style.display === 'flex';
      reader.classList.toggle('reader-locked', locked);
      lockBtn.classList.toggle('is-locked', locked);
      lockBtn.textContent = locked ? '🔒' : '🔓';
      lockBtn.style.display = readerVisible ? 'flex' : 'none';
    }

    function setLocked(next) {
      locked = !!next;
      sync();
    }

    function toggleLocked() {
      setLocked(!locked);
    }

    lockBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      toggleLocked();
    });

    function wrap(name, fn) {
      const original = window[name];
      if (typeof original !== 'function') return;
      window[name] = function (...args) {
        const result = original.apply(this, args);
        queueMicrotask(sync);
        return result;
      };
      window[name]._original = original;
    }

    wrap('openPDF');
    wrap('closeReader');
    wrap('renderDoublePage');

    const observer = new MutationObserver(sync);
    observer.observe(reader, { attributes: true, attributeFilter: ['style', 'class'] });

    sync();
    window.__readerLockSync = sync;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initReaderLock);
  } else {
    initReaderLock();
  }
})();
</script>
